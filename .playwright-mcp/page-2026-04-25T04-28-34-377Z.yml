                - generic [ref=e7755]: "n"
              - generic [ref=e7757]: "n"
          - text: underlying features, we can try to find matrices
          - generic [ref=e7758]:
            - text: A\sim [d,n]
            - generic [ref=e7760]:
              - math [ref=e7762]:
                - generic [ref=e7764]:
                  - generic [ref=e7765]: A
