    - paragraph [ref=e5762]:
      - text: A striking parallel between our toy model and compressed sensing is the existence of phase changes.
      - superscript [ref=e5763]: "24"
      - text: In compressed sensing, if one considers a two-dimensional space defined by the sparsity and dimensionality of the vectors, there are sharp phase changes where the vector can almost surely be recovered in one regime and almost surely not in the other
      - generic [ref=e5766]: "[55, 56]"
      - text: . It isn't immediately obvious how to connect these phase changes in compressed sensing – which apply to recovery of the entire vector, rather than one particular component – to the phase changes we observe in features and neurons. But the parallel is suspicious.
    - paragraph [ref=e5767]:
      - text: Another interesting line of work has tried to build useful sparse recovery algorithms using neural networks
      - generic [ref=e5770]: "[57, 58, 59]"
      - text: . While we find it useful for analysis purposes to view the toy model as a sparse recovery algorithm, so that we may apply sparse recovery lower bounds, we do not expect that the toy model is useful for the problem of sparse recovery. However, there may be an exciting opportunity to relate our understanding of the phenomenon of superposition to these and other techniques.
    - heading "Sparse Coding and Dictionary Learning" [level=4] [ref=e5771]:
      - link "Sparse Coding and Dictionary Learning" [ref=e5772] [cursor=pointer]:
        - /url: "#related-sparse-coding"
    - paragraph [ref=e5773]:
      - link "Sparse Coding" [ref=e5774] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Sparse_dictionary_learning
      - text: studies the problem of finding a sparse representation of dense data. One can think of it as being like compressed sensing, except the matrix projecting sparse vectors into the lower dimensional space is also unknown. This topic goes by many different names including sparse coding (most common in neuroscience), dictionary learning (in computer science), and sparse frame design (in mathematics). For a general introduction, we refer readers to a textbook by Michael Elad
      - generic [ref=e5777]: "[60]"
      - text: .
    - paragraph [ref=e5778]:
      - text: Classic sparse coding algorithms take an expectation-maximization approach (this includes Olshausen et al's early work
      - generic [ref=e5781]: "[26]"
      - text: ", the MOD algorithm"
      - generic [ref=e5784]: "[61]"
      - text: ", and the k-SVD algorithm"
      - generic [ref=e5787]: "[62]"
      - text: ). More recently, new methods based on gradient descent and autoencoders have begun building on these ideas
      - generic [ref=e5790]: "[63, 64]"
      - text: .
    - paragraph [ref=e5791]:
      - text: From our perspective, sparse coding is interesting because it's probably the most natural mathematical formulation of trying to "solve superposition" by discovering which directions correspond to features.
      - superscript [ref=e5792]: "25"
      - text: But can we actually use these methods to solve superposition in practice? Previous work has attempted to use sparse coding to find sparse structure
      - generic [ref=e5795]: "[1, 2]"
      - text: . More recently,
      - link "research" [ref=e5796] [cursor=pointer]:
        - /url: https://www.lesswrong.com/posts/z6QQJbtpkEAX3Aojj/interim-research-report-taking-features-out-of-superposition
      - text: by Sharkey et al
      - generic [ref=e5799]: "[65]"
      - text: following up on the original publication of this paper has had preliminary success in extracting features out of superposition in toy models using a sparse autoencoder. In general, we're only in the very preliminary investigations of using sparse coding and dictionary learning in this way, but the situation seems quite optimistic. See the section
      - 'link "Approach 2: Finding an Overcomplete Basis" [ref=e5800] [cursor=pointer]':
        - /url: "#strategic-approach-overcomplete"
      - text: for more discussion.
    - heading "Theories of Neural Coding and Representation" [level=4] [ref=e5801]:
      - link "Theories of Neural Coding and Representation" [ref=e5802] [cursor=pointer]:
        - /url: "#related-codes"
    - paragraph [ref=e5803]: Our work explores representations in artificial “neurons”. Neuroscientists study similar questions in biological neurons. There are a variety of theories for how information could be encoded by a group of neurons. At one extreme is a local code, in which every individual stimulus is represented by a separate neuron. At the other extreme is a maximally-dense distributed code, in which the information-theoretic capacity of the population is fully utilized, and every neuron in the population plays a necessary role in representing every input.
    - paragraph [ref=e5804]:
      - text: "One challenge in comparing our work with the neuroscience literature is that a “distributed representation” seems to mean different things. Consider an overly-simplified example of a population of neurons, each taking a binary value of active or inactive, and a stimulus set of sixteen items: four shapes, with four colors (example borrowed from"
      - generic [ref=e5807]: "[6]"
      - text: ). A “local code” would be one with a “red triangle” neuron, a “red square” neuron, and so on. In what sense could the representation be made more “distributed”? One sense is by representing independent features separately — e.g. four “shape” neurons and four “color” neurons. A second sense is by representing more items than neurons — i.e. using a binary code over four neurons to encode 2^4 = 16 stimuli. In our framework, these senses correspond to decomposability (representing stimuli as compositions of independent features) and superposition (representing more features than neurons, at cost of interference if features co-occur).
    - paragraph [ref=e5808]:
      - text: Decomposability doesn’t necessarily mean each feature gets its own neuron. Instead, it could be that each feature corresponds to a “direction in activation-space”
      - superscript [ref=e5810]: "26"
      - text: ", given scalar “activations” (which in biological neurons would be firing rate). Then, only if there is a privileged basis, “feature neurons” are incentivized to develop. In biological neurons, metabolic considerations are often hypothesized to induce a privileged basis, and thus a “sparse code”. This would be expected if the nervous system’s energy expenditure increases linearly or sublinearly with firing rate."
      - superscript [ref=e5812]: "27"
      - text: Additionally, neurons are the units by which biological neural networks can implement non-linear transformations, so if a feature needs to be non-linearly transformed, a “feature neuron” is a good way to achieve that.
    - paragraph [ref=e5813]: Any decomposable linear code that uses orthogonal feature vectors is functionally equivalent from the viewpoint of a linear readout. So, a code can both be “maximally distributed” — in the sense that every neuron participates in representing every input, making each neuron extremely polysemantic — and also have no more features than it has dimensions. In this conception, it’s clear that a code can be fully “distributed” and also have no superposition.
    - paragraph [ref=e5814]:
      - text: A notable difference between our work, and the neuroscience literature we have encountered, is that we consider as a central concept the likelihood that features co-occur with some probability.
      - superscript [ref=e5816]: "28"
      - text: A “maximally-dense distributed code” makes the most sense in the case where items never co-occur; if the network only needs to represent one item at a time, it can tolerate a very extreme degree of superposition. By contrast, a network that could plausibly need to represent all the items at once can do so without interference between the items if it uses a code with no superposition. One example of high feature co-occurrence could be encoding spatial frequency in a receptive field; these visual neurons need to be able to represent white noise, which has energy at all frequencies. An example of limited co-occurrence could be a motor “reach” task to discrete targets, far enough apart that only one can be reached at a time.
    - paragraph [ref=e5817]:
      - text: One hypothesis in neuroscience is that highly compressed representations might have an important use in long-range communication between brain areas
      - generic [ref=e5820]: "[68]"
      - text: . Under this theory, sparse representations are used within a brain area to do computation, and then are compressed for transmission across a small number of axons. Our experiments with
      - link "the absolute value toy model" [ref=e5821] [cursor=pointer]:
        - /url: "#superposition-computation"
      - text: shows that networks can do useful computation even under a code with a moderate degree of superposition. This suggests that all neural codes, not just those used for efficient communication, could plausibly be “compressed” to some degree; the regional code might not necessarily need to be decompressed to a fully sparse one.
    - paragraph [ref=e5822]:
      - text: It's worth noting that the term "distributed representation" is also used in deep learning, and has the same ambiguities of meaning there. Our sense is that some influential early works (e.g.
      - generic [ref=e5825]: "[7]"
      - text: ) may have primarily meant the "independent features are represented independently" decomposability sense, but we believe that other work intends to suggest something similar to what we call superposition.
    - heading "Additional Connections" [level=4] [ref=e5826]:
      - link "Additional Connections" [ref=e5827] [cursor=pointer]:
        - /url: "#additional-connections"
    - paragraph [ref=e5828]: "After publishing the original version of this paper, a number of readers generously brought to our attention additional connections to prior work. We don't have a sufficiently deep understanding of this work to offer a detailed review, but we offer a brief overview below:"
    - list [ref=e5829]:
      - listitem [ref=e5830]:
        - text: Vector Symbolic Architectures and Hyperdimensional Computing (see reviews
        - generic [ref=e5833]: "[69, 70]"
        - text: ) are models from theoretical neuroscience of how neural systems can manipulate symbols. Many of the core ideas of how quasi-orthogonal vectors and the "blessings of dimensionality" enable computation are closely related to our notions of superposition.
      - listitem [ref=e5834]:
        - text: Frames (see review
        - generic [ref=e5837]: "[71]"
        - text: ) are a generalization of the idea of a mathematical basis. The way superposition encodes features in lower dimensional spaces might be seen as frames, at least in some cases. In particular, the "Mercedes-Benz Frame" is equivalent to the triangular geometry superposition we sometimes observe.
      - listitem [ref=e5838]: Although we discuss compressed sensing and sparse coding above, it's worth noting that this only scratches the surface of research on how sparse vectors can be encoded in lower dimensional dense vectors, and there's a large body of additional work not captured by these topics.
