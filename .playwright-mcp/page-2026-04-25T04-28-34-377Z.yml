                - generic [ref=e7271]: x
              - generic [ref=e7273]: x
          - text: .
          - link "[↩]" [ref=e7274] [cursor=pointer]:
            - /url: "#d-footnote-5"
        - listitem [ref=e7275]:
          - text: A vision model of sufficient generality might benefit from representing every species of plant and animal and every manufactured object which it might potentially see. A language model might benefit from representing each person who has ever been mentioned in writing. These are only scratching the surface of plausible features, but already there seem more than any model has neurons. In fact, large language models demonstrably do in fact know about people of very modest prominence – presumably more such people than they have neurons. This point is a common argument in discussion of the plausibility of "grandmother neurons'' in neuroscience, but seems even stronger for artificial neural networks.
          - link "[↩]" [ref=e7276] [cursor=pointer]:
            - /url: "#d-footnote-6"
        - listitem [ref=e7277]:
          - text: For computational reasons, we won't focus on it in this article, but we often imagine an infinite number of features with importance asymptotically approaching zero.
          - link "[↩]" [ref=e7278] [cursor=pointer]:
            - /url: "#d-footnote-7"
        - listitem [ref=e7279]:
