    - paragraph [ref=e5182]: "A couple of notes on visualization: Since we're primarily interested in understanding superposition and polysemantic neurons, we'll show a stacked weight plot of the absolute values of weights. The features are colored by superposition. To make the diagrams easier to read, neurons are faintly colored based on how polysemantic they are (as judged by eye based on the plots). Neuron order is sorted by the importance of the largest feature."
    - figure [ref=e5183]:
      - img [ref=e5184]
    - paragraph [ref=e5185]: Much like we saw in the ReLU hidden layer models, these results demonstrate that activation functions, under the right circumstances, create a privileged basis and cause features to align with basis dimensions. In the dense regime, we end up with each neuron representing a single feature, and we can read feature values directly off of neuron activations.
    - paragraph [ref=e5186]:
      - text: However, once the features become sufficiently sparse, this model, too, uses superposition to represent more features than it has neurons. This result is notable because it demonstrates the ability of neural networks to perform computation even on data that is represented in superposition.
      - superscript [ref=e5187]: "17"
      - text: Remember that the model is required to use the hidden layer ReLU in order to compute an absolute value; gradient descent manages to find solutions that usefully approximate the computation even when each neuron encodes a mix of multiple features.
    - paragraph [ref=e5188]: "Focusing on the intermediate sparsity regimes, we find several additional qualitative behaviors that we find fascinatingly reminiscent of behavior that has been observed in real, full-scale neural networks:"
    - figure [ref=e5189]:
      - img [ref=e5190]
    - paragraph [ref=e5191]:
      - text: To begin, we find that in some regimes, many of the model's neurons will encode pure features, but a subset of them will be highly polysemantic. This is similar to the
      - link "phase change" [ref=e5192] [cursor=pointer]:
        - /url: "#phase-change"
      - text: we saw earlier in the ReLU output model. However, in that case, the phase change was with respect to features, with more important features not being put in superposition. In this experiment, the neurons don't have any intrinsic importance, but we see that the neurons representing the most important features (on the left) tend to be monosemantic.
    - paragraph [ref=e5193]:
      - text: We find this to bear a suggestive resemblance to
      - link "some previous work in vision models" [ref=e5194] [cursor=pointer]:
        - /url: https://distill.pub/2020/circuits/zoom-in/#claim-2-superposition
      - text: ", which found some layers that contained \"mostly pure\" feature neurons, but with some neurons representing additional features on a different scale."
    - paragraph [ref=e5195]: We also note that many neurons appear to be associated with a single "primary" feature – encoded by a relatively large weight – coupled with one or more "secondary" features encoded with smaller-magnitude weights to that neuron. If we were to observe the activations of such a neuron over a range of input examples, we would find that the largest activations of that neuron were all or nearly-all associated with the presence of the "primary" feature, but that the lower-magnitude activations were much more polysemantic.
    - paragraph [ref=e5196]:
      - text: Intriguingly, that description closely matches what researchers have found in previous work on language models
      - generic [ref=e5199]: "[4]"
      - text: – many neurons appear interpretable when we examine their strongest activations over a dataset, but can be shown on further investigation to activate for other meanings or patterns, often at a lower magnitude. While only suggestive, the ability of our toy model to reproduce these qualitative features of larger neural networks offers an exciting hint that these models are illuminating general phenomena.
    - heading "The Asymmetric Superposition Motif" [level=3] [ref=e5200]:
      - link "The Asymmetric Superposition Motif" [ref=e5201] [cursor=pointer]:
        - /url: "#computation-asymmetric-motif"
    - paragraph [ref=e5202]:
      - text: If neural networks can perform computation in superposition, a natural question is to ask how exactly they're doing so. What does that look like mechanically, in terms of the weights? In this subsection, we'll (mostly) work through one such model and see an interesting motif of asymmetric superposition. (We use the term "motif" in the
      - link "sense" [ref=e5203] [cursor=pointer]:
        - /url: https://distill.pub/2020/circuits/zoom-in/#claim-2-motifs
      - text: of the original circuit thread, inspired by its use in systems biology
      - generic [ref=e5206]: "[38]"
      - text: .)
    - paragraph [ref=e5207]: The model we're trying to understand is shown below on the left, visualized as a neuron weight stack plot, with features corresponding to colors. The model is only doing a limited amount of superposition, and many of the weights can be understood as simply implementing absolute value in the expected way.
    - paragraph [ref=e5208]: However, there are a few neurons doing something else…
