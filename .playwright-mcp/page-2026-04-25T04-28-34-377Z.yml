    - figure [ref=e3901]:
      - img [ref=e3902]
    - paragraph [ref=e3903]: If this result holds in real neural networks, it suggests we might be able to make a kind of "local non-superposition" assumption, where for certain sub-distributions we can assume that the activating features are not in superposition. This could be a powerful result, allowing us to confidently use methods such as PCA which might not be principled to generally use in the context of superposition.
    - heading "Collapsing of Correlated Features" [level=4] [ref=e3904]:
