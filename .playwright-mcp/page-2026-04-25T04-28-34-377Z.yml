      - generic [ref=e6332]:
        - paragraph [ref=e6333]:
          - text: I describe a natural experiment of the
          - link "linear representation hypothesis" [ref=e6334] [cursor=pointer]:
            - /url: "#motivation-directions"
          - text: described in this paper -- the idea that features correspond to directions in neural networks.
        - paragraph [ref=e6335]:
          - text: "Background: Martin Wattenberg (an author on this paper) and colleagues"
          - link "recently found" [ref=e6336] [cursor=pointer]:
            - /url: https://arxiv.org/pdf/2210.13382.pdf
          - text: that, if you train transformer language model trained to predict the next token in synthetic Othello games (where each move is a randomly chosen legal move), it forms an emergent model of the board state (despite only being trained to predict the next move!). They showed that the state of the board (whether each cell was empty, black or white) could be recovered with high accuracy by a one hidden layer MLP probe. They further showed that you could use the world model to causally intervene on the model’s residual stream. By choosing another board state, and changing the residual stream (with gradient descent) such that the probe indicates that new board state, they caused the model to output legal moves in the new board state, even if the edited board state was impossible to reach via legal Othello play!
        - paragraph [ref=e6337]: "Pre-Registered Hypothesis: The probing and causal intervention together provided strong evidence that the model had learned to represent features corresponding to the state of each square on the board. Yet, notably, linear probes were not able to recover the board state. Since linear features should be recoverable with a one-layer probe, and the causal intervention suggests the model both computes and uses the board state, this seemed like significant evidence against the linear representation hypothesis."
        - paragraph [ref=e6338]: However, Chris Olah (an author on this paper) argued the model might still be representing features linearly if it used a different set of features, and that the probe and causal intervention may be picking up on this different set of features. This created an informal pre-registered prediction of the hypothesis which was contrary to the evidence at the time.
        - paragraph [ref=e6339]:
          - text: "Results: I independently came to the same conclusion as Chris and investigated"
          - link "the Othello playing model" [ref=e6340] [cursor=pointer]:
            - /url: https://www.neelnanda.io/othello
          - text: . I found that the model does form an emergent model of the board state that is linearly represented and can be extracted with a linear probe. But that as the model plays both black and white moves, the model represents the state of a cell as whether it has “my colour” vs “opponent’s colour”. Further, I found circumstantial evidence that these features are used by the model, as we can linearly intervene on the residual stream using the directions given by the probe to edit the represented board state, and the model plays legal moves in the new board state.
        - paragraph [ref=e6341]: I consider these results to be notable, as the paper’s results provided evidence against the linear representation hypothesis and the hypothesis faced genuine risk of falsification. And the hypothesis made non-trivial predictions that were contrary to where the evidence pointed, but these turned out to be true. This is both a proof of concept that there are underlying principles of neural networks which have predictive power about models, and a natural experiment supporting the linear representation hypothesis.
        - paragraph [ref=e6342]:
          - text: I think that there is further work interpreting the Othello playing model that could test other hypotheses in this paper and our broader conceptual frameworks about neural networks and transformers, such as by looking for monosemantic vs superposed neurons in its MLP layers. The model is both complex enough to be interesting and expose principles of how transformers learn algorithms, yet the algorithmic nature of the task and existence of the probe suggests that finding circuits will be tractable. I elaborate on what I consider promising directions of future work in
          - link "a follow-up post" [ref=e6343] [cursor=pointer]:
            - /url: https://www.alignmentforum.org/posts/qgK7smTvJ4DB8rZ6h/othello-gpt-future-work-i-am-excited-about
