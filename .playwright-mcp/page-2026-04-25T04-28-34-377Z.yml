      - text: case where we can explicitly visualize the weights as points in 2D space. In general, such solutions can be understood as a collection of points on a unit circle. To make solutions easy to compare, we rotate and flip solutions to align with each other.
    - figure [ref=e3876]:
      - img [ref=e3877]
    - heading "Local Almost-Orthogonal Bases" [level=4] [ref=e3878]:
      - link "Local Almost-Orthogonal Bases" [ref=e3879] [cursor=pointer]:
        - /url: "#geometry-local-bases"
    - paragraph [ref=e3880]: It turns out that the tendency of models to arrange correlated features to be orthogonal is actually quite a strong phenomenon. In particular, for larger models, it seems to generate a kind of "local almost-orthogonal basis" where, even though the model as a whole is in superposition, the correlated feature sets considered in isolation are (nearly) orthogonal and can be understood as having very little superposition.
    - paragraph [ref=e3881]:
      - text: To investigate this, we train a larger model with two sets of correlated features and visualize
      - generic [ref=e3882]:
