    - paragraph [ref=e2814]: These diagrams suggest that there really is a phase change between different strategies for encoding features. However, we'll see in the next section that there's much more complex structure this preliminary view doesn't capture.
    - separator [ref=e2815]
    - heading "The Geometry of Superposition" [level=2] [ref=e2816]:
      - link "The Geometry of Superposition" [ref=e2817] [cursor=pointer]:
        - /url: "#geometry"
    - paragraph [ref=e2818]: "We've seen that superposition can allow a model to represent extra features, and that the number of extra features increases as we increase sparsity. In this section, we'll investigate this relationship in more detail, discovering an unexpected geometric story: features seem to organize themselves into geometric structures such as pentagons and tetrahedrons! In some ways, the structure described in this section seems \"too elegant to be true\" and we think there's a good chance it's at least partly idiosyncratic to the toy model we're investigating. But it seems worth investigating because if anything about this generalizes to real models, it may give us a lot of leverage in understanding their representations."
    - paragraph [ref=e2819]: "We'll start by investigating uniform superposition, where all features are identical: independent, equally important and equally sparse. It turns out that uniform superposition has a surprising connection to the geometry of uniform polytopes! Later, we'll move on to investigate non-uniform superposition, where features are not identical. It turns out that this can be understood, at least to some extent, as a deformation of uniform superposition."
    - heading "Uniform Superposition" [level=3] [ref=e2820]:
