    - paragraph [ref=e2000]: "In the previous section, we observed a surprising empirical result: adding a ReLU to the output of our model allowed a radically different solution – superposition – which doesn't occur in linear models."
    - paragraph [ref=e2001]: The model where it occurs is still quite mathematically simple. Can we analytically understand why superposition is occurring? And for that matter, why does adding a single non-linearity make things so different from the linear model case? It turns out that we can get a fairly satisfying answer, revealing that our model is governed by balancing two competing forces – feature benefit and interference – which will be useful intuition going forwards. We'll also discover a connection to the famous Thomson Problem in chemistry.
    - paragraph [ref=e2002]: "Let's start with the linear case. This is well understood by prior work! If one wants to understand why linear models don't exhibit superposition, the easy answer is to observe that linear models essentially perform PCA. But this isn't fully satisfying: if we set aside all our knowledge and intuition about linear functions for a moment, why exactly is it that superposition can't occur?"
    - paragraph [ref=e2003]:
      - text: A deeper understanding can come from the results of Saxe et al.
      - generic [ref=e2006]: "[28]"
      - text: who study the learning dynamics of linear neural networks – that is, neural networks without activation functions. Such models are ultimately linear functions, but because they are the composition of multiple linear functions the dynamics are potentially quite complex. The punchline of their paper reveals that neural network weights can be thought of as optimizing a simple closed-form solution. We can tweak their problem to be a bit more similar to our linear case,
      - superscript [ref=e2008]: "10"
      - text: "revealing the following equation:"
    - figure [ref=e2009]:
      - img [ref=e2010]
    - paragraph [ref=e2011]:
      - text: The Saxe results reveal that there are fundamentally two competing forces which control learning dynamics in the considered model. Firstly, the model can attain a better loss by representing more features (we've labeled this "feature benefit"). But it also gets a worse loss if it represents more than it can fit orthogonally due to "interference" between features.
      - superscript [ref=e2013]: "11"
      - text: In fact, this makes it never worthwhile for the linear model to represent more features than it has dimensions.
      - superscript [ref=e2014]: "12"
