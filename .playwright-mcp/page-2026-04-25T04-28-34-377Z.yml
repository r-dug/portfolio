        - listitem [ref=e7665]:
          - text: "These specific values were chosen to illustrate the phenomenon we're interested in: the absolute value model learns more easily when there are more neurons, but we wanted to keep the numbers small enough that it could be easily visualized."
          - link "[↩]" [ref=e7666] [cursor=pointer]:
            - /url: "#d-footnote-16"
        - listitem [ref=e7667]:
          - text: One question you might ask is whether we can quantify the ability of superposition to enable extra computation by examining the loss. Unfortunately, we can't easily do this. Superposition occurs when we change the task, making it sparser. As a result, the losses of models with different amounts of superposition are not comparable – they're measuring the loss on different tasks!
          - link "[↩]" [ref=e7668] [cursor=pointer]:
            - /url: "#d-footnote-17"
        - listitem [ref=e7669]:
          - text: Ultimately we want to say that a model doesn't implement some class of behaviors. Enumerating over all features makes it easy to say a feature doesn't exist (e.g. "there is no 'deceptive behavior' feature") but that isn't quite what we want. We expect models that need to represent the world to represent unsavory behaviors. But it may be possible to build more subtle claims such as "all 'deceptive behavior' features do not participate in circuits X, Y and Z."
          - link "[↩]" [ref=e7670] [cursor=pointer]:
            - /url: "#d-footnote-18"
        - listitem [ref=e7671]:
          - text: Superposition also makes it harder to find interpretable directions in a model without a privileged basis. Without superposition, one could try to do something like the Gram–Schmidt process, progressively identifying interpretable directions and then removing them to make future features easier to identify. But with superposition, one can't simply remove a direction even if one knows that it is a feature direction.
          - link "[↩]" [ref=e7672] [cursor=pointer]:
            - /url: "#d-footnote-19"
