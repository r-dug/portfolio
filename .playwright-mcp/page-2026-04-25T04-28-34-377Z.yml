        - listitem [ref=e7256]:
          - text: This definition is trickier than it seems. Specifically, something is a feature if there exists a large enough model size such that it gets a dedicated neuron. This create a kind "epsilon-delta" like definition. Our present understanding – as we'll see in later sections – is that arbitrarily large models can still have a large fraction of their features be in superposition. However, for any given feature, assuming the feature importance curve isn't flat, it should eventually be given a dedicated neuron. This definition can be helpful in saying that something is a feature – curve detectors are a feature because you find them in across a range of models larger than some minimal size – but unhelpful for the much more common case of features we only hypothesize about or observe in superposition.
          - link "[↩]" [ref=e7257] [cursor=pointer]:
            - /url: "#d-footnote-3"
        - listitem [ref=e7258]:
          - text: A famous book by Lakatos
          - generic [ref=e7261]: "[25]"
          - text: illustrates the importance of uncertainty about definitions and how important rethinking definitions often is in the context of research.
          - link "[↩]" [ref=e7262] [cursor=pointer]:
            - /url: "#d-footnote-4"
        - listitem [ref=e7263]:
          - text: This experiment setup could also be viewed as an autoencoder reconstructing
          - generic [ref=e7264]:
            - text: x
