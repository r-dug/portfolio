    - paragraph [ref=e4318]:
      - text: We find that vulnerability to adversarial examples sharply increases as superposition forms (increasing by >3x), and that the level of vulnerability closely tracks the number of features per dimension (the reciprocal of
      - link "feature dimensionality" [ref=e4319] [cursor=pointer]:
        - /url: "#geometry-dimensionality"
      - text: ).
    - figure [ref=e4320]:
      - img [ref=e4321]
    - paragraph [ref=e4322]:
      - text: We're hesitant to speculate about the extent to which superposition is responsible for adversarial examples in practice. There are compelling theories for why adversarial examples occur without reference to superposition (e.g.
      - generic [ref=e4325]: "[35]"
      - text: ). But it is interesting to note that if one wanted to try to argue for a "superposition maximalist stance", it does seem like many interesting phenomena related to adversarial examples can be predicted from superposition. As seen above, superposition can be used to explain why adversarial examples exist. It also predicts that adversarially robust models would have worse performance, since making models robust would require giving up superposition and representing less features. It predicts that more adversarially robust models might be more interpretable (see e.g.
      - generic [ref=e4328]: "[36]"
      - text: ). Finally, it could arguably predict that adversarial examples transfer (see e.g.
      - generic [ref=e4331]: "[37]"
      - text: ) if the arrangement of features in superposition is heavily influenced by which features are correlated or anti-correlated (see
      - link "earlier results on this" [ref=e4332] [cursor=pointer]:
        - /url: "#geometry-correlated"
      - text: ). It might be interesting for future work to see how far the hypothesis that superposition is a significant contributor to adversarial examples can be driven.
    - paragraph [ref=e4333]: In addition to observing that superposition can cause models to be vulnerable to adversarial examples, we briefly experimented with adversarial training to see if the relationship could be used in the other direction to reduce superposition. To keep training reasonably efficient, we used the analytic optimal attack against a random feature. We found that this did reduce superposition, but attacks had to be made unreasonably large (80% input L2 norm) to fully eliminate it, which didn't seem satisfying. Perhaps stronger adversarial attacks would work better. We didn't explore this further since the increased cost and complexity of adversarial training made us want to prioritize other lines of attack on superposition first.
