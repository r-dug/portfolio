    - paragraph [ref=e3716]: So far, this section has focused on the geometry of uniform superposition, where all features are of equal importance, equal sparsity, and independent. The model is essentially solving a variant of the Thomson problem. Because all features are the same, solutions corresponding to uniform polyhedra get especially low loss. In this subsection, we'll study non-uniform superposition, where features are somehow not uniform. They may vary in importance and sparsity, or have a correlational structure that makes them not independent. This distorts the uniform geometry we saw earlier.
    - paragraph [ref=e3717]: "In practice, it seems like superposition in real neural networks will be non-uniform, so developing an understanding of it seems important. Unfortunately, we're far from a comprehensive theory of the geometry of non-uniform superposition at this point. As a result, the goal of this section will merely be to highlight some of the more striking phenomena we observe:"
    - list [ref=e3718]:
      - listitem [ref=e3719]: Features varying in importance or sparsity causes smooth deformation of polytopes as the imbalance builds, up until a critical breaking point at which they snap to another polytope.
      - listitem [ref=e3720]: "Correlated features prefer to be orthogonal, often forming in different tegum factors. As a result, correlated features may form an orthogonal local basis. When they can't be orthogonal, they prefer to be side-by-side. In some cases correlated features merge into a single feature: this hints at some kind of interaction between \"superposition-like behavior\" and \"PCA-like behavior\"."
      - listitem [ref=e3721]: Anti-correlated features prefer to be in the same tegum factor when superposition is necessary. They prefer to have negative interference, ideally being antipodal.
    - paragraph [ref=e3722]: We attempt to illustrate these phenomena with some representative experiments below.
    - heading "Perturbing a Single Feature" [level=4] [ref=e3723]:
      - link "Perturbing a Single Feature" [ref=e3724] [cursor=pointer]:
        - /url: "#geometry-perturb"
    - paragraph [ref=e3725]:
