    - paragraph [ref=e5318]: There are a few other weights this doesn't explain. (We believe they're effectively small conditional biases.) But this asymmetric superposition and inhibition pattern appears to be the primary story.
    - separator [ref=e5319]
    - heading "The Strategic Picture of Superposition" [level=2] [ref=e5320]:
      - link "The Strategic Picture of Superposition" [ref=e5321] [cursor=pointer]:
        - /url: "#strategic"
    - paragraph [ref=e5322]: "Although superposition is scientifically interesting, much of our interest comes from a pragmatic motivation: we believe that superposition is deeply connected to the challenge of using interpretability to make claims about the safety of AI systems. In particular, it is a clear challenge to the most promising path we see to be able to say that neural networks won't perform certain harmful behaviors or to catch \"unknown unknowns\" safety problems. This is because superposition is deeply linked to the ability to identify and enumerate over all features in a model, and the ability to enumerate over all features would be a powerful primitive for making claims about model behavior."
    - paragraph [ref=e5323]: We begin this section by describing how "solving superposition" in a certain sense is equivalent to many strong interpretability properties which might be useful for safety. Next, we'll describe three high level strategies one might take to "solving superposition." Finally, we'll describe a few other additional strategic considerations.
    - heading "Safety, Interpretability, & \"Solving Superposition\"" [level=3] [ref=e5324]:
      - link "Safety, Interpretability, & \"Solving Superposition\"" [ref=e5325] [cursor=pointer]:
        - /url: "#strategic-safety"
    - paragraph [ref=e5326]:
      - text: We'd like a way to have confidence that models will never do certain behaviors such as "deliberately deceive" or "manipulate." Today, it's unclear how one might show this, but we believe a promising tool would be the ability to identify and enumerate over all features. The ability to have a universal quantifier over the fundamental units of neural network computation is a significant step towards saying that certain types of circuits don't exist.
      - superscript [ref=e5327]: "18"
      - text: It also seems like a powerful tool for addressing "unknown unknowns", since it's a way that one can fully cover network behavior, in a sense.
    - paragraph [ref=e5328]:
      - text: How does this relate to superposition? It turns out that the ability to enumerate over features is deeply intertwined with superposition. One way to see this is to imagine a neural network with a privileged basis and without superposition (like the monosemantic neurons found in early InceptionV1, e.g.
      - generic [ref=e5331]: "[3]"
      - text: "): features would simply correspond to neurons, and you could enumerate over features by enumerating over neurons."
      - superscript [ref=e5332]: "19"
      - text: "The connection also goes the other way: if one has the ability to enumerate over features, one can perform compressed sensing using the feature directions to (with high probability) \"unfold\" a superposition models activations into those of a larger, non-superposition model."
    - paragraph [ref=e5333]: For this reason, we'll call any method that gives us the ability to enumerate over features – and equivalently, unfold activations – a "solution to superposition". Any solution is on the table, from creating models that just don't have superposition, to identifying what directions correspond to features after the fact. We'll discuss the space of possibilities shortly.
    - paragraph [ref=e5334]: "We've motivated \"solving superposition\" in terms of feature enumeration, but it's worth noting that it's equivalent to (or necessary for) many other interpretability properties one might care about:"
    - list [ref=e5335]:
      - listitem [ref=e5336]:
        - text: Decomposing Activation Space. The most fundamental challenge of any interpretability agenda is to defeat the curse of dimensionality. For mechanistic interpretability, this ultimately reduces to
        - link "whether we can decompose activation space" [ref=e5337] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2022/mech-interp-essay/index.html
        - text: into independently understandable components, analogous to how computer program memory can be decomposed into variables. Identifying features is what allows us to decompose the model in terms of them.
      - listitem [ref=e5338]:
        - text: Describing Activations in Terms of Pure Features. One of the most obvious casualties of superposition is that we can't describe activations in terms of pure features. When features are relatively basis aligned, we can take an activation – say the activations for a dog head in a vision model – and decompose them into individual underlying features, like a floppy ear, short golden fur, and a snout. (See the "semantic dictionary" interface in
        - link "Building Blocks" [ref=e5339] [cursor=pointer]:
          - /url: https://distill.pub/2018/building-blocks/
        - generic [ref=e5342]: "[39]"
        - text: .) Solving superposition would allow us to do this for every model.
      - listitem [ref=e5343]:
        - text: Understanding Weights (ie. Circuit Analysis). Neural network weights can typically only be understood when they're connecting together understandable features. All the circuit analysis seen in the original circuit thread (see especially
        - generic [ref=e5346]: "[40]"
        - text: ), was fundamentally only possible because the weights connected non-polysemantic neurons. We need to solve superposition for this to work in general.
      - listitem [ref=e5347]: Even very basic approaches become perilous with superposition. It isn't just sophisticated approaches to interpretability which are harmed by superposition. Even very basic methods one might consider become unreliable. For example, if one is concerned about language models exhibiting manipulative behavior, one might ask if an input has a significant cosine similarity to the representations of other examples of deceptive behavior. Unfortunately, superposition means that cosine similarity has the potential to be misleading, since unrelated features start to be embedded with positive dot products to each other. However, if we solve superposition, this won't be an issue – either we'll have a model where features align with neurons, or a way to use compressed sensing to lift features to a space where they no longer have positive dot products.
    - heading "Three Ways Out" [level=3] [ref=e5348]:
      - link "Three Ways Out" [ref=e5349] [cursor=pointer]:
        - /url: "#strategic-ways-out"
    - paragraph [ref=e5350]: "At a very high level, there seem to be three potential approaches to resolving superposition:"
    - list [ref=e5351]:
      - listitem [ref=e5352]: Create models without superposition.
      - listitem [ref=e5353]: Find an overcomplete basis that describes how features are represented in models with superposition.
      - listitem [ref=e5354]: Hybrid approaches in which one changes models, not resolving superposition, but making it easier for a second stage of analysis to find an overcomplete basis that describes it.
    - paragraph [ref=e5355]: Our sense is that all of these approaches are possible if one doesn't care about having a competitive model. For example, we believe it's possible to accomplish any of these for the toy models described in this paper. However, as one starts to consider serious neural networks, let alone modern large language models, all of these approaches begin to look very difficult. We'll outline the challenges we see for each approach in the following sections.
    - paragraph [ref=e5356]: With that said, it's worth highlighting one bright spot before we focus on the challenges. You might have believed that superposition was something you could never fully get rid of, but that doesn't seem to be the case. All our results seem to suggest that superposition and polysemanticity are phases with sharp transitions. That is, there may exist a regime for every model where it has no superposition or polysemanticity. The question is largely whether the cost of getting rid of or otherwise resolving superposition is too high.
    - 'heading "Approach 1: Creating Models Without Superposition" [level=4] [ref=e5357]':
      - 'link "Approach 1: Creating Models Without Superposition" [ref=e5358] [cursor=pointer]':
        - /url: "#strategic-approach-no-super"
    - paragraph [ref=e5359]:
      - text: It's actually quite easy to get rid of superposition in the toy models described in this paper, albeit at the cost of a higher loss. Simply apply at L1 regularization term to the hidden layer activations (i.e. add
      - generic [ref=e5360]:
        - text: \lambda ||h||_1
        - generic [ref=e5362]:
          - math [ref=e5364]:
            - generic [ref=e5366]:
              - generic [ref=e5367]: λ
              - generic [ref=e5368]: ∣
              - generic [ref=e5369]: ∣
              - generic [ref=e5370]: h
              - generic [ref=e5371]: ∣
              - generic [ref=e5372]:
                - generic [ref=e5373]: ∣
                - generic [ref=e5374]: "1"
          - generic [ref=e5376]:
            - text: λ∣∣h∣
            - generic [ref=e5377]:
              - text: ∣
              - generic [ref=e5382]: "1"
      - text: to the loss). This actually has a nice interpretation in terms of killing features below a certain importance threshold, especially if they're not basis aligned. Generalizing this to real neural networks isn't trivial, but we expect it can be done. (This approach would be similar to work attempting to use sparsity to encourage basis-aligned word embeddings
      - generic [ref=e5388]: "[41, 42, 43]"
      - text: .)
    - paragraph [ref=e5389]: However, it seems likely that models are significantly benefitting from superposition. Roughly, the sparser features are, the more features can be squeezed in per neuron. And many features in language models seem very sparse! For example, language models know about individuals with only modest public presences, such as several of the authors of this paper. Presumably we only occur with frequency significantly less than one in a million tokens. As a result, it may be the case that superposition effectively makes models much bigger.
    - paragraph [ref=e5390]: All of this paints a picture where getting rid of superposition may be fairly achievable, but doing so will have a large performance cost. For a model with a fixed number of neurons, superposition helps – potentially a lot.
    - paragraph [ref=e5391]:
      - text: But this is only true if the constraint is thought of in terms of neurons. That is, a superposition model with
      - generic [ref=e5392]:
        - text: "n"
        - generic [ref=e5394]:
          - math [ref=e5396]:
            - generic [ref=e5399]: "n"
          - generic [ref=e5401]: "n"
      - text: neurons likely has the same performance as a significantly larger monosemantic model with
      - generic [ref=e5402]:
        - text: kn
        - generic [ref=e5404]:
          - math [ref=e5406]:
            - generic [ref=e5408]:
              - generic [ref=e5409]: k
              - generic [ref=e5410]: "n"
          - generic [ref=e5412]: kn
      - text: "neurons. But neurons aren't the fundamental constraint: flops are. In the most common model architectures, flops and neurons have a strict correspondence, but this doesn't have to be the case and it's much less clear that superposition is optimal in the broader space of possibilities."
    - paragraph [ref=e5413]:
      - text: One family of models which change the flop-neuron relationship are Mixture of Experts (MoE) models (see review
      - generic [ref=e5416]: "[44]"
      - text: ). The intuition is that most neurons are for specialized circumstances and don't need to activate most of the time. For example, German-specific neurons don't need to activate on French text. Harry Potter neurons don't need to activate on scientific papers. So MoE models organize neurons into blocks or experts, which only activate a small fraction of the time. This effectively allows the model to have
      - generic [ref=e5417]:
        - text: k
        - generic [ref=e5419]:
          - math [ref=e5421]:
            - generic [ref=e5424]: k
          - generic [ref=e5426]: k
      - text: times more neurons for a similar flop budget, given the constraint that only
      - generic [ref=e5427]:
        - text: 1/k
        - generic [ref=e5429]:
          - math [ref=e5431]:
            - generic [ref=e5433]:
              - generic [ref=e5434]: "1"
              - generic [ref=e5435]: /
              - generic [ref=e5436]: k
          - generic [ref=e5438]: 1/k
      - text: of the neurons activate in a given example and that they must activate in a block. Put another way, MoE models can recover neuron sparsity as free flops, as long as the sparsity is organized in certain ways.
    - paragraph [ref=e5439]: "It's unclear how far this can be pushed, especially given difficult engineering constraints. But there's an obvious lower bound, which is likely too optimistic but is interesting to think about: what if models only expended flops on neuron activations, and recovered the compute of all non-activating neurons? In this world, it seems unlikely that superposition would be optimal: you could always split a polysemantic neuron into dedicated neurons for each feature with the same cost, except for the cases where there would have been interference that hurt the model anyways. Our preliminary investigations comparing various types of superposition in terms of \"loss reduction per activation frequency\" seem to suggest that superposition is not optimal on these terms, although it asymptotically becomes as good as dedicated feature dimensions. Another way to think of this is that superposition exploits a gap between the sparsity of neurons and the sparsity of the underlying features; MoE eats that same gap, and so we should expect MoE models to have less superposition."
    - paragraph [ref=e5440]: To be clear, MoE models are already well studied, and we don't think this changes the capabilities case for them. (If anything, superposition offers a theory for why MoE models have not proven more effective for capabilities when the case for them seems so initially compelling!) But if one's goal is to create competitive models that don't have superposition, MoE models become interesting to think about. We don't necessarily think that they specifically are the right path forward – our goal here has been to use them as an example of why we think it remains plausible there may be ways to build competitive superposition-free models.
    - 'heading "Approach 2: Finding an Overcomplete Basis" [level=4] [ref=e5441]':
      - 'link "Approach 2: Finding an Overcomplete Basis" [ref=e5442] [cursor=pointer]':
        - /url: "#strategic-approach-overcomplete"
    - paragraph [ref=e5443]:
      - text: The opposite strategy of creating a superposition-free model is to take a regular model, which has superposition, and find an overcomplete basis describing how features are embedded after the fact. This appears to be a relatively standard sparse coding (or dictionary learning) problem, where we want to take the activations of neural network layers and find out which directions correspond to features.
      - superscript [ref=e5445]: "20"
      - text: This approach has been explored by some prior work
      - generic [ref=e5448]: "[2, 1]"
      - text: .
    - paragraph [ref=e5449]: "The advantage of this is that we don't need to worry about whether we're damaging model performance. On the other hand, many other things are harder:"
    - list [ref=e5450]:
      - listitem [ref=e5451]: It’s no longer easy to know how many features you have to enumerate. A monosemantic model represents a feature per neuron, but when finding an overcomplete basis there’s an additional challenge of identifying how many features to use for it.
      - listitem [ref=e5452]:
        - text: Solutions are no longer integrated into the surface computational structure. Neural networks can be understood in terms of their surface structure – neurons, attention heads, etc – and virtual structure that implicitly emerge (e.g. virtual attention heads
        - generic [ref=e5455]: "[45]"
        - text: "). A model described by an overcomplete basis has \"virtual neurons\": there's a further gap between the surface and virtual structure."
    - list [ref=e5456]:
      - listitem [ref=e5457]: It's a different, major engineering challenge. Seriously attempting to solve superposition by applying sparse coding to real neural nets suggests a massive sparse coding problem. For truly large language models, one would be starting with something like a millions (neurons) by billions (tokens) matrix and then trying to do an extremely overcomplete factorization, perhaps trying to factor it to be a thousand or more times larger. This is a major engineering challenge which is different from the standard distributed training challenges ML labs are set up for.
      - listitem [ref=e5458]: Interference is no longer pushing in your favor. If you try to train models without superposition, interference between features is pushing the training process to have less superposition. If you instead try to decode superposition after the fact, whatever amount of superposition is "baked in" by the training process and you don't have part of the objective pushing in your favor.
    - 'heading "Approach 3: Hybrid Approaches" [level=4] [ref=e5459]':
      - 'link "Approach 3: Hybrid Approaches" [ref=e5460] [cursor=pointer]':
        - /url: "#strategic-approach-hybrid"
    - paragraph [ref=e5461]:
      - text: In addition to approaches which address superposition purely at training time, or purely after the fact, it may be possible to take "hybrid approaches" which do a mixture. For example, even if one can't change models without superposition, it may be possible to produce models with less superposition, which are then easier to decode.
      - superscript [ref=e5462]: "21"
      - text: Alternatively, it may be possible for architecture changes to make finding an overcomplete basis easier or more computationally tractable in large models, separately from trying to reduce superposition.
    - heading "Additional Considerations" [level=3] [ref=e5463]:
      - link "Additional Considerations" [ref=e5464] [cursor=pointer]:
        - /url: "#strategic-additional"
    - paragraph [ref=e5465]: Phase Changes as Cause For Hope. Is totally getting rid of superposition a realistic hope? One could easily imagine a world where it can only be asymptotically reduced, and never fully eliminated. While the results in this paper seem to suggest that superposition is hard to get rid of because it's actually very useful, the upshot of it corresponding to a phase change is that there's a regime where it totally doesn't exist. If we can find a way to push models in the non-superposition regime, it seems likely it can be totally eliminated.
    - paragraph [ref=e5466]: Any superposition-free model would be a powerful tool for research. We believe that most of the research risk is in whether one can make performant superposition free models, rather than whether it's possible to make superposition free models at all. Of course, ultimately, we need to make performant models. But a non-performant superposition free model could still be a very useful research tool for studying superposition in normal models. At present, it's challenging to study superposition in models because we have no ground truth for what the features are. (This is also the reason why the toy models described in this paper can be studied – we do know what the features are!) If we had a superposition-free model, we may be able to use it as a ground truth to study superposition in regular models.
    - paragraph [ref=e5467]:
      - text: Local bases are not enough. Earlier, when we considered
      - link "the geometry of non-uniform superposition" [ref=e5468] [cursor=pointer]:
        - /url: "#geometry-non-uniform"
      - text: ", we observed that models often form local orthogonal bases, where co-occurring features are orthogonal. This suggests a strategy for locally understanding models on sufficiently narrow sub-distributions. However, if our goal is to eventually make useful statements about the safety of models, we need mechanistic accounts that hold for the full distribution (and off distribution). Local bases seem unlikely to give this to us."
    - separator [ref=e5469]
    - heading "Discussion" [level=2] [ref=e5470]:
      - link "Discussion" [ref=e5471] [cursor=pointer]:
        - /url: "#discussion"
    - heading "To What Extent Does Superposition Exist in Real Models?" [level=3] [ref=e5472]:
      - link "To What Extent Does Superposition Exist in Real Models?" [ref=e5473] [cursor=pointer]:
        - /url: "#real-models"
    - paragraph [ref=e5474]: "Why are we interested in toy models? We believe they are useful proxies for studying the superposition we suspect might exist in real neural networks. But how can we know if they're actually a useful toy model? Our best validation is whether their predictions are consistent with empirical observations regarding polysemanticity. To the best of our knowledge they are. In particular:"
    - list [ref=e5475]:
      - listitem [ref=e5476]: Polysemantic neurons exist. Polysemantic neurons form in our third model, just as they are observed in a wide range of neural networks.
      - listitem [ref=e5477]: Neurons are sometimes "cleanly interpretable" and sometimes "polysemantic", often in the same layer. Our third model exhibits both polyemantic and non-polysemantic neurons, often at the same time. This is analogous to how real neural networks often have a mixture of polysemantic and non-polysemantic neurons in the same layer.
      - listitem [ref=e5478]: InceptionV1 has more polysemantic neurons in later layers. Empirically, the fraction of neurons which are polysemantic in InceptionV1 increases with depth. One natural explanation is that as features become higher-level the stimuli they detect become rarer and thus sparser (for example, in vision, a high-level floppy ear feature is less common than a low-level Gabor filter's edge). A major prediction of our model is that superposition and polysemanticity increase as sparsity increases.
      - listitem [ref=e5479]: Early Transformer MLP neurons are extremely polysemantic. Our experience is that neurons in the first MLP layer in Transformer language models are often extremely polysemantic. If the goal of the first MLP layer is to distinguish between different interpretations of the same token (eg. "die" in English vs German vs Dutch vs Afrikans), such features would be very sparse and our toy model would predict lots of polysemanticity.
    - paragraph [ref=e5480]: This doesn't mean that everything about our toy model reflects real neural networks. Our intuition is that some of the phenomena we observe (superposition, monosemantic vs polysemantic neurons, perhaps the relationship to adversarial examples) are likely to generalize, while other phenomena (especially the geometry and learning dynamics results) are much more uncertain.
    - heading "Open Questions" [level=3] [ref=e5481]:
      - link "Open Questions" [ref=e5482] [cursor=pointer]:
        - /url: "#open-questions"
    - paragraph [ref=e5483]: "This paper has shown that the superposition hypothesis is true in certain toy models. But if anything, we're left with many more questions about it than we had at the start. In this final section, we review some of the questions which strike us as most important: what do we know, and would we like for future work to clarify?"
    - list [ref=e5484]:
      - listitem [ref=e5485]: Is there a statistical test for catching superposition?
      - listitem [ref=e5486]: How can we control whether superposition and polysemanticity occur? Put another way, can we change the phase diagram such that features don't fall into the superposition regime? Pragmatically, this seems like the most important question. L1 regularization of activations, adversarial training, and changing the activation function all seem promising.
      - listitem [ref=e5487]:
        - text: Are there any models of superposition which have a closed-form solution? Saxe et al.
        - generic [ref=e5490]: "[28]"
        - text: demonstrate that it's possible to create nice closed-form solutions for linear neural networks. We made some progress towards this for the
        - generic [ref=e5491]:
          - text: n=2; m=1
          - generic [ref=e5493]:
            - math [ref=e5495]:
              - generic [ref=e5497]:
                - generic [ref=e5498]: "n"
                - generic [ref=e5499]: =
                - generic [ref=e5500]: "2"
                - generic [ref=e5501]: ;
                - generic [ref=e5502]: m
                - generic [ref=e5503]: =
                - generic [ref=e5504]: "1"
            - generic [ref=e5506]: n=2;m=1
        - text: ReLU output model (and Tom McGrath makes further progress in his comment), but it would be nice to solve this more generally.
      - listitem [ref=e5507]: How realistic are these toy models? To what extent do they capture the important properties of real models with respect to superposition? How can we tell?
      - listitem [ref=e5508]: Can we estimate the feature importance curve or feature sparsity curve of real models? If one takes our toy models seriously, the most important properties for understanding the problem are the feature importance and sparsity curves. Is there a way we can estimate them for real models? (Likely, this would involve training models of varying sizes or amounts of regularization, observing the loss and neuron sparsities, and trying to infer something.)
      - listitem [ref=e5509]: Should we expect superposition to go away if we just scale enough? What assumptions about the feature importance curve and sparsity would need to be true for that to be the case? Alternatively, should we expect superposition to remain a constant fraction of represented features, or even to increase as we scale?
      - listitem [ref=e5510]: Are we measuring the maximally principled things? For example, what is the most principled definition of superposition / polysemanticity?
      - listitem [ref=e5511]: How important are polysemantic neurons? If X% of the model is interpretable neurons and 1-X% are polysemantic, how much should we believe we understand from understanding the x% interpretable neurons? (See also the "feature packing principle" suggested above.)
      - listitem [ref=e5512]: How many features should we expect to be stored in superposition? This was briefly discussed in the previous section. It seems like results from compressed sensing should be able to give us useful upper-bounds, but it would be nice to have a clearer understanding – and perhaps tighter bounds!
      - listitem [ref=e5513]: Does the apparent phase change we observe in features/neurons have any connection to phase changes in compressed sensing?
      - listitem [ref=e5514]:
        - text: How does superposition relate to non-robust features? An interesting
        - link "paper by Gabriel Goh" [ref=e5515] [cursor=pointer]:
          - /url: https://distill.pub/2019/advex-bugs-discussion/response-3/
        - text: (
        - link "archive.org backup" [ref=e5516] [cursor=pointer]:
          - /url: https://web.archive.org/web/20190811044354/https://distill.pub/2019/advex-bugs-discussion/response-3/
        - text: ) explores features in a linear model in terms of the principal components of the data. It focuses on a trade off between "usefulness" and "robustness" in the principal component features, but it seems like one could also relate it to the interpretability of features. How much would this perspective change if one believed the superposition hypothesis – could it be that the useful, non-robust features are an artifact of superposition?
      - listitem [ref=e5517]: To what extent can neural networks "do useful computation" on features in superposition? Is the absolute value problem representative of computation in superposition generally, or idiosyncratic? What class of computation is amenable to being performed in superposition? Does it require a sparse structure to the computation?
      - listitem [ref=e5518]: How does superposition change if features are not independent? Can superposition pack features more efficiently if they are anti-correlated?
      - listitem [ref=e5519]: Can models effectively use nonlinear representations? We suspect models will tend not to use them, but further experimentation could provide good evidence. See the appendix on nonlinear compression. For example investigating the representations used by autoencoders with multi-layer encoders and decoders with really small bottlenecks on random uncorrelated data.
    - separator [ref=e5520]
    - heading "Related Work" [level=2] [ref=e5521]:
      - link "Related Work" [ref=e5522] [cursor=pointer]:
        - /url: "#related"
    - heading "Interpretable Features" [level=4] [ref=e5523]:
      - link "Interpretable Features" [ref=e5524] [cursor=pointer]:
        - /url: "#related-interpretable-features"
    - paragraph [ref=e5525]:
      - text: Our work is inspired by research exploring the features that naturally occur in neural networks. Many models form at least some interpretable features. Word embeddings have semantic directions (see
      - generic [ref=e5528]: "[11]"
      - text: ). There is evidence of interpretable neurons in RNNs (e.g.
      - generic [ref=e5531]: "[14, 15]"
      - text: ), convolutional neural networks (see generally e.g.
      - generic [ref=e5534]: "[16, 17, 46, 22]"
      - text: ; individual neuron families
      - generic [ref=e5537]: "[9, 21]"
      - text: ), and in some limited cases, transformer language models (see detailed discussion in our previous paper). However this work has also found many "polysemantic" neurons which are not interpretable as a single concept
      - generic [ref=e5540]: "[8]"
      - text: .
    - heading "Superposition" [level=4] [ref=e5541]:
      - link "Superposition" [ref=e5542] [cursor=pointer]:
        - /url: "#related-interpretable-features"
    - paragraph [ref=e5543]:
      - text: The earliest reference to superposition in artificial neural networks that we're aware of is Arora et al.'s work
      - generic [ref=e5546]: "[1]"
      - text: ", who suggest that the word embeddings of words with multiple different word senses may be superpositions of the vectors for the distinct meanings. Arora extend this idea there to there being many sparse \"atoms of discourse\" in superposition, an idea which was generalized to other kinds of embeddings vectors and explored in more detail by Goh"
      - generic [ref=e5549]: "[2]"
      - text: .
    - paragraph [ref=e5550]:
      - text: In parallel with this, investigations of individual neurons in models with privileged bases were beginning to grapple with "polysemantic" neurons which respond to unrelated inputs
      - generic [ref=e5553]: "[8]"
      - text: . A natural hypothesis was that these polysemantic neurons are disambiguated by the combined activation of other neurons. This line of thinking eventually became the "superposition hypothesis" for circuits
      - generic [ref=e5556]: "[3]"
      - text: .
    - paragraph [ref=e5557]:
      - text: Separate from all of this, Cheung et al.
      - generic [ref=e5560]: "[10]"
      - text: "explore a slightly different idea one might describe as \"model level\" superposition: can neural network parameters represent multiple completely independent models? Their investigation is motivated by catastrophic forgetting, but seems quite related to the questions investigated in this paper. Model level superposition can be seen as feature level superposition for highly correlated sets of features, similar to the"
      - link "\"almost orthogonal bases\" experiment" [ref=e5561] [cursor=pointer]:
        - /url: "#geometry-local-bases"
      - text: we considered above.
    - heading "Disentanglement" [level=4] [ref=e5562]:
      - link "Disentanglement" [ref=e5563] [cursor=pointer]:
        - /url: "#related-disentanglement"
    - paragraph [ref=e5564]:
      - text: The goal of learning disentangled representations arises from Bengio et al.'s influential position paper on representation learning
      - generic [ref=e5567]: "[7]"
      - text: ": \"we would like our representations to disentangle the factors of variation… to learn representations that separate the various explanatory sources.\" Since then, a literature has developed motivated by this goal, tending to focus on creating generative models which separate out major factors of variation in their latent spaces. This research touches on questions related to superposition, but is also quite different in a number of ways."
    - paragraph [ref=e5568]:
      - text: Concretely, disentanglement research often explores whether one can train a VAE or GAN where basis dimensions correspond to the major features one might use to describe the problem (e.g. rotation, lighting, gender… as relevant). Early work often focused on semi-supervised approaches where the features were known in advance, but fully unsupervised approaches started to develop around 2016
      - generic [ref=e5571]: "[47, 48, 49]"
      - text: .
    - paragraph [ref=e5572]: Put another way, the goal of disentanglement might be described as imposing a strong privileged basis on representations which are rotationally invariant by default. This helps get at ways in which the questions of polysemanticity and superposition are a bit different from disentanglement. Consider that when we deal with neurons, rather than embeddings, we have a privileged basis by default. It varies by model, but many neurons just cleanly respond to features. This means that polysemanticity arises as a kind of anomalous behavior, and superposition arises as a hypothesis for explaining it. The question then isn't how to impose a privileged basis, but how to remove superposition as a fundamental problem to accessing features.
    - paragraph [ref=e5573]:
      - text: Of course, if the superposition hypothesis is true, there are still a number of connections to disentanglement. On the one hand, it seems likely superposition occurs in the latent spaces of generative models, even though that isn't an area we've investigated. If so, it may be that superposition is a major reason why disentanglement is difficult. Superposition may allow generative models to be much more effective than they would otherwise be without. Put another way, disentanglement often assumes a small number of important latent variables to explain the data. There are clearly examples of such variables, like the orientation of objects – but what if a large number of sparse, rare, individually unimportant features are collectively very important? Superposition would be the natural way for models to represent this.
      - superscript [ref=e5574]: "22"
      - text: On the other hand, one could imagine ideas from the disentanglement literature being useful in creating architectures that resist superposition by creating an even more strongly privileged basis.
    - heading "Compressed Sensing" [level=4] [ref=e5575]:
      - link "Compressed Sensing" [ref=e5576] [cursor=pointer]:
        - /url: "#related-compressed"
    - paragraph [ref=e5577]:
      - text: The toy problems we consider are quite similar to the problems considered in the field of
      - link "compressed sensing" [ref=e5578] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Compressed_sensing
      - text: ", which is also known as compressive sensing and sparse recovery. However, there are some important differences:"
    - list [ref=e5579]:
      - listitem [ref=e5580]: Compressed sensing recovers vectors by solving an optimization problem using general techniques, while our toy model must use a neural network layer. Compressed sensing algorithms are, in principle, much more powerful than our toy model.
      - listitem [ref=e5581]: "Compressed sensing works using the number of non-zero entries as the measure of sparsity, while we use the probability that each dimension is zero as the sparsity. These are not wholly unrelated: concentration of measure implies that our vectors have a bounded number of non-zero entries with high probability."
      - listitem [ref=e5582]:
        - text: Compressed sensing requires that the embedding matrix (usually called the measurement matrix) have a certain “incoherent” structure
        - generic [ref=e5585]: "[50]"
        - text: such as the restricted isometry property
        - generic [ref=e5588]: "[27]"
        - text: or nullspace property
        - generic [ref=e5591]: "[51]"
        - text: . Our toy model learns the embedding matrix, and will often simply ignore many input dimensions to make others easier to recover.
      - listitem [ref=e5592]: Features in our toy model have different "importances", which means the model will often prefer to be able to recover “important” features more accurately, at the cost of not being able to recover “less important” features at all.
    - paragraph [ref=e5593]: In general, our toy model is solving a similar problem using less powerful methods than compressed sensing algorithms, especially because the computational model is so much more restricted (to just a single linear transformation and a non-linearity) compared to the arbitrary computation that might be used by a compressed sensing algorithm.
