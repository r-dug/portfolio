    - paragraph [ref=e2534]:
      - text: "The results in the previous section seem to suggest that there are three outcomes for a feature when we train a model: (1) the feature may simply not be learned; (2) the feature may be learned, and represented in superposition; or (3) the model may represent a feature with a dedicated dimension. The transitions between these three outcomes seem sharp. Possibly, there's some kind of phase change."
      - superscript [ref=e2535]: "13"
    - paragraph [ref=e2536]:
      - text: One way to understand this better is to explore if there's something like a "phase diagram" from physics, which could help us understand when a feature is expected to be in one of these regimes. Although we can see hints of this in
      - link "our previous experiment" [ref=e2537] [cursor=pointer]:
        - /url: "#demonstrating-basic-results"
      - text: ", it's hard to really isolate what's going on because many features are changing at once and there may be interaction effects. As a result, we set up the following experiment to better isolate the effects."
