          - text: is sparse.
          - link "[↩]" [ref=e7800] [cursor=pointer]:
            - /url: "#d-footnote-20"
        - listitem [ref=e7801]:
          - text: In particular, it seems like we should expect to be able to reduce superposition at least a little bit with essentially no effect on performance, just by doing something like L1 regularization without any architectural changes. Note that models should have a level of superposition where the derivative of loss with respect to the amount of superposition is zero – otherwise, they'd use more or less superposition. As a result, there should be at least some margin within which we can reduce the amount of superposition without affecting model performance.
          - link "[↩]" [ref=e7802] [cursor=pointer]:
            - /url: "#d-footnote-21"
        - listitem [ref=e7803]:
          - text: A more subtle issue is that GANs and VAEs often assume that their latent space is Gaussianly distributed. Sparse latent variables are very non-Gaussian, but the central limit theorem means that the superposition of many such variables will gradually look more Gaussian. So the latent spaces of some generative models may in fact force models to use superposition!
          - link "[↩]" [ref=e7804] [cursor=pointer]:
            - /url: "#d-footnote-22"
        - listitem [ref=e7805]:
          - text: "Note that this has a nice information-theoretic interpretation:"
          - generic [ref=e7806]:
            - text: \log(1 - S)
            - generic [ref=e7808]:
              - math [ref=e7810]:
                - generic [ref=e7812]:
                  - generic [ref=e7813]: log
                  - generic [ref=e7814]: (
                  - generic [ref=e7815]: "1"
                  - generic [ref=e7816]: −
                  - generic [ref=e7817]: S
                  - generic [ref=e7818]: )
              - generic [ref=e7820]:
                - generic [ref=e7821]: log
                - text: (1−S)
          - text: is the surprisal of a given dimension being non-zero, and is multiplied by the expected number of non-zeros.
          - link "[↩]" [ref=e7822] [cursor=pointer]:
            - /url: "#d-footnote-23"
        - listitem [ref=e7823]:
          - text: Note that in the compressed sensing case, the phase transition is in the limit as the number of dimensions becomes large - for finite-dimensional spaces, the transition is fast but not discontinuous.
          - link "[↩]" [ref=e7824] [cursor=pointer]:
            - /url: "#d-footnote-24"
        - listitem [ref=e7825]:
          - text: Interestingly, this is the reverse of how sparse coding is typically thought of in neuroscience. Neuroscience often thinks of biological neurons as sparse coding their inputs, whereas we're interested in applying it the opposite direction, to find features in superposition over neurons.
          - link "[↩]" [ref=e7826] [cursor=pointer]:
            - /url: "#d-footnote-25"
        - listitem [ref=e7827]:
          - text: We haven’t encountered a specific term in the distributed coding literature that corresponds to this hypothesis specifically, although the idea of a “direction in activation-space” is common in the literature, which may be due to ignorance on our part. We call this hypothesis linearity.
          - link "[↩]" [ref=e7828] [cursor=pointer]:
            - /url: "#d-footnote-26"
        - listitem [ref=e7829]:
          - text: Experimental evidence seems to support this
          - generic [ref=e7832]: "[66]"
          - link "[↩]" [ref=e7833] [cursor=pointer]:
            - /url: "#d-footnote-27"
        - listitem [ref=e7834]:
          - text: A related, but different, concept in the neuroscience literature is the “binding problem”
          - generic [ref=e7837]: "[67]"
          - text: in which e.g. a red triangle is a co-occurrence of exactly one shape and exactly one color, which is not a representational challenge, but a binding problem arises if a decomposed code needs to represent simultaneously also a blue square — which shape feature goes with which color feature? Our work does not engage with the binding question, merely treating this as a co-occurrence of “blue”, “red”, “triangle”, and “square”.
          - link "[↩]" [ref=e7838] [cursor=pointer]:
            - /url: "#d-footnote-28"
