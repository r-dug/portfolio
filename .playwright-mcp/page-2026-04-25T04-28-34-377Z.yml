      - paragraph [ref=e6330]:
        - text: Neel Nanda is an external researcher in mechanistic interpretability. This is a description of his blog post,
        - link "Actually, Othello-GPT Has A Linear Emergent World Representation" [ref=e6331] [cursor=pointer]:
