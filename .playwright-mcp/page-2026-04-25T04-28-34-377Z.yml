    - paragraph [ref=e3829]: "A note for reimplementations: optimizing with a two-dimensional hidden space makes this easier to study, but the actual optimization process to be really challenging from gradient descent – a lot harder than even just having three dimensions. Getting clean results required fitting each model multiple times and taking the solution with the lowest loss. However, there's a silver lining to this: visualizing the sub-optimal solutions on a scatter plot as above allows us to see the loss curves for different geometries and gain greater insight into the phase change."
    - heading "Correlated and Anticorrelated Features" [level=3] [ref=e3830]:
      - link "Correlated and Anticorrelated Features" [ref=e3831] [cursor=pointer]:
        - /url: "#geometry-correlated"
    - paragraph [ref=e3832]: A more complicated form of non-uniform superposition occurs when there are correlations between features. This seems essential for understanding superposition in the real world, where many features are correlated or anti-correlated.
    - paragraph [ref=e3833]: For example, one very pragmatic question to ask is whether we should expect polysemantic neurons to group the same features together across models. If the groupings were random, you could use this to detect polysemantic neurons, by comparing across models! However, we'll see that correlational structure strongly influences which features are grouped together in superposition.
    - paragraph [ref=e3834]: The behavior seems to be quite nuanced, with a kind of "order of preferences" for how correlated features behave in superposition. The model ideally represents correlated features orthogonally, in separate tegum factors with no interactions between them. When that fails, it prefers to arrange them so that they're as close together as possible – it prefers positive interference between correlated features over negative interference. Finally, when there isn't enough space to represent all the correlated features, it will collapse them and represent their principal component instead! Conversely, when features are anti-correlated, models prefer to have them interfere, especially with negative interference. We'll demonstrate this with a few experiments below.
    - heading "Setup for Exploring Correlated and Anticorrelated Features" [level=4] [ref=e3835]:
      - link "Setup for Exploring Correlated and Anticorrelated Features" [ref=e3836] [cursor=pointer]:
        - /url: "#geometry-correlated-setup"
    - paragraph [ref=e3837]: Throughout this section we'll refer to "correlated feature sets" and "anticorrelated feature sets".
    - paragraph [ref=e3838]:
      - text: "Correlated Feature Sets. Our correlated feature sets can be thought of as \"bundles\" of co-occurring features. One can imagine a highly idealized version of what might happen in an image classifier: there could be a bundle of features used to identify animals (fur, ears, eyes) and another bundle used to identify buildings (corners, windows, doors). Features from one of these bundles are likely to appear together. Mathematically, we represent this by linking the choice of whether all the features in a correlated feature set are zero or not together. Recall that we"
      - link "originally defined" [ref=e3839] [cursor=pointer]:
        - /url: "#demonstrating-setup-x"
      - text: our synthetic distribution to have features be zero with probability
      - generic [ref=e3840]:
        - text: S
        - generic [ref=e3842]:
          - math [ref=e3844]:
            - generic [ref=e3847]: S
          - generic [ref=e3849]: S
      - text: and otherwise uniformly distributed between [0,1]. We simply have the same sample determine whether they're zero.
    - paragraph [ref=e3850]:
      - text: Anticorrelated Feature Sets. One could also imagine anticorrelated features which are extremely unlikely to occur together. To simulate these, we'll have anticorrelated feature sets where only one feature in the set can be active at a time. To simulate this, we'll have the feature set be entirely zero with probability
      - generic [ref=e3851]:
        - text: S
        - generic [ref=e3853]:
          - math [ref=e3855]:
            - generic [ref=e3858]: S
          - generic [ref=e3860]: S
      - text: ", but then only have one randomly selected feature in the set be uniformly sampled from [0,1] if it's active, with the others being zero."
    - heading "Organization of Correlated and Anticorrelated Features" [level=4] [ref=e3861]:
      - link "Organization of Correlated and Anticorrelated Features" [ref=e3862] [cursor=pointer]:
        - /url: "#geometry-organization"
    - paragraph [ref=e3863]:
      - text: For our initial investigation, we simply train a number of small toy models with correlated and anti-correlated features and observe what happens. To make this easy to study, we limit ourselves to the
      - generic [ref=e3864]:
