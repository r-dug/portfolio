    - paragraph [ref=e3985]: As an experiment, we consider six features, organized into three sets of correlated pairs. Features in each correlated pair are represented by a given color (red, green, and blue). The correlation is created by having both features always activate together – they're either both zero or neither zero. (The exact non-zero values they take when they activate is uncorrelated.)
    - paragraph [ref=e3986]: As we vary the sparsity of the features, we find that in the very sparse regime, we observe superposition as expected, with features arranged in a hexagon and correlated features side-by-side. As we decrease sparsity, the features progressively "collapse" into their principal components. In very dense regimes, the solution becomes equivalent to PCA.
    - figure [ref=e3987]:
      - img [ref=e3988]
    - paragraph [ref=e3989]: These results seem to hint that PCA and superposition are in some sense complementary strategies which trade off with one another. As features become more correlated, PCA becomes a better strategy. As features become sparser, superposition becomes a better strategy. When features are both sparse and correlated, mixtures of each strategy seem to occur. It would be nice to more deeply understand this space of tradeoffs.
    - paragraph [ref=e3990]:
      - text: It's also interesting to think about this in the context of continuous
      - link "equivariant features" [ref=e3991] [cursor=pointer]:
        - /url: https://distill.pub/2020/circuits/equivariance/
      - text: ", such as features which occur in different rotations."
    - separator [ref=e3992]
    - heading "Superposition and Learning Dynamics" [level=2] [ref=e3993]:
      - link "Superposition and Learning Dynamics" [ref=e3994] [cursor=pointer]:
        - /url: "#learning"
    - paragraph [ref=e3995]: The focus of this paper is how superposition contributes to the functioning of fully trained neural networks, but as a brief detour it's interesting to ask how our toy models – and the resulting superposition – evolve over the course of training.
    - paragraph [ref=e3996]: There are several reasons why these models seem like a particularly interesting case for studying learning dynamics. Firstly, unlike most neural networks, the fully trained models converge to a simple but non-trivial structure that rhymes with an emerging thread of evidence that neural network learning dynamics might have geometric weight structure that we can understand. One might hope that understanding the final structure would make it easier for us to understand the evolution over training. Secondly, superposition hints at surprisingly discrete structure (regular polytopes of all things!). We'll find that the underlying learning dynamics are also surprisingly discrete, continuing an emerging trend of evidence that neural network learning might be less continuous than it seems. Finally, since superposition has significant implications for interpretability, it would be nice to understand how it emerges over training – should we expect models to use superposition early on, or is it something that only emerges later in training, as models struggle to fit more features in?
    - paragraph [ref=e3997]: Unfortunately, we aren't able to give these questions the detailed investigation they deserve within the scope of this paper. Instead, we'll limit ourselves to a couple particularly striking phenomena we've noticed, leaving more detailed investigation for future work.
    - 'heading "Phenomenon 1: Discrete \"Energy Level\" Jumps" [level=4] [ref=e3998]':
      - 'link "Phenomenon 1: Discrete \"Energy Level\" Jumps" [ref=e3999] [cursor=pointer]':
        - /url: "#learning-jumps"
    - paragraph [ref=e4000]:
      - text: Perhaps the most striking phenomenon we've noticed is that the learning dynamics of toy models with large numbers of features appear to be dominated by "energy level jumps" where features jump between different feature dimensionalities. (Recall that a feature's
      - link "dimensionality" [ref=e4001] [cursor=pointer]:
        - /url: "#geometry-dimensionality"
      - text: is the fraction of a dimension dedicated to representing a feature.)
    - paragraph [ref=e4002]:
      - text: Let's consider the problem setup we studied when investigating the geometry of uniform superposition in the
      - link "previous section" [ref=e4003] [cursor=pointer]:
        - /url: "#geometry-dimensionality"
      - text: ", where we have a large number of features of equal importance and sparsity. As we saw previously, the features ultimately arrange themselves into a small number of polytopes with fractional dimensionalities."
    - paragraph [ref=e4004]: A natural question to ask is what happens to these feature dimensionalities over the course of training. Let's pick one model where all the features converge into digons and observe. In the first plot, each colored line corresponds to the dimensionality of a single feature. The second plot shows how the loss curve changes over the same duration.
    - figure [ref=e4005]:
      - img [ref=e4006]
    - paragraph [ref=e4007]: Note how the dimensionality of some features "jump" between different values and swap places. As this happens, the loss curve also undergoes a sudden drop (a very small one at the first jump, and a larger one at the second jump).
    - paragraph [ref=e4008]:
      - text: These results make us suspect that seemingly smooth decreases of the loss curve in larger models are in fact composed of many small jumps of features between different configurations. (For similar results of sudden mechanistic changes, see Olsson et al.'s induction head phase change
      - generic [ref=e4011]: "[29]"
      - text: ", and Nanda and Lieberum's results on phase changes in modular arithmetic"
      - generic [ref=e4014]: "[30]"
      - text: . More broadly, consider the phenomenon of grokking
      - generic [ref=e4017]: "[31]"
      - text: .)
    - 'heading "Phenomenon 2: Learning as Geometric Transformations" [level=4] [ref=e4018]':
      - 'link "Phenomenon 2: Learning as Geometric Transformations" [ref=e4019] [cursor=pointer]':
        - /url: "#learning-geometric"
