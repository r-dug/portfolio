  - generic [ref=e93]:
    - paragraph [ref=e94]: It would be very convenient if the individual neurons of artificial neural networks corresponded to cleanly interpretable features of the input. For example, in an “ideal” ImageNet classifier, each neuron would fire only in the presence of a specific visual feature, such as the color red, a left-facing curve, or a dog snout. Empirically, in models we have studied, some of the neurons do cleanly map to features. But it isn't always the case that features correspond so cleanly to neurons, especially in large language models where it actually seems rare for neurons to correspond to clean features. This brings up many questions. Why is it that neurons sometimes align with features and sometimes don't? Why do some models and tasks have many of these clean neurons, while they're vanishingly rare in others?
    - paragraph [ref=e95]:
      - text: In this paper, we use toy models — small ReLU networks trained on synthetic data with sparse input features — to investigate how and when models represent more features than they have dimensions. We call this phenomenon superposition
      - generic [ref=e98]: "[1, 2, 3]"
      - text: . When features are sparse, superposition allows compression beyond what a linear model would do, at the cost of "interference" that requires nonlinear filtering.
    - paragraph [ref=e99]:
      - text: Consider a toy model where we train an embedding of five features of varying importance
      - superscript [ref=e100]: "1"
      - text: "in two dimensions, add a ReLU afterwards for filtering, and vary the sparsity of the features. With dense features, the model learns to represent an orthogonal basis of the most important two features (similar to what Principal Component Analysis might give us), and the other three features are not represented. But if we make the features sparse, this changes:"
    - figure [ref=e101]:
      - img [ref=e102]
    - generic [ref=e103]:
      - text: This figure and a few others can be reproduced using the
      - link "toy model framework Colab notebook" [ref=e104] [cursor=pointer]:
        - /url: https://colab.research.google.com/github/anthropics/toy-models-of-superposition/blob/main/toy_models.ipynb
      - text: in our
      - link "Github repo" [ref=e105] [cursor=pointer]:
        - /url: https://github.com/anthropics/toy-models-of-superposition
    - paragraph [ref=e106]: Not only can models store additional features in superposition by tolerating some interference, but we'll show that, at least in certain limited cases, models can perform computation while in superposition. (In particular, we'll show that models can put simple circuits computing the absolute value function in superposition.) This leads us to hypothesize that the neural networks we observe in practice are in some sense noisily simulating larger, highly sparse networks. In other words, it's possible that models we train can be thought of as doing “the same thing as” an imagined much-larger model, representing the exact same features but with no interference.
    - paragraph [ref=e107]:
      - text: Feature superposition isn't a novel idea. A number of previous interpretability papers have considered it
      - generic [ref=e110]: "[1, 2, 3, 4]"
      - text: ", and it's very closely related to the long-studied topic of compressed sensing in mathematics"
      - generic [ref=e113]: "[5]"
      - text: ", as well as the ideas of distributed, dense, and population codes in neuroscience"
      - generic [ref=e116]: "[6]"
      - text: and deep learning
      - generic [ref=e119]: "[7]"
      - text: . What, then, is the contribution of this paper?
    - paragraph [ref=e120]:
      - text: For interpretability researchers, our main contribution is providing a direct demonstration that superposition occurs in artificial neural networks given a relatively natural setup, suggesting this may also occur in practice. That is, we show a case where interpreting neural networks as having sparse structure in superposition isn't just a useful post-hoc interpretation, but actually the "ground truth" of a model. We offer a theory of when and why this occurs, revealing a
      - link "phase diagram" [ref=e121] [cursor=pointer]:
        - /url: "#phase-change"
      - text: for superposition. This
      - link "explains" [ref=e122] [cursor=pointer]:
        - /url: "#privileged-basis"
      - text: why neurons are sometimes "monosemantic" responding to a single feature, and sometimes "polysemantic"
      - generic [ref=e125]: "[8]"
      - text: responding to many unrelated features. We also discover that, at least in our toy model, superposition exhibits
      - link "complex geometric structure" [ref=e126] [cursor=pointer]:
        - /url: "#geometry"
      - text: .
    - paragraph [ref=e127]:
      - text: But our results may also be of broader interest. We find preliminary evidence that superposition may be linked to adversarial examples and grokking, and might also suggest a theory for the performance of mixture of experts models. More broadly, the toy model we investigate has unexpectedly rich structure, exhibiting
      - link "phase changes" [ref=e128] [cursor=pointer]:
        - /url: "#phase-change"
      - text: ", a"
      - link "geometric structure" [ref=e129] [cursor=pointer]:
        - /url: "#geometry"
      - text: based on uniform polytopes,
      - link "\"energy level\"-like jumps" [ref=e130] [cursor=pointer]:
        - /url: "#learning-jumps"
      - text: during training, and a
      - link "phenomenon" [ref=e131] [cursor=pointer]:
        - /url: "#geometry-uniform"
      - text: which is qualitatively similar to the fractional quantum Hall effect in physics, among other striking phenomena. We originally investigated the subject to gain understanding of cleanly-interpretable neurons in larger models, but we've found these toy models to be surprisingly interesting in their own right.
    - heading "Key Results From Our Toy Models" [level=4] [ref=e132]:
      - link "Key Results From Our Toy Models" [ref=e133] [cursor=pointer]:
        - /url: "#key-results"
    - paragraph [ref=e134]: "In our toy models, we are able to demonstrate that:"
    - list [ref=e135]:
      - listitem [ref=e136]: Superposition is a real, observed phenomenon.
      - listitem [ref=e137]: Both monosemantic and polysemantic neurons can form.
      - listitem [ref=e138]: At least some kinds of computation can be performed in superposition.
      - listitem [ref=e139]: Whether features are stored in superposition is governed by a phase change.
      - listitem [ref=e140]: Superposition organizes features into geometric structures such as digons, triangles, pentagons, and tetrahedrons.
    - paragraph [ref=e141]: Our toy models are simple ReLU networks, so it seems fair to say that neural networks exhibit these properties in at least some regimes, but it's very unclear what to generalize to real networks.
    - separator [ref=e142]
    - 'heading "Definitions and Motivation: Features, Directions, and Superposition" [level=2] [ref=e143]':
      - 'link "Definitions and Motivation: Features, Directions, and Superposition" [ref=e144] [cursor=pointer]':
        - /url: "#motivation"
    - paragraph [ref=e145]: In our work, we often think of neural networks as having features of the input represented as directions in activation space. This isn't a trivial claim. It isn't obvious what kind of structure we should expect neural network representations to have. When we say something like "word embeddings have a gender direction" or "vision models have curve detector neurons", one is implicitly making strong claims about the structure of network representations.
    - paragraph [ref=e146]: "Despite this, we believe this kind of \"linear representation hypothesis\" is supported both by significant empirical findings and theoretical arguments. One might think of this as two separate properties, which we'll explore in more detail shortly:"
    - list [ref=e147]:
      - listitem [ref=e148]: "Decomposability: Network representations can be described in terms of independently understandable features."
      - listitem [ref=e149]: "Linearity: Features are represented by direction."
    - paragraph [ref=e150]:
      - text: If we hope to reverse engineer neural networks, we need a property like decomposability. Decomposability is what
      - link "allows us to reason about the model" [ref=e151] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/mech-interp-essay/index.html
      - text: "without fitting the whole thing in our heads! But it's not enough for things to be decomposable: we need to be able to access the decomposition somehow. In order to do this, we need to identify the individual features within a representation. In a linear representation, this corresponds to determining which directions in activation space correspond to which independent features of the input."
    - paragraph [ref=e152]:
      - text: Sometimes, identifying feature directions is very easy because features seem to correspond to neurons. For example, many neurons in the early layers of InceptionV1 clearly correspond to features (e.g. curve detector neurons
      - generic [ref=e155]: "[9]"
      - text: "). Why is it that we sometimes get this extremely helpful property, but in other cases don't? We hypothesize that there are really two countervailing forces driving this:"
    - list [ref=e156]:
      - listitem [ref=e157]: "Privileged Basis: Only some representations have a privileged basis which encourages features to align with basis directions (i.e. to correspond to neurons)."
      - listitem [ref=e158]: "Superposition: Linear representations can represent more features than dimensions, using a strategy we call superposition. This can be seen as neural networks simulating larger networks. This pushes features away from corresponding to neurons."
    - paragraph [ref=e159]:
      - text: Superposition has been hypothesized in previous work
      - generic [ref=e162]: "[1, 2, 3, 4]"
      - text: ", and in some cases, assuming something like superposition has been shown to help find interpretable structure"
      - generic [ref=e165]: "[1, 2]"
      - text: . However, we're not aware of feature superposition having been unambiguously demonstrated to occur in neural networks before (
      - generic [ref=e168]: "[10]"
      - text: demonstrates a closely related phenomenon of model superposition). The goal of this paper is to change that, demonstrating superposition and exploring how it interacts with privileged bases. If superposition occurs in networks, it deeply influences what approaches to interpretability research make sense, so unambiguous demonstration seems important.
    - paragraph [ref=e169]: The goal of this section will be to motivate these ideas and unpack them in detail.
    - paragraph [ref=e170]:
      - text: It's worth noting that many of the ideas in this section have close connections to ideas in other lines of interpretability research (especially disentanglement), neuroscience (distributed representations, population codes, etc), compressed sensing, and many other lines of work. This section will focus on articulating our perspective on the problem. We'll discuss these other lines of work in detail in
      - link "Related Work" [ref=e171] [cursor=pointer]:
        - /url: "#related-work"
      - text: .
    - heading "Empirical Phenomena" [level=3] [ref=e172]:
      - link "Empirical Phenomena" [ref=e173] [cursor=pointer]:
        - /url: "#motivation-empirical"
    - paragraph [ref=e174]: "When we talk about \"features\" and how they're represented, this is ultimately theory building around several observed empirical phenomena. Before describing how we conceptualize those results, we'll simply describe some of the major results motivating our thinking:"
    - list [ref=e175]:
      - listitem [ref=e176]:
        - text: Word Embeddings - A famous result by Mikolov et al.
        - generic [ref=e179]: "[11]"
        - text: found that word embeddings appear to have directions which correspond to semantic properties, allowing for embedding arithmetic vectors such as
        - code [ref=e180]: V("king") - V("man") + V("woman") = V("queen")
        - text: (but see
        - generic [ref=e183]: "[12]"
        - text: ).
      - listitem [ref=e184]:
        - text: Latent Spaces - Similar "vector arithmetic" and interpretable direction results have also been found for generative adversarial networks (e.g.
        - generic [ref=e187]: "[13]"
        - text: ).
      - listitem [ref=e188]:
        - text: Interpretable Neurons - There is a significant body of results finding neurons which appear to be interpretable (in RNNs
        - generic [ref=e191]: "[14, 15]"
        - text: ; in CNNs
        - generic [ref=e194]: "[16, 17]"
        - text: ; in GANs
        - generic [ref=e197]: "[18]"
        - text: ), activating in response to some understandable property. This work has faced some skepticism
        - generic [ref=e200]: "[19, 20]"
        - text: . In response, several papers have aimed to give extremely detailed accounts of a few specific neurons, in the hope of dispositively establishing examples of neurons which truly detect some understandable property (notably Cammarata et al.
        - generic [ref=e203]: "[9]"
        - text: ", but also"
        - generic [ref=e206]: "[21, 22]"
        - text: ).
      - listitem [ref=e207]:
        - text: Universality - Many analogous neurons responding to the same properties can be found across networks
        - generic [ref=e210]: "[23, 3, 21]"
        - text: .
      - listitem [ref=e211]:
        - text: Polysemantic Neurons - At the same time, there are also many neurons which appear to not respond to an interpretable property of the input, and in particular, many polysemantic neurons which appear to respond to unrelated mixtures of inputs
        - generic [ref=e214]: "[8]"
        - text: .
    - paragraph [ref=e215]: As a result, we tend to think of neural network representations as being composed of features which are represented as directions. We'll unpack this idea in the following sections.
    - heading "What are Features?" [level=3] [ref=e216]:
      - link "What are Features?" [ref=e217] [cursor=pointer]:
        - /url: "#motivation-features"
    - paragraph [ref=e218]:
      - text: Our use of the term "feature" is motivated by the interpretable properties of the input we observe neurons (or word embedding directions) responding to. There's a rich variety of such observed properties!
      - superscript [ref=e220]: "2"
      - text: We'd like to use the term "feature" to encompass all these properties.
    - paragraph [ref=e221]: "But even with that motivation, it turns out to be quite challenging to create a satisfactory definition of a feature. Rather than offer a single definition we're confident about, we consider three potential working definitions:"
    - list [ref=e222]:
      - listitem [ref=e223]:
        - text: Features as arbitrary functions. One approach would be to define features as any function of the input (as in
        - generic [ref=e226]: "[24]"
        - text: "). But this doesn't quite seem to fit our motivations. There's something special about these features that we're observing: they seem to in some sense be fundamental abstractions for reasoning about the data, with the same features forming reliably across models. Features also seem identifiable: cat and car are two features while cat+car and cat-car seem like mixtures of features rather than features in some important sense."
      - listitem [ref=e227]: "Features as interpretable properties. All the features we described are strikingly understandable to humans. One could try to use this for a definition: features are the presence of human understandable \"concepts\" in the input. But it seems important to allow for features we might not understand. If AlphaFold discovers some important chemical structure for predicting protein folding, it very well might not be something we initially understand!"
      - listitem [ref=e228]:
        - text: Neurons in Sufficiently Large Models. A final approach is to define features as properties of the input which a sufficiently large neural network will reliably dedicate a neuron to representing.
        - superscript [ref=e230]: "3"
        - text: For example, curve detectors appear to reliably occur across sufficiently sophisticated vision models, and so are a feature. For interpretable properties which we presently only observe in polysemantic neurons, the hope is that a sufficiently large model would dedicate a neuron to them. This definition is slightly circular, but avoids the issues with the earlier ones.
    - paragraph [ref=e231]:
      - text: We've written this paper with the final "neurons in sufficiently large models" definition in mind. But we aren't overly attached to it, and actually think it's probably important to not prematurely attach to a definition.
      - superscript [ref=e233]: "4"
    - heading "Features as Directions" [level=3] [ref=e234]:
      - link "Features as Directions" [ref=e235] [cursor=pointer]:
        - /url: "#motivation-directions"
    - paragraph [ref=e236]:
      - text: As we've mentioned in previous sections, we generally think of features as being represented by directions. For example, in word embeddings, "gender" and "royalty" appear to correspond to directions, allowing arithmetic like
      - code [ref=e237]: V("king") - V("man") + V("woman") = V("queen")
      - generic [ref=e240]: "[11]"
      - text: . Examples of interpretable neurons are also cases of features as directions, since the amount a neuron activates corresponds to a basis direction in the representation
