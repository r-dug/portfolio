    - paragraph [ref=e3353]: "We can now break the above plot down on a per-feature basis. This reveals many more of these \"sticky points\"! To help us understand this better, we're going to create a scatter plot annotated with some additional information:"
    - list [ref=e3354]:
      - listitem [ref=e3355]: We start with the line plot we had in the previous section.
      - listitem [ref=e3356]: We overlay this with a scatter plot of the individual feature dimensionalities for each feature in the models at each sparsity level.
      - listitem [ref=e3357]: The feature dimensionalities cluster at certain fractions, so we draw lines for those. (It turns out that each fraction corresponds to a specific weight geometry – we'll discuss this shortly.)
      - listitem [ref=e3358]: We visualize the weight geometries for a few models with a "feature geometry graph" where each feature is a node and edge weights are based on the absolute value of the dot product feature embedding vectors. So features are connected if they aren't orthogonal.
    - paragraph [ref=e3359]: "Let's look at the resulting plot, and then we'll try to figure out what it's showing us:"
    - figure [ref=e3360]:
      - img [ref=e3361]
    - paragraph [ref=e3362]: What is going on with the points clustering at specific fractions?? We'll see shortly that the model likes to create specific weight geometries and kind of jumps between the different configurations.
    - paragraph [ref=e3363]: In the previous section, we developed a theory of superposition as a phase change. But everything on this plot between 0 (not learning a feature) and 1 (dedicating a dimension to a feature) is superposition. Superposition is what happens when features have fractional dimensionality. That is to say – superposition isn't just one thing!
    - paragraph [ref=e3364]: "How can we relate this to our original understanding of the phase change? We often think of water as only having three phases: ice, water and steam. But this is a simplification: there are actually many phases of ice, often corresponding to different crystal structures (eg. hexagonal vs cubic ice). In a vaguely similar way, neural network features seem to also have many other phases within the general category of \"superposition.\""
    - heading "Why these geometric structures?" [level=4] [ref=e3365]:
      - link "Why these geometric structures?" [ref=e3366] [cursor=pointer]:
        - /url: "#geometry-structures"
    - paragraph [ref=e3367]: "In the previous diagram, we found that there are distinct lines corresponding to dimensionality of: ¾ (tetrahedron), ⅔ (triangle), ½ (antipodal pair), ⅖ (pentagon), ⅜ (square antiprism), and 0 (feature not learned). We believe there would also be a 1 (dedicated dimension for a feature) line if not for the fact that basis features are indistinguishable from other directions in the dense regime."
    - paragraph [ref=e3368]:
      - text: Several of these configurations may jump out as solutions to the famous
      - link "Thomson problem" [ref=e3369] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Thomson_problem
      - text: . (In particular,
      - link "square antiprisms" [ref=e3370] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Square_antiprism
      - text: are much less famous than cubes and are primarily of note for their
      - link "role in molecular geometry" [ref=e3371] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Square_antiprismatic_molecular_geometry
      - text: due to being a Thomson problem solution.) As we saw earlier, there is a very real sense in which our model can be understood as solving a generalized version of the Thomson problem. When our model chooses to represent a feature, the feature is embedded as a point on an
      - generic [ref=e3372]:
        - text: m
        - generic [ref=e3374]:
          - math [ref=e3376]:
            - generic [ref=e3379]: m
          - generic [ref=e3381]: m
      - text: "-dimensional sphere."
    - paragraph [ref=e3382]: A second clue as to what's going on is that there are lines for the Thomson solutions which are uniform polyhedra (e.g. tetrahedron), but there seem to be split lines where we'd expect to see non-uniform solutions (e.g. instead of a ⅗ line for triangular bipyramids we see a co-occurence of points at ⅔ for triangles and points at ½ for a antipodes). In a uniform polyhedron, all vertices have the same geometry, and so if we embed features as them each feature has the same dimensionality. But if we embed features as a non-uniform polyhedron, different features will have more or less interference with others.
    - paragraph [ref=e3383]:
      - text: In particular, many of the Thomson solutions can be understood as
      - link "tegum products" [ref=e3384] [cursor=pointer]:
        - /url: https://polytope.miraheze.org/wiki/Tegum_product
      - text: (an operation which constructs polytopes by embedding two polytopes in orthogonal subspaces) of smaller uniform polytopes. (In the earlier graph visualizations of feature geometry, two subgraphs are disconnected if and only if they are in different tegum factors.) As a result, we should expect their dimensionality to actually correspond to the underlying factor uniform polytopes.
    - figure [ref=e3385]:
      - img [ref=e3386]
    - paragraph [ref=e3387]: This also suggests a possible reason why we observe 3D Thomson problem solutions, despite the fact that we're actually studying a higher dimensional version of the problem. Just as many 3D Thomson solutions are tegum products of 2D and 1D solutions, perhaps higher dimensional solutions are often tegum products of 1D, 2D, and 3D solutions.
    - paragraph [ref=e3388]:
      - text: "The orthogonality of factors in tegum products has interesting implications. For the purposes of superposition, it means that there can't be any \"interference\" across tegum-factors. This may be preferred by the toy model: having many features interfere simultaneously could be really bad for it. (See related discussion in"
      - link "our earlier mathematical analysis" [ref=e3389] [cursor=pointer]:
        - /url: "#demonstrating-math"
      - text: .)
