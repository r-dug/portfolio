        - /url: "#appendix-methods"
    - heading "Dataset Examples" [level=4] [ref=e8289]:
      - link "Dataset Examples" [ref=e8290] [cursor=pointer]:
        - /url: "#appendix-methods-dataset"
    - paragraph [ref=e8291]: One of our primary tools for understanding features are dataset examples that activate the feature to varying extents. Most often, we show the maximally activating examples, which we interpret as the most extreme examples of the feature (see the linear representation hypothesis). Since the features are highly sparse, we understand features not activating as a default condition, and features activating as the case to understand.
    - paragraph [ref=e8292]: We collect both maximally activating dataset examples, and also dataset examples that are randomly sampled within certain “activation buckets” linearly spaced between the maximum activation and zero.
    - paragraph [ref=e8293]:
      - text: We collect our text dataset examples over The Pile (excluding “books3”)
      - generic [ref=e8296]: "[74]"
      - text: and Common Crawl
      - generic [ref=e8299]: "[75]"
      - text: "datasets, two standard research datasets, rather than our internal training dataset. One important caveat here is that this data does not include any of the “Human: … Assistant: …” data that Claude is finetuned on, and as such, may not clearly demonstrate features focused on that."
    - paragraph [ref=e8300]: Image dataset examples are hand curated, primarily from Wikimedia commons. They are not randomly sampled.
    - paragraph [ref=e8301]: "It's also important to keep in mind that dataset examples do not establish causal links to model behaviors. In principle, a feature could consistently respond to something, and then have no function. As a result, we also heavily use another technique: feature steering."
    - heading "Feature Steering" [level=4] [ref=e8302]:
      - link "Feature Steering" [ref=e8303] [cursor=pointer]:
        - /url: "#appendix-methods-steering"
    - paragraph
    - paragraph [ref=e8304]:
      - text: "Many of our experiments involve applying perturbations to network activity along feature directions, or feature steering. We implemented feature steering as follows: we decompose the residual stream activity x into the sum of two components, the SAE reconstruction SAE(x) and the reconstruction error error(x). We then replace the SAE(x) term with a modified SAE “reconstruction” in which we clamp the activity of a specific feature in the SAE to a specific value, and leave the error term unchanged."
      - superscript [ref=e8305]: "16"
      - text: We then run the forward pass of the network in downstream layers using this modified residual stream activity. We apply this manipulation for every model input, and at every token position.
    - paragraph [ref=e8306]: Interestingly, we find that obtaining interesting results typically requires clamping feature activations to values outside their observed range over the SAE training dataset. We suspect that this is because we perturb only one feature at a time, which typically might be co-active with several correlated features with related meanings. At the same time, clamping feature activations to too extreme a value (say, ±100× their observed maximum) typically causes the model to devolve into nonsensical behavior, e.g., repeating the same token indefinitely. When we refer to clamping features to numerical values, the units are with respect to the feature’s maximum activity over the SAE training dataset. We find that the perturbation magnitude needed to elicit interesting behavior varies by feature – typically, we experiment with values between −10 and 10.
    - heading "Comparison to few-shot probe-based steering" [level=4] [ref=e8307]:
      - link "Comparison to few-shot probe-based steering" [ref=e8308] [cursor=pointer]:
        - /url: "#appendix-methods-steering-compare"
    - paragraph [ref=e8309]: To qualitatively compare the performance of feature steering to non-feature-based alternatives, we performed the following experiments. We took a collection of seven examples where feature steering was successful (i.e. meaningful altered model outputs in ways consistent with our interpretation of the feature), and where the feature in question could be found quickly via one or two positive and text examples (in most case the examples used were those we used to find the feature in the first place – in some cases, where the feature was originally found using only a positive examples, we came up with reasonable corresponding negative examples that attempted to control for confounds other than the concept of interest). We then used these examples to construct a “few-shot” steering vector for the concept of interest by taking the difference of the mean middle layer residual stream activity on the positive examples vs. negative examples (in all cases we measured activity on the last token position of the examples, as this is the approach we typically used in searching for features).
    - paragraph [ref=e8310]: We experimented with adding scaled multiples of this few-shot steering vector to model activations, varying the scaling factor. While our sweeps over scaling factors were not systematic, we attempted to do a thorough job of manually tuning the scaling factor using a binary search-like protocol (up to a resolution of 0.1) using qualitative indicators of whether the factor should be increased or decreased – for instance, too-strong factors would result in nonsensical model outputs, and too-weak factors would result in no meaningful change to the model output. While more thorough work is needed to make these experiments more rigorous, we felt convinced that we were not missing any potentially interesting results from these particular steering vectors.
    - paragraph [ref=e8311]: In two examples (the “gender bias” feature highlighted in the main text and an “agreement” feature) we found that few-shot steering vectors were similarly effective for steering. In five examples (the “secrecy,” “sycophancy,” and “code errors” features highlighted in the main text, along with features related to “self-improving AI” and “developing methamphetamine”), we were able to usefully steer model outputs with features but not few-shot steering vectors.
    - paragraph [ref=e8312]: However, we note that for most applications of interest we may not be limited to the few-shot regime, in which case non-feature-based methods of constructing steering vectors may be as or more effective than using features. We expect the value of features is primarily that they provide an unsupervised way of uncovering abstractions that could be useful for steering that we may not have thought to specify in advance. We leave a rigorous comparison of different steering approaches to future work.
    - heading "Ablations and Attributions" [level=3] [ref=e8313]:
      - link "Ablations and Attributions" [ref=e8314] [cursor=pointer]:
        - /url: "#appendix-ablations"
    - paragraph [ref=e8315]:
      - text: We comprehensively evaluate the relationship between feature activations, attributions, and ablation effects on the “John” and the first “Kobe” example from the
      - link "Features as Computational Intermediates" [ref=e8316] [cursor=pointer]:
        - /url: "#computational"
      - text: section. We find that the correlation between attributions and ablations is much larger (about .81) than the one between activations and ablations (.12). This confirms previous findings
      - generic [ref=e8319]: "[76]"
      - text: that attribution makes an efficient proxy for the gold-standard causal effect of feature ablations. For a better approximation, one might implement AtP*, which adjusts for attention pattern saturation
      - generic [ref=e8322]: "[77]"
      - text: .
