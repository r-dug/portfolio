        - /url: "#computational"
    - paragraph [ref=e4040]: Another potential application of features is that they let us examine the intermediate computation that the model uses to produce an output. As a proof of concept, we observe that in prompts where intermediate computation is required, we find active features corresponding to some of the expected intermediate results.
    - paragraph [ref=e4041]:
      - text: A simple strategy for efficiently identifying causally important features for a model's output is to compute attributions, which are local linear approximations of the effect of turning a feature off at a specific location on the model's next-token prediction.
      - superscript [ref=e4043]: "10"
      - text: We also perform feature ablations, where we clamp a feature’s value to zero at a specific token position during a forward pass, which measures the full, potentially nonlinear causal effect of that feature’s activation in that position on the model output. This is much slower since it requires one forward pass for every feature that activates at each position, so we often used attribution as a preliminary step to filter the set of features to ablate. (In the case studies shown below, we do ablate every active feature for completeness, and find a 0.8 correlation between attribution and ablation effects; see
      - link "appendix" [ref=e4044] [cursor=pointer]:
        - /url: "#appendix-ablations"
      - text: .)
    - paragraph [ref=e4045]: We find that the middle layer residual stream of the model contains a range of features causally implicated in the model's completion.
