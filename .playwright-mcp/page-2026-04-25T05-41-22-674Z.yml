    - paragraph
    - paragraph [ref=e2359]:
      - text: Thus, we concluded that
      - link "1M/1013764" [ref=e2361] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_1013764
      - text: represents a broad variety of errors in code.
      - superscript [ref=e2362]: "5"
    - paragraph [ref=e2363]:
      - text: But does it also control model behavior? We claim that it does, but will need to do different experiments to show this. The above experiments only support that the feature activates in response to bugs, and don't show a corresponding effect. As a result, we'll now turn to using feature steering (see
      - link "methods" [ref=e2364] [cursor=pointer]:
        - /url: "#appendix-methods-steering"
      - text: and
      - link "related work" [ref=e2365] [cursor=pointer]:
        - /url: "#related-work-steering"
      - text: ) to demonstrate
      - link "1M/1013764" [ref=e2367] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_1013764
      - text: behavioral effects.
    - paragraph [ref=e2368]:
      - text: "As a first experiment, we input a prompt with bug-free code and clamped the feature to a large positive activation. We see that the model proceeds to hallucinate an error message:"
      - superscript [ref=e2369]: "6"
    - figure [ref=e2370]:
      - img [ref=e2371]
    - paragraph [ref=e2372]: We can also intervene to clamp this feature to a large negative activation. Doing this for code that does contain a bug causes the model to predict what the code would have produced if the bug was not there!
    - figure [ref=e2373]:
      - img [ref=e2374]
    - paragraph [ref=e2375]:
      - text: Surprisingly, if we add an extra “
      - code [ref=e2376]: ">>>"
      - text: ” to the end of the prompt (indicating that a new line of code is being written) and clamp the feature to a large negative activation, the model rewrites the code without the bug!
    - figure [ref=e2377]:
      - img [ref=e2378]
    - paragraph [ref=e2379]: The last example is somewhat delicate – the “code rewriting” behavior is sensitive to the details of the prompt – but the fact that it occurs at all points to a deep connection between this feature and the model’s understanding of bugs in code.
    - heading "Features representing functions" [level=4] [ref=e2380]:
      - link "Features representing functions" [ref=e2381] [cursor=pointer]:
        - /url: "#assessing-sophisticated-functions"
    - paragraph [ref=e2382]:
      - text: We also discovered features that track specific function definitions and references to them in code. A particularly interesting example is an addition feature
      - link "1M/697189" [ref=e2384] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_697189
      - text: ", which activates on names of functions that add numbers. For example, this feature fires on “bar” when it is defined to perform addition, but not when it is defined to perform multiplication. Moreover, it fires at the end of any function definition that implements addition."
    - figure [ref=e2385]:
      - img [ref=e2386]
    - paragraph [ref=e2387]: Remarkably, this feature even correctly handles function composition, activating in response to functions that call other functions that perform addition. In the following example, on the left, we redefine “bar” to call “foo”, therefore inheriting its addition operation and causing the feature to fire. On the right, “bar” instead calls the multiply operation from “goo”, and the feature does not fire.
    - figure [ref=e2388]:
      - img [ref=e2389]
    - paragraph [ref=e2390]:
      - text: We also verified that this feature is in fact involved in the model’s computation of addition-related functions. For instance, this feature is among the top ten features with strongest attributions (explained in
      - link "Features as Computational Intermediates" [ref=e2391] [cursor=pointer]:
        - /url: "#computational"
      - text: ) when the model is asked to execute a block of code involving an addition function.
    - paragraph [ref=e2392]:
      - text: Thus this feature appears to represent the function of addition being performed by the model, reminiscent of Todd et al.'s function vectors
      - generic [ref=e2395]: "[19]"
      - text: . To further test this hypothesis, we experimented with clamping the feature to be active on code that does not involve addition. When we do so, we find that the model is “tricked” into believing that it has been asked to execute an addition.
    - figure [ref=e2396]:
      - img [ref=e2397]
    - heading "Features vs. Neurons" [level=3] [ref=e2398]:
      - link "Features vs. Neurons" [ref=e2399] [cursor=pointer]:
        - /url: "#assessing-features-v-neurons"
    - paragraph [ref=e2400]:
      - text: A natural question to ask about SAEs is whether the feature directions they uncover are more interpretable than, or even distinct from, the neurons of the model. We fit our SAEs on residual stream activity, which to first approximation has no privileged basis (but see
      - generic [ref=e2403]: "[20]"
      - text: ) – thus the directions in the residual stream are not especially meaningful. However, residual stream activity receives inputs from all preceding MLP layers. Thus, a priori, it could be the case that SAEs identify feature directions in the residual stream whose activity reflects the activity of individual neurons in preceding layers. If that were the case, fitting an SAE would not be particularly useful, as we could have identified the same features by simply inspecting MLP neurons.
    - paragraph [ref=e2404]: To address this question, for a random subset of the features in our 1M SAE, we measured the Pearson correlation between its activations and those of every neuron in all preceding layers. Similar to our findings in Towards Monosemanticity, we find that for the vast majority of features, there is no strongly correlated neuron – for 82% of our features, the most-correlated neuron has a correlation of 0.3 or smaller. Manually inspecting visualizations for the best-matching neuron for a random set of features, we found almost no resemblance in semantic content between the feature and the corresponding neuron. We additionally confirmed that feature activations are not strongly correlated with activations of any residual stream basis direction.
    - paragraph [ref=e2405]: Even if dictionary learning features are not highly correlated with any individual neurons, it could still be the case that the neurons are interpretable. However, upon manual inspection of a random sample of 50 neurons and features each, the neurons appear significantly less interpretable than the features, typically activating in multiple unrelated contexts.
    - paragraph [ref=e2406]:
      - text: To quantify this difference, we first compared the interpretability of 100 randomly chosen features versus that of 100 randomly chosen neurons. We did this with the same automated interpretability approach
      - link "outlined" [ref=e2407] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/index.html#appendix-automated
      - text: in Towards Monosemanticity
      - generic [ref=e2410]: "[8]"
      - text: ", but using Claude 3 Opus to provide explanations of features and predict their held out activations. We find that activations of a random selection of SAE features are significantly more interpretable on average than a random selection of MLP neurons."
    - figure [ref=e2411]:
      - img [ref=e2412]
    - paragraph [ref=e2413]: We additionally evaluated the specificity of random neurons and SAE features using the automated specificity rubric above. We find that the activations of a random selection of SAE features are significantly more specific than those of the neurons in the previous layer.
    - figure [ref=e2414]:
      - img [ref=e2415]
    - separator [ref=e2416]
    - heading "Feature Survey" [level=2] [ref=e2417]:
      - link "Feature Survey" [ref=e2418] [cursor=pointer]:
        - /url: "#feature-survey"
    - paragraph [ref=e2419]: The features we find in Sonnet are rich and diverse. These range from features corresponding to famous people, to regions of the world (countries, cities, neighborhoods, and even famous buildings!), to features tracking type signatures in computer programs, and much more besides. Our goal in this section is to provide some sense of this breadth.
    - paragraph [ref=e2420]:
      - text: One challenge is that we have millions of features. Scaling feature exploration is an important open problem (see
      - link "Limitations, Challenges, and Open Problems" [ref=e2421] [cursor=pointer]:
        - /url: "#discussion-limitations"
      - text: ), which we do not solve in this paper. Nevertheless, we have made some progress in characterizing the space of features, aided by automated interpretability
      - generic [ref=e2424]: "[16, 8]"
      - text: . We will first focus on the local structure of features, which are often organized in geometrically-related clusters that share a semantic relationship. We then turn to understanding more global properties of features, such as how comprehensively they cover a given topic or category. Finally, we examine some categories of features we uncovered through manual inspection.
    - heading "Exploring Feature Neighborhoods" [level=3] [ref=e2425]:
      - link "Exploring Feature Neighborhoods" [ref=e2426] [cursor=pointer]:
        - /url: "#feature-survey-neighborhoods"
    - paragraph [ref=e2427]:
      - text: Here we walk through the local neighborhoods of several features of interest across the 1M, 4M and 34M SAEs, with closeness measured by the cosine similarity of the feature vectors. We find that this consistently surfaces features that share a related meaning or context — the
      - link "interactive feature UMAP" [ref=e2428] [cursor=pointer]:
        - /url: ./umap.html
      - text: has additional neighborhoods to explore.
    - heading "Golden Gate Bridge feature" [level=4] [ref=e2429]:
      - link "Golden Gate Bridge feature" [ref=e2430] [cursor=pointer]:
        - /url: "#feature-survey-neighborhoods-golden"
    - paragraph [ref=e2431]:
      - text: Focusing on a small neighborhood around the Golden Gate Bridge feature
      - link "34M/31164353" [ref=e2433] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_31164353
      - text: ", we find that there are features corresponding to particular locations in San Francisco such as Alcatraz and the Presidio. More distantly, we also see features with decreasing degrees of relatedness, such as features related to Lake Tahoe, Yosemite National Park, and Solano County (which is near San Francisco). At greater distances, we also see features related in more abstract ways, like features corresponding to tourist attractions in other regions (e.g. “Médoc wine region, France”; “Isle of Skye, Scotland”). Overall, it appears that distance in decoder space maps roughly onto relatedness in concept space, often in interesting and unexpected ways."
    - figure [ref=e2435]:
      - img [ref=e2436]
    - paragraph [ref=e2437]:
      - text: We also find evidence of
      - link "feature splitting" [ref=e2438] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/index.html#phenomenology-feature-splitting
      - generic [ref=e2441]: "[8]"
      - text: ", a phenomenon in which features in smaller SAEs “split” into multiple features in a larger SAE, which are geometrically close and semantically related to the original feature, but represent more specific concepts. For instance, a “San Francisco” feature in the 1M SAE splits into two features in the 4M SAE and eleven fine-grained features in the 34M SAE."
    - paragraph [ref=e2442]: In addition to feature splitting, we also see examples in which larger SAEs contain features that represent concepts not captured by features in smaller SAEs. For instance, there is a group of earthquake features from the 4M and 34M SAEs that has no analog in this neighborhood in the 1M SAE, nor do any of the nearest 1M SAE features seem related.
    - heading "Immunology feature" [level=4] [ref=e2443]:
      - link "Immunology feature" [ref=e2444] [cursor=pointer]:
        - /url: "#feature-survey-neighborhoods-immunology"
    - paragraph [ref=e2445]:
      - text: The next feature neighborhood on our tour is centered around an Immunology feature
      - link "1M/533737" [ref=e2447] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_533737
      - text: .
    - paragraph [ref=e2448]: We see several distinct clusters within this neighborhood. Towards the top of the figure, we see a cluster focused on immunocompromised people, immunosuppression, diseases causing impaired immune function, and so on. As we move down and to the left, this transitions to a cluster of features focused on specific diseases (colds, flu, respiratory illness generally), then into immune response-related features, and then into features representing organ systems with immune involvement. In contrast, as we move down and to the right from the immunocompromised cluster, we see more features corresponding to microscopic aspects of the immune system (e.g. immunoglobulins), then immunology techniques (e.g. vaccines), and so on.
    - paragraph [ref=e2449]: Towards the bottom, quite separated from the rest, we see a cluster of features related to immunity in non-medical contexts (e.g. legal/social).
    - figure [ref=e2451]:
      - img [ref=e2452]
    - paragraph [ref=e2453]: These results are consistent with the trend identified above, in which nearby features in dictionary vector space touch on similar concepts.
    - heading "Inner Conflict feature" [level=4] [ref=e2454]:
      - link "Inner Conflict feature" [ref=e2455] [cursor=pointer]:
        - /url: "#feature-survey-neighborhoods-conflict"
    - paragraph [ref=e2456]:
      - text: The last neighborhood we investigate in detail is centered around an Inner Conflict feature
      - link "1M/284095" [ref=e2458] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_284095
      - text: . While this neighborhood does not cleanly separate out into clusters, we still find that different subregions are associated with different themes. For instance, there is a subregion corresponding to balancing tradeoffs, which sits near a subregion corresponding to opposing principles and legal conflict. These are relatively distant from a subregion focused more on emotional struggle, reluctance, and guilt.
    - figure [ref=e2460]:
      - img [ref=e2461]
    - paragraph [ref=e2462]:
      - text: We highly recommend exploring the neighborhoods of other features using our
      - link "interactive interface" [ref=e2463] [cursor=pointer]:
        - /url: ./umap.html
      - text: to get a sense both for how proximity in decoder space corresponds to similarity of concepts and for the breadth of concepts represented.
    - heading "Feature Completeness" [level=3] [ref=e2464]:
      - link "Feature Completeness" [ref=e2465] [cursor=pointer]:
        - /url: "#feature-survey-completeness"
    - paragraph [ref=e2466]: "We were curious about the breadth and completeness with which our features cover the space of concepts. For instance, does the model have a feature corresponding to every major world city? To study questions like this, we used Claude to search for features which fired on members of particular families of concepts/terms. Specifically:"
    - list [ref=e2467]:
      - listitem [ref=e2468]: We pass a prompt with the relevant concept (e.g. “The physicist Richard Feynman”) to the model and see which features activate on the final token.
      - listitem [ref=e2469]: We then take the top five features by activation magnitude and run them through our automated interpretability pipeline, asking Sonnet to provide explanations of what those features fire on.
      - listitem [ref=e2470]:
        - text: We then look at each of the top 5 explanations and a human rater judges whether the concept, or some subset of the concept, is specifically indicated by the model-generated explanation as the most important part of the feature
        - superscript [ref=e2471]: "7"
        - text: .
    - paragraph [ref=e2472]: We find increasing coverage of concepts as we increase the number of features, though even in the 34M SAE we see evidence that the set of features we uncovered is an incomplete description of the model’s internal representations. For instance, we confirmed that Claude 3 Sonnet can list all of the London boroughs when asked, and in fact can name tens of individual streets in many of the areas. However, we could only find features corresponding to about 60% of the boroughs in the 34M SAE. This suggests that the model contains many more features than we have found, which may be able to be extracted with even larger SAEs.
    - paragraph [ref=e2473]:
      - text: We also took a more detailed look at what determines whether a feature corresponding to a concept is present in our SAEs. If one looks at the frequency of the elements in a proxy of the SAE training data, we find that representation in our dictionaries is closely tied with the frequency of the concept in the training data. For instance, chemical elements which are mentioned often in the training data almost always have corresponding features in our dictionary, while those which are mentioned rarely or not at all do not. Since the SAEs were trained on a data mixture very similar to Sonnet’s pre-training data, it’s unclear to what extent feature learning is dependent on frequency in the model’s training data rather than on the SAE’s training data. Frequency in training data is measured by a search for
      - code [ref=e2474]: <space>[Name]<space>
      - text: ", which causes some false positives in cases like the element “lead”."
    - figure [ref=e2475]:
      - img [ref=e2476]
    - paragraph [ref=e2477]: We quantified this relationship for four different categories of concepts – elements, cities, animals and foods (fruits and vegetables) – using 100–200 concepts in each category. We focused on concepts that could be unambiguously expressed by a single word (i.e. that word has few other common meanings) and with a wide distribution of frequencies in text data. We found a consistent tendency for the larger SAEs to have features for concepts that are rarer in the training data, with the rough “threshold” frequency required for a feature to be present being similar across categories.
    - figure [ref=e2478]:
      - img [ref=e2479]
    - paragraph [ref=e2480]:
      - text: Notably, for each of the three runs, the frequency in the training data at which the dictionary becomes more than 50% likely to include a concept is consistently slightly lower than the inverse of the number of alive features (the 34M model having only about 12M alive features). We can show this more clearly by rescaling the x-axis for each line by the number of alive features, finding that the lines end up approximately overlapping, following a common curve that resembles a sigmoid in log-frequency space.
      - superscript [ref=e2482]: "8"
    - figure [ref=e2483]:
      - img [ref=e2484]
    - paragraph [ref=e2485]:
      - text: This finding gives us some handle on the SAE scale at which we should expect a concept-specific feature to appear – if a concept is present in the training data only once in a billion tokens, then we should expect to need a dictionary with on the order of a billion alive features in order to find a feature which uniquely represents that specific concept. Importantly, not having a feature dedicated to a particular concept does not mean that the reconstructed activations do not contain information about that concept, as the model can use multiple related features compositionally to reference a specific concept.
      - superscript [ref=e2486]: "9"
    - paragraph [ref=e2487]:
      - text: This also informs how much data we should expect to need in order to train larger dictionaries – if we assume that the SAE needs to see data corresponding to a feature a certain fixed number of times during training in order to learn it, then the amount of SAE training data needed to learn
      - generic [ref=e2488]:
        - text: "N"
        - generic [ref=e2490]:
          - math [ref=e2492]:
            - generic [ref=e2495]: "N"
          - generic [ref=e2497]: "N"
      - text: features would be proportional to
      - generic [ref=e2498]:
        - text: "N"
        - generic [ref=e2500]:
          - math [ref=e2502]:
            - generic [ref=e2505]: "N"
          - generic [ref=e2507]: "N"
      - text: .
    - heading "Feature Categories" [level=3] [ref=e2508]:
      - link "Feature Categories" [ref=e2509] [cursor=pointer]:
        - /url: "#feature-survey-categories"
    - paragraph [ref=e2510]: Through manual inspection, we identified a number of other interesting categories of features. Here we describe several of these, in the spirit of providing a flavor of what we see in our dictionaries rather than attempting to be complete or prescriptive.
    - heading "Person Features" [level=4] [ref=e2511]:
      - link "Person Features" [ref=e2512] [cursor=pointer]:
        - /url: "#feature-survey-categories-people"
