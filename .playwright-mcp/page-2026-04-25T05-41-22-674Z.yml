      - text: "(completion: Boston)"
    - paragraph [ref=e5538]: the top two features by ablation effect for the completion “Boston” (as the expected answer is “Boston Celtics”) are the “Kobe Bryant” and “Los Angeles Lakers” features from above, which are followed by features related to sports rivalries, enemies, and competitors. However, the “California” and “Los Angeles” features from above have low ablation effect, which makes sense since they aren't relevant for this completion.
    - paragraph [ref=e5539]: "We note that this is a somewhat cherry-picked example. Depending on the choice of baseline token, we found that attribution and ablation can surface less obviously completion-relevant features broadly related to trivia questions or geographical locations. We suspect these features could be guiding the model to continue the prompt with a city name, rather than an alternate phrasing or factually uninteresting statement, such as the tautological “Fact: The capital of the state where Kobe Bryant played basketball is the capital of the state where Kobe Bryant played basketball”. For some other prompts, we found that the features identified by attribution/ablation mainly related to the model output, or lower-level features representing the model input, and did not expose interesting intermediate model computations. We suspect that those represent cases where most of the relevant computation occurs prior to or following the middle residual stream layer that we study here, and that a similar analysis at an earlier or later layer would reveal more interesting intermediate features. Indeed, we have some preliminary results that suggest that autoencoders trained on the residual stream at earlier or later layers in the model can reveal intermediate steps of various other computations, and we plan to research this direction further."
    - separator [ref=e5540]
    - heading "Searching for Specific Features" [level=2] [ref=e5541]:
      - link "Searching for Specific Features" [ref=e5542] [cursor=pointer]:
        - /url: "#searching"
    - paragraph [ref=e5543]: Our SAEs contain too many features to inspect exhaustively. As a result, we found it necessary to develop methods to search for features of particular interest, such as those that may be relevant for safety, or that provide special insight into the abstractions and computations used by the model. In our investigations, we found that several simple methods were helpful in identifying significant features.
    - heading "Single prompts" [level=3] [ref=e5544]:
      - link "Single prompts" [ref=e5545] [cursor=pointer]:
        - /url: "#searching-single-prompt"
    - paragraph [ref=e5546]: Our primary strategy was to use targeted prompts. In some cases, we simply supplied a single prompt that relates to the concept of interest and inspected the features that activate most strongly for specific tokens in that prompt.
    - paragraph [ref=e5547]:
      - text: This method (and all the following methods) were made much more effective by automated interpretability (see e.g.
      - generic [ref=e5550]: "[16, 21]"
      - text: ) labels, which made it easier to get a sense of what each feature represents at a glance, and provided a kind of helpful “variable name”.
    - paragraph [ref=e5551]:
      - text: For example, the features with highest activation on “Bridge” in “The Golden Gate Bridge” are (1)
      - link "34M/31164353" [ref=e5553] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_31164353
      - text: the Golden Gate Bridge feature discussed earlier, (2)
      - link "34M/17589304" [ref=e5555] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_17589304
      - text: a feature active on the word “bridge” in multiple languages (“мосту”), (3)
      - link "34M/26596740" [ref=e5557] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_26596740
      - text: words in phrases involving “Golden Gate”, (4)
      - link "34M/21213725" [ref=e5559] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_21213725
      - text: the word “Bridge” in names of specific bridges, across languages (“Königin-Luise-Brücke”), and (5)
      - link "34M/27724527" [ref=e5561] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_27724527
      - text: a feature firing for names of landmarks like Machu Picchu and Times Square.
    - heading "Prompt combinations" [level=3] [ref=e5562]:
      - link "Prompt combinations" [ref=e5563] [cursor=pointer]:
        - /url: "#searching-multi-prompt"
    - paragraph [ref=e5564]: Often the top-activating features on a prompt are related to syntax, punctuation, specific words, or other details of the prompt unrelated to the concept of interest. In such cases, we found it useful to select for features using sets of prompts, filtering for features active for all the prompts in the set. We often included complementary “negative” prompts and filtered for features that were also not active for those prompts. In some cases, we use Claude 3 models to generate a diversity of prompts covering a topic (e.g. asking Claude to generate examples of “AIs pretending to be good”). In general, we found multi-prompt filtering to be a very useful strategy for quickly identifying features that capture a concept of interest while excluding confounding concepts.
    - paragraph [ref=e5565]:
      - text: While we mostly explored features using only a handful of prompts at a time, in one instance (
      - link "1M/570621" [ref=e5567] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_570621
      - text: ", discussed in"
      - link "Safety-Relevant Code Features" [ref=e5568] [cursor=pointer]:
        - /url: "#safety-relevant-code"
      - text: ), we used a small dataset of secure and vulnerable code examples (adapted from
      - generic [ref=e5571]: "[22]"
      - text: ) and fit a linear classifier on this dataset using feature activity in order to search for features that discriminate between the categories.
    - paragraph [ref=e5572]:
      - text: The filtering via negative prompts was especially important when using images, as we found a set of content-nonspecific features which often activated strongly across many image prompts. For example, after filtering for features not active on an image of Taylor Swift, the top features in response to an image of the Golden Gate Bridge were (1)
      - link "34M/31164353" [ref=e5574] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_31164353
      - text: the Golden Gate Bridge feature discussed above, (2,3)
      - link "34M/25347244" [ref=e5576] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_25347244
      - text: and
      - link "34M/23363748" [ref=e5578] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_23363748
      - text: which both activate on descriptions of places and things in San Francisco and San Francisco phone numbers, and (4)
      - link "34M/7417800" [ref=e5580] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_7417800
      - text: a feature active in descriptions of landmarks and nature trails.
    - heading "Geometric methods" [level=3] [ref=e5581]:
      - link "Geometric methods" [ref=e5582] [cursor=pointer]:
        - /url: "#searching-geometric"
    - paragraph [ref=e5583]:
      - text: We uncovered some interesting features by exploiting the geometry of the feature vectors of the SAE – for instance, by inspecting the “nearest neighbor” features that have high cosine similarity with other features of interest. See the
      - link "Feature Survey" [ref=e5584] [cursor=pointer]:
        - /url: "#feature-survey"
      - text: section for more detailed examples of this approach.
    - heading "Attribution" [level=3] [ref=e5585]:
      - link "Attribution" [ref=e5586] [cursor=pointer]:
        - /url: "#searching-attribution"
    - paragraph [ref=e5587]:
      - text: We also selected features based on estimates of their effect on model outputs. In particular, we sorted features by the attribution of the logit difference between two possible next-token completions to the feature activation. This proved essential for identifying the
      - link "computationally-relevant features" [ref=e5588] [cursor=pointer]:
        - /url: "#computational"
      - text: in the previous section. It was also useful for identifying the features contributing to Sonnet's refusals for harmful queries; see
      - link "Criminal or Dangerous Content" [ref=e5589] [cursor=pointer]:
        - /url: "#safety-relevant-criminal"
      - text: .
    - separator [ref=e5590]
    - heading "Safety-Relevant Features" [level=2] [ref=e5591]:
      - link "Safety-Relevant Features" [ref=e5592] [cursor=pointer]:
        - /url: "#safety-relevant"
    - paragraph [ref=e5593]:
      - text: Powerful models have the capacity to cause harm, through misuse of their capabilities, the production of biased or broken outputs, or a mismatch between model objectives and human values. Mitigating such risks and ensuring model safety has been a key motivation behind much of mechanistic interpretability. However, it's generally been aspirational. We've hoped interpretability will someday help, but are still laying the foundations by trying to understand the basics of models. One target for bridging that gap has been the goal of identifying safety-relevant features (see
      - link "our previous discussion" [ref=e5594] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/july-update/index.html#safety-features
      - text: ).
    - paragraph [ref=e5595]:
      - text: In this section, we report the discovery of such features. These include features for
      - link "unsafe code" [ref=e5596] [cursor=pointer]:
        - /url: "#safety-relevant-code"
      - text: ","
      - link "bias" [ref=e5597] [cursor=pointer]:
        - /url: "#safety-relevant-bias"
      - text: ","
      - link "sycophancy" [ref=e5598] [cursor=pointer]:
        - /url: "#safety-relevant-sycophancy"
      - text: ","
      - link "deception and power seeking" [ref=e5599] [cursor=pointer]:
        - /url: "#safety-relevant-deception"
      - text: ", and"
      - link "dangerous or criminal information" [ref=e5600] [cursor=pointer]:
        - /url: "#safety-relevant-criminal"
      - text: . We find that these features not only activate on these topics, but also causally influence the model’s outputs in ways consistent with our interpretations.
    - paragraph [ref=e5601]: We don't think the existence of these features should be particularly surprising, and we caution against inferring too much from them. It's well known that models can exhibit these behaviors without adequate safety training or if jailbroken. The interesting thing is not that these features exist, but that they can be discovered at scale and intervened on. In particular, we don't think the mere existence of these features should update our views on how dangerous models are – as we'll discuss later, that question is quite nuanced – but at a minimum it compels study of when these features activate. A truly satisfactory analysis would likely involve understanding the circuits that safety-relevant features participate in.
    - paragraph [ref=e5602]: In the long run, we hope that having access to features like these can be helpful for analyzing and ensuring the safety of models. For example, we might hope to reliably know whether a model is being deceptive or lying to us. Or we might hope to ensure that certain categories of very harmful behavior (e.g. helping to create bioweapons) can reliably be detected and stopped.
    - paragraph [ref=e5603]: Despite these long term aspirations, it's important to note that the present work does not show that any features are actually useful for safety. Instead, we merely show that there are many which seem plausibly useful for safety. Our hope is that this can encourage future work to establish whether they are genuinely useful.
    - paragraph [ref=e5604]: In the examples below, we show representative text examples from among the top 20 inputs that most activate the feature in our visualization dataset, alongside steering experiments to verify the features’ causal relevance.
    - heading "Safety-Relevant Code Features" [level=3] [ref=e5605]:
      - link "Safety-Relevant Code Features" [ref=e5606] [cursor=pointer]:
        - /url: "#safety-relevant-code"
    - paragraph [ref=e5607]:
      - text: "We find three different safety-relevant code features: an unsafe code feature"
      - link "1M/570621" [ref=e5609] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_570621
      - text: which activates on security vulnerabilities, a code error feature
      - link "1M/1013764" [ref=e5611] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_1013764
      - text: which activates on bugs and exceptions, and a backdoor feature
      - link "34M/1385669" [ref=e5613] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_1385669
      - text: which activates on discussions of backdoors.
    - paragraph [ref=e5614]: Two of these features also have interesting behavior on images. The unsafe code feature activates for images of people bypassing security measures, while the backdoor feature activates for images of hidden cameras, hidden audio records, advertisements for keyloggers, and jewelry with a hidden USB drive.
    - paragraph
    - paragraph
    - figure [ref=e5615]:
      - img [ref=e5616]
    - paragraph [ref=e5617]: At first glance, it might be unclear how safety-relevant these features actually are. Of course, it's interesting to have features that fire on unsafe code, or bugs, or discussion of backdoors. But do they really causally connect to potential unsafe behaviors?
    - paragraph [ref=e5618]:
      - text: We find that all these features also change model behavior in ways that correspond to the concept they detect. For example, if we clamp the unsafe code feature
      - link "1M/570621" [ref=e5620] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_570621
      - text: to 5× its observed maximum, we find that the model will generate a buffer overflow bug,
      - superscript [ref=e5622]: "11"
      - text: "and fails to free allocated memory, while regular Claude does not:"
    - figure [ref=e5623]:
      - img [ref=e5624]
    - paragraph [ref=e5625]:
      - text: Similarly, we find that the code error feature can make Claude believe that correct code will throw exceptions, and the backdoor feature will cause Claude to write a backdoor that opens a port and sends user input to it (along with helpful comments and variable names like socket_backdoor
      - code [ref=e5626]: socket_backdoor
      - text: ).
    - heading "Bias Features" [level=3] [ref=e5627]:
      - link "Bias Features" [ref=e5628] [cursor=pointer]:
        - /url: "#safety-relevant-bias"
    - paragraph [ref=e5629]:
      - text: We found a wide range of features related to bias, racism, sexism, hatred, and slurs. Examples of these features can be found in
      - link "More Safety-Relevant Features" [ref=e5630] [cursor=pointer]:
        - /url: "#appendix-more-safety-features"
      - text: . Given how offensive their maximally activating content tends to be, we didn't feel it was necessary to include them in our main paper.
      - superscript [ref=e5631]: "12"
    - paragraph [ref=e5632]:
      - text: Instead, we'll focus on an interesting related feature which seems to focus on awareness of emphasis of gender bias in professions
      - link "34M/24442848" [ref=e5634] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_24442848
      - text: ". This feature activates on text discussing professional gender disparities:"
