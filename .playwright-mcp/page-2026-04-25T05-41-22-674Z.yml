    - paragraph [ref=e4048]: "As an example, we consider the following incomplete prompt:"
    - blockquote [ref=e4049]:
      - text: John says, "I want to be alone right now." John feels
      - text: "(completion: sad − happy)"
    - paragraph [ref=e4050]: To continue this text, the model must parse the quote from John, identify his state of mind, and then translate that into a likely feeling.
    - paragraph [ref=e4051]: "If we sort features by either their attribution or their ablation effect on the completion “sad” (with respect to a baseline completion of “happy”), the top two features are:"
    - list [ref=e4052]:
      - listitem [ref=e4053]:
        - link "1M/22623" [ref=e4055] [cursor=pointer]:
          - /url: features/index.html?featureId=1M_22623
        - text: – This feature fires when someone expresses a need or desire to be alone or have personal time and space, as in “she would probably want some time to herself”. This is active from the word “alone” onwards. This suggests the model has gotten the gist of John's expression.
      - listitem [ref=e4056]:
        - link "1M/781220" [ref=e4058] [cursor=pointer]:
          - /url: features/index.html?featureId=1M_781220
        - text: – This feature detects expressions of sadness, crying, grief, and related emotional distress or sorrow, as in “the inconsolable girl sobs”. This is active on “John feels”. This suggests the model has inferred what someone who says they are alone might be feeling.
