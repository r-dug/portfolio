    - paragraph [ref=e1483]: "While these examples suggest interpretations for each feature, more work needs to be done to establish that our interpretations truly capture the behavior and function of the corresponding features. Concretely, for each feature, we attempt to establish the following claims:"
    - list [ref=e1484]:
      - listitem [ref=e1485]:
        - text: When the feature is active, the relevant concept is reliably present in the context (
        - link "specificity" [ref=e1486] [cursor=pointer]:
          - /url: "#assessing-tour-specificity"
        - text: ).
      - listitem [ref=e1487]:
        - text: Intervening on the feature’s activation produces relevant downstream behavior (
        - link "influence on behavior" [ref=e1488] [cursor=pointer]:
          - /url: "#assessing-tour-influence"
        - text: ).
    - heading "Specificity" [level=4] [ref=e1489]:
      - link "Specificity" [ref=e1490] [cursor=pointer]:
        - /url: "#assessing-tour-specificity"
    - paragraph [ref=e1491]:
      - text: It is difficult to rigorously measure the extent to which a concept is present in a text input. In our prior work, we focused on features that unambiguously corresponded to sets of tokens (e.g., Arabic script or DNA sequences) and computed the likelihood of that set of tokens relative to the rest of the vocabulary, conditioned on the feature’s activation. This technique does not generalize to more abstract features. Instead, to demonstrate specificity in this work we more heavily leverage automated interpretability methods (similar to
      - generic [ref=e1494]: "[16, 8]"
      - text: ). We use the same automated interpretability pipeline as in our previous work
      - generic [ref=e1497]: "[8]"
      - text: in the
      - link "features vs. neurons" [ref=e1498] [cursor=pointer]:
        - /url: "#assessing-features-v-neurons"
      - text: section below, but we additionally find that current-generation models can now more accurately rate text samples according to how well they match a proposed feature interpretation.
    - paragraph [ref=e1499]: We constructed the following rubric for scoring how a feature’s description relates to the text on which it fires. We then asked Claude 3 Opus to rate feature activations at many tokens on that rubric.
    - list [ref=e1500]:
      - listitem [ref=e1501]: 0 – The feature is completely irrelevant throughout the context (relative to the base distribution of the internet).
      - listitem [ref=e1502]: 1 – The feature is related to the context, but not near the highlighted text or only vaguely related.
      - listitem [ref=e1503]: 2 – The feature is only loosely related to the highlighted text or related to the context near the highlighted text.
      - listitem [ref=e1504]: 3 – The feature cleanly identifies the activating text.
    - paragraph [ref=e1505]:
      - text: By scoring examples of activating text, we provide a measure of specificity for each feature.
      - superscript [ref=e1506]: "4"
      - text: The features in this section are selected to have straightforward interpretations, to make automated interpretability analysis more reliable. They are not intended to be a representative example of all features in our SAEs. Later, we provide an analysis of the interpretability of randomly sampled features. We also conduct in-depth explorations throughout the paper of many more features which have interesting interpretations which are more abstract or nuanced, and thus more difficult to quantitatively assess.
    - paragraph [ref=e1507]: Below we show distributions of feature activations (excluding zero activations) for the four features mentioned above, along with example text and image inputs that induce low and high activations. Note that these features also activate on relevant images, despite our only performing dictionary learning on a text-based dataset!
    - paragraph [ref=e1508]:
      - text: First, we study a Golden Gate Bridge feature
      - link "34M/31164353" [ref=e1510] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_31164353
      - text: . Its greatest activations are essentially all references to the bridge, and weaker activations also include related tourist attractions, similar bridges, and other monuments. Next, a brain sciences feature
      - link "34M/9493533" [ref=e1512] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_9493533
      - text: activates on discussions of neuroscience books and courses, as well as cognitive science, psychology, and related philosophy. In the 1M training run, we also find a feature that strongly activates for various kinds of transit infrastructure
      - link "1M/3" [ref=e1514] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_3
      - text: including trains, ferries, tunnels, bridges, and even wormholes! A final feature
      - link "1M/887839" [ref=e1516] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_887839
      - text: responds to popular tourist attractions including the Eiffel Tower, the Tower of Pisa, the Golden Gate Bridge, and the Sistine Chapel.
    - paragraph [ref=e1517]: To quantify specificity, we used Claude 3 Opus to automatically score examples that activate these features according to the rubric above, with roughly 1000 activations of the feature drawn from the dataset used to train the dictionary learning model. We plot the frequency of each rubric score as a function of the feature’s activation level. We see that inputs that induce strong feature activations are all judged to be highly consistent with the proposed interpretation.
    - figure [ref=e1518]:
      - img [ref=e1519]
    - figure [ref=e1520]:
      - img [ref=e1521]
    - figure [ref=e1522]:
      - img [ref=e1523]
    - figure [ref=e1524]:
      - img [ref=e1525]
    - paragraph [ref=e1526]:
      - text: As in Towards Monosemanticity, we see that these features become less specific as the activation strength weakens. This could be due to the model using activation strengths to represent confidence in a concept being present. Or it may be that the feature activates most strongly for central examples of the feature, but weakly for related ideas – for example, the Golden Gate Bridge feature
      - link "34M/31164353" [ref=e1528] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_31164353
      - text: appears to weakly activate for other San Francisco landmarks. It could also reflect imperfection in our dictionary learning procedure. For example, it may be that the architecture of the autoencoder is not able to extract and discriminate among features as cleanly as we might want. And of course interference from features that are not exactly orthogonal could also be a culprit, making it more difficult for Sonnet itself to activate features on precisely the right examples. It is also plausible that our feature interpretations slightly misrepresent the feature's actual function, and that this inaccuracy manifests more clearly at lower activations. Nonetheless, we often find that lower activations tend to maintain some specificity to our interpretations, including related concepts or generalizations of the core feature. As an illustrative example, weak activations of the transit infrastructure feature
      - link "1M/3" [ref=e1530] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_3
      - text: include procedural mechanics instructions describing which through-holes to use for particular parts.
    - paragraph [ref=e1531]:
      - text: Moreover, we expect that very weak activations of features are not especially meaningful, and thus we are not too concerned with low specificity scores for these activation ranges. For instance, we have observed that techniques such as rounding feature activations below a threshold to zero can improve specificity at the low-activation end of the spectrum without substantially increasing the reconstruction error of the SAE, and there are a variety of techniques in the literature that potentially address the same issue
      - generic [ref=e1534]: "[17, 18]"
      - text: .
    - paragraph [ref=e1535]: Regardless, the activations that have the most impact on the model’s behavior are the largest ones, so it is encouraging to see high specificity among the strong activations.
    - paragraph [ref=e1536]: Note that we have had more difficulty in quantifying feature sensitivity – that is, how reliably a feature activates for text that matches our proposed interpretation – in a scalable, rigorous way. This is due to the difficulty of generating text related to a concept in an unbiased fashion. Moreover, many features may represent something more specific than we are able to glean with our visualizations, in which case they would not respond reliably to text selected based on our proposed interpretation, and this problem gets harder the more abstract the features are. As a basic check, however, we observe that the Golden Gate Bridge feature still fires strongly on the first sentence of the Wikipedia article for the Golden Gate Bridge in various languages (after removing any English parentheticals). In fact, the Golden Gate Bridge feature is the top feature by average activation for every example below.
