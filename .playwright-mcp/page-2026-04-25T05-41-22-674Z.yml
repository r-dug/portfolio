    - heading "Our SAE experiments" [level=3] [ref=e840]:
      - link "Our SAE experiments" [ref=e841] [cursor=pointer]:
        - /url: "#scaling-sae-experiments"
    - paragraph [ref=e842]:
      - text: Claude 3 Sonnet is a proprietary model for both safety and competitive reasons. Some of the decisions in this publication reflect this, such as not reporting the size of the model, leaving units off certain plots, and using a simplified tokenizer. For more information on how Anthropic thinks about safety considerations in publishing research results, we refer readers to our
      - link "Core Views on AI Safety" [ref=e844] [cursor=pointer]:
        - /url: https://www.anthropic.com/news/core-views-on-ai-safety
      - text: .
    - paragraph [ref=e845]:
      - text: In this work, we focused on applying SAEs to residual stream activations halfway through the model (i.e. at the “middle layer”). We made this choice for several reasons. First, the residual stream is smaller than the MLP layer, making SAE training and inference computationally cheaper. Second, focusing on the residual stream in theory helps us mitigate an issue we call “cross-layer superposition” (see
      - link "Limitations" [ref=e846] [cursor=pointer]:
        - /url: "#discussion-limitations"
      - text: for more discussion). We chose to focus on the middle layer of the model because we reasoned that it is likely to contain interesting, abstract features (see e.g.,
      - generic [ref=e849]: "[11, 12, 13]"
      - text: ).
    - paragraph [ref=e850]:
      - text: "We trained three SAEs of varying sizes: 1,048,576 (~1M), 4,194,304 (~4M), and 33,554,432 (~34M) features. The number of training steps for the 34M feature run was selected using a scaling laws analysis to minimize the training loss given a fixed compute budget (see below). We used an L1 coefficient of 5"
      - superscript [ref=e852]: "3"
      - text: . We performed a sweep over a narrow range of learning rates (suggested by the scaling laws analysis) and chose the value that gave the lowest loss.
    - paragraph [ref=e853]:
      - text: For all three SAEs, the average number of features active (i.e. with nonzero activations) on a given token was fewer than 300, and the SAE reconstruction explained at least 65% of the variance of the model activations. At the end of training, we defined “dead” features as those which were not active over a sample of
      - generic [ref=e854]:
        - text: "10^{7}"
        - generic [ref=e856]:
          - math [ref=e858]:
            - generic [ref=e860]:
              - generic [ref=e861]: "1"
              - generic [ref=e862]:
                - generic [ref=e863]: "0"
                - generic [ref=e864]: "7"
          - generic [ref=e866]:
            - text: "1"
            - generic [ref=e867]:
              - text: "0"
              - generic [ref=e873]: "7"
      - text: tokens. The proportion of dead features was roughly 2% for the 1M SAE, 35% for the 4M SAE, and 65% for the 34M SAE. We expect that improvements to the training procedure may be able to reduce the number of dead features in future experiments.
    - heading "Scaling Laws" [level=3] [ref=e874]:
      - link "Scaling Laws" [ref=e875] [cursor=pointer]:
        - /url: "#scaling-scaling-laws"
    - paragraph [ref=e876]: Training SAEs on larger models is computationally intensive. It is important to understand (1) the extent to which additional compute improves dictionary learning results, and (2) how that compute should be allocated to obtain the highest-quality dictionary possible for a given computational budget.
    - paragraph [ref=e877]: Though we lack a gold-standard method of assessing the quality of a dictionary learning run, we have found that the loss function we use during training – a weighted combination of reconstruction mean-squared error (MSE) and an L1 penalty on feature activations – is a useful proxy, conditioned on a reasonable choice of the L1 coefficient. That is, we have found that dictionaries with low loss values (using an L1 coefficient of 5) tend to produce interpretable features and to improve other metrics of interest (the L0 norm, and the number of dead or otherwise degenerate features). Of course, this is an imperfect metric, and we have little confidence that it is optimal. It may well be the case that other L1 coefficients (or other objective functions altogether) would be better proxies to optimize.
    - paragraph [ref=e878]:
      - text: With this proxy, we can treat dictionary learning as a standard machine learning problem, to which we can apply the “scaling laws” framework for hyperparameter optimization (see e.g.
      - generic [ref=e881]: "[14, 15]"
      - text: "). In an SAE, compute usage primarily depends on two key hyperparameters: the number of features being learned, and the number of steps used to train the autoencoder (which maps linearly to the amount of data used, as we train the SAE for only one epoch). The compute cost scales with the product of these parameters if the input dimension and other hyperparameters are held constant."
    - paragraph [ref=e882]: We conducted a thorough sweep over these parameters, fixing the values of other hyperparameters (learning rate, batch size, optimization protocol, etc.). We were also interested in tracking the compute-optimal values of the loss function and parameters of interest; that is, the lowest loss that can be achieved using a given compute budget, and the number of training steps and features that achieve this minimum.
    - paragraph [ref=e883]: "We make the following observations:"
    - paragraph [ref=e884]: Over the ranges we tested, given the compute-optimal choice of training steps and number of features, loss decreases approximately according to a power law with respect to compute.
    - figure [ref=e885]:
      - img [ref=e886]
    - paragraph [ref=e887]: As the compute budget increases, the optimal allocations of FLOPS to training steps and number of features both scale approximately as power laws. In general, the optimal number of features appears to scale somewhat more quickly than the optimal number of training steps at the compute budgets we tested, though this trend may change at higher compute budgets.
    - figure [ref=e888]:
      - img [ref=e889]
    - paragraph [ref=e890]: These analyses used a fixed learning rate. For different compute budgets, we subsequently swept over learning rates at different optimal parameter settings according to the plots above. The inferred optimal learning rates decreased approximately as a power law as a function of compute budget, and we extrapolated this trend to choose learning rates for the larger runs.
    - separator [ref=e891]
    - heading "Assessing Feature Interpretability" [level=2] [ref=e892]:
      - link "Assessing Feature Interpretability" [ref=e893] [cursor=pointer]:
        - /url: "#assessing-interp"
    - paragraph [ref=e894]: "In the previous section, we described how we trained sparse autoencoders on Claude 3 Sonnet. And as predicted by scaling laws, we achieved lower losses by training large SAEs. But the loss is only a proxy for what we actually care about: interpretable features that explain model behavior."
    - paragraph [ref=e895]: The goal of this section is to investigate whether these features are actually interpretable and explain model behavior. We'll first look at a handful of relatively straightforward features and provide evidence that they're interpretable. Then we'll look at two much more complex features, and demonstrate that they track very abstract concepts. We'll close with an experiment using automated interpretability to evaluate a larger number of features and compare them to neurons.
    - heading "Four Examples of Interpretable Features" [level=3] [ref=e896]:
      - link "Four Examples of Interpretable Features" [ref=e897] [cursor=pointer]:
        - /url: "#assessing-tour"
    - paragraph [ref=e898]:
      - text: In this subsection, we'll look at a few features and argue that they are genuinely interpretable. Our goal is just to demonstrate that interpretable features exist, leaving strong claims (such as most features being interpretable) to a later section. We will provide evidence that our interpretations are good descriptions of what the features represent and how they function in the network, using an analysis similar to that in Towards Monosemanticity
      - generic [ref=e901]: "[8]"
      - text: .
