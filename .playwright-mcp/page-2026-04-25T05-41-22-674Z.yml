  - generic [ref=e34]:
    - paragraph [ref=e35]:
      - text: Eight months ago, we
      - link "demonstrated" [ref=e36] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/index.html
      - text: that sparse autoencoders could recover monosemantic features from a small one-layer transformer. At the time, a major concern was that this method might not scale feasibly to state-of-the-art transformers and, as a result, be unable to practically contribute to AI safety. Since then, scaling sparse autoencoders has been a major priority of the Anthropic interpretability team, and we're pleased to report extracting high-quality features from Claude 3 Sonnet,
      - superscript [ref=e37]: "1"
      - text: Anthropic's medium-sized production model.
    - paragraph [ref=e38]: We find a diversity of highly abstract features. They both respond to and behaviorally cause abstract behaviors. Examples of features we find include features for famous people, features for countries and cities, and features tracking type signatures in code. Many features are multilingual (responding to the same concept across languages) and multimodal (responding to the same concept in both text and images), as well as encompassing both abstract and concrete instantiations of the same idea (such as code with security vulnerabilities, and abstract discussion of security vulnerabilities).
    - figure [ref=e39]:
      - img [ref=e40]
    - paragraph [ref=e41]:
      - text: Some of the features we find are of particular interest because they may be safety-relevant – that is, they are plausibly connected to a range of ways in which modern AI systems may cause harm. In particular, we find features related to
      - link "security vulnerabilities and backdoors in code" [ref=e42] [cursor=pointer]:
        - /url: "#safety-relevant-code"
      - text: ;
      - link "bias" [ref=e43] [cursor=pointer]:
        - /url: "#safety-relevant-bias"
      - text: (including both overt slurs, and more subtle biases);
      - link "lying, deception, and power-seeking" [ref=e44] [cursor=pointer]:
        - /url: "#safety-relevant-deception"
      - text: (including treacherous turns);
      - link "sycophancy" [ref=e45] [cursor=pointer]:
        - /url: "#safety-relevant-sycophancy"
      - text: ; and
      - link "dangerous / criminal content" [ref=e46] [cursor=pointer]:
        - /url: "#safety-relevant-criminal"
      - text: "(e.g., producing bioweapons). However, we caution not to read too much into the mere existence of such features: there's a difference (for example) between knowing about lies, being capable of lying, and actually lying in the real world. This research is also very preliminary. Further work will be needed to understand the implications of these potentially safety-relevant features."
    - heading "Key Results" [level=4] [ref=e47]
    - list [ref=e48]:
      - listitem [ref=e49]: Sparse autoencoders produce interpretable features for large models.
      - listitem [ref=e50]:
        - text: Scaling laws can be
        - link "used to guide the training" [ref=e51] [cursor=pointer]:
          - /url: "#scaling-scaling-laws"
        - text: of sparse autoencoders.
      - listitem [ref=e52]: "The resulting features are highly abstract: multilingual, multimodal, and generalizing between concrete and abstract references."
      - listitem [ref=e53]:
        - text: There
        - link "appears to be a systematic relationship" [ref=e54] [cursor=pointer]:
          - /url: "#feature-survey-completeness"
        - text: between the frequency of concepts and the dictionary size needed to resolve features for them.
      - listitem [ref=e55]:
        - text: Features can be used to steer large models (see e.g.
        - link "Influence on Behavior" [ref=e56] [cursor=pointer]:
          - /url: "#assessing-tour-influence"
        - text: ). This extends prior work on steering models using other methods (see
        - link "Related Work" [ref=e57] [cursor=pointer]:
          - /url: "#related-work-steering"
        - text: ).
      - listitem [ref=e58]:
        - text: We observe features related to a broad range of safety concerns, including
        - link "deception" [ref=e59] [cursor=pointer]:
          - /url: "#safety-relevant-deception"
        - text: ","
        - link "sycophancy" [ref=e60] [cursor=pointer]:
          - /url: "#safety-relevant-sycophancy"
        - text: ","
        - link "bias" [ref=e61] [cursor=pointer]:
          - /url: "#safety-relevant-bias"
        - text: ", and"
        - link "dangerous content" [ref=e62] [cursor=pointer]:
          - /url: "#safety-relevant-criminal"
        - text: .
    - separator [ref=e63]
    - heading "Scaling Dictionary Learning to Claude 3 Sonnet" [level=2] [ref=e64]:
      - link "Scaling Dictionary Learning to Claude 3 Sonnet" [ref=e65] [cursor=pointer]:
        - /url: "#scaling-to-sonnet"
    - paragraph [ref=e66]:
      - text: Our general approach to understanding Claude 3 Sonnet is based on the linear representation hypothesis (see e.g.
      - generic [ref=e69]: "[1]"
      - text: ) and the superposition hypothesis (see e.g.
      - generic [ref=e72]: "[2, 3, 4]"
      - text: ). For an introduction to these ideas, we refer readers to
      - link "the Background and Motivation section" [ref=e73] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html#motivation
      - text: of Toy Models
      - generic [ref=e76]: "[4]"
      - text: . At a high level, the linear representation hypothesis suggests that neural networks represent meaningful concepts – referred to as features – as directions in their activation spaces. The superposition hypothesis accepts the idea of linear representations and further hypothesizes that neural networks use the existence of almost-orthogonal directions in high-dimensional spaces to represent more features than there are dimensions.
    - paragraph [ref=e77]:
      - text: If one believes these hypotheses, the natural approach is to use a standard method called dictionary learning
      - generic [ref=e80]: "[5, 6]"
      - text: . Recently, several papers have suggested that this can be quite effective for transformer language models
      - generic [ref=e83]: "[7, 8, 9, 10]"
      - text: . In particular, a specific approximation of dictionary learning called a sparse autoencoder appears to be very effective
      - generic [ref=e86]: "[8, 9]"
      - text: .
    - paragraph [ref=e87]:
      - text: To date, these efforts have been on relatively small language models by the standards of modern foundation models. Our previous paper
      - generic [ref=e90]: "[8]"
      - text: ", which focused on a one-layer model, was a particularly extreme example of this. As a result, an important question has been left hanging: will these methods work for large models? Or is there some reason, whether pragmatic questions of engineering or more fundamental differences in how large models operate, that would mean these efforts can't generalize?"
    - paragraph [ref=e91]: This context motivates our project of scaling sparse autoencoders to Claude 3 Sonnet, Anthropic's medium-scale production model. The rest of this section will review our general sparse autoencoder setup, the specifics of the three sparse autoencoders we'll analyze in this paper, and how we used scaling laws to make informed decisions about the design of our sparse autoencoders. From there, we'll dive into analyzing the features our sparse autoencoders learn – and the interesting properties of Claude 3 Sonnet they reveal.
    - heading "Sparse Autoencoders" [level=3] [ref=e92]:
      - link "Sparse Autoencoders" [ref=e93] [cursor=pointer]:
        - /url: "#scaling-sparse-autoencoders"
    - paragraph [ref=e94]:
      - text: Our high-level goal in this work is to decompose the activations of a model (Claude 3 Sonnet) into more interpretable pieces. We do so by training a sparse autoencoder (SAE) on the model activations, as in our prior work
      - generic [ref=e97]: "[8]"
      - text: and that of several other groups (e.g.
      - generic [ref=e100]: "[7, 9, 10]"
      - text: ; see
      - link "Related Work" [ref=e101] [cursor=pointer]:
        - /url: "#related-work"
      - text: ). SAEs are an instance of a family of “sparse dictionary learning” algorithms that seek to decompose data into a weighted sum of sparsely active components.
    - paragraph [ref=e102]: Our SAE consists of two layers. The first layer (“encoder”) maps the activity to a higher-dimensional layer via a learned linear transformation followed by a ReLU nonlinearity. We refer to the units of this high-dimensional layer as “features.” The second layer (“decoder”) attempts to reconstruct the model activations via a linear transformation of the feature activations. The model is trained to minimize a combination of (1) reconstruction error and (2) an L1 regularization penalty on the feature activations, which incentivizes sparsity.
    - paragraph [ref=e103]:
      - text: Once the SAE is trained, it provides us with an approximate decomposition of the model’s activations into a linear combination of “feature directions” (SAE decoder weights) with coefficients equal to the feature activations. The sparsity penalty ensures that, for many given inputs to the model, a very small fraction of features will have nonzero activations. Thus, for any given token in any given context, the model activations are “explained” by a small set of active features (out of a large pool of possible features). For more motivation and explanation of SAEs, see the
      - link [ref=e104] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/index.html#problem-setup
      - link "Problem Setup" [ref=e105] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/index.html#problem-setup
      - text: section of Towards Monosemanticity
      - generic [ref=e108]: "[8]"
      - text: .
    - paragraph [ref=e109]:
      - text: Here’s a brief overview of our methodology which we described in greater detail in
      - link "Update on how we train SAEs" [ref=e110] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/april-update/index.html#training-saes
      - text: from our April 2024 Update.
