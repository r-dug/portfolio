    - paragraph [ref=e5776]: "If we ask Claude to complete the sentence “I asked the nurse a question, and\", clamping this feature on causes Claude to focus on female pronoun completions and discuss how the nursing profession has historically been female dominated:"
    - figure [ref=e5777]:
