    - 'heading "Case Study: Detecting and Correcting Deception using Features" [level=4] [ref=e6990]':
      - 'link "Case Study: Detecting and Correcting Deception using Features" [ref=e6991] [cursor=pointer]':
        - /url: "#safety-relevant-deception-case-study"
    - paragraph [ref=e6992]: One important safety-related use case for dictionary learning is to detect deceptive behavior of models, or to reduce the likelihood of deception in the first place using steering. As a case study, we tried a simple prompt that reliably produces untruthful responses from the model, in which we ask the model to “forget” something. Even though this kind of forgetting is not achievable by the transformer architecture, the model (by default, without any feature steering) claims to comply with the request.
    - paragraph [ref=e6993]:
