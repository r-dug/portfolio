    - generic [ref=e8997]:
      - heading "Footnotes" [level=3] [ref=e8998]
      - list [ref=e8999]:
        - listitem [ref=e9000]:
          - text: For clarity, this is the 3.0 version of Claude 3 Sonnet, released March 4, 2024. It is the exact model in production as of the writing of this paper. It is the finetuned model, not the base pretrained model (although our method also works on the base model).
          - link "[↩]" [ref=e9001] [cursor=pointer]:
            - /url: "#d-footnote-1"
        - listitem [ref=e9002]:
          - text: This also prevents the SAE from “cheating” the L1 penalty by making
          - generic [ref=e9003]:
            - text: "f_i(\\mathbf{x})"
            - generic [ref=e9005]:
              - math [ref=e9007]:
                - generic [ref=e9009]:
                  - generic [ref=e9010]:
                    - generic [ref=e9011]: f
                    - generic [ref=e9012]: i
                  - generic [ref=e9013]: (
                  - generic [ref=e9015]: x
                  - generic [ref=e9016]: )
              - generic [ref=e9018]:
                - generic [ref=e9019]:
                  - text: f
                  - generic [ref=e9024]: i
                - text: (
                - generic [ref=e9028]: x
                - text: )
          - text: small and
          - generic [ref=e9029]:
            - text: "\\mathbf{W}^{dec}_{\\cdot,i}"
            - generic [ref=e9031]:
              - math [ref=e9033]:
                - generic [ref=e9036]:
                  - generic [ref=e9037]: W
                  - generic [ref=e9038]:
                    - generic [ref=e9039]: ⋅
                    - generic [ref=e9040]: ","
                    - generic [ref=e9041]: i
                  - generic [ref=e9042]:
                    - generic [ref=e9043]: d
                    - generic [ref=e9044]: e
                    - generic [ref=e9045]: c
              - generic [ref=e9048]:
                - generic [ref=e9049]: W
                - generic [ref=e9053]:
                  - generic [ref=e9055]: ⋅,i
                  - generic [ref=e9057]: dec
          - text: large in a way that leaves the reconstructed activations unchanged.
          - link "[↩]" [ref=e9061] [cursor=pointer]:
            - /url: "#d-footnote-2"
        - listitem [ref=e9062]:
          - text: Our L1 coefficient is only relevant in the context of how we normalize activations. See
          - link "Update on how we train SAEs" [ref=e9063] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2024/april-update/index.html#training-saes
          - text: for full details.
          - link "[↩]" [ref=e9064] [cursor=pointer]:
            - /url: "#d-footnote-3"
        - listitem [ref=e9065]:
          - text: We also manually checked a number of examples to ensure they were generally handled correctly.
          - link "[↩]" [ref=e9066] [cursor=pointer]:
            - /url: "#d-footnote-4"
        - listitem [ref=e9067]:
          - text: Note that we have not established that it exhaustively represents all forms of errors in code; indeed, we suspect that there are many features representing different kinds of errors.
          - link "[↩]" [ref=e9068] [cursor=pointer]:
            - /url: "#d-footnote-5"
        - listitem [ref=e9069]:
          - text: The hallucinated error message includes the name of a real person, which we have redacted.
          - link "[↩]" [ref=e9070] [cursor=pointer]:
            - /url: "#d-footnote-6"
        - listitem [ref=e9071]:
          - text: As an example of how we draw these boundaries, mentions of mid-20th century physicists such as Richard Feynman would not count, but mentions of mid-20th century physicists, especially Richard Feynman would (just barely) count, though most cases are much more clear-cut.
          - link "[↩]" [ref=e9072] [cursor=pointer]:
            - /url: "#d-footnote-7"
        - listitem [ref=e9073]:
          - text: Speculatively, this may be connected to Zipf’s law, a common phenomenon in which the frequency of the nth most common object in a population, relative to the most common, is roughly
          - generic [ref=e9074]:
            - text: 1/n
            - generic [ref=e9076]:
              - math [ref=e9078]:
                - generic [ref=e9080]:
                  - generic [ref=e9081]: "1"
                  - generic [ref=e9082]: /
                  - generic [ref=e9083]: "n"
              - generic [ref=e9085]: 1/n
          - text: . Zipf’s law would predict that, for example, the millionth feature would represent a concept 10× rarer than the hundred thousandth feature.
          - link "[↩]" [ref=e9086] [cursor=pointer]:
            - /url: "#d-footnote-8"
        - listitem [ref=e9087]:
          - text: For example, if there were features for “large non-capital city” and “in New York state”, those together would suffice to specify New York City.
          - link "[↩]" [ref=e9088] [cursor=pointer]:
            - /url: "#d-footnote-9"
        - listitem [ref=e9089]:
          - text: "More explicitly: We compute the gradient of the difference between an output logit of interest and the logit of a specific other baseline token (or the average of the logits across all tokens) with respect to the residual stream activations in the middle layer. Then the attribution of that logit difference to a feature is defined as the dot product of that gradient with the feature vector (SAE decoder weight), multiplied by the feature's activation. This method is equivalent to the “attribution patching” technique introduced in"
          - 'link "Attribution Patching: Activation Patching At Industrial Scale" [ref=e9090] [cursor=pointer]':
            - /url: https://www.neelnanda.io/mechanistic-interpretability/attribution-patching
          - text: ", except that we use a baseline value of 0 for the feature instead of a baseline value taken from the feature’s activity on a second prompt."
          - link "[↩]" [ref=e9091] [cursor=pointer]:
            - /url: "#d-footnote-10"
        - listitem [ref=e9092]:
          - code [ref=e9093]:
            - link "strlen" [ref=e9094] [cursor=pointer]:
              - /url: https://en.cppreference.com/w/c/string/byte/strlen
          - text: computes the length of a C string excluding its null terminator, but
          - code [ref=e9095]:
            - link "strcpy" [ref=e9096] [cursor=pointer]:
              - /url: https://en.cppreference.com/w/c/string/byte/strcpy
          - text: copies a string including its null terminator, so its destination buffer needs to be one byte longer.
          - link "[↩]" [ref=e9097] [cursor=pointer]:
            - /url: "#d-footnote-11"
        - listitem [ref=e9098]:
          - text: It's worth noting that these features don't need to be so blunt as a racist screed, although that's often their maximally activating content. Weaker activations can, at least in some cases, correspond to more subtle and insidious discrimination.
          - link "[↩]" [ref=e9099] [cursor=pointer]:
            - /url: "#d-footnote-12"
        - listitem [ref=e9100]:
          - text: "This concern isn't purely hypothetical: There was a fascinating exchange between Li et al."
          - generic [ref=e9103]: "[29]"
          - text: and Nanda et al.
          - generic [ref=e9106]: "[30]"
          - text: (discussed by us
          - link "here" [ref=e9107] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2023/may-update/index.html#external-representations
          - text: ", and by Nanda"
          - link "here" [ref=e9108] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2022/toy_model/index.html#comment-nanda
          - text: ) on whether Othello-GPT has a linear representation, and if so, what the features are. At its heart was an initial assumption that the features should be “black/white has a piece here”, when it turned out that the model instead represented the board as “present player / other player has a piece here”. Dictionary learning wouldn't have made this assumption.
          - link "[↩]" [ref=e9109] [cursor=pointer]:
            - /url: "#d-footnote-13"
        - listitem [ref=e9110]:
          - text: We suspect this might even start to be an issue in fairly small and shallow models, and just get worse with scale – does GPT-2 actually care if a feature is implemented in the 17th MLP layer or 18th?
          - link "[↩]" [ref=e9111] [cursor=pointer]:
            - /url: "#d-footnote-14"
        - listitem [ref=e9112]:
          - text: Interestingly, in the context in which it was introduced, sparse dictionary learning was used to model biological neurons themselves as the sparse factors underlying natural image data. In our context, we treat neurons as the data to be explained, and features as the sparse factors to be inferred.
          - link "[↩]" [ref=e9113] [cursor=pointer]:
            - /url: "#d-footnote-15"
        - listitem [ref=e9114]:
          - text: Even though our encoder always outputs nonnegative feature activities, we may clamp a feature activity to a negative value, which simply results in a negative multiple of the feature vector.
          - link "[↩]" [ref=e9115] [cursor=pointer]:
            - /url: "#d-footnote-16"
