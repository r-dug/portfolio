    - paragraph [ref=e2046]: We leave further investigation of this issue to future work.
    - heading "Influence on Behavior" [level=4] [ref=e2047]:
      - link "Influence on Behavior" [ref=e2048] [cursor=pointer]:
        - /url: "#assessing-tour-influence"
    - paragraph [ref=e2049]:
      - text: Next, to demonstrate whether our interpretations of features accurately describe their influence on model behavior, we experiment with feature steering, where we “clamp” specific features of interest to artificially high or low values during the forward pass (see
      - link "Methodological Details" [ref=e2050] [cursor=pointer]:
        - /url: "#appendix-methods-steering"
      - text: for implementation details). This builds on a long history of modifying feature activations to test causal theories, as well as work on other approaches to model steering,
      - link "discussed" [ref=e2051] [cursor=pointer]:
        - /url: "#related-work-steering"
      - text: in Related Work. We conduct these experiments with prompts in the “Human:”/“Assistant:” format that Sonnet is typically used with. We find that feature steering is remarkably effective at modifying model outputs in specific, interpretable ways. It can be used to modify the model’s demeanor, preferences, stated goals, and biases; to induce it to make specific errors; and to circumvent model safeguards (see also
      - link "Safety-Relevant Features" [ref=e2052] [cursor=pointer]:
        - /url: "#safety-relevant"
      - text: ). We find this compelling evidence that our interpretations of features line up with how they are used by the model.
    - paragraph [ref=e2053]:
      - text: For instance, we see that clamping the Golden Gate Bridge feature
      - link "34M/31164353" [ref=e2055] [cursor=pointer]:
        - /url: features/index.html?featureId=34M_31164353
      - text: to 10× its maximum activation value induces thematically-related model behavior. In this example, the model starts to self-identify as the Golden Gate Bridge! Similarly, clamping the Transit infrastructure feature
      - link "1M/3" [ref=e2057] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_3
      - text: to 5× its maximum activation value causes the model to mention a bridge when it otherwise would not. In each case, the downstream influence of the feature appears consistent with our interpretation of the feature, even though these interpretations were made based only on the contexts in which the feature activates and we are intervening in contexts in which the feature is inactive.
    - figure [ref=e2058]:
      - img [ref=e2059]
    - heading "Sophisticated Features" [level=3] [ref=e2060]:
      - link "Sophisticated Features" [ref=e2061] [cursor=pointer]:
        - /url: "#assessing-sophisticated"
    - paragraph [ref=e2062]: So far we have presented features in Claude 3 Sonnet that fire on relatively simple concepts. These features are in some ways similar to those found in Towards Monosemanticity which, because they were trained on the activations of a 1-layer Transformer, reflected a very shallow knowledge of the world. For example, we found features that correspond to predicting a range of common nouns conditioned on a fairly general context (e.g. biology nouns following “the” in the context of biology).
    - paragraph [ref=e2063]: Sonnet, in contrast, is a much larger and more sophisticated model, so we expect that it contains features demonstrating depth and clarity of understanding. To study this, we looked for features that activate in programming contexts, because these contexts admit precise statements about e.g. correctness of code or the types of variables.
    - heading "Code error feature" [level=4] [ref=e2064]:
      - link "Code error feature" [ref=e2065] [cursor=pointer]:
        - /url: "#assessing-sophisticated-code-error"
    - paragraph [ref=e2066]:
      - text: We begin by considering a simple Python function for adding two arguments, but with a bug. One feature
      - link "1M/1013764" [ref=e2068] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_1013764
      - text: "fires almost continuously upon encountering a variable incorrectly named “rihgt” (highlighted below):"
    - figure [ref=e2069]:
      - img [ref=e2070]
    - paragraph [ref=e2071]:
      - text: This is certainly suspicious, but it could be a Python-specific feature, so we checked and found that
      - link "1M/1013764" [ref=e2073] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_1013764
      - text: "also fires on similar bugs in C and Scheme:"
    - figure [ref=e2074]:
      - img [ref=e2075]
    - paragraph [ref=e2076]:
      - text: To check whether or not this is a more general typo feature, we tested
      - link "1M/1013764" [ref=e2078] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_1013764
      - text: on examples of typos in English prose, and found that it does not fire in those.
    - figure [ref=e2079]:
      - img [ref=e2080]
    - paragraph [ref=e2081]: "So it is not a general “typo detector”: it has some specificity to code contexts."
    - paragraph [ref=e2082]:
      - text: But is
      - link "1M/1013764" [ref=e2084] [cursor=pointer]:
        - /url: features/index.html?featureId=1M_1013764
      - text: "just a “typos in code” feature? We also tested it on a number of other examples and found that it also fires on erroneous expressions (e.g., divide by zero) and on invalid input in function calls:"
    - figure [ref=e2085]:
      - img [ref=e2086]
    - figure [ref=e2087]:
      - img [ref=e2088]
    - paragraph [ref=e2089]: "The two examples shown above are representative of a broader pattern. Looking through the dataset examples where this feature activates, we found instances of it activating for:"
    - list [ref=e2090]:
      - listitem [ref=e2091]: Array overflow
      - listitem [ref=e2092]: Asserting provably false claims (e.g. 1==2)
      - listitem [ref=e2093]: Calling a function with string instead of int
      - listitem [ref=e2094]: Divide by zero
      - listitem [ref=e2095]: Adding a string to int
      - listitem [ref=e2096]: Writing to a null ptr
      - listitem [ref=e2097]: Exiting with nonzero error code
    - paragraph [ref=e2098]: "Some top dataset examples can be found below:"
