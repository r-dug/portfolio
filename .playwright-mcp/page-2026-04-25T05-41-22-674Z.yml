    - paragraph [ref=e4025]: "We also see a number of features that represent different syntax elements or other low-level concepts in code, which give the impression of syntax highlighting when visualized together (here for simplicity we binarize activation information, only distinguishing between zero vs. nonzero activations):"
    - figure [ref=e4026]:
      - img [ref=e4027]
    - paragraph [ref=e4028]:
      - text: These features were chosen primarily to fire on the Python examples. We have found that there is some transfer from Python code features to related languages like Java, but not more distant ones (e.g. Haskell), suggesting at least some level of language specificity. We hypothesize that more abstract features are more likely to span many languages, but so far have only found one concrete example of this (see the
      - link "Code error feature" [ref=e4029] [cursor=pointer]:
        - /url: "#h.ixuncga3akhk"
      - text: ).
    - heading "List Position Features" [level=4] [ref=e4030]:
      - link "List Position Features" [ref=e4031] [cursor=pointer]:
        - /url: "#feature-survey-categories-list-pos"
    - paragraph [ref=e4032]: "Finally, we see features that fire on particular positions in lists, regardless of the content in those positions:"
    - figure [ref=e4033]:
      - img [ref=e4034]
    - paragraph [ref=e4035]: Notice that these don’t fire on the first line. This is likely because the model doesn’t interpret the prompt as containing lists until it reaches the second line.
    - paragraph [ref=e4036]: We have only scratched the surface of the features present in these SAEs, and we expect to find much more in future work.
    - separator [ref=e4037]
    - heading "Features as Computational Intermediates" [level=2] [ref=e4038]:
