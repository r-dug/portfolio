    - paragraph
    - paragraph [ref=e7942]: "One feature that appears to activate especially robustly for Human/Assistant prompts appears to represent (in the pretraining dataset) dialogue and the notion of “assistants.” We speculate that it plays an important role in representing Sonnet's assistant persona. One piece of evidence for this is that clamping this feature to negative two times its maximum value causes the model to shed this persona and respond to questions in a more human-like fashion:"
    - figure [ref=e7943]:
      - img [ref=e7944]
    - paragraph [ref=e7945]: We also found that some particularly interesting and potentially safety-relevant features activate in response to seemingly innocuous prompts in which a human asks the model about itself. Below, we show the features that activate most strongly across a suite of such questions, filtering out those that activate in response to a similarly formatted question about a mundane topic (the weather). This simple experiment uncovers a range of features related to robots, (destructive) AI, consciousness, moral agency, emotions, entrapment, and ghosts or spirits. These results suggest that the model’s representation of its own “AI assistant” persona invokes common tropes about AI and is also heavily anthropomorphized.
    - figure [ref=e7946]:
      - img [ref=e7947]
    - paragraph [ref=e7948]: We urge caution in interpreting these results. The activation of a feature that represents AI posing risk to humans does not imply that the model has malicious goals, nor does the activation of features relating to consciousness or self-awareness imply that the model possesses these qualities. How these features are used by the model remains unclear. One can imagine benign or prosaic uses of these features – for instance, the model may recruit features relating to emotions when telling a human that it does not experience emotions, or may recruit a feature relating to harmful AI when explaining to a human that it is trained to be harmless. Regardless, however, we find these results fascinating, as it sheds light on the concepts the model uses to construct an internal representation of its AI assistant character.
    - heading "Comparison to other approaches" [level=3] [ref=e7949]:
      - link "Comparison to other approaches" [ref=e7950] [cursor=pointer]:
        - /url: "#safety-relevant-comparison"
    - paragraph [ref=e7951]:
      - text: There is considerable prior work on identifying meaningful directions in model activation space without relying on dictionary learning, using methods like linear probes (see e.g.
      - generic [ref=e7954]: "[24, 25, 26, 27, 28]"
      - text: ). Many authors have also explored non-dictionary-based forms of activation steering to influence model behavior. See
      - link "Related Work" [ref=e7955] [cursor=pointer]:
        - /url: "#related-work"
      - text: for a more detailed discussion of these methods. Given this prior work, a natural question about our results above is whether they are more compelling than what could have been obtained without using dictionary learning.
    - paragraph [ref=e7956]: "At a high level, we find that dictionary learning offers some advantages that complement the strengths of other methods:"
    - list [ref=e7957]:
      - listitem [ref=e7958]: Dictionary learning is a one-time cost that produces millions of features. Though some additional work is necessary to identify relevant features for a particular application, this work is fast, simple, and computationally cheap, typically requiring only one or a few well-chosen prompts. Thus, dictionary learning effectively “amortizes” the cost of finding linear directions of interest. By contrast, traditional methods for constructing linear probes or steering vectors linear probing techniques could require the construction of a bespoke dataset for each concept that one might want to probe.
      - listitem [ref=e7959]:
        - text: Being an unsupervised method, dictionary learning allows us to uncover abstractions or associations formed by the model that we may not have predicted in advance. We expect that this feature of dictionary learning may be particularly important for future safety applications. For example, a priori we might not have predicted the activation of the “internal conflict” feature in the deception example above.
        - superscript [ref=e7961]: "13"
    - paragraph [ref=e7962]:
      - text: To better understand the benefit of using features, for a few case studies of interest, we obtained linear probes using the same positive / negative examples that we used to identify the feature, by subtracting the residual stream activity in response to the negative example(s) from the activity in response to the positive example(s). We experimented with (1) visualizing the top-activating examples for probe directions, using the same pipeline we use for our features, and (2) using these probe directions for steering. In all cases, we were unable to interpret the probe directions from their activating examples. In most cases (with a few exceptions) we were unable to adjust the model’s behavior in the expected way by adding perturbations along the probe directions, even in cases where feature steering was successful (see
      - link "this appendix" [ref=e7963] [cursor=pointer]:
        - /url: "#appendix-methods-steering-compare"
      - text: for more details).
    - paragraph [ref=e7964]: We note that these negative results do not imply that these methods for constructing probes or steering vectors are not useful in general. Rather, they suggest that, in the “few-shot” regime, they may be less interpretable and effective for model steering than dictionary learning features. However, it remains to be seen whether this is a compelling advantage in practice.
    - separator [ref=e7965]
    - heading "Discussion" [level=2] [ref=e7966]:
      - link "Discussion" [ref=e7967] [cursor=pointer]:
        - /url: "#discussion"
    - heading "What Does This Mean for Safety?" [level=4] [ref=e7968]:
      - link "What Does This Mean for Safety?" [ref=e7969] [cursor=pointer]:
        - /url: "#discussion-safety"
    - paragraph [ref=e7970]: It's natural to wonder what these results mean for the safety of large language models. We caution against inferring too much from these preliminary results. Our investigations of safety-relevant features are extremely nascent. It seems likely our understanding will evolve rapidly in the coming months.
    - paragraph [ref=e7971]: In general, we don't think the mere existence of the safety-relevant features we've observed should be that surprising. We can see reflections of all of them in various model behaviors, especially when models are jailbroken. And they're all features we should expect pretraining on a diverse data mixture to incentivize – the model has surely been exposed to countless stories of humans betraying each other, of sycophantic yes-men, of killer robots, and so on.
    - paragraph [ref=e7972]: "Instead, a more interesting question is: when do these features activate? Going forwards, we're particularly interested in studying:"
    - list [ref=e7973]:
      - listitem [ref=e7974]: "What features activate on tokens we'd expect to signify Claude's self-identity? Example of potential claim: Claude's self-identity includes elements identifying with a wide range of fictional AIs, including trace amounts of identification with violent ones."
      - listitem [ref=e7975]: "What features need to activate / remain inactive for Claude to give advice on producing Chemical, Biological, Radiological or Nuclear (CBRN) weapons? Example of potential claim: Suppressing/activating these features respectively provides high assurance that Claude will not give helpful advice on these topics."
      - listitem [ref=e7976]: What features activate when we ask questions probing Claude's goals and values?
      - listitem [ref=e7977]: What features activate during jailbreaks?
      - listitem [ref=e7978]:
        - text: What features activate when Claude is trained to be a sleeper agent
        - generic [ref=e7981]: "[22]"
        - text: "? And how do these features relate to the linear probe directions already identified that predict harmful behavior from such an agent"
        - generic [ref=e7984]: "[31]"
        - text: "?"
      - listitem [ref=e7985]: What features activate when we ask Claude questions about its subjective experience?
      - listitem [ref=e7986]: Can we use the feature basis to detect when fine-tuning a model increases the likelihood of undesirable behaviors?
    - paragraph [ref=e7987]: "Given the potential implications of these investigations, we believe it will be important for us and others to be cautious in making strong claims. We want to think carefully about several potential shortcomings of our methodology, including:"
    - list [ref=e7988]:
      - listitem [ref=e7989]: Illusions from suboptimal dictionary learning, such as messy feature splitting. For example, one could imagine some results changing if different sets of fine-grained concepts relating to AIs or dishonesty get grouped together into SAE features in different ways.
      - listitem [ref=e7990]: Cases where the downstream effects of features diverge from what we might expect given their activation patterns.
    - paragraph [ref=e7991]: We have not seen evidence of either of these potential failure modes, but these are just a few examples, and in general we want to keep an open mind as to the possible ways we could be misled.
    - heading "Generalization and Safety" [level=4] [ref=e7992]:
      - link "Generalization and Safety" [ref=e7993] [cursor=pointer]:
        - /url: "#discussion-generalization"
    - paragraph [ref=e7994]: One hope for interpretability is that it can be a kind of "test set for safety", which allows us to tell whether models that appear safe during training will actually be safe in deployment. In order for interpretability to give us any confidence in this, we need to know that our analysis will hold off-distribution. This is especially true if we want to use interpretability analysis as part of an "affirmative safety case" at some point in the future.
    - paragraph [ref=e7995]: "In the course of this project, we observed two properties of our feature that seem like cause for optimism:"
    - list [ref=e7996]:
      - listitem [ref=e7997]: Generalization to Image Activations. Our SAE features were trained purely on text activations. Image activations are in some sense dramatically off-distribution for the SAE, and yet it successfully generalizes to them.
      - listitem [ref=e7998]: Concrete-Abstract Generalization. We observe that features often respond to both abstract discussion and concrete examples of a concept. For instance, the security vulnerability feature responds to both abstract discussion of security vulnerabilities as well as specific security vulnerabilities in actual code. Thus, we might hope that as long our SAE training distribution includes abstract discussion of safety concerns, we'll catch (and be able to understand) specific instantiations.
    - paragraph [ref=e7999]: These observations are very preliminary and, as with all connections to safety in this paper, we caution against inferring too much from them.
    - heading "Limitations, Challenges, and Open Problems" [level=4] [ref=e8000]:
      - link "Limitations, Challenges, and Open Problems" [ref=e8001] [cursor=pointer]:
        - /url: "#discussion-limitations"
    - paragraph [ref=e8002]: Our work has many limitations. Some of these are superficial limitations relating to this work being early, but others are deeply fundamental challenges that require novel research to address.
    - paragraph [ref=e8003]: Superficial Limitations. In our work, we perform dictionary learning over activations sampled from a text-only dataset similar to parts of our pretraining distribution. It did not include any “Human:” / “Assistant:” formatted data that we finetune Claude to operate on, and did not include any images. In the future, we'd like to include data more representative of the distribution Claude is finetuned to operate on. On the other hand, the fact that this method works when trained on such a different distribution (including zero-shot generalization to images) seems like a positive sign.
    - paragraph [ref=e8004]: Inability to Evaluate. In most machine learning research, one has a principled objective function which can be optimized. But in this work, it isn't really clear what the “ground truth” objective is. The objective we optimize – a combination of reconstruction accuracy and sparsity – is only a proxy for what we really are interested in, interpretability. For example, it isn't clear how we should trade off between the mean squared error and sparsity, nor how we'd know if we made that trade-off well. As a result, while we can very scientifically study how to optimize the loss of SAEs and infer scaling laws, it's unclear that they're really getting at the fundamental thing we care about.
    - paragraph [ref=e8005]:
      - text: Cross-Layer Superposition. We believe that many features in large models are in “cross-layer superposition”. That is, gradient descent often doesn't really care exactly which layer a feature is implemented in or even if it is isolated to a specific layer, allowing for features to be “smeared” across layers.
      - superscript [ref=e8006]: "14"
      - text: "This is a big challenge for dictionary learning, and we don’t yet know how to solve it. This work tries to partially sidestep it by focusing on the residual stream which, as the sum of the outputs of all previous layers, we expect to suffer less from cross-layer superposition. Concretely, even if features are represented in cross-layer superposition, their activations all get added together in the residual stream, so fitting an SAE on residual stream layer X may suffice to disentangle any cross-layer superposition among earlier layers. Unfortunately, we don't think this fully avoids the problem: features which are partly represented by later layers will still be impossible to properly interpret. We believe this issue is very fundamental. In particular, we would ideally like to do “pre-post” / “transcoder” style SAEs"
      - generic [ref=e8009]: "[32, 33, 34]"
      - text: for the MLPs and it's especially challenging to reconcile these with cross-layer superposition.
    - paragraph [ref=e8010]:
      - text: "Getting All the Features and Compute. We do not believe we have found anywhere near “all the features” that exist in Sonnet, even if we restrict ourselves to the middle layer we focused on. We don't have an estimate of how many features there are or how we'd know we got all of them (if that's even the right frame!). We think it's quite likely that we're orders of magnitude short, and that if we wanted to get all the features – in all layers! – we would need to use much more compute than the total compute needed to train the underlying models. This won't be tenable: as a field, we must find significantly more efficient algorithms. At a high level, it seems like there are two approaches. The first is to make sparse autoencoders themselves cheaper – for example, perhaps we could use a mixture of experts"
      - generic [ref=e8013]: "[35]"
      - text: to cheaply express many more features. Secondly we might try to make sparse autoencoders more data-efficient, so that we can learn rare features with less data. One possibility of this might be
      - link "Attribution SAEs" [ref=e8014] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/april-update/index.html#attr-dl
      - text: described in our most recent update, which we hope might use gradient information to more efficiently learn features.
    - paragraph [ref=e8015]:
      - text: Shrinkage. We use an L1 activation penalty to encourage sparsity. This approach is well known to have issues with “shrinkage”, where non-zero activations are systematically underestimated. We believe this significantly harms sparse autoencoder performance, independent of whether we've “learned all the features” or how much compute we use. Recently, a number of approaches have been suggested for addressing this
      - generic [ref=e8018]: "[17, 36]"
      - text: . Our group also
      - link "unsuccessfully explored" [ref=e8019] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/feb-update/index.html#dict-learning-tanh
      - text: using a tanh L1 penalty, which we found improved proxy metrics, but made the resulting features less interpretable for unknown reasons.
    - paragraph [ref=e8020]:
      - text: Other major barriers to mechanistic understanding. For the broader mechanistic interpretability agenda to succeed, pulling features out of superposition isn't enough. We need an answer to
      - link "attention superposition" [ref=e8021] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/jan-update/index.html#attn-superposition
      - text: ", as we expect many attentional features to be packed in superposition across attention heads. We're also increasingly concerned that interference weights from"
      - link "weight superposition" [ref=e8022] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/may-update/index.html#weight-superposition
      - text: may be a major challenge for understanding circuits (this was a motivation for focusing on attribution for circuit analysis in this paper).
    - paragraph [ref=e8023]:
      - text: Scaling Interpretability. Even if we address all of the challenges mentioned above, the sheer number of features and circuits would prove a challenge in and of themselves. This is sometimes called the scalability problem. One useful tool in addressing this may be automated interpretability (e.g.
      - generic [ref=e8026]: "[16, 21]"
      - text: ; see
      - link "discussion" [ref=e8027] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/interpretability-dreams/index.html#automated-interpretability
      - text: ). However, we believe there may be other approaches by
      - link "exploiting larger-scale structure" [ref=e8028] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/interpretability-dreams/index.html#larger-scale
      - text: of various kinds.
    - paragraph [ref=e8029]:
      - text: Limited Scientific Understanding. While we're pretty persuaded that features and superposition are a
      - link "pragmatically useful theory" [ref=e8030] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/april-update/index.html#caloric-theory
      - text: ", it still isn't that tested. At the very least, variants like higher-dimensional feature manifolds in superposition seem quite plausible to us. Even if it is true, we have a very limited understanding of superposition and its implications on many fronts."
    - separator [ref=e8031]
    - heading "Related Work" [level=2] [ref=e8032]:
      - link "Related Work" [ref=e8033] [cursor=pointer]:
        - /url: "#related-work"
    - paragraph [ref=e8034]:
      - text: While we briefly review the most related work in this section, a dedicated review paper would be needed to truly do justice to the relevant literature. For a general introduction to mechanistic interpretability, we refer readers to Neel Nanda's
      - link "guide" [ref=e8035] [cursor=pointer]:
        - /url: https://www.neelnanda.io/mechanistic-interpretability/getting-started
      - text: and
      - link "annotated reading list" [ref=e8036] [cursor=pointer]:
        - /url: https://www.neelnanda.io/mechanistic-interpretability/favourite-papers
      - text: . For detailed discussion of progress in mechanistic interpretability, we refer readers to our periodic reviews of recent work (
      - link "May 2023" [ref=e8037] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/may-update/index.html#external-research
      - text: ","
      - link "Jan 2024" [ref=e8038] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/jan-update/index.html#external-research
      - text: ","
      - link "March 2024" [ref=e8039] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/march-update/index.html#external-research
      - text: ","
      - link "April 2024" [ref=e8040] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/april-update/index.html#external-research
      - text: ). For discussion of the foundations of superposition and how it relates to compressed sensing, neural coding, mathematical frames, disentanglement, vector symbolic architectures, and also work on interpretable neurons and features generally, we refer readers to the
      - link "related work" [ref=e8041] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html#related
      - text: section of Toy Models
      - generic [ref=e8044]: "[4]"
      - text: . For distributed representations in particular, we also refer readers to our essay
      - 'link "Distributed Representations: Composition & Superposition" [ref=e8046] [cursor=pointer]':
        - /url: https://transformer-circuits.pub/2023/superposition-composition/index.html
      - generic [ref=e8049]: "[37]"
      - text: .
    - heading "Theory of superposition" [level=4] [ref=e8050]:
      - link "Theory of superposition" [ref=e8051] [cursor=pointer]:
        - /url: "#related-work-superposition"
    - paragraph [ref=e8052]:
      - text: “Superposition,” in our context, refers to the concept that a neural network layer of dimension N may linearly represent many more than N features. The basic idea of superposition has deep connections to a number of classic ideas in other fields. It's deeply connected to
      - link "compressed sensing" [ref=e8054] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Compressed_sensing
      - text: and
      - link "frames" [ref=e8056] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Frame_(linear_algebra)
      - text: in mathematics – in fact, it's arguably just taking these ideas seriously in the context of neural representations. It's also deeply connected to the idea of distributed representations in neuroscience and machine learning, with superposition being a
      - link "subtype of distributed representation" [ref=e8057] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/superposition-composition/index.html
      - text: .
    - paragraph [ref=e8058]:
      - text: The modern notion of superposition can be found in early work by Arora et al.
      - generic [ref=e8061]: "[2]"
      - text: and Goh
      - generic [ref=e8064]: "[3]"
      - text: studying embeddings. It also began to come up in mechanistic interpretability work grappling with polysemantic neurons and circuits involving them
      - generic [ref=e8067]: "[38]"
      - text: .
    - paragraph [ref=e8068]:
      - text: More recently, Elhage et al's
      - link "Toy Models of Superposition" [ref=e8070] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html
      - generic [ref=e8073]: "[4]"
      - text: gave examples where toy neural networks explicitly exhibited superposition, showing that it definitely occurs in at least some situations. Combined with the growing challenge of understanding language models due to polysemanticity, this created significant interest in the topic. Most notably, it triggered efforts to apply dictionary learning to decode superposition, discussed in the next section.
    - paragraph [ref=e8074]:
      - text: But in parallel with this work on decoding superposition, our understanding of the theory of superposition has continued to progress. For example, Scherlis et al.
      - generic [ref=e8077]: "[39]"
      - text: offer a theory of polysemanticity in terms of capacity. Henighan et al.
      - generic [ref=e8080]: "[40]"
      - text: extend toy models of superposition to consider toy cases of memorization. Vaintrob et al.
      - generic [ref=e8083]: "[41]"
      - text: provide a very interesting discussion of computation in superposition (
      - link "discussion" [ref=e8084] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/march-update/index.html#external-computation-in-superposition
      - text: ).
    - heading "Dictionary learning" [level=4] [ref=e8085]:
      - link "Dictionary learning" [ref=e8086] [cursor=pointer]:
        - /url: "#related-work-dictionary"
    - paragraph [ref=e8087]:
      - link "Dictionary learning" [ref=e8089] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Sparse_dictionary_learning
      - text: is a standard method for problems like ours, where we have a bunch of dense vectors (the activations) which we believe are explained by sparse linear combinations of unknown vectors (the features). This classic line of machine learning research began with a paper by Olshausen and Field
      - generic [ref=e8092]: "[6]"
      - text: ","
      - superscript [ref=e8093]: "15"
      - text: and has since blossomed into a rich and well-studied topic. We're unable to do justice to the full field, and instead refer readers to a textbook by Elad
      - generic [ref=e8096]: "[5]"
      - text: .
    - paragraph [ref=e8097]:
      - text: Modern excitement about dictionary learning and sparse autoencoders builds on the foundation of a number of papers that explored it before this surge. In particular, a number of papers began trying to apply these methods to various kinds of neural embeddings
      - generic [ref=e8100]: "[2, 3, 42, 43, 44]"
      - text: ", and in 2021, Yun et al."
      - generic [ref=e8103]: "[7]"
      - text: applied non-overcomplete dictionary learning to transformers. Many of these papers prefigured modern thinking on superposition, despite often using different language to describe it
    - paragraph [ref=e8104]:
      - text: More recently, two papers by Bricken et al.
      - generic [ref=e8107]: "[8]"
      - text: and Cunningham et al.
      - generic [ref=e8110]: "[9]"
      - text: demonstrated that sparse autoencoders could extract interpretable, monosemantic features from transformers. A paper by Tamkin et al.
      - generic [ref=e8113]: "[10]"
      - text: "showed similar results for a variant of dictionary learning with binary features. This created significant excitement in the mechanistic interpretability, and a flurry of work building on sparse autoencoders:"
    - list [ref=e8114]:
      - listitem [ref=e8115]:
        - text: Several projects have aimed to address the shrinkage problem (see the
        - link "Limitations section" [ref=e8116] [cursor=pointer]:
          - /url: "#discussion-limitations"
        - text: ") of sparse autoencoders: Wright & Sharkey take a finetuning approach"
        - generic [ref=e8119]: "[36]"
        - text: ", while Rajamanoharan et al."
        - generic [ref=e8122]: "[17]"
        - text: introduce a new gating activation function which helps.
      - listitem [ref=e8123]:
        - text: Braun et al.
        - generic [ref=e8126]: "[45]"
        - text: explored using reconstruction losses other than MSE.
      - listitem [ref=e8127]:
        - text: A number of authors have explored applying sparse autoencoders to new domains, including Othello-GPT
        - generic [ref=e8130]: "[46, 47]"
        - text: (
        - link "discussion" [ref=e8131] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2024/march-update/index.html#external-othello
        - text: ), Vision Transformers
        - generic [ref=e8134]: "[48]"
        - text: ", and attention layer outputs"
        - generic [ref=e8137]: "[49]"
        - text: .
      - listitem [ref=e8138]:
        - text: Several projects have explored the limits of sparse autoencoders, including whether they learn composed features
        - generic [ref=e8141]: "[50, 51]"
        - text: or fail to learn expected features
        - generic [ref=e8144]: "[47]"
        - text: .
      - listitem [ref=e8145]:
        - text: Gurnee has found interesting effects from ablating the residual error left unexplained by SAEs
        - generic [ref=e8148]: "[52]"
        - text: (
        - link "discussion" [ref=e8149] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2024/april-update/index.html#external-sae-errors
        - text: ), further explored by Lindsey
        - generic [ref=e8152]: "[53]"
        - text: .
      - listitem [ref=e8153]:
        - text: Open-source sparse autoencoders have been built for GPT-2 (e.g.
        - generic [ref=e8156]: "[54, 55]"
        - text: ).
    - heading "Disentanglement" [level=4] [ref=e8157]:
      - link "Disentanglement" [ref=e8158] [cursor=pointer]:
        - /url: "#related-work-disentanglement"
    - paragraph [ref=e8159]:
      - text: Dictionary learning methods can be seen as part of a broader literature on disentanglement. Motivated a classic paper by Bengio
      - generic [ref=e8162]: "[56]"
      - text: ", the disentanglement literature generally seeks to find or enforce during training a basis which isolates factors of variation (e.g."
      - generic [ref=e8165]: "[57, 58, 59]"
      - text: ).
    - paragraph [ref=e8166]:
      - text: Where dictionary learning and the superposition hypothesis focus on the idea that there are more features than representation dimensions, the disentanglement literature generally imagines the number of features to be equal to or fewer than the number of dimensions. Dictionary learning is more closely related to compressed sensing, which assumes a larger number of latent factors than observed dimensions. A
      - link "longer discussion" [ref=e8167] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html#related-disentanglement
      - text: of the relationship between compressed sensing and dictionary learning can be found in Toy Models.
    - heading "Sparse features circuits" [level=4] [ref=e8168]:
      - link "Sparse features circuits" [ref=e8169] [cursor=pointer]:
        - /url: "#related-work-circuits"
    - paragraph
    - paragraph [ref=e8170]:
      - text: A natural next step after extracting features from a model is studying how they participate in circuits within the model. Recently, we've seen this start to be explored by He et al.
      - generic [ref=e8173]: "[46]"
      - text: in the context of Othello-GPT (
      - link "discussion" [ref=e8174] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/march-update/index.html#external-othello
      - text: ), and Marks et al.
      - generic [ref=e8177]: "[60]"
      - text: (
      - link "discussion" [ref=e8178] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/april-update/index.html#external-sparse-circuits
      - text: ), and
      - link "Batson" [ref=e8179] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/march-update/index.html#feature-heads
      - link "et al." [ref=e8181] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2024/march-update/index.html#feature-heads
      - generic [ref=e8184]: "[61]"
      - text: in the context of large language models. We're very excited to see this direction continue.
    - heading "Activation Steering" [level=4] [ref=e8185]:
      - link "Activation Steering" [ref=e8186] [cursor=pointer]:
        - /url: "#related-work-steering"
    - paragraph [ref=e8187]:
      - text: Activation steering is a family of techniques involving modifying the activations of a model during a forward pass to influence downstream behavior
      - generic [ref=e8190]: "[62, 63, 26, 64]"
      - text: . These ideas can trace back to a long history of steering GANs or VAEs with vector arithmetic (e.g.
      - generic [ref=e8193]: "[65, 66, 67]"
      - text: ). The modifications can be derived from activations extracted from dataset examples (e.g. using linear probes), or from features found by dictionary learning
      - generic [ref=e8196]: "[10, 60, 68]"
      - text: . Modifications can also take the form of concept scrubbing
      - generic [ref=e8199]: "[69]"
      - text: ", in which activations are changed to suppress a given concept/behavior in the model. Recently, related ideas have also been explored under the Representation Engineering agenda"
      - generic [ref=e8202]: "[70]"
      - text: .
    - paragraph [ref=e8203]: Our work has two main differences. Firstly, dictionary learning features are constructed in an unsupervised manner, whereas steering vectors are typically constructed in a supervised manner, picking the target behaviors in advance. Secondly, Sonnet is a much larger model than is typically studied in prior steering experiments. More generally, our focus in these experiments is in establishing that features do have the causal effect we expect them to, rather than improving steering performance as an end in itself. We haven't rigorously evaluated our features against other steering methods (although see appendix).
    - heading "Safety-Relevant Features" [level=4] [ref=e8204]:
      - link "Safety-Relevant Features" [ref=e8205] [cursor=pointer]:
        - /url: "#related-work-safety-features"
    - paragraph [ref=e8206]: "Dictionary learning is, of course, not the only way to attempt to access safety-relevant features. Several lines of work have tried to access or study various safety-relevant properties with linear probes, embedding arithmetic, contrastive pairs, or similar methods:"
    - list [ref=e8207]:
      - listitem [ref=e8208]:
        - text: Bias / Fairness. A significant body of work has studied linear directions related to bias, especially in the context of word embeddings (e.g.
        - generic [ref=e8211]: "[27]"
        - text: ), and more recently in the context of transformers (e.g.
        - generic [ref=e8214]: "[28]"
        - text: ).
      - listitem [ref=e8215]:
        - text: Truthfulness / Honesty / Confidence. Several lines of work have attempted to access the truthfulness, honesty, or epistemic confidence of models using linear probes (e.g.
        - generic [ref=e8218]: "[24, 25, 26, 71, 31]"
        - text: ).
      - listitem [ref=e8219]:
        - text: World Models. Some recent work has found evidence of linear “world models” in transformers (e.g.
        - generic [ref=e8222]: "[30]"
        - text: for Othello board states and
        - generic [ref=e8225]: "[72]"
        - text: for longitude and latitude). These might be seen as safety-relevant in a broad sense, from the perspective of Eliciting Latent Knowledge
        - generic [ref=e8228]: "[73]"
        - text: .
