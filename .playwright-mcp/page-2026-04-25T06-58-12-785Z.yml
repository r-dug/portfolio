    - heading "Smeared key models" [level=4] [ref=e4699]
    - paragraph [ref=e4700]:
      - text: The “smeared key” architecture modification described in
      - link "Argument 2" [ref=e4701] [cursor=pointer]:
        - /url: "#argument-architectural-requirements"
      - text: "is as follows: we introduce a trainable real parameter"
