    - separator [ref=e4796]
    - heading "Unexplained Curiosities" [level=2] [ref=e4797]:
      - link "Unexplained Curiosities" [ref=e4798] [cursor=pointer]:
        - /url: "#curiosities"
    - paragraph [ref=e4799]: As with all scientific investigations, in the course of this work we’ve encountered a few unexplained phenomena. In this section, we discuss these and provide very preliminary investigations of a few that were especially surprising.
    - heading "Seemingly Constant In-Context Learning Score" [level=3] [ref=e4800]:
      - link "Seemingly Constant In-Context Learning Score" [ref=e4801] [cursor=pointer]:
        - /url: "#seemingly-constant"
    - paragraph [ref=e4802]:
      - text: One of the stranger observations in this paper is that
      - link "in-context learning score" [ref=e4803] [cursor=pointer]:
        - /url: "#in-context-learning-key-concept"
      - text: "(as we've defined it: the loss of the 500th token in the context minus the loss of the 50th token in the context) is more or less the same for all models after the phase change. It appears to not matter whether the model is a tiny two layer model or a fairly large 13 billion parameter model, nor whether the model has just gone through the phase change or trained much longer. The only thing that matters, seemingly, is whether the model has gone through the phase change at all."
    - paragraph [ref=e4804]:
      - text: A natural question is whether this might be an artifact of the relatively arbitrary definition. Afterall, there's no reason to privilege token index 50 or 500 in the context. But it appears that varying these doesn't matter. In the following plot, we show how the large models' "in-context learning score" varies if we define it instead as the difference between the loss at the final token in the context (8192) and other indices. While there are small differences between models – for some definitions, small models would do slightly more "in-context learning"!
      - superscript [ref=e4805]: "27"
      - text: – all definitions appear to show that the amount of in-context learning varies only slightly between models.
    - figure [ref=e4806]:
      - img [ref=e4807]
    - paragraph [ref=e4808]: "How can this be? First, it's important to be clear that large models still predict tokens at all indices better than small models, and they're best at predicting later tokens. What's going on is that the large models gain all their advantage over small models very early in the context. In fact, the majority of the difference forms in the first ten tokens:"
    - figure [ref=e4809]:
      - img [ref=e4810]
    - paragraph [ref=e4811]:
      - text: It seems that large models are able to pull a lot of information out of the very early context. (This might partly be, as an example, because their increased world knowledge mean they don't need to gain as much information from the context.) They then further decrease their loss by a roughly fixed amount over the remainder of the context.
      - superscript [ref=e4812]: "28"
      - text: It seems likely this fixed amount is in some sense "more difficult in-context learning" for large models, since they're starting from a lower loss baseline. While it still seems mysterious to us why models should have the same in-context learning score, this perspective makes it "strange" rather than "shocking".
    - heading "Phase Change Effect on Loss Derivatives" [level=3] [ref=e4813]
    - paragraph [ref=e4814]: Another observation we find quite striking is that if one looks at the derivative of the loss curves of models of different sizes, it appears that their order switches at the phase change. This is most easily seen by plotting the derivative of loss with respect to the log of elapsed tokens (since loss curves are often most easily reasoned about on a log x-axis). The key observation is that the loss decreases more slowly for small models than large models before the phase change, but the opposite is true after.
    - figure [ref=e4815]:
      - img [ref=e4816]
    - paragraph [ref=e4817]: While it doesn't seem that surprising that small models learn more quickly in early training, it is striking that this inversion seems to coincide with the phase change. It's another piece of evidence that suggests the phase change is an important transition point in the training of transformers.
    - heading "Additional Curiosities" [level=3] [ref=e4818]
    - paragraph [ref=e4819]:
      - text: In the
      - link "model analysis table" [ref=e4820] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: ":"
    - list [ref=e4821]:
      - listitem [ref=e4822]: The 6-layer attention-only model has an unusual head that develops in the later half of training. This head is not an induction head, and yet ablating it has an effect similar to reversing the phase change (in the “before-and-after vector” attribution plot). What is this head?
    - list [ref=e4823]:
      - listitem [ref=e4824]: The 4-layer MLP model ablations are nowhere near as “peaky” as those of any other model. What is different about this model’s development?
      - listitem [ref=e4825]: The 6-layer MLP model shows a “loss spike”. We don’t yet know what causes loss spikes.
      - listitem [ref=e4826]: The 6-layer MLP model has one lone induction head whose ablation has the opposite effect on the in-context learning score. What is this head?
    - paragraph [ref=e4827]:
      - text: And in the
      - link "Appendix" [ref=e4828] [cursor=pointer]:
        - /url: "#evaluators-on-models"
      - text: ":"
    - list [ref=e4829]:
      - listitem [ref=e4830]: Full-scale models above 16 layers start to show a small number of heads that score well on “prefix search”, but get a negative score on copying, which means they are not induction heads. What can we learn about these “anti-copying prefix-search” heads?
    - separator [ref=e4831]
    - heading "Discussion" [level=2] [ref=e4832]:
      - link "Discussion" [ref=e4833] [cursor=pointer]:
        - /url: "#discussion"
    - heading "Safety Implications" [level=3] [ref=e4834]:
      - link "Safety Implications" [ref=e4835] [cursor=pointer]:
        - /url: "#safety-implications"
    - paragraph [ref=e4836]: "The ultimate motivation of our research is the theory that reverse engineering neural networks might help us be confident in their safety. Our work is only a very preliminary step towards that goal, but it it does begin to approach several safety-relevant issues:"
    - paragraph [ref=e4837]: "Phase changes: If neural network behavior discontinuously changes from one scale to the next, this makes it more challenging for researchers and society to prepare for future problems."
    - paragraph [ref=e4838]:
      - text: "In-Context Learning: In-context learning has been a topic of concerned speculation in the safety community. With less-capable neural networks, one might be tempted to treat their behavior as relatively fixed after training. (That said, demonstrations of adversarial reprogramming"
      - generic [ref=e4841]: "[21]"
      - text: shed some doubt on this assumption.) In-context learning highlights that model behavior can in some sense “change” during inference, without further training. Even if we think of in-context learning as “locating” an already-learned behavior
      - generic [ref=e4844]: "[22]"
      - text: ", rather than learning something new, the behavior could be a surprising and unwanted off-distribution generalization."
    - paragraph [ref=e4845]:
      - text: "Mesa-Optimization: There have been some concerns that the underlying mechanism of in-context learning might be mesa-optimization"
      - generic [ref=e4848]: "[14]"
      - text: ", a hypothesized situation where models develop an internal optimization algorithm. Our work suggests that the primary mechanism of in-context learning, at least in small models, is induction heads. We did not observe any evidence of mesa-optimizers."
    - heading "Linking Learning Dynamics, Scaling Laws, and Mechanistic Interpretability" [level=3] [ref=e4849]:
      - link "Linking Learning Dynamics, Scaling Laws, and Mechanistic Interpretability" [ref=e4850] [cursor=pointer]:
        - /url: "#multiple-levels-of-analysis"
    - paragraph [ref=e4851]:
      - text: The in-context-learning phase change may be a useful "Rosetta stone" linking mechanistic interpretability, learning dynamics
      - generic [ref=e4854]: "[23]"
      - text: ", and statistical physics-like empirical properties of neural networks (e.g. scaling laws or phase changes). If one wants to investigate the intersections of these lines of work, the phase change seems like an ideal starting point: a concrete example where these lines of inquiry are intertwined, which can be explored in small models, bounded in a small sliver of the training process, and is linked to a capability (in-context learning) the community is excited about."
    - separator [ref=e4855]
    - heading "Related Work" [level=2] [ref=e4856]:
      - link "Related Work" [ref=e4857] [cursor=pointer]:
        - /url: "#related-work"
    - paragraph [ref=e4858]:
      - text: The general approach of this paper to reverse engineering transformers is based heavily on our previous paper,
      - link "A Mathematical Framework for Transformer Circuits" [ref=e4859] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html
      - text: . There is much to be said about how that framework relates to other work in interpretability. Rather than repeating it, we refer readers to
      - link "Related Work" [ref=e4860] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html#related-work
      - text: in our previous paper, especially discussion of the relationship
      - link "to circuits" [ref=e4861] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html#circuits
      - generic [ref=e4864]: "[6]"
      - text: ","
      - link "to analysis of attention heads" [ref=e4865] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html#attention-head-analysis
      - text: (e.g.
      - generic [ref=e4868]: "[24, 25, 26, 27, 28]"
      - text: ), and
      - link "to related mathematical analysis" [ref=e4869] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html#mathematical-framework
      - text: (e.g.
      - generic [ref=e4872]: "[29]"
      - text: ).
    - paragraph [ref=e4873]: Building on that perspective, we here focus on how aspects of this paper raise new connections to the machine learning literature, separate from the connections raised simply by the underlying framework.
    - heading "In-Context Learning" [level=4] [ref=e4874]:
      - link "In-Context Learning" [ref=e4875] [cursor=pointer]:
        - /url: "#in-context-learning-related-work"
    - paragraph [ref=e4876]:
      - text: Emergent in-context learning was compellingly demonstrated in GPT-3
      - generic [ref=e4879]: "[1]"
      - text: . A number of papers have studied how to effectively leverage in-context learning, especially with "prompt engineering"
      - generic [ref=e4882]: "[11, 12]"
      - text: . But of particular importance to us, several papers have tried to study how and when in-context learning occurs (e.g.
      - generic [ref=e4885]: "[13, 30, 31, 32]"
      - text: ).
    - paragraph [ref=e4886]: "Some of the findings of these papers are consistent with the induction head hypothesis, or support our methodology:"
    - list [ref=e4887]:
      - listitem [ref=e4888]:
        - text: Kaplan et al.
        - generic [ref=e4891]: "[13]"
        - text: is the origin of our approach for using loss at different token indices as a formalism for studying in-context learning.
      - listitem [ref=e4892]:
        - text: O’Connor & Andreas
        - generic [ref=e4895]: "[30]"
        - text: find that preserving word order in contexts is important, as the induction head hypothesis would suggest.
    - paragraph [ref=e4896]: "However, there are also places where experiments in these papers seem in tension with the induction head hypothesis:"
    - list [ref=e4897]:
      - listitem [ref=e4898]:
        - text: O’Connor & Andreas
        - generic [ref=e4901]: "[30]"
        - text: have some experiments suggesting that removing all words except nouns can improve loss. This seems inconsistent with the induction head hypothesis. However, they only find this for experiments where they retrain the model on modified data. This seems both less directly related to our work (because we aim to study models trained on natural data) and subtle to interpret (because retraining models introduces the possibility of run-to-run loss variation, and the measured loss differences are small). The experiments where they don't retrain models on modified data seem consistent with the induction head hypothesis.
      - listitem [ref=e4902]:
        - text: Xie et al.
        - generic [ref=e4905]: "[31]"
        - text: finds that LSTMs outperform Transformers when fit to synthetic data generated by a Hidden Markov Model (HHM) designed to isolate a particular theoretical model of in-context learning. We generally expect Transformers to outperform LSTMs at in-context learning on natural text (as seen in Kaplan et al.
        - generic [ref=e4908]: "[13]"
        - text: ), with induction heads as a major explanation. But in the case of the Xie et al. experiments (which don’t use natural text), we suspect that the structure of the synthetic data doesn't benefit from Transformers, and that LSTMs are perhaps better at simulating HMMs.
    - paragraph [ref=e4909]:
      - text: Note that we are using a broader conception of “in-context learning”, rather than something as specific as “few-shot learning”. This is in contrast with Brown et al.
      - generic [ref=e4912]: "[1]"
      - text: ", which describes that a language model “develops a broad set of skills and pattern recognition abilities. It then uses these abilities at inference time to rapidly adapt to or recognize the desired task,” with examples of tasks such as few-digit addition and typo correction. In our conception of “in-context learning”, we refer to all the ways that a model rapidly adapts to or recognizes what is going on in the context, even if “what is going on in the context” isn’t well-conceived-of as multiple “shots” of some other specific repeated task."
    - heading "Scaling Laws" [level=4] [ref=e4913]:
      - link "Scaling Laws" [ref=e4914] [cursor=pointer]:
        - /url: "#scaling-laws"
    - paragraph [ref=e4915]:
      - text: Over the last few years, the observation that machine learning models change in smooth, predictable ways described by scaling laws
      - generic [ref=e4918]: "[13]"
      - text: has emerged as a useful tool for modeling the properties of models before training them.
    - paragraph [ref=e4919]: "The relationship between scaling laws and mechanistic interpretability might be seen as analogous to the relationship between thermodynamics and the physics of individual particles. For both thermodynamics and scaling laws, even though the underlying system is very complicated, we're able to find simple relationships between the variables – for thermodynamics: entropy, temperature, volume and pressure; for neural networks: loss, compute, parameters, and data. In contrast, mechanistic interpretability studies the individual circuits underlying our models, vaguely analogous to how one might carefully study individual particles in physics. In physics, these two layers of abstraction were bridged by statistical physics."
    - paragraph [ref=e4920]: Can we bridge these two levels of abstraction in machine learning? The induction head phase change is the first time we're aware of a bridge. They give us a phenomenon at the level of macroscopic properties at loss which can be explained at the level of circuits and mechanistic interpretability.
    - paragraph [ref=e4921]:
      - text: In fact, induction heads may be able to explain previous observed exceptions to scaling laws. In our work, 1-layer transformers seem very different from deeper transformers. This was previously observed by Kaplan et al.
      - generic [ref=e4924]: "[13]"
      - text: who found that 1-layer transformers do not follow the same scaling laws as larger transformers. It seems quite plausible that the reason why the scaling laws are different for one-layer models is that they don't have induction heads.
    - figure [ref=e4925]:
      - img [ref=e4926]
    - heading "Phase Changes & Discontinuous Model Behavior" [level=4] [ref=e4927]:
      - link "Phase Changes & Discontinuous Model Behavior" [ref=e4928] [cursor=pointer]:
        - /url: "#phase-changes--discontinuous-model-behavior"
    - paragraph [ref=e4929]: "In the previous section, we discussed how scaling laws describe smooth predictable relationships between model loss and properties like scale. However, a more recent set of results have made the situation seem more subtle. While models’ losses often scale in predictable ways, there are cases where behavior is more complex:"
    - list [ref=e4930]:
      - listitem [ref=e4931]:
        - text: Brown et al.
        - generic [ref=e4934]: "[1]"
        - text: find that, while aggregate loss scales predictably with model size, models’ ability to perform specific tasks like arithmetic can change abruptly.
      - listitem [ref=e4935]:
        - text: Power et al.
        - generic [ref=e4938]: "[8]"
        - text: observe a phenomenon they call "grokking" where models discontinuously jump from random chance to perfect generalization as they train.
      - listitem [ref=e4939]:
        - text: Double Descent
        - generic [ref=e4942]: "[33]"
        - text: is a phenomenon where model performance first gets worse due to overfitting as one makes a model larger (the "classical” regime), but then gets better again past a certain point (the "modern" regime). Generalizations of double descent can occur with respect to parameter size, dataset size, or amount of training
        - generic [ref=e4945]: "[34]"
        - text: . These phenomena are not discontinuous in loss, but they are surprising trend reversals, and perhaps discontinuous in derivatives.
    - paragraph [ref=e4946]:
      - text: For more general discussion of these phase change phenomena, see a
      - link "recent blog post" [ref=e4947] [cursor=pointer]:
        - /url: https://bounded-regret.ghost.io/future-ml-systems-will-be-qualitatively-different/
      - text: by Steinhardt
      - generic [ref=e4950]: "[35]"
      - text: .
    - paragraph [ref=e4951]:
      - text: The discontinuous phase change behavior we observe with induction heads is most analogous to Power et al.
      - generic [ref=e4954]: "[8]"
      - text: "'s \"grokking\", in that it occurs over the course of training. We think our main contribution to this literature is linking the changes we observe to the formation of induction heads and a parameter-level understanding of the circuits involved. As far as we know, induction heads are the first case where a mechanistic account has been provided for a phase change in machine learning."
    - heading "Learning Dynamics" [level=4] [ref=e4955]
    - paragraph [ref=e4956]: If neural networks can genuinely be understood mechanistically, in terms of circuits, it seems like there almost has to be some way to understand the learning process in terms of the dynamics of circuits changing. Induction heads offer an interesting preliminary bridge between these topics, and are a source of optimism for such a connection. This section will briefly review some strands of work on the learning dynamics side, which seem particularly promising to think about if one wanted to pursue such a connection further.
    - paragraph [ref=e4957]:
      - text: One remarkable result in learning dynamics, by Saxe et al
      - generic [ref=e4960]: "[23]"
      - text: ", has been the discovery of closed form solutions to learning dynamics for linear neural networks without activation functions. The exciting thing about this work is that it actually provides a simple way to conceptually think about neural network learning in a simplified case. (In follow up work, Saxe et al also explore connections between this framework and models learning to represent semantic information"
      - generic [ref=e4963]: "[36]"
      - text: .) We're unable to provide a detailed review of this work here, but we note that Saxe et al's framework could naturally suggest a circuit lens for thinking about learning dynamics. Very roughly, they find that linear neural networks can be understood in terms of the evolution of independent paths through the network, with each path corresponding to a principal component of the data. These paths might be thought of as circuits.
    - paragraph [ref=e4964]:
      - text: Another interesting line of work has been the study of the geometry of neural network loss surfaces (e.g.
      - generic [ref=e4967]: "[37, 38, 39, 40]"
      - text: ). Here, our thoughts on the connection are more superficial, but it seems like there must be some way in which aspects of the loss surface connect to the formation of circuits. Very concretely, it seems like the phase change we've described in this paper must correspond to some very large feature in the loss landscape of transformers.
    - heading "Universality" [level=4] [ref=e4968]
    - paragraph [ref=e4969]:
      - text: In the context of interpretability and circuits,
      - link "\"universality\"" [ref=e4970] [cursor=pointer]:
        - /url: https://distill.pub/2020/circuits/zoom-in/#claim-3
      - generic [ref=e4973]: "[41]"
      - text: or "convergent learning"
      - generic [ref=e4976]: "[42]"
      - text: "is when multiple models develop the same features and circuits. Universality might seem like an intellectual curiosity, but the circuits thread argues that universality plays a critical role in what kind of interpretability makes sense:"
    - blockquote [ref=e4977]:
      - text: "[I]magine the study of anatomy in a world where every species of animal had a completely unrelated anatomy: would we seriously study anything other than humans and a couple domestic animals? In the same way, the universality hypothesis determines what form of circuits research makes sense. If it was true in the strongest sense, one could imagine a kind of “periodic table of visual features” which we observe and catalogue across models. On the other hand, if it was mostly false, we would need to focus on a handful of models of particular societal importance and hope they stop changing every year."
      - generic [ref=e4980]: "[41]"
    - paragraph [ref=e4981]:
      - text: Research on universality began with Li et al.
      - generic [ref=e4984]: "[42]"
      - text: who showed that many neurons are highly correlated with neurons in retrained versions of the same model. More recently, a number of papers have shown that in aggregate, neural networks develop representations with a lot of shared information (e.g.
      - generic [ref=e4987]: "[43, 44]"
      - text: ). The Circuits thread tried to extend this notion of universality from features to circuits, finding that not only do at least some families of well-characterized neurons reoccur across multiple networks of different architectures and that the same circuits
      - generic [ref=e4990]: "[41]"
      - text: ", but the same circuits appear to implement them"
      - generic [ref=e4993]: "[45]"
      - text: .
    - paragraph [ref=e4994]:
      - text: Certain kinds of universality are often implicitly assumed in the language model attention head interpretability literature. For example, it seems widely accepted that "previous token" attention heads form across many transformer language models (e.g.
      - generic [ref=e4997]: "[26, 27]"
      - text: ). The implicit hypothesis of universal attention heads – that is, attention heads with the same attention patterns in different models – isn't exactly the same thing as the kind of feature universality studied in the vision context, but is kind of analogous.
    - paragraph [ref=e4998]: "Our work in this paper has analogies to many of these strands of prior work. Like the previous attention head papers, we describe the induction head pattern as a universal attention pattern. However, our analysis of these heads’ OV and QK circuits extends this claim of universality to the circuit level, similar to the original Circuits thread. And a corollary of our analysis of the OV circuit is a claim about what feature the attention head computes (roughly: the token embedding of the token following a previous copy of the present token) which is more similar to the traditional work on universality."
    - paragraph [ref=e4999]:
      - text: Separate from all of this, it's worth mentioning that increasingly there's evidence for a particularly extreme kind of universality at the intersection of neuroscience and deep learning. Increasingly, research suggests that biological and artificial neural networks learn similar representations (e.g.
      - generic [ref=e5002]: "[46, 47, 48]"
      - text: ). In fact, Goh et al.
      - generic [ref=e5005]: "[49]"
      - text: find that multimodal "concept" neurons found in humans (such as the famous "Jennifer Anniston neuron") occur in neural networks.
    - heading "Attention Patterns in Translation-like Tasks" [level=4] [ref=e5006]
    - paragraph [ref=e5007]:
      - text: In
      - link "Argument 4" [ref=e5008] [cursor=pointer]:
        - /url: "#argument-induction-heads-can-implement-abstract-behaviors"
      - text: ", we saw an induction head that helps implement translation. Although we're not aware of anything quite so general in the prior literature, there are reports of attention patterns which, in retrospect, seem somewhat similar. Often, in translation-like tasks, we see attention attend to the token which is about to be translated. We see this in literal translation (e.g."
      - generic [ref=e5011]: "[50]"
      - text: ) and also in voice recognition (e.g.
      - generic [ref=e5014]: "[51]"
      - text: where the model attends to the portion of the audio about to be transcribed). Visualizations of this in the encoder-decoder context often slightly obscure the induction-like nature of the attention patterns, because the decoder is visualized in terms of the output tokens predicted per time step rather than its input tokens.
