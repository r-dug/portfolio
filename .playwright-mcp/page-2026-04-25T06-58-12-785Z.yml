  - generic [ref=e50]:
    - paragraph [ref=e51]:
      - text: As Transformer generative models continue to scale and gain increasing real world use
      - generic [ref=e54]: "[1, 2, 3, 4, 5]"
      - text: ", addressing their associated safety problems becomes increasingly important. Mechanistic interpretability – attempting to reverse engineer the detailed computations performed by the model – offers one possible avenue for addressing these safety issues. If we can understand the internal structures that cause Transformer models to produce the outputs they do, then we may be able to address current safety problems more systematically, as well as anticipating safety problems in future more powerful models."
      - superscript [ref=e56]: "1"
    - paragraph [ref=e57]:
      - text: In the past, mechanistic interpretability has largely focused on CNN vision models
      - generic [ref=e60]: "[6]"
      - text: ", but recently, we"
      - link "presented" [ref=e61] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html
      - text: some very preliminary progress on mechanistic interpretability for Transformer language models
      - generic [ref=e64]: "[7]"
      - text: . Specifically, in our prior work we developed a mathematical framework for decomposing the operations of transformers, which allowed us to make sense of small (1 and 2 layer attention-only) models and give a near-complete account of how they function. Perhaps the most interesting finding was the induction head, a circuit whose function is to look back over the sequence for previous instances of the current token (call it
      - code [ref=e65]: A
      - text: ), find the token that came after it last time (call it
      - code [ref=e66]: B
      - text: ), and then predict that the same completion will occur again (e.g. forming the sequence
      - code [ref=e67]: "[A][B] … [A] → [B]"
      - text: "). In other words, induction heads “complete the pattern” by copying and completing sequences that have occurred before. Mechanically, induction heads in our models are implemented by a circuit of two attention heads: the first head is a “previous token head” which copies information from the previous token into the next token, while the second head (the actual “induction head”) uses that information to find tokens preceded by the present token. For 2-layer attention-only models,"
      - superscript [ref=e68]: "2"
      - text: we were able to show precisely that induction heads implement this pattern copying behavior and appear to be the primary source of in-context learning.
    - paragraph [ref=e69]: "Ultimately, however, our goal is to reverse-engineer frontier language models (which often contain hundreds of layers and billions or trillions of parameters), not merely 2-layer attention-only models. Unfortunately, both the presence of many layers, and the presence of MLPs, makes it much more difficult to mathematically pin down the precise circuitry of these models. However, a different approach is possible: by empirically observing, perturbing, and studying the learning process and the formation of various structures, we can try to assemble an indirect case for what might be happening mechanistically inside the network. This is somewhat similar to how a neuroscientist might gain understanding of how part of the brain functions by looking at neural development over time, studying patients with an injury to that part of the brain, perturbing brain function in animals, or looking at a select small number of relevant neurons."
    - paragraph [ref=e70]:
      - text: "In this paper, we take the first preliminary steps towards building such an indirect case. In particular, we present preliminary and indirect evidence for a tantalizing hypothesis: that induction heads might constitute the mechanism for the actual majority of all in-context learning in large transformer models. Specifically, the thesis is that there are circuits which have the same or similar mechanism to the 2-layer induction heads and which perform a “fuzzy” or “nearest neighbor” version of pattern completion, completing"
      - code [ref=e71]: "[A*][B*] … [A] → [B]"
      - text: ", where"
      - code [ref=e72]: A* ≈ A
      - text: and
      - code [ref=e73]: B* ≈ B
      - text: are similar in some space; and furthermore, that these circuits implement most in-context learning in large models.
    - paragraph [ref=e74]: The primary way in which we obtain this evidence is via discovery and study of a phase change that occurs early in training for language models of every size (provided they have more than one layer), and which is visible as a bump in the training loss. During this phase change, the majority of in-context learning ability (as measured by difference in loss between tokens early and late in the sequence) is acquired, and simultaneously induction heads form within the model that are capable of implementing fairly abstract and fuzzy versions of pattern completion. We study this connection in detail to try to establish that it is causal, including showing that if we perturb the transformer architecture in a way that causes the induction bump to occur in a different place in training, then the formation of induction heads as well as formation of in-context learning simultaneously move along with it.
    - paragraph [ref=e75]: "Specifically, the paper presents six complementary lines of evidence arguing that induction heads may be the mechanistic source of general in-context learning in transformer models of any size:"
    - list [ref=e77]:
      - listitem [ref=e78]:
        - link "Argument 1" [ref=e79] [cursor=pointer]:
          - /url: "#argument-phase-change"
        - text: "(Macroscopic co-occurence): Transformer language models undergo a “phase change” early in training, during which induction heads form and simultaneously in-context learning improves dramatically."
      - listitem [ref=e80]:
        - link "Argument 2" [ref=e81] [cursor=pointer]:
          - /url: "#argument-architectural-requirements"
        - text: "(Macroscopic co-perturbation): When we change the transformer architecture in a way that shifts whether induction heads can form (and when), the dramatic improvement in in-context learning shifts in a precisely matching way."
      - listitem [ref=e82]:
        - link "Argument 3" [ref=e83] [cursor=pointer]:
          - /url: "#argument-ablations"
        - text: "(Direct ablation): When we directly “knock out” induction heads at test-time in small models, the amount of in-context learning greatly decreases."
      - listitem [ref=e84]:
        - link "Argument 4" [ref=e85] [cursor=pointer]:
          - /url: "#argument-induction-heads-can-implement-abstract-behaviors"
        - text: "(Specific examples of induction head generality): Although we define induction heads very narrowly in terms of copying literal sequences, we empirically observe that these same heads also appear to implement more sophisticated types of in-context learning, including highly abstract behaviors, making it plausible they explain a large fraction of in-context learning."
      - listitem [ref=e86]:
        - link "Argument 5" [ref=e87] [cursor=pointer]:
          - /url: "#argument-induction-head-mechanism"
        - text: "(Mechanistic plausibility of induction head generality): For small models, we can explain mechanistically how induction heads work, and can show they contribute to in-context learning. Furthermore, the actual mechanism of operation suggests natural ways in which it could be re-purposed to perform more general in-context learning."
      - listitem [ref=e88]:
        - link "Argument 6" [ref=e89] [cursor=pointer]:
          - /url: "#argument-extrapolation"
        - text: "(Continuity from small to large models): In the previous 5 arguments, the case for induction heads explaining in-context learning is stronger for small models than for large ones. However, many behaviors and data related to both induction heads and in-context learning are smoothly continuous from small to large models, suggesting the simplest explanation is that mechanisms are the same."
    - paragraph [ref=e90]: Together the claims establish a circumstantial case that induction heads might be responsible for the majority of in-context learning in state-of-the-art transformer models. We emphasize that our results here are only the beginnings of evidence for such a case, and that like any empirical or interventional study, a large number of subtle confounds or alternative hypotheses are possible – which we discuss in the relevant sections. But we considered these results worth reporting, both because future work could build on our results to establish the claim more firmly, and because this kind of indirect evidence is likely to be common in interpretability as it advances, so we’d like to establish a norm of reporting it even when it is not fully conclusive.
    - paragraph [ref=e91]:
      - text: Finally, in addition to being instrumental for tying induction heads to in-context learning, the phase change may have relevance to safety in its own right. Neural network capabilities — such as multi-digit addition — are known to sometimes abruptly form or change as models train or increase in scale
      - generic [ref=e94]: "[8, 1]"
      - text: ", and are of particular concern for safety as they mean that undesired or dangerous behavior could emerge abruptly. For example reward hacking, a type of safety problem, can emerge in such a phase change"
      - generic [ref=e97]: "[9]"
      - text: . Thus, studying a phase change “up close” and better understanding its internal mechanics could contain generalizable lessons for addressing safety problems in future systems. In particular, the phase change we observe forms an interesting potential bridge between the microscopic domain of interpretability and the macroscopic domain of scaling laws and learning dynamics.
    - paragraph [ref=e98]:
      - text: The rest of the paper is organized as follows. We start by clarifying several key concepts and definitions, including in-context learning, induction heads, and a “per-token loss analysis” method we use throughout. We then present the 6 arguments one by one, drawing on evidence from analysis of 34 transformers over the course of training, including more than 50,000 attention head ablations (the data of which is shown in the
      - link "Model Analysis Table" [ref=e99] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: ). We then discuss some unexplained “curiosities” in our findings, as well as reviewing related work.
    - separator [ref=e100]
    - heading "Key Concepts" [level=2] [ref=e101]:
      - link "Key Concepts" [ref=e102] [cursor=pointer]:
        - /url: "#key-concepts"
    - heading "In-context Learning" [level=3] [ref=e103]:
      - link "In-context Learning" [ref=e104] [cursor=pointer]:
        - /url: "#in-context-learning-key-concept"
    - paragraph [ref=e105]:
      - text: In modern language models, tokens later in the context are easier to predict than tokens earlier in the context. As the context gets longer, loss goes down. In some sense this is just what a sequence model is designed to do (use earlier elements in the sequence to predict later ones), but as the ability to predict later tokens from earlier ones gets better, it can increasingly be used in interesting ways (such as specifying tasks, giving instructions, or asking the model to match a pattern) that suggest it can usefully be thought of as a phenomenon of its own. When thought of in this way, it is usually referred to as in-context learning.
      - superscript [ref=e107]: "3"
    - paragraph [ref=e108]:
      - text: Emergent in-context learning was noted in GPT-2
      - generic [ref=e111]: "[10]"
      - text: and gained significant attention in GPT-3
      - generic [ref=e114]: "[1]"
      - text: . Simply by adjusting a “prompt”, transformers can be adapted to do many useful things without re-training, such as translation, question-answering, arithmetic, and many other tasks. Using “prompt engineering” to leverage in-context learning became a popular topic of study and discussion
      - generic [ref=e117]: "[11, 12]"
      - text: .
    - paragraph [ref=e118]:
      - text: At least two importantly different ways of conceptualizing and measuring in-context learning exist in the literature. The first conception, represented in Brown et al., focuses on few-shot learning
      - generic [ref=e121]: "[1]"
      - text: of specific tasks. The model is prompted with several instances of some “task” framed in a next-token-prediction format (such as few-digit addition, or English-to-French translation). The second conception of in-context learning, represented in Kaplan et al.
      - generic [ref=e124]: "[13]"
      - text: ", focuses on observing the loss at different token indices, in order to measure how much better the model gets at prediction as it receives more context. The first conception can be thought of as a micro perspective (focusing on specific tasks), where as the second conception can be seen as a macro perspective (focusing on general loss, which on average correlates with these tasks)."
    - paragraph [ref=e125]: The “few-shot learning” conception of in-context learning has tended to receive greater community attention. The ability to do many different tasks with one large model, even without further fine-tuning, is a notable change to the basic economics of model training. Moreover, it gives evidence of wide-ranging general capabilities and the ability to adapt on the fly, which nudges us to re-examine what it means for a model to “understand” or to “reason”.
    - paragraph [ref=e126]:
      - text: "However, for the purposes of this work, we focus instead on the Kaplan et al. conception: decreasing loss at increasing token indices. We do so because it's a more general framing of the phenomenon than “few-shot learning”. A drawback of this definition is it fails to isolate specific behaviors of interest. At the same time, it allows us to measure models’ overall ability to learn on-the-fly from the context, without depending on our specific choices of “task”. We’ll also see that, starting from this definition, we are also able to study a couple classic few-shot learning examples (see"
      - link "Argument 4" [ref=e127] [cursor=pointer]:
        - /url: "#argument-induction-heads-can-implement-abstract-behaviors"
      - text: ).
    - paragraph [ref=e128]: "Throughout this work we compute a simple heuristic measure of in-context learning:"
    - list [ref=e129]:
      - listitem [ref=e130]: "In-context learning score: the loss of the 500th token in the context minus the average loss of the 50th token in the context, averaged over dataset examples."
    - paragraph [ref=e131]: We chose the 500th and 50th token indices somewhat arbitrarily. The 500th token is near the end of a length-512 context, and the 50th token is far enough into the context that some basic properties of the text have been established (such as language and document type) while still being near the start. We will also show that picking different numbers here does not change our conclusions.
    - paragraph [ref=e132]:
      - text: Finally, it is worth noting that in-context learning is of potentially special relevance to safety. In-context learning makes it harder to anticipate how a model might behave after a long context. In the longer run, concepts such as mesa-optimization or inner-alignment
      - generic [ref=e135]: "[14]"
      - text: postulate that meaningful learning or optimization could occur at test time (without changing the weights). In-context learning would be an obvious future mechanism for such hidden optimization to occur, whether or not it does so today. Thus, studying in-context learning seems valuable for the future.
    - paragraph [ref=e136]:
      - text: (See
      - link "Related Work" [ref=e137] [cursor=pointer]:
        - /url: "#in-context-learning-related-work"
      - text: for more on in-context learning, and
      - link "Discussion" [ref=e138] [cursor=pointer]:
        - /url: "#safety-implications"
      - text: for more on the connection to safety.)
    - heading "Induction Heads" [level=3] [ref=e139]:
      - link "Induction Heads" [ref=e140] [cursor=pointer]:
        - /url: "#definition-of-induction-heads"
    - paragraph [ref=e141]:
      - text: In our
      - link "previous paper" [ref=e142] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html
      - text: ", we discovered a special kind of attention head – which we named induction heads – in two layer attention-only models. Induction heads are implemented by a circuit consisting of a pair of attention heads in different layers that work together to copy or complete patterns. The first attention head copies information from the previous token into each token. This makes it possible for the second attention head to attend to tokens based on what happened before them, rather than their own content. Specifically, the second head (which we call the \"induction head\") search for a previous place in the sequence where the present token"
      - code [ref=e143]: A
      - text: occurred and attends to the next token (call it
      - code [ref=e144]: B
      - text: ), copying it and causing the model to be more likely to output
      - code [ref=e145]: B
      - text: as the next token. That is, the two heads working together cause the sequence
      - code [ref=e146]: …[A][B]…[A]
      - text: to be more likely to be completed with
      - code [ref=e147]: "[B]"
      - text: .
    - paragraph [ref=e148]:
      - text: Induction heads are named by analogy to inductive reasoning. In inductive reasoning, we might infer that if
      - code [ref=e149]: A
      - text: is followed by
      - code [ref=e150]: B
      - text: earlier in the context,
      - code [ref=e151]: A
      - text: is more likely to be followed by
      - code [ref=e152]: B
      - text: again later in the same context. Induction heads crystallize that inference. They search the context for previous instances of the present token, attend to the token which would come next if the pattern repeated, and increase its probability. Induction heads attend to tokens that would be predicted by basic induction (over the context, rather than over the training data).
    - paragraph [ref=e153]:
      - text: Notice that induction heads are implementing a simple algorithm, and are not memorizing a fixed table of n-gram statistics. The rule
      - code [ref=e154]: "[A][B] … [A] → [B]"
      - text: applies regardless of what
      - code [ref=e155]: A
      - text: and
      - code [ref=e156]: B
      - text: are.
      - superscript [ref=e158]: "4"
      - text: This means that induction heads can in some sense work out of distribution, as long as local statistics early in the context are representative of statistics later. This hints that they may be capable of more general and abstract behavior.
    - paragraph [ref=e159]: "Our previous paper focused on a few explorations of induction heads, including showing that these heads occur in 2-layer attention-only models (but not 1-layer models); tracking down how they operate mechanistically as part of our mathematical decomposition of transformers; and making an eigenvalue-based test for detecting their presence. However, we were a bit vague on the exact definition of induction heads: it was more like we found a cluster of behaviors and mechanisms that tended to occur together, and called heads in that cluster “induction heads”."
    - paragraph [ref=e160]:
      - text: "In this paper our goal is to provide evidence for something more expansive: that induction heads play a major role in general in-context learning (not just literal"
      - code [ref=e161]: "[A][B]...[A]→[B]"
      - text: copying), for large models and not just for small 2-layer attention only models. To do this clearly and coherently, we need a more precise definition of induction heads. Mechanistic analysis of weights and eigenvalue analysis are much more complicated in large models with MLP’s, so for this paper we choose to define induction heads by their narrow empirical sequence copying behavior (the
      - code [ref=e162]: "[A][B]...[A]→[B]"
      - text: ), and then attempt to show that they (1) also serve a more expansive function that can be tied to in-context learning, and (2) coincide with the mechanistic picture for small models.
    - paragraph [ref=e163]:
      - text: Formally, we define an induction head as one which exhibits the following two properties
      - superscript [ref=e164]: "5"
      - text: on a repeated random sequence
      - superscript [ref=e165]: "6"
      - text: "of tokens:"
    - list [ref=e166]:
      - listitem [ref=e167]:
        - text: "Prefix matching: The head attends back to previous tokens that were followed by the current and/or recent tokens."
        - superscript [ref=e168]: "7"
        - text: That is, it attends to the token which induction would suggest comes next.
      - listitem [ref=e169]: "Copying: The head’s output increases the logit corresponding to the attended-to token."
    - paragraph [ref=e170]:
      - text: In other words, induction heads are any heads that empirically increase the likelihood of
      - code [ref=e171]: "[B]"
      - text: given
      - code [ref=e172]: "[A][B]...[A]"
      - text: "when shown a repeated sequence of completely random tokens. An illustration of induction heads’ behavior is shown here:"
    - figure [ref=e173]:
      - img [ref=e174]
    - paragraph [ref=e175]: "Note that, as a consequence, induction heads will tend to be good at repeating sequences wholesale. For example, given “The cat sat on the mat. The cat …”, induction heads will promote the continuation “sat on the mat”. This gives a first hint of how they might be connected to general in-context learning and even few-shot learning: they learn to repeat arbitrary sequences, which is a (simple) form of few-shot learning."
    - paragraph [ref=e176]:
      - text: One of things we’ll be trying to establish is that when induction heads occur in sufficiently large models and operate on sufficiently abstract representations, the very same heads that do this sequence copying also take on a more expanded role of analogical sequence copying or in-context nearest neighbors. By this we mean that they promote sequence completions like
      - code [ref=e177]: "[A*][B*] … [A] → [B]"
      - text: where
      - code [ref=e178]: A*
      - text: is not exactly the same token as
      - code [ref=e179]: A
      - text: but similar in some embedding space, and also
      - code [ref=e180]: B
      - text: is not exactly the same token as
      - code [ref=e181]: B*
      - text: . For example,
      - code [ref=e182]: A
      - text: and
      - code [ref=e183]: A*
      - text: (as well as B and
      - code [ref=e184]: B*
      - text: ) might be the same word in different languages, and the induction head can then translate a sentence word by word by looking for “something like
      - code [ref=e185]: A
      - text: ”, finding
      - code [ref=e186]: A*
      - text: followed by
      - code [ref=e187]: B*
      - text: ", and then completing with “something like"
      - code [ref=e188]: B*
      - text: ” (which is
      - code [ref=e189]: B
      - text: ). We are not yet able to prove mechanistically that induction heads do this in general, but in
      - link "Argument 4" [ref=e190] [cursor=pointer]:
        - /url: "#argument-induction-heads-can-implement-abstract-behaviors"
      - text: we show empirical examples of induction heads behaving in this way (including on translation), and in
      - link "Argument 5" [ref=e191] [cursor=pointer]:
        - /url: "#argument-induction-head-mechanism"
      - text: we point out that the known copying mechanism of induction heads in small models can be naturally adapted to function in this way.
    - heading "Per-Token Loss Analysis" [level=3] [ref=e192]:
      - link "Per-Token Loss Analysis" [ref=e193] [cursor=pointer]:
        - /url: "#per-token-loss-intro"
    - paragraph [ref=e194]:
      - text: To better understand how models evolve during training, we analyze what we call the "per-token loss vectors." The core idea traces back to a method used by Erhan et al.
      - generic [ref=e197]: "[15]"
      - text: ", and more generally to the idea of \"function spaces\" in mathematics."
      - superscript [ref=e198]: "8"
    - paragraph [ref=e199]: "We start with a collection of models. (In our use, we'll train several different model architectures, saving dozens of “snapshots” of each over the course of training. We’ll use this set of snapshots as our collection of models.) Next, we collect the log-likelihoods each model assigns to a consistent set of 10,000 random tokens, each taken from a different example sequence. We combine these log-likelihoods into a \"per-token loss vector\" and apply Principal Component Analysis (PCA):"
    - figure [ref=e200]:
      - img [ref=e201]
    - paragraph [ref=e202]:
      - text: A more detailed discussion of technical details can be found in the
      - link "Appendix" [ref=e203] [cursor=pointer]:
        - /url: "#per-token-losses"
      - text: .
    - paragraph [ref=e204]: By applying this method to snapshots over training for multiple models, we can visualize and compare how different models' training trajectories evolve in terms of their outputs. Since we're using PCA, each direction can be thought of as a vector of log-likelihoods that models are moving along. We particularly focus on the first two principal components, since we can easily visualize those. Of course, models also move in directions not captured by the first two principal components, but it's a useful visualization for capturing the highest-level story of training.
    - separator [ref=e205]
    - heading "Arguments that induction heads are the mechanism for the majority of in-context learning." [level=2] [ref=e206]:
      - link "Arguments that induction heads are the mechanism for the majority of in-context learning." [ref=e207] [cursor=pointer]:
        - /url: "#toc-arguments"
    - paragraph [ref=e208]: Now we’ll proceed to the main part of the paper, which makes the case that induction heads may provide the primary mechanism for the majority of in-context learning for transformer models in general. As stated in the introduction, this is a very broad hypothesis and much of our evidence is indirect, but nevertheless we believe that all the lines of evidence together make a relatively strong, though not conclusive, case.
    - paragraph [ref=e209]:
      - text: Before we go through the arguments, it’s useful to delineate where the evidence is more conclusive vs. less conclusive. This is shown in the table below. For small, attention-only models, we believe we have strong evidence that attention heads are the mechanism for the majority of in-context learning, as we have evidence supported by ablations and mechanistic reverse engineering. Conversely, for all models, we can make a strong case that induction heads play some role in in-context learning, as we can demonstrate examples and show suggestive correlations. However, the larger the models get, the harder it is to establish that induction heads account for the actual majority of in-context learning. For large models with MLP’s, we must therefore rely on mainly correlational evidence, which could be confounded. We explore alternate hypotheses throughout, including at the end of
      - link "Argument 1" [ref=e210] [cursor=pointer]:
        - /url: "#assessing-the-evidence"
      - text: and again briefly in
      - link "Argument 6" [ref=e211] [cursor=pointer]:
        - /url: "#argument-extrapolation"
      - text: .
