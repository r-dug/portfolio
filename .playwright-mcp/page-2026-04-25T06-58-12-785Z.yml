      - text: Recall from
      - link "Key Concepts" [ref=e1400] [cursor=pointer]:
        - /url: "#definition-of-induction-heads"
      - text: that induction heads are defined as heads that exhibit both copying and prefix matching.
    - paragraph [ref=e1401]:
      - text: Copying is done by the OV ("Output-Value") circuit. One of the defining properties of an induction head is that it copies. Induction heads are not alone in this! Transformers seem to have quite a number of
