    - paragraph [ref=e570]: All of our previous evidence (in Arguments 1-3) focused on observing or perturbing the connection between induction head formation and macroscopic in-context learning. A totally different angle is to just find examples of induction heads implementing seemingly-difficult in-context learning behaviors; this would make it plausible that induction heads account for the majority of in-context learning. This evidence applies even to the very largest models (and we study up to 12B parameter models), but since it shows only a small number of tasks, it’s only suggestive regarding in-context learning in general.
    - paragraph [ref=e571]:
      - text: Recall that we
      - link "define" [ref=e572] [cursor=pointer]:
        - /url: "#definition-of-induction-heads"
      - text: induction heads as heads that empirically copy arbitrary token sequences using a “prefix matching” attention pattern. Our goal is to find heads that meet this definition but also perform more interesting and sophisticated behaviors, essentially showing that induction heads in large models can be “generalizable”.
    - paragraph [ref=e573]:
      - text: In this argument, we show some anecdotal examples of induction heads from larger transformers (
      - link "our 40-layer model" [ref=e574] [cursor=pointer]:
        - /url: "#full-scale-models"
      - text: with 13 billion parameters) that exhibit exactly such behaviors – namely literal copying, translation, and a specific type of abstract pattern matching. The behaviors are all of the form
      - code [ref=e575]: "[A*][B*]...[A][B]"
      - text: ", aka the “fuzzy nearest neighbor match” or “find something similar early in the sequence and complete the sequence in analogy”. We verify that these heads score highly on our"
      - link "“copying” and “prefix matching” evaluations" [ref=e576] [cursor=pointer]:
        - /url: "#head-activation-evaluators"
      - text: (that is, they increase the probability of the token they attend to, and attend to tokens where the prefix matches the present token on random text), and are thus “induction heads” by our strict empirical
      - link "definition" [ref=e577] [cursor=pointer]:
        - /url: "#definition-of-induction-heads"
      - text: ", at the same time as they also perform these more sophisticated tasks."
