    - paragraph [ref=e226]: "Here is the list of arguments we’ll be making, one per section, repeated from the introduction:"
    - list [ref=e228]:
      - listitem [ref=e229]:
        - link "Argument 1" [ref=e230] [cursor=pointer]:
          - /url: "#argument-phase-change"
        - text: "(Macroscopic co-occurrence): Transformer language models undergo a “phase change” early in training, during which induction heads form and simultaneously in-context learning improves dramatically."
      - listitem [ref=e231]:
        - link "Argument 2" [ref=e232] [cursor=pointer]:
          - /url: "#argument-architectural-requirements"
        - text: "(Macroscopic co-perturbation): When we change the transformer architecture in a way that shifts whether induction heads can form (and when), the dramatic improvement in in-context learning shifts in a precisely matching way."
      - listitem [ref=e233]:
        - link "Argument 3" [ref=e234] [cursor=pointer]:
          - /url: "#argument-ablations"
        - text: "(Direct ablation): When we directly “knock out” induction heads at test-time in small models, the amount of in-context learning greatly decreases."
      - listitem [ref=e235]:
        - link "Argument 4" [ref=e236] [cursor=pointer]:
          - /url: "#argument-induction-heads-can-implement-abstract-behaviors"
        - text: "(Specific examples of induction head generality): Although we define induction heads very narrowly in terms of copying literal sequences, we empirically observe that these same heads also appear to implement more sophisticated types of in-context learning, including highly abstract behaviors, making it plausible they explain a large fraction of in-context learning."
      - listitem [ref=e237]:
        - link "Argument 5" [ref=e238] [cursor=pointer]:
          - /url: "#argument-induction-head-mechanism"
        - text: "(Mechanistic plausibility of induction head generality): For small models, we can explain mechanistically how induction heads work, and can show they contribute to in-context learning. Furthermore, the actual mechanism of operation suggests natural ways in which it could be repurposed to perform more general in-context learning."
      - listitem [ref=e239]:
        - link "Argument 6" [ref=e240] [cursor=pointer]:
          - /url: "#argument-extrapolation"
        - text: "(Continuity from small to large models): In the previous 5 arguments, the case for induction heads explaining in-context learning is stronger for small models than for large ones. However, many behaviors and data related to both induction heads and in-context learning are smoothly continuous from small to large models, suggesting the simplest explanation is that mechanisms are the same."
    - paragraph [ref=e241]: For each argument, we’ll have a similar table to the one in this section, showing the strength of the evidence provided by that claim as it applies to large/small models and some/most of context learning. The table above is the sum of the evidence from all six lines of reasoning.
    - separator [ref=e242]
    - 'heading "Argument 1: Transformer language models undergo a “phase change” during training, during which induction heads form and simultaneously in-context learning improves dramatically." [level=2] [ref=e243]':
      - 'link "Argument 1: Transformer language models undergo a “phase change” during training, during which induction heads form and simultaneously in-context learning improves dramatically." [ref=e244] [cursor=pointer]':
        - /url: "#argument-phase-change"
    - paragraph [ref=e245]:
      - text: Our first line of evidence comes from correlating measures of in-context learning and measures of induction head presence over the course of training. Specifically, we observe a tight co-variation between them across dozens of models, of different sizes, trained on different datasets (See
      - link "Model Analysis Table" [ref=e246] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: for more on the models in which we observe this co-occurrence.).
    - paragraph [ref=e247]: "The table below summarizes the quality of this evidence for the models we have studied: it applies to both large and small models, and is the expected outcome if induction heads were responsible for the majority of in-context learning, but it is only correlational and so could be confounded (discussed more below)."
    - generic [ref=e248]:
      - generic [ref=e249]: Strength of Argument for Sub-Claims
      - generic [ref=e251]: Small Attention-Only
      - generic [ref=e252]: Small with MLPs
      - generic [ref=e253]: Large Models
      - generic [ref=e254]: Contributes Some
      - generic [ref=e255]: Medium, Correlational
      - generic [ref=e256]: Medium, Correlational
      - generic [ref=e257]: Medium, Correlational
      - generic [ref=e258]: Contributes Majority
      - generic [ref=e259]: Medium, Correlational
      - generic [ref=e260]: Medium, Correlational
      - generic [ref=e261]: Medium, Correlational
    - paragraph [ref=e262]:
      - text: Our first observation is that if we measure in-context learning for transformer models over the course of training (defined as the 50th token loss minus the 500th token loss as described in
      - link "Key Concepts" [ref=e263] [cursor=pointer]:
        - /url: "#in-context-learning-key-concept"
      - text: ), it develops abruptly in a narrow window early in training (roughly 2.5 to 5 billion tokens) and then is constant for the rest of training (see figure below). Before this window there is less than 0.15 nats of in-context learning, after it there is roughly 0.4 nats, an amount that remains constant for the rest of training and is also constant across many different model sizes (except for the one layer model where not much in-context learning ever forms). This seems surprising – naively, one might expect in-context learning to improve gradually over training, and improve with larger model sizes,
      - superscript [ref=e265]: "9"
      - text: as most things in machine learning do.
    - figure [ref=e266]:
      - img [ref=e267]
    - paragraph [ref=e268]:
      - text: "Although we only show three models above, the pattern holds true very generally: many examples are shown in the"
      - link "Model Analysis Table" [ref=e269] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: later in the paper, including models of varying model architecture and size.
    - paragraph [ref=e270]:
      - text: One might wonder if the sudden increase is somehow an artifact of the choice to define in-context learning in terms of the difference between the 500th and 50th tokens. We'll discuss this in more depth
      - link "later" [ref=e271] [cursor=pointer]:
        - /url: "#seemingly-constant"
      - text: . But for now, an easy way to see that this is a robust phenomenon is to look at the derivative of loss with respect to the logarithm token index in context. You can think of this as measuring something like "in-context learning per ε% increase in context length." We can visualize this on a 2D plot, where one axis is the amount of training that has elapsed, the other is the token index being predicted. Before the phase change, loss largely stops improving around token 50, but after the phase change, loss continues to improve past that point.
    - figure [ref=e272]:
      - img [ref=e273]
    - paragraph [ref=e274]:
      - text: It turns out that a sudden improvement in in-context learning isn't the only thing that changes in this window. If we go through the attention heads of a model and and score them for whether they are induction heads (using a prefix matching score which measures their ability to perform the task we used to define induction heads in
      - link "Key Concepts" [ref=e275] [cursor=pointer]:
        - /url: "#definition-of-induction-heads"
      - text: ), we find that induction heads form abruptly during exactly the same window where in-context learning develops (figure below). Again we show only a few models here, but a full set is shown in the
      - link "Model Analysis Table" [ref=e276] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: . The exception is the one-layer model, where induction heads never form – just as in-context learning never substantially develops for the one-layer model.
    - figure [ref=e277]:
      - img [ref=e278]
    - paragraph [ref=e279]: "This already strongly suggests some connection between induction heads and in-context learning, but beyond just that, it appears this window is a pivotal point for the training process in general: whatever's occurring is visible as a bump on the training curve (figure below). It is in fact the only place in training where the loss is not convex (monotonically decreasing in slope)."
    - paragraph [ref=e280]: That might not sound significant, but the loss curve is averaging over many thousands of tokens. Many behaviors people find interesting in language models, such as the emergence of arithmetic, would be microscopic on the loss curve. For something to be visible at that scale suggests it's a widespread, major change in model behavior. This shift also appears to be the first point where, at least for small models, the loss curve diverges from a one-layer model – which does not display the bump, just as it does not display the other abrupt changes.
    - figure [ref=e281]:
      - img [ref=e282]
    - paragraph [ref=e283]:
      - text: We can also apply principal components analysis (PCA) to the per-token losses, as described in
      - link "per-token-loss analysis" [ref=e284] [cursor=pointer]:
        - /url: "#per-token-loss-intro"
      - text: ", which allows us to summarize the main dimensions of variation in how several models' predictions vary over the course of training."
    - paragraph [ref=e285]: Below we show the first two principal components of these models’ predictions, with the golden outline highlighting the same interval shown above, when in-context learning abruptly improved. We see that the training trajectories pivot during exactly the same window where the other changes happen. In some sense, whatever is occurring when in-context learning improves is the primary deviation from the basic trajectory our transformers follow during the course of their training. Once again the only exception is the one-layer model – where induction heads cannot form and in-context learning does not improve.
    - figure [ref=e286]:
      - img [ref=e287]
    - paragraph [ref=e288]: "In summary, the following things all co-occur during the same abrupt window:"
    - list [ref=e289]:
      - listitem [ref=e290]:
        - text: Capacity for in-context learning sharply improves (as measured via the
        - link "in-context learning score" [ref=e291] [cursor=pointer]:
          - /url: "#in-context-learning-key-concept"
        - text: ).
      - listitem [ref=e292]: Induction heads form.
      - listitem [ref=e293]: Loss undergoes a small “bump” (that is, the loss curve undergoes a period of visibly steeper improvement than the parts of the curve before and after).
      - listitem [ref=e294]: The model’s trajectory abruptly changes (in the space of per-token losses, as visualized with PCA).
    - paragraph [ref=e295]:
      - text: Collectively these results suggest that some important transition is happening during the 2.5e9 to 5e9 token window early in training (for large models this is maybe 1-2% of the way through training). We call this transition “the phase change”, in that it’s an abrupt change that alters the model’s behavior and has both macroscopic (loss and in-context learning curves) and microscopic (induction heads) manifestations, perhaps analogous to e.g. ice melting.
      - superscript [ref=e297]: "10"
    - heading "Looking at the Phase Change More Closely" [level=3] [ref=e298]:
      - link "Looking at the Phase Change More Closely" [ref=e299] [cursor=pointer]:
        - /url: "#phase-change-more-closely"
    - paragraph [ref=e300]:
      - text: "A natural explanation would be that for all these models, the induction heads implement in-context learning: their formation is what drives all the other changes observed. To strengthen this hypothesis a bit, we check a few things. First, the window where the phase change happens doesn’t appear to correspond to a scheduled change in learning rate, warmup, or weight decay; there is not some known exogenous factor precipitating everything. Second, we tried out training some of the small models on a different dataset, and we observed the phase change develop in the same way (see"
      - link "Model Analysis Table" [ref=e301] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: for more details).
      - superscript [ref=e302]: "11"
    - paragraph [ref=e303]: Third, to strengthen the connection a little more, we look qualitatively and anecdotally at what’s going on with the model’s behavior during the phase change. One way to do this is to look at specific tokens the model gets better and worse at predicting. The model's loss is an average of billions of log-likelihood losses for individual tokens. By pulling them apart, we can get a sense for what's changed.
    - paragraph [ref=e304]:
      - text: Concretely, let's pick a piece of text – for fun, we'll use the first paragraph of Harry Potter – and look at the differences in log-likelihoods comparing the start and the end of the phase change.
      - superscript [ref=e306]: "12"
      - text: "We'll notice that the majority of the changes occur when tokens are repeated multiple times in the text. If a sequence of tokens occurs multiple times, the model is better at predicting the sequence the second time it shows up. On the other hand, if a token is followed by a different token than it previously was, the post-phase-change model is worse at predicting it:"
    - figure [ref=e307]:
      - img [ref=e308]
    - paragraph [ref=e309]: We can also do this same analysis over the course of model training. The loss curve is the average of millions of per-token loss curves. We can break this apart and look at the loss curves for individual tokens.
    - paragraph [ref=e310]: "In particular, let’s take a look at per-token loss trajectories for two tokens in the first paragraph of Harry Potter. In red, we show a token whose prediction gets dramatically better during the phase change: it’s the last of four tokens in “ The Dursleys”, a sequence that appears several times in the text. In blue, we show a token that gets meaningfully worse during the phase change: it’s the first-ever appearance of “ Mrs Potter”, after both previous instances of “ Mrs” were followed by “ Dursley” instead."
    - figure [ref=e311]:
      - img [ref=e312]
    - paragraph [ref=e313]: All of this shows that during the phase change, we see exactly the behaviors we’d expect to see if induction heads were indeed contributing the majority of in-context learning.
    - heading "Assessing the Evidence" [level=3] [ref=e314]:
      - link "Assessing the Evidence" [ref=e315] [cursor=pointer]:
        - /url: "#assessing-the-evidence"
    - paragraph [ref=e316]:
      - text: Despite all of the co-occurrence evidence above (and more in the
      - link "Model Analysis Table" [ref=e317] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: "), the fact remains that we haven’t shown that induction heads are the primary mechanism for in-context learning. We have merely shown that induction heads form at the same time as in-context learning, and that in-context learning does not improve thereafter. There are a number of potential confounds in this story. Below we summarize reasons in favor and against thinking the connection is causal. The argument in favor might look like this:"
    - list [ref=e318]:
      - listitem [ref=e319]: The formation of induction heads is correlated with a great increase in models' capacity for in-context learning, for a wide variety of models large and small.
      - listitem [ref=e320]: It's highly improbable these two sharp transitions would co-occur across so many models by pure chance, without any causal connection.
      - listitem [ref=e321]: There is almost surely some connection, and the simplest possibility is that induction heads are the primary mechanism driving the observed increase in in-context learning. (However, as discussed below, it could also be a confounding variable.)
      - listitem [ref=e322]: Since over 75% of final in-context learning forms in this window, one might naively believe this to be the amount of in-context learning that induction heads are responsible for.
    - paragraph [ref=e323]: "However, the following issues and confounds suggest caution:"
    - list [ref=e324]:
      - listitem [ref=e325]: In large models, we have low time resolution on our analysis over training. Co-occurrence when one only has 15 points in time is less surprising and weaker evidence.
      - listitem [ref=e326]: Perhaps other mechanisms form in our models at this point, that contribute to not only induction heads, but also other sources of in-context learning. (For example, perhaps the phase change is really the point at which the model learns how to compose layers through the residual stream, enabling both induction heads and potentially many other mechanisms that also require composition of multiple heads) Put another way, perhaps the co-occurrence is primarily caused by a shared latent variable, rather than direct causality from induction heads to the full observed change in in-context learning.
      - listitem [ref=e327]:
        - text: The fact that in-context learning score is roughly constant (at 0.4 nats) after the phase change doesn't necessarily mean that the underlying mechanisms of in-context learning are constant after that point. In particular, the metric we use measures a relative loss between the token index 500 and 50, and we know that the model’s performance at token 50 improves over training time. Reducing the loss a fixed amount from a lower baseline is likely harder, and so may be driven by additional mechanisms as training time goes on.
        - superscript [ref=e329]: "13"
        - superscript [ref=e331]: "14"
    - paragraph [ref=e332]: One point worth noting here is that the argument that induction heads account for most in-context learning at the transition point of the phase change is more solid than the argument that they account for most in-context learning at the end of training – a lot could be changing during training even as the in-context learning score remains constant.
    - separator [ref=e333]
