    - paragraph [ref=e530]:
      - text: For the cases they cover, ablations are by far our strongest evidence. The basic argument is that knocking out induction heads decreases the amount of in-context learning we observe in our models. By “knocking out” we mean that we remove a given attention head from the model at test time, doing a forward pass on the transformer without it. (See
      - link "our methods section" [ref=e531] [cursor=pointer]:
        - /url: "#per-token-losses-ablated"
      - text: for exact details of how the ablation is done.)
    - paragraph [ref=e532]:
      - text: The ablations presented below show how attention heads contribute to in-context learning, but we can also do ablations to study how attention heads contribute to the overall behavior change that occurs during the phase change (see the
      - link "Model Analysis Table" [ref=e533] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: ).
    - figure [ref=e534]:
      - img [ref=e535]
    - generic [ref=e536]:
      - text: These plots are a small excerpt of the
      - link "Model Analysis Table" [ref=e537] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: ; look there to see the full evidence. See
      - link "our methods section" [ref=e538] [cursor=pointer]:
        - /url: "#per-token-losses-ablated"
      - text: for exact details of how the ablation is done.
    - paragraph [ref=e539]:
      - text: In fact, almost all the in-context learning in small attention-only models appears to come from these induction heads! This begins at the start of the phase change, and remains true through the end of training.
      - superscript [ref=e541]: "17"
    - paragraph [ref=e542]:
      - text: Unfortunately, we do not have ablations for our full-scale models.
      - superscript [ref=e544]: "18"
      - text: "For the models where we do have ablations, it seems like this evidence is clearly dispositive that induction heads increase in-context learning (at least as we've chosen to evaluate it). But can we further infer that they're the primary mechanism? A couple considerations:"
    - list [ref=e545]:
      - listitem [ref=e546]:
        - text: In attention-only models, in-context learning must essentially be a sum of contributions from different attention heads.
        - superscript [ref=e548]: "19"
        - text: But in models with MLPs, in-context learning could also come from interactions between MLP and attention layers. While ablating attention heads would affect such mechanisms, the relationship between the effect of the ablation on in-context learning and its true importance becomes more complicated.
        - superscript [ref=e549]: "20"
        - text: As a result, we can't be fully confident that head ablations in MLP models give us the full picture.
    - list [ref=e550]:
      - listitem [ref=e551]: Our ablations measure the marginal effects of removing attention heads from the model. To the extent two heads do something similar and the layer norm before the logits rescales things, the importance of individual heads may be masked.
    - paragraph [ref=e552]: All things considered, we feel comfortable concluding from this that induction heads are the primary mechanism for in-context learning in small attention-only models, but see this evidence as only suggestive for the MLP case.
