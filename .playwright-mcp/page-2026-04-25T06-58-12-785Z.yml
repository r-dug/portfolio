        - text: is a master's student at the University of Amsterdam.
      - paragraph [ref=e5042]:
        - text: I used the empirical criterion for induction heads
        - link "presented" [ref=e5043] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2022/phase-change/index.html#definition-of-induction-heads
        - text: "in this paper to look for induction heads in publicly available models. To reiterate: on a sequence of tokens"
        - code [ref=e5044]: "[A][B] .... [A] → [B]"
        - text: ", a head is called an induction head if it attends to the previous"
        - code [ref=e5045]: "[B]"
        - text: when reading the last
        - code [ref=e5046]: "[A]"
        - text: ", and if the previous"
        - code [ref=e5047]: "[B]"
        - text: increased the logit of the last
        - code [ref=e5048]: "[B]"
        - text: .
      - paragraph [ref=e5050]:
        - text: Under this definition, I found potential induction heads in GPT2 and GPT-Neo mostly starting in the mid-depth region. I made an interactive version to explore attention and logit attribution across all layers and heads on the long Harry Potter prompt with the repetition of the first paragraph. It can be accessed
        - link "here" [ref=e5051] [cursor=pointer]:
          - /url: https://share.streamlit.io/tomfrederik/gpt_induction_vis/main
        - text: . For example, for GPT2-XL, head 20 in layer 21 seems to be an induction head, as well as head 0 in layer 12 of GPT-Neo-2.7B. For these heads we can see that virtually every token in the repetition of the first paragraph attends to its following token in the original paragraph. Thanks to
        - link "EleutherAI" [ref=e5052] [cursor=pointer]:
          - /url: https://www.eleuther.ai/
        - text: for providing the compute resources for this project.
      - paragraph [ref=e5054]: At one point the paper speculates on the minimal context length necessary to form induction heads. On a synthetic dataset, I have already found induction to be easily learned with a context length of 4. However, I believe that this is, in general, a property of the dataset/data distribution rather than the model itself, i.e. "how useful is induction for this task, on this dataset?". While it is intriguing to think about the statistics of language in this way, I am not sure how useful this line of research would be to the overall project of interpretability.
