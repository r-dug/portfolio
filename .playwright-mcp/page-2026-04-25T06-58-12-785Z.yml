    - heading "Where induction heads form" [level=3] [ref=e5083]:
      - link "Where induction heads form" [ref=e5084] [cursor=pointer]:
        - /url: "#where-are-induction-heads-located-in-models"
    - paragraph [ref=e5085]: "In this section we examine: Where are induction heads located in models? Do they generally form in the second layer, or the last layer, or somewhere else?"
    - heading "Small attention-only models" [level=4] [ref=e5086]
    - paragraph [ref=e5087]: In our attention-only models, induction heads form in the last layer.
    - paragraph [ref=e5088]:
      - text: (In these plots, each point represents a head, colored by layer and arranged along the x-axis by depth in the model. The height of the point is the
      - link "prefix matching score" [ref=e5089] [cursor=pointer]:
        - /url: "#head-activation-evaluators"
      - text: of that head.)
    - figure [ref=e5090]:
      - img [ref=e5091]
    - heading "Small models with MLPs:" [level=4] [ref=e5092]
    - paragraph [ref=e5093]: In small models with MLPs, by the 5L and 6L size, the induction heads form more in the second-to-last layer.
    - figure [ref=e5094]:
      - img [ref=e5095]
    - heading "Full-scale models:" [level=4] [ref=e5096]
    - paragraph [ref=e5097]: In the models in our full-scale sweep, induction heads form earlier. In fact, in 24L and 40L models the majority of induction heads form before the halfway point in model depth.
    - paragraph [ref=e5098]: Note that in these plots, only a randomized sample of 100 heads (with selection biased towards those scoring highly on prefix matching) are shown as opaque dots; most of the datapoints are left translucent for ease of reading.
    - figure [ref=e5099]:
      - img [ref=e5100]
    - heading "Distribution of scores" [level=3] [ref=e5101]:
