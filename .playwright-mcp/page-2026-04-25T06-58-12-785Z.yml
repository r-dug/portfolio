    - figure [ref=e5122]:
      - img [ref=e5123]
    - heading "Data Collection" [level=3] [ref=e5124]:
      - link "Data Collection" [ref=e5125] [cursor=pointer]:
        - /url: "#data-collection"
    - paragraph [ref=e5126]: We measure several properties of the model’s overall behavior and of each constituent attention head. With the exception of the attention head ablations (which are the most computationally-intensive, and so were run only on the small models), we measure these properties on all snapshots of all models across training (that is, 200 snapshots each for the twelve small models, and 14 or 15 snapshots each for the six full-scale models). By measuring them on each snapshot, we can see how each property evolves over the course of training, rather than simply measuring the final model.
    - paragraph [ref=e5127]: "The properties we collect data on are as follows:"
    - list [ref=e5128]:
      - listitem [ref=e5129]: Per-token losses with unaltered models
      - listitem [ref=e5130]: Per-token losses with ablations of individual attention heads
      - listitem [ref=e5131]: "Empirical head measurements with head activation evaluators: using heuristics to score attention heads based on their observed activations, as another way of estimating “copying”, “prefix matching” and “previous token” attention."
      - listitem [ref=e5132]: "Mathematical head measurements with the trace of QK eigenvalues for the previous-token QK-circuit term: measuring how much the WQWK weight matrix reads in a subspace affected by heads that attend to the previous token."
    - heading "(1) Per-token losses (unaltered models)" [level=4] [ref=e5133]
    - paragraph [ref=e5134]: The most straightforward property we measure is per-token losses from each model snapshot. We run the model snapshot on a set of 10,000 randomly-selected examples from the dataset, each of which is 512 tokens in length, and save individual token losses for every token. The set is held the same between all snapshots and between all models in all three families.
    - paragraph [ref=e5135]: "When analyzing the per-token loss data, we summarize it in two different ways:"
    - list [ref=e5136]:
      - listitem [ref=e5137]:
        - generic [ref=e5138]: Random token per example.
        - text: For each example, we extract the loss for just one random token out of the 512 tokens and discard the rest, giving a length-10,000 vector for each model snapshot. (The random index used for each example is consistent between each model.)
      - listitem [ref=e5139]:
        - generic [ref=e5140]: Context index average.
        - text: We average the per-token losses by context index (i.e. by position), giving a length-512 vector for each model snapshot. The icontextth entry in the vector is an average over the 10,000 tokens drawn from position icontext in each example.
    - heading "(2) Per-token losses (attention head ablations)" [level=4] [ref=e5141]
    - paragraph [ref=e5142]: One way to study individual attention heads is to measure the difference between the complete model’s overall behavior and the overall behavior of a model that is exactly the same except for missing that head. We do this by successively ablating (i.e. zeroing-out) each attention head’s contribution to the residual stream. The approach of removing a head’s contribution can be thought of as loosely similar to a genetic “knockout” experiment in biology, where observing the effect of removing a specific gene can provide information about the gene’s function.
    - paragraph [ref=e5143]:
      - text: "We could do these ablations in two different ways: a “full” ablation, and a “pattern-preserving” ablation. (The"
      - link "model analysis table" [ref=e5144] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: shows only pattern-preserving ablations; we explain the other method for comparison) The full ablation would remove all of a head’s contributions to model behavior, whereas the pattern-preserving ablation removes the ablated head’s contribution to all later heads’ output vectors, but preserves the ablated head’s contribution to all later heads’ attention patterns.
      - superscript [ref=e5146]: "29"
    - paragraph [ref=e5147]: Full ablation
    - list [ref=e5148]:
      - listitem [ref=e5149]: "Method: Run the model, replacing the ablated attention head’s result vector with a zero vector."
      - listitem [ref=e5150]: "Outcome: All downstream computations are impacted (including all Q, K, and V calculations, and attention patterns)."
    - paragraph [ref=e5151]:
      - generic [ref=e5152]:
        - text: Pattern-preserving ablation (shown in
        - link "Model Analysis Table" [ref=e5153] [cursor=pointer]:
          - /url: "#model-analysis-table"
        - text: )
    - list [ref=e5154]:
      - listitem [ref=e5155]: "Method:"
    - list [ref=e5156]:
      - listitem [ref=e5157]: "Step 1: Run the model for the first time, saving all attention patterns and discarding the output logits."
      - listitem [ref=e5158]: "Step 2: Run model a second time. Replace the ablated attention head’s result vector with a zero vector, and force all attention patterns to be the version recorded in the first run."
    - list [ref=e5159]:
      - listitem [ref=e5160]:
        - text: "Outcome: Only downstream V calculations are affected by the ablation, not Q and K calculations. The contribution a head makes to later layers’ attention patterns is preserved."
        - superscript [ref=e5162]: "30"
    - paragraph [ref=e5163]: This is by far the most computationally-intensive measurement we perform, although fortunately it consists of many small single-GPU jobs and so we could often run it in “spare” capacity.
    - paragraph [ref=e5164]:
      - text: As a quick note of comparison, our previous work in
      - link "Transformer Circuits" [ref=e5165] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html#term-importance-analysis
      - text: also contained ablation experiments. Although there are similarities (most notably the decision to freeze patterns), the specific ablations we describe here are individual attention head ablations where only one attention head is modified at a time, whereas the ablations described in our prior work are nth-order term ablations in which all attention heads are manipulated at once and the process is repeated iteratively n times.
    - heading "(3) Head activation evaluators" [level=4] [ref=e5166]
    - paragraph [ref=e5167]: We construct three heuristic measurements of attention heads, to score how strongly a head exhibits specific properties of interest. These are empirical measurements, based on observed activations on example data.
    - paragraph [ref=e5168]: "We evaluate heads on the following properties:"
    - list [ref=e5169]:
      - listitem [ref=e5170]: Copying. Does the head’s direct effect on the residual stream increase the logits of the same token as the one being attended to?
      - listitem [ref=e5171]: Prefix matching. On repeated sequences of random tokens, does the head attend to earlier tokens that are followed by a token that matches the present token?
      - listitem [ref=e5172]: Previous token attention. Does the head attend to the token that immediately precedes the present token?
    - paragraph [ref=e5173]: (Note that “copying” is a property that depends on a head’s OV circuit, whereas “prefix matching” and “previous token attention” are properties that depend on a head’s QK circuit.)
    - paragraph [ref=e5174]:
      - text: We are interested in these properties in particular — copying, prefix matching, and previous token attention — because they are relevant to induction heads’ function of predicting repeated sequences of random tokens. Specifically, (1) a head with both a “copying” OV circuit and a “prefix matching” QK circuit is thereby an induction head by our definition, because it attends to previous instances of the present token and increases the logit of the token that followed; and (2) a “previous token” head can be used as an algorithmic component of a future induction head in a later layer (as we explain in more detail in
      - link "Argument 5" [ref=e5175] [cursor=pointer]:
        - /url: "#argument-induction-head-mechanism"
      - text: ).
    - paragraph [ref=e5176]: In more detail, each head evaluator is implemented as follows, and each score is averaged over 10 examples.
    - list [ref=e5177]:
      - listitem [ref=e5178]: "Copying: Generate a sequence of 25 random tokens, excluding the most common and the least common tokens. Compute this head’s contribution to the residual stream, then convert that using the unembeddings (i.e. along the “direct path”) to impacts on each logit. Logits are transformed by subtracting the mean of the logits and passing through a ReLU, allowing the evaluator to focus on where logits are raised. Compute the ratio of the amount it raises the logits of the token being attended to, to that of all tokens in this sample. This value ranges from 0 (only raises other tokens) to 0.5 (only raises the present token), so we scale it into the range of -1 to 1."
      - listitem [ref=e5179]:
        - text: "Prefix matching: Generate a sequence of 25 random tokens, excluding the most common and the least common tokens. Repeat this sequence 4 times and prepend a “start of sequence” token."
        - superscript [ref=e5180]: "31"
        - text: Compute the attention pattern. The prefix matching score is the average of all attention pattern entries attending from a given token back to the tokens that preceded the same token in earlier repeats.
      - listitem [ref=e5181]: "Previous token: Draw an example from the training distribution. Compute the attention pattern. The previous token score is the average of the entries of all the attention pattern entries attending from token i to token i-1."
    - paragraph [ref=e5182]:
      - text: In the Appendix we
      - link "validate the connection" [ref=e5183] [cursor=pointer]:
        - /url: "#validating-qk-and-ov-eigenvalues"
      - text: between these empirical measurements and the mathematical properties of attention head weight matrices explored in
      - link "Transformer Circuits" [ref=e5184] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2021/framework/index.html
      - text: ", and show a"
      - link "joint distribution of scores" [ref=e5185] [cursor=pointer]:
        - /url: "#evaluators-on-models"
      - text: for copying and prefix matching, for heads in the small and large models.
