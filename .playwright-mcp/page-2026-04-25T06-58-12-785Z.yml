    - paragraph [ref=e1356]: This head attends back to a previous instance of the correct category more often than not. It often knows to skip over lines where one of the words is identical but the pattern is wrong (such as “January bird” primarily attending to “April fish” and not “grey bird”). This head isn’t perfect at this, but empirically it allocates about 65% of its attention from the colons to the correct positions, when tested on a range of similar problems.
    - heading "What’s going on with more abstract heads that are also induction heads?" [level=3] [ref=e1357]:
      - link "What’s going on with more abstract heads that are also induction heads?" [ref=e1358] [cursor=pointer]:
        - /url: "#why-might-induction-heads-also-do-pattern-matching"
    - paragraph [ref=e1359]:
      - text: We emphasize again that the attention heads that we described above simultaneously implement both the abstract behaviors that we described, and these very same attention heads (as in, the exact same head in the same layer) also satisfy the
      - link "formal definition" [ref=e1360] [cursor=pointer]:
        - /url: "#definition-of-induction-heads"
      - text: "of induction head (literal copying of random sequences using prefix matching). The comparison is not a metaphor or a blurring of the definition: induction heads which are defined by their ability to copy literal sequences turn out to also sometimes match more abstract patterns. This is what the table at the beginning of the section shows empirically."
    - paragraph [ref=e1361]:
      - text: "But this still leaves the question: why do the same heads that inductively copy random text also exhibit these other behaviors? One hint is that these behaviors can be seen as “spiritually similar” to copying. Recall that where an induction head is defined as implementing a rule like"
      - code [ref=e1362]: "[A][B] … [A] → [B]"
      - text: ", our empirically observed heads also do something like"
      - code [ref=e1363]: "[A*][B*] … [A] → [B]"
      - text: where
      - code [ref=e1364]: A*
      - text: and
      - code [ref=e1365]: B*
      - text: are similar to
      - code [ref=e1366]: A
      - text: and
      - code [ref=e1367]: B
      - text: in some higher-level representation. There are several ways these similar behaviors could be connected. For example, note that the first behavior is a special case of the second, so perhaps induction heads are implementing a more general algorithm that reverts to the special case of copying when given a repeated sequence
      - superscript [ref=e1368]: "22"
      - text: . Another possibility is that induction heads implement literal copying when they take a path through the residual stream that includes only them, but implement more abstract behaviors when they process the outputs of earlier layers that create more abstract representations (such as representations where the same word in English and French are embedded in the same place).
    - paragraph [ref=e1369]:
      - text: In
      - link "Argument 5" [ref=e1370] [cursor=pointer]:
        - /url: "#argument-induction-head-mechanism"
      - text: we’ll strengthen this argument by giving a mechanistic account of how induction heads (when doing simple copying with prefix-matching) attend back to the token that comes next in the pattern, and observe that the actual mechanism they use could naturally generalize to more abstract pattern matching. Our point in this section is just that it's actually quite natural for these more abstract induction heads to also exhibit the basic copying behaviors underlying our definition.
