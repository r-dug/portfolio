      - link "model analysis table" [ref=e1530] [cursor=pointer]:
        - /url: "#model-analysis-table"
      - text: look fully analogous between the small attention-only, small models with MLPs, and full-scale model cases. Provided there's more than one layer, all of them go through a phase change. All of them have the same sharp increase in in-context learning, with the same rough amounts before and after the transition. All of them trace similar paths in PCA space. All of them form induction heads.
    - paragraph [ref=e1531]: If things change from the small model case to the large model case, where do they change? And why is there no visible sign of the change in all our measurements?
    - paragraph [ref=e1532]:
      - text: On the flip side, there are many cases where large models behave very differently than small models (see discussion of phase changes with respect to model size in
      - link "Related Work" [ref=e1533] [cursor=pointer]:
        - /url: "#related-work"
      - text: ). Extrapolating from small models to models many orders of magnitude larger is something one should do with caution.
    - paragraph [ref=e1534]: The most compelling alternative possibility we see is that other composition mechanisms may also form during the phase change. Larger models have more heads, which gives them more capacity for other interesting Q-composition and K-composition mechanisms that small models can’t afford to express. If all “composition heads” form simultaneously during the phase change, then it’s possible that above some size, non-induction composition heads could together account for more of the phase change and in-context learning improvement than induction heads do.
    - separator [ref=e1535]
    - heading "Model Analysis Table" [level=2] [ref=e1536]:
      - link "Model Analysis Table" [ref=e1537] [cursor=pointer]:
        - /url: "#model-analysis-table"
    - paragraph [ref=e1538]:
      - text: The
      - link "arguments above" [ref=e1539] [cursor=pointer]:
        - /url: "#argument-phase-change"
      - text: "are based on analysis of 34 decoder-only Transformer language models, with different snapshots saved over the course of training, for one run of training per model. The models are drawn from four different model series as follows:"
    - list [ref=e1540]:
      - listitem [ref=e1541]: “Small, attention-only models”, a series of models (from 1-layer to 6-layer) that do not have MLPs, and were trained specifically for the present investigations.
      - listitem [ref=e1542]: “Small models with MLPs”, a series of models (from 1-layer to 6-layer) that have both attention and MLP layers, and were trained specifically for the present investigations.
      - listitem [ref=e1543]: “Full-scale models”, a series of successively-larger models with MLPs (ranging from 4 layers and 13M parameters, up to 40 layers and 13B parameters), that are used as the basis for multiple projects at Anthropic.
      - listitem [ref=e1544]: “Smeared key models”, a targeted architectural experiment designed to allow transformers of any depth to express induction heads.
    - paragraph [ref=e1545]:
      - text: The dataset used for training the small models and smeared key models was an earlier version of the dataset described in Askell et al.
      - generic [ref=e1548]: "[18]"
      - text: ", consisting of filtered common crawl data"
      - generic [ref=e1551]: "[19]"
      - text: and internet books, along with several other smaller distributions
      - generic [ref=e1554]: "[20]"
      - text: ", including approximately 10% python code. The full-scale models were trained on an improved version of roughly the same data distribution. Additionally, another set of the small models was trained on a different dataset, consisting of just internet books, to explore the impact of varying the dataset. All models trained on a given dataset saw the same examples in the same order. Models never saw the same training data twice."
    - paragraph [ref=e1555]:
      - text: For more details on model architecture and training, continue past the table below, to the
      - link "Model Details" [ref=e1556] [cursor=pointer]:
        - /url: "#models"
      - text: section.
    - paragraph [ref=e1557]:
      - text: In the Model Analysis Table below, each row includes a brief summary of the measurement shown. For a more in-depth explanation of the
      - link "data collection" [ref=e1558] [cursor=pointer]:
        - /url: "#data-collection"
      - text: and
      - link "results analysis" [ref=e1559] [cursor=pointer]:
        - /url: "#results"
      - text: ", see the Appendix."
    - figure [ref=e1560]:
      - generic [ref=e1563]:
        - heading "Small Attention-Only Transformers" [level=3] [ref=e1564]
        - paragraph [ref=e1565]:
          - text: This experiment series studies small attention-only transformers, because these are the models we have the strongest theoretical understanding of (see the
          - link "framework paper" [ref=e1566] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2021/framework/index.html
          - text: ). For these small models, we're able to capture snapshots with a high time resolution over early training. These experiments are the ones that most cleanly demonstrate the phase change and link it to induction heads. Note how (1) many models undergo a discontinuous phase change (seen most clearly in the PCA plot and in-context learning score); (2) it appears to be caused by induction heads (see ablations); and (3) the only model without a phase change is the one-layer model.
          - link "More..." [ref=e1567] [cursor=pointer]:
