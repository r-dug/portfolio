        - text: loss data — a matrix of size (N model snapshots x 512 token index positions) — is visualized directly as a 2D plot. This shows model performance on tokens earlier versus later in the context, as well as across training time. We borrow this technique for highlighting “in-context learning” from Kaplan et al.
        - generic [ref=e5542]: "[13]"
        - text: . A horizontal slice of this plot represents a loss curve as a function of training step, for one particular token index rather than averaged over all tokens; a vertical slice represents a particular snapshot’s prediction ability as a function of token index.
      - listitem [ref=e5543]:
        - generic [ref=e5544]: "2D loss derivative plot:"
        - text: We also plot the partial derivative of the context-index-average loss data with respect to log(context index). This captures the amount that token loss is reduced by seeing ϵ% more context.
      - listitem [ref=e5545]:
        - generic [ref=e5546]: In-context learning score
        - text: ": We compute what we call the “in-context learning score” as the average loss of the 500th token minus the average loss of the 50th token (for a length-512 context)± over training. This functions as a summary of the 2D in-context learning plot, capturing in a single summary statistic the trajectory over training time of the model’s ability to make better predictions later in the context than earlier."
    - paragraph [ref=e5547]: Additionally in a separate row at the top, we show PCA results from the per-token results. These are displayed separately because, unlike all the other graphs, the x-axis is not elapsed training tokens.
    - list [ref=e5548]:
      - listitem [ref=e5549]:
        - generic [ref=e5550]: "PCA:"
        - text: A plot of each model's trajectory in function space over training time, using PCA. The random-token-per-example loss data for all snapshots and all models of each type is concatenated into a large matrix, of shape (N*M model snapshots x 10,000 examples), where N = 200 snapshots per model and M = 12 models for small models, and N = 15 snapshots per model and M = 6 models for full-scale models. This combined matrix is projected down to the first two principal components. Each model is then plotted separately, tracing out a trajectory in function space over the course of its training
    - heading "Attention head measurements" [level=4] [ref=e5551]
    - paragraph [ref=e5552]:
      - text: The next two rows of Figure 1 show results derived from the
      - link "attention head measurements" [ref=e5553] [cursor=pointer]:
        - /url: "#head-activation-evaluators"
      - text: ": one row shows the score of the “prefix matching” head activation evaluator over training time, and the following row shows the prefix-matching QK-circuit eigenvalue trace over training time."
    - paragraph [ref=e5554]:
      - text: For the small models, all attention heads are shown. For the full-scale models, a subset of 100 heads is shown; see the
      - link "Appendix" [ref=e5555] [cursor=pointer]:
        - /url: "#where-are-induction-heads-located-in-models"
      - text: for an explanation of how the 100 heads were chosen.
    - paragraph [ref=e5556]:
      - text: Note that in the QK-circuit plot, the change in weight decay at approximately 5 billion tokens (described in
      - link "Model Details" [ref=e5557] [cursor=pointer]:
        - /url: "#models"
      - text: ) can be seen particularly prominently as a bend or hiccup in the plotted trajectories, but occurs after the phase change and is an unrelated phenomenon.
    - heading "Ablation attribution to phase change" [level=4] [ref=e5558]
    - paragraph [ref=e5559]:
      - text: For the small models only, the final two rows of Figure 1 show results derived from the per-token loss data from the attention head ablation experiments. We show only the
      - link "pattern-preserving ablation" [ref=e5560] [cursor=pointer]:
        - /url: "#per-token-losses-ablated><span style="
      - text: results here; full ablation results can be found in the appendix. Note also that ablation experiments were not conducted for the full-scale models.
    - paragraph [ref=e5561]: "The first “view” on the ablation data is the attribution to the “before-and-after” vector, which relates the result of each head ablation to the change in model behavior over the course of the phase change, and which we explain here. First: For a given model, a length-10,000 vector is computed by taking the delta of the random-token-per-example loss data for the “phase change end” snapshot, minus the “phase change start” snapshot. This represents how the model’s behavior changed over the course of the phase change. This vector is normalized to a unit vector; we call this the before-and-after vector. It can be thought of as the “direction in token-loss space” that is affected by the phase change. Second: Note that ablating a given head also induces a change in the behavior of a model snapshot, and thus a corresponding length-10,000 vector change to the random-token-per-example loss data (calculated by subtracting the un-ablated snapshot’s per-token loss vector from the ablated snapshot’s per-token loss vector). We are interested in the similarity between these two changes, which we compute as the dot product between the model’s before-and-after vector and the ablation change vector for this head and this snapshot. For induction heads, this dot product is negative, indicating that removing induction heads is like undoing the changes to model behavior that happened during the phase change."
    - paragraph [ref=e5562]: "The second “view” on the ablation data is the attribution to the in-context learning score. We operationalize the model’s in-context learning abilities as how much better the model is at predicting the 500th token than the 50th token: this difference measured as Loss(ntrain, icontext= 500) - Loss(ntrain, icontext= 50) is the in-context learning score."
    - generic [ref=e5563]:
      - heading "Footnotes" [level=3] [ref=e5564]
      - list [ref=e5565]:
        - listitem [ref=e5566]:
          - text: Note that mechanistic interpretability is a subset of the broader field of interpretability, which encompasses many different methods for explaining the outputs of a neural network. Mechanistic interpretability is distinguished by a specific focus on trying to systematically characterize the internal circuitry of a neural net.
          - link "[↩]" [ref=e5567] [cursor=pointer]:
            - /url: "#d-footnote-1"
        - listitem [ref=e5568]:
          - text: Note that induction heads don’t occur in 1 layer models, because they require a composition of attention heads in different layers.
          - link "[↩]" [ref=e5569] [cursor=pointer]:
            - /url: "#d-footnote-2"
        - listitem [ref=e5570]:
          - text: Or sometimes metalearning, although this term implicitly makes the stronger claim that the model is learning how to do a new ability (as opposed to “locating” an ability, i.e. learning what it is supposed to do), an implication which is both controversial and not entirely precise in its meaning.
          - link "[↩]" [ref=e5571] [cursor=pointer]:
            - /url: "#d-footnote-3"
        - listitem [ref=e5572]:
          - text: More specifically, induction heads seem to largely decouple
          - code [ref=e5573]: A
          - text: and
          - code [ref=e5574]: B
          - text: . While some induction heads may specialize on certain kinds of
          - code [ref=e5575]: A
          - text: s or
          - code [ref=e5576]: B
          - text: s, this significant decoupling of
          - code [ref=e5577]: A
          - text: and
          - code [ref=e5578]: B
          - text: means that they don't have a fixed table of bigram statistics they can update on, but rather can abstract to new patterns.
          - link "[↩]" [ref=e5579] [cursor=pointer]:
            - /url: "#d-footnote-4"
        - listitem [ref=e5580]:
          - text: In practice, induction heads don't exhibit these properties perfectly, and our measurements give us a continuum, but there is a clear subset of heads which exhibit these properties with much greater than random chance.
          - link "[↩]" [ref=e5581] [cursor=pointer]:
            - /url: "#d-footnote-5"
        - listitem [ref=e5582]:
          - text: By defining induction heads in terms of their behavior on repeated copies of random sequences, we can be confident that it's actually relying on induction rather than, say, a simple copying head that heuristically attends to previous tokens which could plausibly slot in well after the next token, even if that hasn’t occurred yet in the current context.
          - link "[↩]" [ref=e5583] [cursor=pointer]:
            - /url: "#d-footnote-6"
        - listitem [ref=e5584]:
          - text: The simplest induction heads match just one preceding token. But we also often observe induction heads that perform a fuzzy match over several preceding tokens.
          - link "[↩]" [ref=e5585] [cursor=pointer]:
            - /url: "#d-footnote-7"
        - listitem [ref=e5586]:
          - text: In mathematics, one sometimes thinks of a function as an infinite dimensional vector of the values it would give for different inputs. For neural networks, this can be a nice way to abstract away the fact that functionally identical models can have very different parameter vectors. Of course, we can't directly represent these infinite dimensional vectors, but we can approximate them by sampling.
          - link "[↩]" [ref=e5587] [cursor=pointer]:
            - /url: "#d-footnote-8"
        - listitem [ref=e5588]:
          - text: Although see
          - link "later discussion" [ref=e5589] [cursor=pointer]:
            - /url: "#seemingly-constant"
          - text: for a way in which a constant 0.4 nats can be viewed as a “larger” improvement for a more-powerful model, because attaining the same magnitude of improvement starting from a better baseline is more challenging.
          - link "[↩]" [ref=e5590] [cursor=pointer]:
            - /url: "#d-footnote-9"
        - listitem [ref=e5591]:
          - text: As we'll see, many other
          - link "curious phenomena" [ref=e5592] [cursor=pointer]:
            - /url: "#curiosities"
          - text: occur during the phase change as well.
          - link "[↩]" [ref=e5593] [cursor=pointer]:
            - /url: "#d-footnote-10"
        - listitem [ref=e5594]:
          - text: That said, it’s also the case that aside from the experiments varying the dataset, all these models were trained on the same tokens in the same order
          - link "[↩]" [ref=e5595] [cursor=pointer]:
            - /url: "#d-footnote-11"
        - listitem [ref=e5596]:
          - text: Of course, this passage is merely a single piece of anecdata, shown here to provide a qualitative intuition rather than meant as systematic evidence. For a more comprehensive analysis of the observed behavioral change before and after the phase change, consult the “ablation to before-and-after vector” analyses in the
          - link "Model Analysis Table" [ref=e5597] [cursor=pointer]:
            - /url: "#model-analysis-table"
          - link "[↩]" [ref=e5598] [cursor=pointer]:
            - /url: "#d-footnote-12"
        - listitem [ref=e5599]:
          - text: Some bits of information are harder to learn than others. For example, near the start of training, the model can achieve a significant decrease in loss with simple approaches such as memorizing bigram statistics. But later in training all the low-hanging fruit has been plucked, and the model must learn more sophisticated algorithms such as induction heads, which is likely harder to learn yet results in fewer bits of information. In today’s state of the art models, such as GPT-3, we observe complex capabilities such as addition, and we can imagine future models approaching near-perfect loss might need human-level understanding of language and beyond to get those last few fractions of a bit.
          - generic [ref=e5602]: "[16]"
          - text: So the relative loss between token 50 and token 500 likely represents harder and harder bits over the course of training.
          - link "[↩]" [ref=e5603] [cursor=pointer]:
            - /url: "#d-footnote-13"
        - listitem [ref=e5604]:
          - text: It is still a mystery why these forces of increased capacity for in-context learning and increasing difficulty of marginal bits would so exactly balance, and this seems a promising avenue of future research. Perhaps there is not, in fact, much overlap in the information that could be gained from both in-context learning and other approaches, so these bits do not get harder with time. We'll revisit this in the Discussion.
          - link "[↩]" [ref=e5605] [cursor=pointer]:
            - /url: "#d-footnote-14"
        - listitem [ref=e5606]:
          - text: Why do induction heads require composition? In an induction head, where the head attends must be a function of the token before the token it attends to. But an individual attention head computes attention scores only from the source and destination token. Without using information written by a second earlier attention head, the score from the attended token can’t be a function of the token that precedes it.
          - link "[↩]" [ref=e5607] [cursor=pointer]:
            - /url: "#d-footnote-15"
        - listitem [ref=e5608]:
          - text: The key vector for the first token is unchanged.
          - link "[↩]" [ref=e5609] [cursor=pointer]:
            - /url: "#d-footnote-16"
        - listitem [ref=e5610]:
          - text: "In fact, ablating most other attention heads appears to increase in-context learning. At first, that seems kind of crazy: how could damaging the model make it better at in-context learning? It appears that some tokens can be predicted with both \"normal prediction\" and in-context learning. If ablating a head makes the model bad at \"normal prediction\", in-context learning can predict more tokens that otherwise wouldn't be predicted, and in-context learning score as we've defined it increases."
          - link "[↩]" [ref=e5611] [cursor=pointer]:
            - /url: "#d-footnote-17"
        - listitem [ref=e5612]:
          - text: Note that the cost of a full set of ablations scales superlinearly with model size at
          - generic [ref=e5613]:
            - text: "O(N^{1.33})"
            - generic [ref=e5615]:
              - math [ref=e5617]:
                - generic [ref=e5619]:
                  - generic [ref=e5620]: O
                  - generic [ref=e5621]: (
                  - generic [ref=e5622]:
                    - generic [ref=e5623]: "N"
                    - generic [ref=e5624]:
                      - generic [ref=e5625]: "1"
                      - generic [ref=e5626]: .
                      - generic [ref=e5627]: "3"
                      - generic [ref=e5628]: "3"
                  - generic [ref=e5629]: )
              - generic [ref=e5631]:
                - text: O(
                - generic [ref=e5632]:
                  - text: "N"
                  - generic [ref=e5638]: "1.33"
                - text: )
          - text: ", since there are"
          - generic [ref=e5639]:
            - text: "O(N^{0.33})"
            - generic [ref=e5641]:
              - math [ref=e5643]:
                - generic [ref=e5645]:
                  - generic [ref=e5646]: O
                  - generic [ref=e5647]: (
                  - generic [ref=e5648]:
                    - generic [ref=e5649]: "N"
                    - generic [ref=e5650]:
                      - generic [ref=e5651]: "0"
                      - generic [ref=e5652]: .
                      - generic [ref=e5653]: "3"
                      - generic [ref=e5654]: "3"
                  - generic [ref=e5655]: )
              - generic [ref=e5657]:
                - text: O(
                - generic [ref=e5658]:
                  - text: "N"
                  - generic [ref=e5664]: "0.33"
                - text: )
          - text: heads and each ablation is
          - generic [ref=e5665]:
            - text: O(N)
            - generic [ref=e5667]:
              - math [ref=e5669]:
                - generic [ref=e5671]:
                  - generic [ref=e5672]: O
                  - generic [ref=e5673]: (
                  - generic [ref=e5674]: "N"
                  - generic [ref=e5675]: )
              - generic [ref=e5677]: O(N)
          - text: where
          - generic [ref=e5678]:
            - text: "N"
            - generic [ref=e5680]:
              - math [ref=e5682]:
                - generic [ref=e5685]: "N"
              - generic [ref=e5687]: "N"
          - text: is the number of parameters. The base cost of an ablation is also non-trivial, since we're evaluating each ablation on 10,000 examples, for each training checkpoint.
          - link "[↩]" [ref=e5688] [cursor=pointer]:
            - /url: "#d-footnote-18"
        - listitem [ref=e5689]:
          - text: In attention-only models, the logits can be expressed (up to a rescaling due to LayerNorm) as a sum of terms from each attention head, along with a "direct path term" to the the token embedding (see our
          - link "previous paper" [ref=e5690] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2021/framework/index.html
          - text: ). The direct path term is solely a function of the present token, so it can't contribute to in-context learning. That means that all in-context learning must ultimately originate with attention heads, and since the relationship is almost linear, ablations (with frozen attention patterns) are a principled way to measure their contribution.
          - link "[↩]" [ref=e5691] [cursor=pointer]:
            - /url: "#d-footnote-19"
        - listitem [ref=e5692]:
          - text: Why is ablating attention heads harder to reason about if they can interact with MLP layers? At a high-level, the issue is that in-context learning is a complicated function of which heads are ablated, rather than a sum of their contributions. But it may be helpful to consider specific examples. One possibility is that ablating a head might shift the statistics of an MLP layer and "break" neurons by shifting their effective bias, without actually having a meaningful role. Another possibility is that an important MLP layer mechanism relies on two attention heads, but can function reasonably well with one if the other is albated.
          - link "[↩]" [ref=e5693] [cursor=pointer]:
            - /url: "#d-footnote-20"
        - listitem [ref=e5694]:
          - text: We compute this by taking the value vector produced at each position, weighting it by the attention matrix, and multiplying it by
          - generic [ref=e5695]:
            - text: W_O
            - generic [ref=e5697]:
              - math [ref=e5699]:
                - generic [ref=e5702]:
                  - generic [ref=e5703]: W
                  - generic [ref=e5704]: O
              - generic [ref=e5707]:
                - text: W
                - generic [ref=e5712]: O
          - text: and the unembedding, and selecting the logit value for the corresponding token. Note that we first normalise the vector of logits to have zero mean, as adding a constant to every argument in a softmax has no effect.
          - link "[↩]" [ref=e5716] [cursor=pointer]:
            - /url: "#d-footnote-21"
        - listitem [ref=e5717]:
          - text: For example, a special case of translating from English to another language is translating English to itself, which is precisely the same as literal copying.
          - link "[↩]" [ref=e5718] [cursor=pointer]:
            - /url: "#d-footnote-22"
        - listitem [ref=e5719]:
          - text: The only other potential contender for driving in-context learning in two-layer attention only models would be basic copying heads. However, basic copying heads also exist in one-layer models, which don't have the greatly increased in-context learning we see in two-layer models. Further, induction heads just seem conceptually more powerful.
          - link "[↩]" [ref=e5720] [cursor=pointer]:
            - /url: "#d-footnote-23"
        - listitem [ref=e5721]:
          - text: Note that the attended token is only ignored when calculating the attention pattern through the QK-circuit. It is extremely important for calculating the head’s output through the OV-circuit! As observed in
          - link "our previous work" [ref=e5722] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2021/framework/index.html#architecture-attn-as-movement
          - text: ", the parts of the head that calculate the attention pattern, and the output if attended to, are separable and are often useful to consider independently."
          - link "[↩]" [ref=e5723] [cursor=pointer]:
            - /url: "#d-footnote-24"
        - listitem [ref=e5724]:
          - text: Instead, they use a slightly unusual positional mechanism similar to Press et al.
          - generic [ref=e5727]: "[17]"
          - link "[↩]" [ref=e5728] [cursor=pointer]:
            - /url: "#d-footnote-25"
        - listitem [ref=e5729]:
          - text: Note that this is different to the small models, which have
          - generic [ref=e5730]:
            - text: "200"
            - generic [ref=e5732]:
              - math [ref=e5734]:
                - generic [ref=e5736]:
                  - generic [ref=e5737]: "2"
                  - generic [ref=e5738]: "0"
                  - generic [ref=e5739]: "0"
              - generic [ref=e5741]: "200"
          - text: snapshots saved at linear intervals. As the full-scale models have only
          - generic [ref=e5742]:
            - text: "14"
            - generic [ref=e5744]:
              - math [ref=e5746]:
                - generic [ref=e5748]:
                  - generic [ref=e5749]: "1"
                  - generic [ref=e5750]: "4"
              - generic [ref=e5752]: "14"
          - text: or
          - generic [ref=e5753]:
            - text: "15"
            - generic [ref=e5755]:
              - math [ref=e5757]:
                - generic [ref=e5759]:
                  - generic [ref=e5760]: "1"
                  - generic [ref=e5761]: "5"
              - generic [ref=e5763]: "15"
          - text: snapshots, this makes it harder to judge the shape of the curves as confidently as for small models.
          - link "[↩]" [ref=e5764] [cursor=pointer]:
            - /url: "#d-footnote-26"
        - listitem [ref=e5765]:
          - text: Around token 100, there's a regime where small models reduce their loss very slightly more per token than large models. We interpret this as the small models picking up low-hanging fruit that the large models already got in the very early context.
          - link "[↩]" [ref=e5766] [cursor=pointer]:
            - /url: "#d-footnote-27"
        - listitem [ref=e5767]:
          - text: In fact, small models gain slightly more in the mid-context, catching up a tiny bit with large models, but it's a small effect.
          - link "[↩]" [ref=e5768] [cursor=pointer]:
            - /url: "#d-footnote-28"
        - listitem [ref=e5769]:
          - text: The fact that this is possible at all is a surprising application of the insight in our previous work that the calculation of each attention head’s attention pattern and output vector is
          - link "separable" [ref=e5770] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2021/framework/index.html#splitting-attention-head-terms-into-circuits
          - text: ", that is, implemented by different circuits consisting of different sets of parameters which may be run and studied in isolation"
          - link "[↩]" [ref=e5771] [cursor=pointer]:
            - /url: "#d-footnote-29"
        - listitem [ref=e5772]:
          - text: As an interesting aside, we note that with the attention pattern frozen the action of each head is purely linear, which means that in an attention-only model, a pattern-preserving ablation is equivalent to subtracting all terms containing the ablated head from the output logits. See our
          - link "previous work" [ref=e5773] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2021/framework/index.html#ov-and-qk-independence
          - text: for further exploration of the implications of this. This does not hold in more complex models, due to the non-linearity introduced by MLPs
          - link "[↩]" [ref=e5774] [cursor=pointer]:
            - /url: "#d-footnote-30"
        - listitem [ref=e5775]:
          - text: It would’ve been better if we had used a start of sequence token for the copying head evaluator as well, but we omitted it by mistake. Without the “start of sequence” token, some heads that were doing prefix matching on real data would get anomalously low scores on our test sequences
          - link "[↩]" [ref=e5776] [cursor=pointer]:
            - /url: "#d-footnote-31"
