        - text: .
      - paragraph [ref=e5031]:
        - text: Redwood Research has been working on language model interpretability, inspired in part by Anthropic’s work. We’ve found induction heads reliably appearing in two-layer attention-only transformers. Their structure roughly matches the description in
        - link "“Analyzing a Two-Layer Model”" [ref=e5032] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2021/framework/index.html#analyzing-a-two-layer-model
        - text: from Anthropic’s previous paper, with previous-token heads in layer 0 and induction heads in layer 1 (often one of each). These each have the expected attention behaviors. We tested this by replacing attention-score matrices with idealized versions and comparing the change in loss to the change from ablating that head. Replacing the previous-token head’s scores with exact previous-token attention recovered 99% of the loss difference. Replacing the induction head’s scores with a simple approximation (attending to the first token and to exact
        - code [ref=e5033]: "[A][B]...[A]"
        - text: matches) recovered about 65% of the loss difference. Our induction heads also match patterns of the form
        - code [ref=e5034]: "[A][B][C]...[A][B]→[C]"
        - text: ; including this in the substituted attention scores recovered an additional 10% of loss difference. The induction head’s OV circuit copies tokens, including some fuzzy matching of semantically similar tokens. Its QK circuit is dominated by K-composition with the previous-token head; the previous-token head’s OV matrix copies information to a new subspace and the induction head’s QK matrix copies it back to the usual token embedding. We’ve also cataloged a few other kinds of attention heads, including skip-trigram heads.
    - generic [ref=e5035]:
      - heading "Replication" [level=3] [ref=e5036]:
        - link "Replication" [ref=e5037] [cursor=pointer]:
