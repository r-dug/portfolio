    - paragraph [ref=e5112]:
      - text: We show here that our
      - link "head activation evaluators" [ref=e5113] [cursor=pointer]:
        - /url: "#head-activation-evaluators"
      - text: (that we use to measure the properties in our
      - link "definition of induction heads" [ref=e5114] [cursor=pointer]:
        - /url: "#definition-of-induction-heads"
      - text: ) correlate well with mathematically-based measures in small attention-only models.
    - heading "Copying" [level=4] [ref=e5115]
    - paragraph [ref=e5116]: Our copying evaluator correlates well with the OV matrix of each head. Specifically here we plot against the sum of the eigenvalues, divided by the absolute value of the eigenvalues, which is a measure of what fraction of the eigenvalues are positive vs. negative.
    - figure [ref=e5117]:
