        - heading "\"Smeared Key\" Architecture Modification + Controls" [level=3] [ref=e3014]
        - paragraph [ref=e3015]:
          - text: This experiment series analyzes "smeared key" models, which are designed so that a single attention layer can implement induction heads (see
          - link "Argument 2" [ref=e3016] [cursor=pointer]:
            - /url: "#argument-architectural-requirements"
          - text: ). For each smeared key model, a regular control model is provided (trained exactly the same) for comparison. The key observations are that (1) a one-layer smeared-key model experiences the phase change, while a regular one-layer model does not; and (2) the two-layer smeared-key model experiences a phase change earlier than a baseline model.
          - link "More..." [ref=e3017] [cursor=pointer]:
