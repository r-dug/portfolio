    - paragraph [ref=e1507]:
      - text: What about the induction heads we saw in
      - link "Argument 2" [ref=e1508] [cursor=pointer]:
        - /url: "#argument-induction-heads-can-implement-abstract-behaviors"
      - text: "with more complex behavior? Can we also reverse engineer them? Do they operate on the same mechanisms? Presently, fully reverse engineering them is beyond us, since they exist in large models with MLPs, which we don't have a strong framework for mechanistically understanding. However, we hypothesize they're different in two ways: (1) using more complex QK terms rather than matching on just the previous token; and (2) matching and copying more abstract and sophisticated linguistic features, rather than precise tokens."
    - paragraph [ref=e1509]:
      - text: When we
      - link "first introduced" [ref=e1510] [cursor=pointer]:
