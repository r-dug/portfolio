      - text: What is the distribution of heads’ scores on our
      - link "head activation evaluators" [ref=e5104] [cursor=pointer]:
        - /url: "#head-activation-evaluators"
      - text: "?"
    - paragraph [ref=e5105]: The distribution is sharper in our small models than our full-size models. In both cases, heads with a positive prefix matching score are more likely to have a positive copying score, and this correlation is even stronger for the highest prefix matching scores.
    - paragraph [ref=e5106]:
      - text: (For models with more than 100 heads, a subset of heads is plotted, as seen in the opaque versus translucent datapoints
      - link "immediately above" [ref=e5107] [cursor=pointer]:
