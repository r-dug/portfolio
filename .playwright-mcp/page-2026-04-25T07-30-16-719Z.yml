        - paragraph [ref=e58]:
          - text: In the
          - link "previous post, we looked at Attention" [ref=e59] [cursor=pointer]:
            - /url: https://jalammar.github.io/visualizing-neural-machine-translation-mechanics-of-seq2seq-models-with-attention/
          - text: – a ubiquitous method in modern deep learning models. Attention is a concept that helped improve the performance of neural machine translation applications. In this post, we will look at
          - strong [ref=e60]: The Transformer
          - text: – a model that uses attention to boost the speed with which these models can be trained. The Transformer outperforms the Google Neural Machine Translation model in specific tasks. The biggest benefit, however, comes from how The Transformer lends itself to parallelization. It is in fact Google Cloud’s recommendation to use The Transformer as a reference model to use their
          - link "Cloud TPU" [ref=e61] [cursor=pointer]:
            - /url: https://cloud.google.com/tpu/
          - text: offering. So let’s try to break the model apart and look at how it functions.
        - paragraph [ref=e62]:
          - text: The Transformer was proposed in the paper
          - link "Attention is All You Need" [ref=e63] [cursor=pointer]:
            - /url: https://arxiv.org/abs/1706.03762
          - text: . A TensorFlow implementation of it is available as a part of the
          - link "Tensor2Tensor" [ref=e64] [cursor=pointer]:
            - /url: https://github.com/tensorflow/tensor2tensor
          - text: package. Harvard’s NLP group created a
          - link "guide annotating the paper with PyTorch implementation" [ref=e65] [cursor=pointer]:
            - /url: http://nlp.seas.harvard.edu/2018/04/03/attention.html
          - text: . In this post, we will attempt to oversimplify things a bit and introduce the concepts one by one to hopefully make it easier to understand to people without in-depth knowledge of the subject matter.
        - paragraph [ref=e66]:
          - strong [ref=e67]: 2025 Update
