    - paragraph [ref=e124]
    - paragraph [ref=e125]: Mechanistic interpretability seeks to understand neural networks by breaking them into components that are more easily understood than the whole. By understanding the function of each component, and how they interact, we hope to be able to reason about the behavior of the entire network. The first step in that program is to identify the correct components to analyze.
    - paragraph [ref=e126]:
      - text: "Unfortunately, the most natural computational unit of the neural network – the neuron itself – turns out not to be a natural unit for human understanding. This is because many neurons are polysemantic: they respond to mixtures of seemingly unrelated inputs. In the vision model Inception v1, a single neuron responds to faces of cats and fronts of cars"
      - generic [ref=e129]: "[1]"
      - text: . In a small language model we discuss in this paper,
      - link "a single neuron" [ref=e130] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a-neurons.html?ordering=index#feature-83
      - text: responds to a mixture of academic citations, English dialogue, HTTP requests, and Korean text. Polysemanticity makes it difficult to reason about the behavior of the network in terms of the activity of individual neurons.
    - paragraph [ref=e131]:
      - text: One potential cause of polysemanticity is superposition
      - generic [ref=e134]: "[2, 3, 4, 5]"
      - text: ", a hypothesized phenomenon where a neural network represents more independent \"features\" of the data than it has neurons by assigning each feature its own linear combination of neurons. If we view each feature as a vector over the neurons, then the set of features form an overcomplete linear basis for the activations of the network neurons. In our previous paper on"
      - link "Toy Models of Superposition" [ref=e136] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html#strategic-ways-out
      - generic [ref=e139]: "[5]"
      - text: ", we showed that superposition can arise naturally during the course of neural network training if the set of features useful to a model are sparse in the training data. As in compressed sensing, sparsity allows a model to disambiguate which combination of features produced any given activation vector."
      - superscript [ref=e141]: "1"
    - paragraph [ref=e142]:
      - text: In Toy Models of Superposition, we described
      - link "three strategies" [ref=e143] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html#strategic-ways-out
      - text: "to finding a sparse and interpretable set of features if they are indeed hidden by superposition: (1) creating models without superposition, perhaps by encouraging activation sparsity; (2) using dictionary learning to find an overcomplete feature basis in a model exhibiting superposition; and (3) hybrid approaches relying on a combination of the two. Since the publication of that work, we've explored all three approaches. We eventually developed counterexamples which persuaded us that the sparse architectural approach (approach 1) was insufficient to prevent polysemanticity, and that standard dictionary learning methods (approach 2) had significant issues with overfitting."
    - paragraph [ref=e144]:
      - text: In this paper, we use a weak dictionary learning algorithm called a sparse autoencoder to generate learned features from a trained model that offer a more monosemantic unit of analysis than the model's neurons themselves. Our approach here builds on a significant amount of prior work, especially in using dictionary learning and related methods on neural network activations (e.g.
      - generic [ref=e147]: "[6, 2, 7, 8, 9, 10]"
      - text: ), and a more general allied literature on disentanglement. We also note interim reports
      - generic [ref=e150]: "[11, 12, 13, 14, 15, 16]"
      - text: which independently investigated the sparse autoencoder approach in response to Toy Models, culminating in the recent manuscript of Cunningham et al.
      - generic [ref=e153]: "[17]"
      - text: .
    - paragraph [ref=e154]: The goal of this paper is to provide a detailed demonstration of a sparse autoencoder compellingly succeeding at the goals of extracting interpretable features from superposition and enabling basic circuit analysis. Concretely, we take a one-layer transformer with a 512-neuron MLP layer, and decompose the MLP activations into relatively interpretable features by training sparse autoencoders on MLP activations from 8 billion data points, with expansion factors ranging from 1× (512 features) to 256× (131,072 features). We focus our detailed interpretability analyses on the 4,096 features learned in one run we call A/1.
    - paragraph [ref=e155]:
      - text: This report has four major sections. In
      - link "Problem Setup" [ref=e157] [cursor=pointer]:
        - /url: "#problem-setup"
      - text: ", we provide motivation for our approach and describe the transformers and sparse autoencoders we train. In"
      - link "Detailed Investigations of Individual Features" [ref=e159] [cursor=pointer]:
        - /url: "#feature-analysis"
      - text: ", we offer an existence proof – we make the case that several features we find are functionally specific causal units which don't correspond to neurons. In"
      - link "Global Analysis" [ref=e161] [cursor=pointer]:
        - /url: "#global-analysis"
      - text: ", we argue that the typical feature is interpretable and that they explain a non-trivial portion of the MLP layer. Finally, in"
      - link "Phenomenology" [ref=e163] [cursor=pointer]:
        - /url: "#phenomenology"
      - text: we describe several properties of our features, including
      - link "feature-splitting" [ref=e165] [cursor=pointer]:
        - /url: "#phenomenology-feature-splitting"
      - text: ","
      - link "universality" [ref=e166] [cursor=pointer]:
        - /url: "#phenomenology-universality"
      - text: ", and how they can form"
      - link "\"finite state automata\"-like systems" [ref=e167] [cursor=pointer]:
        - /url: "#phenomenology-fsa"
      - text: implementing interesting behaviors.
    - paragraph [ref=e168]:
      - text: We also provide three comprehensive visualizations of features. First, for all features from
      - link "90 learned dictionaries" [ref=e169] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/
      - text: we present activating dataset examples and downstream logit effects. We recommend the reader begin with the
      - link "visualization of A/1" [ref=e171] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: . Second, we provide a
      - link "data-oriented view" [ref=e172] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/index.html#example-texts
      - text: ", showing all features active on each token of 25 texts. Finally, we coembed all 4,096 features from A/1 and all 512 features from A/0 into the plane using UMAP to allow for interactive exploration of the space of features:"
