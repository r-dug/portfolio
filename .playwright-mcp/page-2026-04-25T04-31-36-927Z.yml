      - text: ) and then completing the forward pass. We record the resulting change in the predicted log-likelihood of each token in the context in the color of an underline of that token. Thus if a feature were active on token [B] in the sequence [A][B][C], and ablating that feature reduced the odds placed on the prediction of C, then there would be an orange background on [B] (the activation) and a blue underline on [C] (the ablation effect), indicating that ablating that feature increased the model’s loss on the prediction of [C] and hence that feature is responsible for improving the model’s ability to predict [C] in that context.
    - heading "Feature Interpretability Rubric" [level=3] [ref=e34560]:
      - link "Feature Interpretability Rubric" [ref=e34561] [cursor=pointer]:
        - /url: "#appendix-rubric"
    - paragraph [ref=e34562]: "Our rubric for scoring how interpretable features are has the following instructions:"
    - list [ref=e34563]:
      - listitem [ref=e34564]: Form an interpretation of the feature based on the positive logits and feature activations across all intervals.
      - listitem [ref=e34565]: On a scale of 0–3, rate your confidence in this interpretation.
      - listitem [ref=e34566]: On a scale of 0–5, rate how consistent the high-activation (bolded) tokens are with your interpretation from (1).
      - listitem [ref=e34567]: On a scale of 0–3, rate how consistent the positive logit effects are with your interpretation from (1).
      - listitem [ref=e34568]: If some of the positive logit effects were inconsistent with your interpretation, was there a separation in effect size between the consistent and inconsistent ones? If so, score as 1, otherwise or if not applicable, score as 0.
      - listitem [ref=e34569]: On a scale of 0–3, how specific is your interpretation of this feature?
    - paragraph [ref=e34570]: "The total score for a feature’s interpretability is the sum of ratings across these steps. Note that the maximum score is 14, because a perfect score on item #4 implies that item #5 is not applicable."
    - heading "Feature Density Histograms" [level=3] [ref=e34571]:
      - link "Feature Density Histograms" [ref=e34572] [cursor=pointer]:
        - /url: "#appendix-feature-density"
    - paragraph [ref=e34573]: While iterating on different techniques, one important proxy for autoencoder performance is feature density. Each feature in our autoencoder only activates on a very small percentage of the total tokens in the training set. We define the feature density of each feature as the fraction of tokens on which the feature has a nonzero value.
    - paragraph [ref=e34574]: We hypothesize that language models contain a large number of features across a distribution of feature densities, and that lower-density features are harder for our autoencoder to discover because they appear less often in the training dataset. Using large training datasets was an attempt to recover such low-density features.
    - paragraph [ref=e34575]: "As one way to measure the performance of an autoencoder, we take all the feature densities and plot a histogram of their distribution on a log scale. Roughly, we look for two histogram metrics: the number of features we’ve recovered, and the minimum feature density among features that we’ve recovered. Anecdotally, we find that these metrics are a decent proxy for subjective autoencoder performance and useful for quick iteration cycles."
    - paragraph [ref=e34576]: Ideally, the autoencoder neurons would be either meaningful features or completely dead. Indeed, training does completely leave some autoencoder neurons unused. Many neurons, however, seem to fall into a third category, which we tentatively name the ultralow density cluster.
