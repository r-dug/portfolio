                  - generic [ref=e11921]: "This feature seems to fire when there are code snippets and programming language examples in the text, especially with programming keywords like \"try\", \"catch\", \"method\", \"class\", etc. or symbols like curly braces ({}), tabs/whitespace, backticks (`) and newlines (\\n). There also seems to be a preference for C# and Java examples."
                - generic [ref=e11922] [cursor=pointer]:
                  - img [ref=e11924]
                  - generic [ref=e11926]: A/0/323
                  - generic [ref=e11927]: "This feature fires when it detects the presence of a question followed by a new line, indicated by the \\n token. The feature seems to specifically look for questions in a Q&A format, with the question preceded by \"Q:\" and followed by a new line. Some of the strongest activations occur when a question is formatted in this way: Q: \\n [question] The feature also seems to fire on multiple new line tokens (\\n\\n), indicating a double space after the question. While the feature responds most strongly to typical phrasing of \"Q:\" followed by the question, it also activates to some degree for other question-related words like \"Why,\" \"What,\" etc. So in summary, the feature is detecting a specific formatting pattern of questions in a Q&A context, looking for \"Q:\", new lines, and the content of the question."
