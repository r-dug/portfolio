          - text: .
          - link "[↩]" [ref=e35464] [cursor=pointer]:
            - /url: "#d-footnote-26"
        - listitem [ref=e35465]:
          - text: Naively, simulating a layer with 100k features would be 100,000 times more expensive than sampling a large language model such as Claude 2 or GPT-4 (we'd need to sample the explaining large model once for every feature at every token). At current prices, this would suggest simulating 100k features on a single 4096 token context would cost $12,500–$25,000, and one would presumably need to evaluate over many contexts.
          - link "[↩]" [ref=e35466] [cursor=pointer]:
            - /url: "#d-footnote-27"
        - listitem [ref=e35467]:
          - text: We generate a model with random weights by randomly shuffling the entries of each weight matrix of the trained transformer used in Run A. This guarantees that the distributions of individual weights match, and differences are due to structure.
          - link "[↩]" [ref=e35468] [cursor=pointer]:
            - /url: "#d-footnote-28"
        - listitem [ref=e35469]:
          - text: From a purely theoretical lens, attention heads can largely implement "three point functions" (with two inputs, and an output). MLP layers are well positioned to instead implement N-token conjunctions, perhaps the most extreme of which are context features or token-in-context features. Thus, it is perhaps natural that we see many of these.
          - link "[↩]" [ref=e35470] [cursor=pointer]:
            - /url: "#d-footnote-29"
        - listitem [ref=e35471]:
          - text: Token-in-context features may offer a significant opportunity for simplifying analysis of the model – as Elhage et al.
          - generic [ref=e35474]: "[38]"
          - text: note, it may be possible to understand these features as two-dimensional family of features parameterized by a context and a token.
          - link "[↩]" [ref=e35475] [cursor=pointer]:
            - /url: "#d-footnote-30"
        - listitem [ref=e35476]:
          - text: Toy Models considered correlated features (see in particular
          - link "organization of correlated features" [ref=e35477] [cursor=pointer]:
