    - heading "Summary of Results" [level=3] [ref=e32119]
    - list [ref=e32120]:
      - listitem [ref=e32121]:
        - text: "Sparse Autoencoders extract relatively monosemantic features. We provide four different lines of evidence:"
        - link "detailed investigations" [ref=e32122] [cursor=pointer]:
          - /url: "#feature-analysis"
        - text: for a few features firing in specific contexts for which we can construct computational proxies,
        - link "human analysis" [ref=e32123] [cursor=pointer]:
          - /url: "#global-analysis-interp-manual"
        - text: for a large random sample of features,
        - link "automated interpretability analysis of activations" [ref=e32124] [cursor=pointer]:
          - /url: "#global-analysis-interp-auto-acts"
        - text: for all the features learned by the autoencoder, and finally
        - link "automated interpretability analysis of logit weights" [ref=e32125] [cursor=pointer]:
          - /url: "#global-analysis-interp-auto-logits"
        - text: for all the features. Moreover, the last three analyses show that most learned features are interpretable. While we do not claim that our interpretations catch all aspects of features' behaviors, by constructing metrics of interpretability consistently for features and neurons, we quantitatively show their relative interpretability.
      - listitem [ref=e32126]:
        - text: Sparse autoencoders produce interpretable features that are effectively invisible in the neuron basis. We find features (e.g.,
        - link "one firing on Hebrew script" [ref=e32127] [cursor=pointer]:
          - /url: "#feature-hebrew"
        - text: ) which are not active in any of the top dataset examples for any of the neurons.
      - listitem [ref=e32128]:
        - text: Sparse autoencoder features can be used to intervene on and steer transformer generation. For example, activating the base64 feature we study causes the model to generate base64 text, and activating the Arabic script feature we study produces Arabic text. (See
        - link "discussion" [ref=e32129] [cursor=pointer]:
          - /url: "#global-analysis-about-model"
        - text: of pinned feature sampling in
        - link "Global Analysis" [ref=e32130] [cursor=pointer]:
          - /url: "#global-analysis"
        - text: .)
      - listitem [ref=e32131]:
        - text: Sparse autoencoders produce relatively universal features. Sparse autoencoders applied to different transformer language models produce mostly similar features, more similar to one another than they are to their own model's neurons. (See
        - link "Universality" [ref=e32132] [cursor=pointer]:
          - /url: "#phenomenology-universality"
        - text: )
      - listitem [ref=e32133]:
        - text: Features appear to "split" as we increase autoencoder size. When we gradually increase the width of the autoencoder from 512 (the number of neurons) to over 131,000 (256×), we find features which naturally fit together into families. For example, one base64 feature in a small dictionary
        - link "splits into three" [ref=e32134] [cursor=pointer]:
          - /url: "#features-seem-like-bugs-2"
        - text: ", with more subtle and yet still interpretable roles, in a larger dictionary. The different size autoencoders offer different \"resolutions\" for understanding the same object. (See"
        - link "Feature Splitting" [ref=e32135] [cursor=pointer]:
          - /url: "#phenomenology-feature-splitting"
        - text: .)
      - listitem [ref=e32136]: Just 512 neurons can represent tens of thousands of features. Despite the MLP layer being very small, we continue to find new features as we scale the sparse autoencoder.
      - listitem [ref=e32137]:
        - text: Features connect in "finite-state automata"-like systems that implement complex behaviors. For example, we find features that work together to generate valid HTML. (See
        - link "\"Finite State Automata\"" [ref=e32138] [cursor=pointer]:
          - /url: "#phenomenology-fsa"
        - text: .)
    - separator [ref=e32139]
    - heading "Problem Setup" [level=2] [ref=e32140]:
      - link "Problem Setup" [ref=e32141] [cursor=pointer]:
        - /url: "#problem-setup"
    - paragraph [ref=e32142]: "A key challenge to our agenda of reverse engineering neural networks is the curse of dimensionality: as we study ever-larger models, the volume of the latent space representing the model's internal state that we need to interpret grows exponentially. We do not currently see a way to understand, search or enumerate such a space unless it can be decomposed into independent components, each of which we can understand on its own."
    - paragraph [ref=e32143]:
      - text: In certain limited cases, it is possible to side step these issues by rewriting neural networks in ways that don't make reference to certain hidden states. For example, in A Mathematical Framework for Transformer Circuits
      - generic [ref=e32146]: "[18]"
      - text: ", we were able to analyze a one-layer attention-only network without addressing this problem. But this approach becomes impossible if we consider even a simple standard one-layer transformer with an MLP layer with a ReLU activation function. Understanding such a model requires us to have a way to decompose the MLP layer."
    - paragraph [ref=e32147]: "In some sense, this is the simplest language model we profoundly don't understand. And so it makes a natural target for our paper. We aim to take its MLP activations – the activations we can't avoid needing to decompose – and decompose them into \"features\":"
    - figure [ref=e32148]:
      - img [ref=e32149]
    - paragraph [ref=e32150]:
      - text: Crucially, we decompose into more features than there are neurons. This is because we believe that the MLP layer likely uses superposition
      - generic [ref=e32153]: "[2, 3, 4, 5]"
      - text: to represent more features than it has neurons (and correspondingly do more useful non-linear work!). In fact, in our largest experiments we'll expand to have 256 times more features than neurons, although we'll primarily focus on a more modest 8× expansion.
