        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-416
      - text: has high activation specificity in the upper spectrum. It does weakly activate for other things (especially other languages with Unicode scripts). There is also some blue in strong activations; this appears to significantly be on "common characters", such as whitespace or punctuation, which are from other unicode blocks (see more discussion of similar issues in the
      - link "Arabic feature section" [ref=e33405] [cursor=pointer]:
