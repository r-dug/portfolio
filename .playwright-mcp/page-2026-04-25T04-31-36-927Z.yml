                - text: "}"
          - text: . At a given token
          - generic [ref=e35578]:
            - text: t_j
            - generic [ref=e35580]:
              - math [ref=e35582]:
                - generic [ref=e35585]:
                  - generic [ref=e35586]: t
                  - generic [ref=e35587]: j
