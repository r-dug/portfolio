        - listitem [ref=e35454]:
          - text: In order to sample uniformly across the spectrum of feature activations, we divide the activation spectrum into 11 "activation intervals" evenly spaced between 0 activation and the maximum activation. We sample uniformly from these intervals.
          - link "[↩]" [ref=e35455] [cursor=pointer]:
            - /url: "#d-footnote-22"
        - listitem [ref=e35456]:
          - text: It's worth explicitly stating that our automated interpretability setup was designed to ensure that there's no leak of information about activation patterns, except for the explanation. For example, when predicting new activations, the model cannot see any true activations of that feature.
          - link "[↩]" [ref=e35457] [cursor=pointer]:
            - /url: "#d-footnote-23"
        - listitem [ref=e35458]:
          - text: This is distinct from the evaluation strategy of Bills et al., who calculated their correlation of predicted and true activations on a mixture of maximal dataset examples and random samples. For sparse features, which don't fire on most random samples, this effectively tests the model's ability to distinguish a feature's large activations from zero.
