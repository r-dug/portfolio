              - text: (
              - generic [ref=e32720]:
                - generic [ref=e32721]: x
                - generic [ref=e32726]: j
              - text: )
        - text: is large) that makes sense on a diverse dataset (including potentially synthetic or off-distribution examples meant to test the hypothesis).
        - superscript [ref=e32728]: "4"
      - listitem [ref=e32729]:
        - text: We can interpret the downstream effects of each feature, i.e. the effect of changing the value of
        - generic [ref=e32730]:
          - text: f_i
          - generic [ref=e32732]:
            - math [ref=e32734]:
