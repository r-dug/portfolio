          - text: . The attribution vector is given by stacking the attribution scores for a random sampling of datapoints. This approximates the classic attribution method of multiplying the gradient by the activation, differing in that we ignore the denominators of the softmax and the layer norm.
          - link "[↩]" [ref=e35763] [cursor=pointer]:
            - /url: "#d-footnote-40"
        - listitem [ref=e35764]:
          - text: The "finite state automata"-esque feature assemblies are also different from circuits in that the model didn't learn them to work together. Rather, in the course of learning to autoregressively model text, it learned features that interact via the token stream because of patterns in the real datasets. In contrast, a language model trained with reinforcement learning might have systems like this – circuits whose feature components interact via generated tokens – which co-evolved and adapted to work together during RL training.
          - link "[↩]" [ref=e35765] [cursor=pointer]:
            - /url: "#d-footnote-41"
        - listitem [ref=e35766]:
          - text: The right mode in this example may actually be split into two modes, one around
          - generic [ref=e35767]:
            - text: "10^{-5}"
            - generic [ref=e35769]:
              - math [ref=e35771]:
                - generic [ref=e35773]:
                  - generic [ref=e35774]: "1"
                  - generic [ref=e35775]:
                    - generic [ref=e35776]: "0"
                    - generic [ref=e35777]:
                      - generic [ref=e35778]: −
                      - generic [ref=e35779]: "5"
              - generic [ref=e35781]:
                - text: "1"
                - generic [ref=e35782]:
                  - text: "0"
                  - generic [ref=e35788]: −5
          - text: and another around
          - generic [ref=e35789]:
            - text: "10^{-3}"
            - generic [ref=e35791]:
              - math [ref=e35793]:
                - generic [ref=e35795]:
                  - generic [ref=e35796]: "1"
                  - generic [ref=e35797]:
                    - generic [ref=e35798]: "0"
                    - generic [ref=e35799]:
                      - generic [ref=e35800]: −
                      - generic [ref=e35801]: "3"
              - generic [ref=e35803]:
                - text: "1"
                - generic [ref=e35804]:
                  - text: "0"
                  - generic [ref=e35810]: −3
          - text: . We are still investigating the nature of this split.
          - link "[↩]" [ref=e35811] [cursor=pointer]:
            - /url: "#d-footnote-42"
        - listitem [ref=e35812]:
          - text: We are explicit in keeping all of these examples separate from the ones used when we test on activation predictions.
          - link "[↩]" [ref=e35813] [cursor=pointer]:
            - /url: "#d-footnote-43"
        - listitem [ref=e35814]:
          - text: The top activating tokens out of context examples inherit the weighting of the top activating examples quantile.
          - link "[↩]" [ref=e35815] [cursor=pointer]:
            - /url: "#d-footnote-44"
