    - generic [ref=e34051]:
      - heading "Replication & Tutorial" [level=3] [ref=e34052]:
        - link "Replication & Tutorial" [ref=e34053] [cursor=pointer]:
          - /url: "#comment-nanda"
      - paragraph [ref=e34055]:
        - text: Neel Nanda is an external mechanistic interpretability researcher. This is a summary of
        - link "a blog post" [ref=e34056] [cursor=pointer]:
          - /url: https://www.alignmentforum.org/posts/fKuugaxt2XLTkASkk/open-source-replication-and-commentary-on-anthropic-s
        - text: replicating and extending this paper, with
        - link "an accompanying tutorial" [ref=e34057] [cursor=pointer]:
          - /url: https://colab.research.google.com/drive/1u8larhpxy8w4mMsJiSBddNOzFGj7_RTn?usp=sharing
        - text: to load some trained autoencoders and practice interpreting a feature.
      - generic [ref=e34058]:
        - paragraph [ref=e34059]: The core results of this paper seem to replicate. I trained a sparse autoencoder on the MLP layer of an open source 1 layer GELU language model, and a significant fraction of the latent space features were interpretable.
        - paragraph [ref=e34060]:
          - text: I've open sourced two trained autoencoders and
          - link "a tutorial for how to use them, and how to interpret a feature" [ref=e34061] [cursor=pointer]:
            - /url: https://colab.research.google.com/drive/1u8larhpxy8w4mMsJiSBddNOzFGj7_RTn?usp=sharing
          - text: . I've also open sourced a (very!) rough
          - link "training codebase" [ref=e34062] [cursor=pointer]:
            - /url: https://github.com/neelnanda-io/1L-Sparse-Autoencoder
          - text: ", along with some"
          - link "of the implementation details" [ref=e34063] [cursor=pointer]:
            - /url: https://www.alignmentforum.org/posts/fKuugaxt2XLTkASkk/open-source-replication-and-commentary-on-anthropic-s#Implementation_Details
          - text: that came up, and tips for training your own.
        - paragraph [ref=e34064]:
          - text: I investigated
          - link "how sparse the decoder weights are in the neuron basis" [ref=e34065] [cursor=pointer]:
            - /url: https://www.alignmentforum.org/posts/fKuugaxt2XLTkASkk/open-source-replication-and-commentary-on-anthropic-s#Exploring_Neuron_Sparsity
          - text: and find that they’re highly distributed, with 4% well explained by a single neuron, 4% well explained by 2 to 10, and the remaining 92% dense. I find this pretty surprising! Despite this, kurtosis shows the neuron basis is still privileged.
        - figure [ref=e34066]:
          - img [ref=e34067]
        - paragraph [ref=e34068]:
          - text: I also exhibit
          - link "some case studies" [ref=e34069] [cursor=pointer]:
            - /url: https://www.alignmentforum.org/posts/fKuugaxt2XLTkASkk/open-source-replication-and-commentary-on-anthropic-s#Case_Studies
          - text: of the features I found, like a title case feature, and an "and I" feature
        - paragraph [ref=e34070]:
          - text: I didn’t find any dead features, but more than half of the features form
          - link "an ultra-low frequency cluster" [ref=e34071] [cursor=pointer]:
            - /url: https://www.alignmentforum.org/posts/fKuugaxt2XLTkASkk/open-source-replication-and-commentary-on-anthropic-s#Ultra_Low_Frequency_Features_Are_All_The_Same_Feature
          - text: (frequency less than 1e-4). Surprisingly, I find that this cluster is almost all the same feature (in terms of encoder weights, but not in terms of decoder weights). On one input 95% of these ultra rare features fired!
        - list [ref=e34072]:
          - listitem [ref=e34073]: The same direction forms across random seeds, suggesting it's a true thing about the model and not just an autoencoder artifact
          - listitem [ref=e34074]: I failed to interpret what this shared direction was
          - listitem [ref=e34075]: I tried to fix the problem by training an autoencoder to be orthogonal to this direction but it still forms a ultra-low frequency cluster (which all cluster in a new direction)
        - paragraph [ref=e34076]:
          - text: One question from this work is whether the encoder and decoder should be tied. I find that, empirically,
          - link "the decoder and encoder weights for each feature are moderately different" [ref=e34077] [cursor=pointer]:
            - /url: https://www.alignmentforum.org/posts/fKuugaxt2XLTkASkk/open-source-replication-and-commentary-on-anthropic-s#Misc_Questions
          - text: ", with median cosine similiarty of only 0.5, which is empirical evidence they're doing different things and should not be tied. Conceptually, the encoder and decoder are doing different things: the encoder is detecting, finding the optimal direction to project onto to detect the feature, minimising interference with other similar features, while the decoder is trying to represent the feature, and tries to approximate the “true” feature direction regardless of any interference."
