    - paragraph [ref=e34642]:
      - text: The one-layer transformers we study are trained on the Pile
      - generic [ref=e34645]: "[19]"
      - text: . We chose to train these models on the Pile over Anthropic's internal dataset in order to make our experiments more reproducible. While we think many features are universal, others are very likely idiosyncratic to the dataset.
    - paragraph [ref=e34646]:
      - text: We train the transformers on 100 billion tokens using the Adam optimizer
      - generic [ref=e34649]: "[73]"
      - text: . We hypothesize that a very high number of training tokens may allow our model to learn cleaner representations in superposition. These transformers have a residual stream dimension of 128, and an inner MLP dimension of 512. The MLP activation is a ReLU.
    - 'heading "Advice for Training Sparse Autoencoders: Autoencoder Dataset and Basic Training" [level=3] [ref=e34650]':
      - 'link "Advice for Training Sparse Autoencoders: Autoencoder Dataset and Basic Training" [ref=e34651] [cursor=pointer]':
        - /url: "#appendix-autoencoder-dataset"
    - paragraph [ref=e34652]: To create the dataset for autoencoder training, we evaluate the transformers on 40 million contexts from the Pile and collect the MLP activation vectors after the ReLU for each token within each context. We then sample activation vectors from 250 tokens in each context and shuffle these together so that samples within a batch come from diverse contexts.
    - paragraph [ref=e34653]:
      - text: For training, we sample MLP activation vectors without replacement using a batch size of 8192. We’ve found that sampling without replacement (i.e., not repeating data) is important for optimal results. We perform 1 million update steps, using just over 8 billion activation vectors out of the total dataset size of 10 billion. We use an Adam optimizer
      - generic [ref=e34656]: "[73]"
      - text: to minimize the sum of mean squared error loss and an L1 regularization penalty on the hidden layer activations of the autoencoder.
    - 'heading "Advice for Training Sparse Autoencoders: Autoencoder Architecture" [level=3] [ref=e34657]':
