          - text: and
          - link "collapsing of correlated features" [ref=e35478] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2022/toy_model/index.html#geometry-collapsing
          - text: ), but only features which were correlated in whether they were active (and not their value if active), and had nothing analogous to the similar "output actions" described here. Nonetheless, Toy Models' experiments may be a useful intuition pump, especially in noticing the distinction between similar features in superposition vs features collapsing into a single broader feature.
          - link "[↩]" [ref=e35479] [cursor=pointer]:
            - /url: "#d-footnote-31"
        - listitem [ref=e35480]:
          - text: For each pair of features, we compute the cosine similarity between their activations on the subset of tokens for which one of them fires. We repeat this, restricting to the subset on which the other fires, and take the greater of the two. We draw a connection between the features if this measure exceeds ~0.4. This threshold was chosen to balance producing a small enough graph to visualize while also showing some of the richness of feature splitting. We omit the ultralow density features from this analysis.
          - link "[↩]" [ref=e35481] [cursor=pointer]:
            - /url: "#d-footnote-32"
        - listitem [ref=e35482]:
          - text: The features fire on the token " P" of words where it appears as the first token, such as
          - code [ref=e35483]: "[ P][attern]"
          - text: .
          - link "[↩]" [ref=e35484] [cursor=pointer]:
            - /url: "#d-footnote-33"
        - listitem [ref=e35485]:
          - text: In this instance we found the refined
          - code [ref=e35486]: P
          - text: features by manual inspection rather than by cosine similarity.
          - link "[↩]" [ref=e35487] [cursor=pointer]:
            - /url: "#d-footnote-34"
        - listitem [ref=e35488]:
          - text: Our initial clue that
          - link "A/1/1544" [ref=e35489] [cursor=pointer]:
            - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-1544
          - text: might fire on base64 strings encoding ASCII text was the token
          - code [ref=e35490]: ICAgICAg
          - text: which this feature particularly responds to, and corresponds to six spaces in a row.
          - link "[↩]" [ref=e35491] [cursor=pointer]:
            - /url: "#d-footnote-35"
        - listitem [ref=e35492]:
          - text: Determining when a dataset example encodes ASCII text is somewhat subtle because base64 can only be decoded to ASCII in groups of four characters, since four base64 characters
          - link "encode triples" [ref=e35493] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Base64#Examples
          - text: of ASCII characters. Thus, we select substrings which – when decoded with the python base64 library – contain the maximal number of printable ASCII characters.
          - link "[↩]" [ref=e35494] [cursor=pointer]:
            - /url: "#d-footnote-36"
        - listitem [ref=e35495]:
          - text: In what sense does universality suggest features are "real"? One basic observation is that they suggest the features we're finding are not just artifacts of the dictionary learning process – or at least that if they come from the dictionary learning process, it's in some consistent way. But there are also several deeper ways in which it's suggestive. It means that, whatever the source of the features, we can talk about features as replicable, reliable, recurring units of analysis. It's also just a surprising observation that one would expect if a strong version of the features in superposition hypothesis was true and models were literally representing some finite, discrete set of features in superposition.
          - link "[↩]" [ref=e35496] [cursor=pointer]:
            - /url: "#d-footnote-37"
        - listitem [ref=e35497]:
          - text: In fact, we found some features so universal that we began to take it for granted as a basic tool in our workflow of evaluating dictionary learning runs. For example, the base64 feature – which we previously observed in SoLU models – was so consistently universal that its presence was a useful debugging heuristic.
          - link "[↩]" [ref=e35498] [cursor=pointer]:
            - /url: "#d-footnote-38"
        - listitem [ref=e35499]:
          - text: The feature is bimodal, monosemantic in the larger of the modes, and fires on 0.02% of tokens. This means that at least 1 in 10,000 tokens in the Pile dataset are abbreviations for PLoS journals in citations! This is an example of how inspecting features can reveal properties of the dataset, in this case the strong bias of the Pile towards scientific content.
          - link "[↩]" [ref=e35500] [cursor=pointer]:
            - /url: "#d-footnote-39"
        - listitem [ref=e35501]:
          - text: Suppose feature
          - generic [ref=e35502]:
            - text: f_i
            - generic [ref=e35504]:
              - math [ref=e35506]:
                - generic [ref=e35509]:
                  - generic [ref=e35510]: f
                  - generic [ref=e35511]: i
              - generic [ref=e35514]:
                - text: f
                - generic [ref=e35519]: i
          - text: has logit weights
          - generic [ref=e35523]:
            - text: "v_{ik}"
            - generic [ref=e35525]:
              - math [ref=e35527]:
                - generic [ref=e35530]:
                  - generic [ref=e35531]: v
                  - generic [ref=e35532]:
                    - generic [ref=e35533]: i
