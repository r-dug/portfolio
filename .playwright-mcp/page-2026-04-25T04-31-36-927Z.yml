        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/b1.html#feature-3680
      - text: . Their top logit weights agree, and are DNA tokens (e.g.
      - code [ref=e33345]: AGT
      - text: ) forming a separate mode (circled on the right) than the bulk of the logit weights for both.
