    - separator [ref=e33438]
    - heading "Global Analysis" [level=2] [ref=e33439]:
      - link "Global Analysis" [ref=e33440] [cursor=pointer]:
        - /url: "#global-analysis"
    - paragraph [ref=e33441]: If the previous section has persuaded you that at least some of the features are genuinely interpretable and reflect the underlying model mechanics, it's natural to wonder how broadly this holds outside of those cherry-picked features. The primary focus of this section will be to answer the question, "how interpretable are the rest of the features?" We show that both humans and large language models find our features to be significantly more interpretable than neurons, and quite interpretable in absolute terms.
    - paragraph [ref=e33442]: There are a number of other questions one might also ask. To what extent is our dictionary learning method discovering all the features necessary to understand the MLP layer? Holistically, how much of the MLP layer's mechanics have been made interpretable? We are not yet able to fully answer these questions to our satisfaction, but will provide some preliminary speculation towards the end of this section.
    - paragraph [ref=e33443]:
      - text: We note that of the 4,096 learned features in the A/1 autoencoder, 168 of them are "dead" (active on none of the 100 million dataset) and 292 of them are "ultralow density", active on less than 1 in a million dataset examples and exhibiting
      - link "other atypical properties" [ref=e33444] [cursor=pointer]:
        - /url: "#appendix-feature-density"
      - text: . We exclude both these groups of features from further analyses.
    - heading "How Interpretable is the Typical Feature?" [level=3] [ref=e33445]:
      - link "How Interpretable is the Typical Feature?" [ref=e33446] [cursor=pointer]:
        - /url: "#global-analysis-interp"
    - paragraph [ref=e33447]: "In this section, we use three different methods to analyze how interpretable the typical feature is, and how that compares to neurons: human analysis, and two forms of automated interpretability. All three approaches find that features are much more interpretable than neurons."
    - heading "Manual Human Analysis" [level=4] [ref=e33448]:
      - link "Manual Human Analysis" [ref=e33449] [cursor=pointer]:
        - /url: "#global-analysis-interp-manual"
    - paragraph [ref=e33450]:
      - text: At present, we do not have any metric we trust more than human judgment of interpretability. Thus, we had a blinded annotator (one of the authors, Adam Jermyn) score features and neurons based on how interpretable they are. The scoring rubric can be found in the
      - link "appendix" [ref=e33451] [cursor=pointer]:
        - /url: "#appendix-rubric"
      - text: and accounts for confidence in an explanation, consistency of the activations with that explanation, consistency of the logit output weights with that explanation, and specificity.
    - paragraph [ref=e33452]:
      - text: In doing this evaluation, we wanted to avoid a weakness we perceived in our prior work (e.g.,
      - generic [ref=e33455]: "[38]"
      - text: ) of focusing evaluation predominantly on maximal dataset examples, and paying less attention to the rest of the activation spectrum. Many polysemantic neurons appear monosemantic if you only look at top dataset examples, but are revealed to be polysemantic if you look at lower parts of the activation spectrum. To avoid this, we draw samples uniformly across the spectrum of feature activations,
      - superscript [ref=e33456]: "22"
      - text: and score each interval separately in light of the overall hypothesis suggested by the feature.
    - paragraph [ref=e33457]: Unfortunately, this approach is labor intensive and so the number of scored samples is small. In total, 412 feature activation intervals were scored across 162 features and neurons.
    - figure [ref=e33458]:
      - img [ref=e33459]
    - paragraph [ref=e33460]: We see that features are substantially more interpretable than neurons. Very subjectively, we found features to be quite interpretable if their rubric value was above 8. The median neuron scored 0 on our rubric, indicating that our annotator could not even form a hypothesis of what the neuron could represent! Whereas the median feature interval scored a 12, indicating that the annotator had a confident, specific, consistent hypothesis that made sense in terms of the logit output weights.
    - paragraph
    - heading "Automated Interpretability – Activations" [level=4] [ref=e33461]:
      - link "Automated Interpretability – Activations" [ref=e33462] [cursor=pointer]:
        - /url: "#global-analysis-interp-auto-acts"
    - paragraph [ref=e33463]:
      - text: To analyze features at a larger scale, we turned to automated interpretability
      - generic [ref=e33466]: "[45, 46]"
      - text: . Following the approach of Bills et al.
      - generic [ref=e33469]: "[45]"
      - text: ", we have a large language model, Anthropic’s Claude, generate explanations of features using examples of tokens where they activate. Next, we have the model use that explanation to predict new activations on previously unseen tokens."
      - superscript [ref=e33470]: "23"
    - paragraph [ref=e33471]:
      - text: Like with the human analysis, we used samples across the full range of activation intervals to evaluate monosemanticity.
      - superscript [ref=e33473]: "24"
      - text: Concretely, for each feature, we computed the Spearman correlation coefficient between the predicted activation and the true activations for 60 dataset examples made up of nine tokens each, resulting in 540 predictions per feature. While only using completely random sequences would be the most principled approach to scoring, half of the examples are from across the feature intervals to get a more accurate correlation. See
      - link "the appendix" [ref=e33474] [cursor=pointer]:
        - /url: "#appendix-automated"
      - text: for additional information including the use of importance scoring to precisely counter-weight the bias of providing tokens the feature fires for.
    - paragraph [ref=e33475]:
      - text: In agreement with the human analysis, Claude is able to explain and predict activations for features significantly better than for neurons.
      - superscript [ref=e33476]: "25"
    - figure [ref=e33477]:
      - img [ref=e33478]
    - heading "Automated Interpretability – Logit Weights" [level=4] [ref=e33479]:
      - link "Automated Interpretability – Logit Weights" [ref=e33480] [cursor=pointer]:
        - /url: "#global-analysis-interp-auto-logits"
    - paragraph [ref=e33481]: In our earlier analysis of individual features, we found that looking at the logits is a powerful tool for cross-validating the interpretability of features. We can take this approach in automated interpretability as well. Using the explanations of features generated in the previous analysis, we ask a language model to predict if a previously unseen logit token is something the feature should predict as likely to come next. This is then scored against a 50/50 mix of top positive logit tokens and random other logit tokens. Randomly guessing would give a 50% accuracy, but the model instead achieves a 74% average across features, compared to a 58% average across neurons. Failures here refer to instances where Claude failed to reply in the correct format for scoring.
    - figure [ref=e33482]:
      - img [ref=e33483]
    - heading "Activation Interval Analysis" [level=4] [ref=e33484]:
      - link "Activation Interval Analysis" [ref=e33485] [cursor=pointer]:
        - /url: "#global-analysis-interp-intervals"
    - paragraph [ref=e33486]: In addition to studying features as a whole, in our manual analysis we can zoom in on portions of the feature activation spectrum using the feature intervals. As before, a feature interval is the set of examples with activations closest to a specific evenly-spaced fraction of the max activation. So, rather than asking if a feature seems interpretable, we ask whether a range of activations is consistent with the overall hypothesis suggested by the full spectrum of the feature’s activation. This allows us to ask how interpretability changes with feature activation strength.
    - figure [ref=e33487]:
      - img [ref=e33488]
    - paragraph [ref=e33489]: "Higher-activating feature intervals were more consistent with our interpretations than lower-activating ones. In particular:"
    - list [ref=e33490]:
      - listitem [ref=e33491]: Many features show consistent activations across the entire activation spectrum.
      - listitem [ref=e33492]: Some features show consistent activations across the top ~60% of the activation spectrum, and then quickly become less interpretable as we look to smaller and smaller activations.
    - paragraph [ref=e33493]: It is possible that this is a sign that our features are not quite right. For instance, if one of our features is at a slight angle to the feature we’d really like to have learned, that can show up as inconsistent behavior in the lower activation intervals.
    - heading "Caveats" [level=4] [ref=e33494]:
      - link "Caveats" [ref=e33495] [cursor=pointer]:
        - /url: "#global-analysis-interp-caveats"
    - paragraph [ref=e33496]: "Our manual and automated interpretability experiments have a few caveats:"
    - list [ref=e33497]:
      - listitem [ref=e33498]:
        - text: Feature activations are skewed towards the lower intervals. Most feature activations are quite small, and so fall in the lower (and less-interpretable) feature intervals. That said, as we found in our detailed analysis, most of the effect of a feature
        - superscript [ref=e33500]: "26"
        - text: is due to its higher activations, which are quite interpretable.
      - listitem [ref=e33501]:
        - text: The evaluated features are sampled uniformly from among the set of all features, and interpretability might be correlated with importance. One could imagine evaluating the features with the largest magnitude of activations, or the largest effect when ablated. Our sense is that these would be more interpretable than the randomly sampled features we considered. One could imagine a situation where the most important features in some sense were systematically less interpretable, though inspection of the
        - link "most active features" [ref=e33502] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html?ordering=max_dense
        - text: suggests the opposite.
    - paragraph [ref=e33503]:
      - text: Based on our inspection of many features in the visualization, we believe these caveats do not affect the experimental results. We encourage interested readers to open the visualization for
      - link "A/1" [ref=e33504] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: and the
      - link "corresponding neurons" [ref=e33505] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a-neurons.html
      - text: . You can sort by ‘random’ to get an unbiased sample and do your own version of the above experiment, or sort features by importance metrics such as max activation and max density to evaluate the final caveat above.
    - heading "How much of the model does our interpretation explain?" [level=3] [ref=e33506]:
      - link "How much of the model does our interpretation explain?" [ref=e33507] [cursor=pointer]:
        - /url: "#global-analysis-how-much"
    - paragraph [ref=e33508]: We now turn to the question we're least able to answer – to what extent do these seemingly interpretable features represent the "full story" of the MLP? One could imagine posing this question in a variety of ways. What fraction of the MLP loss contribution have we made interpretable? How much model behavior can we understand? If there really are some discrete set of "true features", what fraction have we discovered?
    - paragraph [ref=e33509]:
      - text: One way to partly get at this question is to ask how much of the loss is explained by our features. For
      - link "A/1" [ref=e33510] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: ", the run we've focused most on in this paper, 79% of the log-likelihood loss reduction provided by the MLP layer is recovered by our features. That is, the additional loss incurred by replacing the MLP activations with the autoencoder's output is just 21% of the loss that would be incurred by zero ablating the MLP. This loss penalty can be reduced by using more features, or using a lower L1 coefficient. As an extreme example,"
      - link "A/" [ref=e33511] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a5.html
      - link "5" [ref=e33512] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a5.html
      - text: (
      - code [ref=e33513]: n_learned_sparse=131,072
      - text: ","
      - code [ref=e33514]: l1_coefficient=0.004
      - text: ) recovers 94.5% of log-likelihood loss.
    - paragraph [ref=e33515]:
      - text: These numbers should be taken with a significant grain of salt. The biggest issue is that framing this question in terms of fraction of loss may be misleading – we expect there to be a long-tail of features such that as the fraction of loss explained increases, more and more features are needed to explain the residual. Another issue is that we don't believe our features are completely monosemantic (some polysemanticity may be hiding in low activations), nor are all of them necessarily cleanly interpretable. With all of that said, our
      - link "earlier analyses" [ref=e33516] [cursor=pointer]:
        - /url: "#feature-analysis"
      - text: of individual features (e.g. the Arabic feature, base64 feature, etc.) do show that specific interpretable features are used by the model in interpretable ways – ablating them decreases probabilities in the appropriate way, and artificially activating them causes a corresponding behavior. This seems to confirm that the 79% of loss recovered is measuring something real, despite these caveats.
    - paragraph [ref=e33517]:
      - text: "In principle, one could use automated interpretability to produce a better measure here: replacing activations with those predicted from explanations. (We believe others in the community have recently been considering this!) The naive versions of this would be quite computationally expensive,"
      - superscript [ref=e33518]: "27"
      - text: although there may be approximations. More generally, there is a much broader space of possibilities here. Perhaps there's a principled way to do this analysis in terms of single features – there are significant conceptual issues, but one might be able to formalize earlier notions of "feature importance" as an independent loss contribution a feature makes, and then analyze how much of that specific feature can be recovered.
    - paragraph [ref=e33519]: Overall, we view the problem of measuring the degree to which a feature-based interpretation explains a model to be an important open question, where significant work is necessary on both defining metrics and finding efficient ways to compute them.
    - heading "Do features tell us about the model or the data?" [level=3] [ref=e33520]:
      - link "Do features tell us about the model or the data?" [ref=e33521] [cursor=pointer]:
        - /url: "#global-analysis-about-model"
    - paragraph [ref=e33522]: "A model's activations reflect two things: the distribution of the dataset and the way that distribution is transformed by the model. Dictionary learning on activations thus mixes data and model properties, and intriguing properties of learned features may be attributed to either or both sources. Correlations in the data can persist after application of the first part of the model (up to the MLP), and it is in theory possible that the intriguing features we see are merely artifacts of dataset correlations projected into a different space. However, the use of those features by the second half of the model (MLP downprojection and unembedding) are not an input to dictionary learning, so the interpretability of the downstream effects of those features must be a property of the model."
    - paragraph [ref=e33523]:
      - text: To assess the effect of dataset correlations on the interpretability of feature activations, we run dictionary learning on a version of our one-layer model with random weights.
      - superscript [ref=e33524]: "28"
      - text: The resulting features are
      - link "here" [ref=e33525] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/random1.html
      - text: ", and contain many single-token features (such as \"span\", \"file\", \".\", and \"nature\") and some other features firing on seemingly arbitrary subsets of different broadly recognizable contexts (such as"
      - link "LaTeX" [ref=e33526] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/random1.html#feature-1143
      - text: or
      - link "code" [ref=e33527] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/random1.html#feature-3050
      - text: ). However, we are unable to construct interpretations for the non-single-token features that make much sense and invite the reader to examine feature visualizations from the model with randomized weights to confirm this for themselves. We conclude that the learning process for the model creates a richer structure in its activations than the distribution of tokens in the dataset alone.
    - paragraph [ref=e33528]: "To assess the interpretability of the downstream feature effects, we again use the three main approaches of the previous section:"
    - list [ref=e33529]:
      - listitem [ref=e33530]:
        - text: Logit weight inspection. The logit weights represent the effect of each feature on the logits, and, as demonstrated in our earlier
        - link "investigations of individual features" [ref=e33531] [cursor=pointer]:
          - /url: "#feature-analysis"
        - text: ", they are consistent with the feature activations for the base64, Arabic, and Hebrew features. The reader is invited to inspect logit weights for all features in the visualization."
      - listitem [ref=e33532]: Feature ablation. We set the value of a feature to zero throughout a context, and record how the loss on each token changes. Ablations are available for all features in the visualization.
      - listitem [ref=e33533]: Pinned feature sampling. We artificially pinned the value of a feature to a fixed high number and then sample from the model. We find that the generated text matches the interpretation of the feature.
    - figure [ref=e33534]:
      - img [ref=e33535]
    - paragraph [ref=e33536]: The empirical consistency of feature activations with their downstream effects across all these metrics provides evidence that the features found are being used by the model.
    - separator [ref=e33537]
    - heading "Phenomenology" [level=2] [ref=e33538]:
      - link "Phenomenology" [ref=e33539] [cursor=pointer]:
        - /url: "#phenomenology"
    - paragraph [ref=e33540]:
      - text: Ultimately, the goal of our work is to understand neural networks. Decomposition of models into features is simply a means to this end, and one might very reasonably wonder if it's genuinely advancing our overall goal. So, in this section, we'll turn attention to the lessons these features can teach us about neural networks. (We've taken to calling this work of leveraging our theoretical understanding to reason about model properties phenomenology by analogy to
      - link "phenomenology in physics" [ref=e33541] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Phenomenology_(physics)
      - text: ", and the"
      - link "2019 ICML workshop" [ref=e33542] [cursor=pointer]:
        - /url: https://deep-phenomena.org/
      - text: on phenomena in deep learning.)
    - paragraph [ref=e33543]:
      - text: One way to do this would be to give a detailed discussion of the features we've found (similar to
      - generic [ref=e33546]: "[47, 48]"
      - text: ), but we believe the best way to get a sense of the features we discovered is simply to
      - link "browse the interface" [ref=e33547] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: for exploring features which we've published alongside this paper. The features we find vary enormously, and no concise summary will capture their breadth. Instead, we will largely focus on more abstract properties and patterns that we notice. These abstract properties will be able to inform – although by no means answer – questions like "Are these the real features?" and "What is actually going on in a one-layer model?"
    - paragraph [ref=e33548]: We begin by discussing some basic motifs and observations about features. We'll then discuss how the features we relate compare to features in other dictionary learning runs and in other models. This will suggest that features are universal and that dictionary learning can be understood as a process of feature splitting that reflects something deep about the geometry of superposition. Finally, we'll explore how features connect together into "finite state automata" as systems that implement more complex behaviors.
    - heading "Feature Motifs" [level=3] [ref=e33549]:
      - link "Feature Motifs" [ref=e33550] [cursor=pointer]:
        - /url: "#phenomenology-feature-motifs"
    - paragraph [ref=e33551]: What kinds of features do we find in our model?
    - paragraph [ref=e33552]:
      - text: One strong theme is the prevalence of context features (e.g. DNA, base64) and token-in-context features (e.g.
      - code [ref=e33553]: the
      - text: in mathematics –
      - link "A/0/341" [ref=e33554] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-341
      - text: ","
      - code [ref=e33555]: <
      - text: in HTML –
      - link "A/0/20" [ref=e33556] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-20
      - text: ).
      - superscript [ref=e33557]: "29"
      - text: These have been observed in prior work (context features e.g.
      - generic [ref=e33560]: "[38, 49, 45]"
      - text: ; token-in-context features e.g.
      - generic [ref=e33563]: "[38, 15]"
      - text: ; preceding observations
      - generic [ref=e33566]: "[50]"
      - text: ), but the sheer volume of token-in-context features has been striking to us. For example, in
      - link "A/4" [ref=e33567] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a4.html
      - text: ", there are over a hundred features which primarily respond to the token \"the\" in different contexts."
      - superscript [ref=e33569]: "30"
      - text: Often these features are connected by feature splitting (discussed in the next section), presenting as pure context features or token features in dictionaries with few learned features, but then splitting into token-in-context features as more features are learned.
    - paragraph [ref=e33570]:
      - text: Another interesting pattern is the implementation of what seem to be "trigram" features, such as a feature that predicts the
      - code [ref=e33571]: "19"
      - text: in
      - code [ref=e33572]: COVID-19
      - text: (
      - link "A/2/12310" [ref=e33573] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a2.html#feature-9143
      - text: ). Such features could in principle be implemented with attention alone, but in practice the model uses the MLP layer as well. We also see features which seem to respond to specific, longer sequences of tokens. These are particularly striking because they may implement "memorization" like behavior – we'll discuss this more later.
    - paragraph [ref=e33574]:
      - text: "Finally, it's worth noting that all the features we find in a one-layer model can be interpreted as \"action features\" in addition to their role as \"input features\". For example, a base64 feature can be understood both as activating in response to base64 strings, and also as acting to increase the probability of base64 strings. The \"action\" view can clarify some of the token-in-context features: the feature"
      - link "A/0/341" [ref=e33575] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-341
      - text: predicts noun phrases in mathematical text, upweighting nouns like
      - code [ref=e33576]: denominator
      - text: and adjectives like
      - code [ref=e33577]: latter
      - text: . Consequently, while it activates most strongly on
      - code [ref=e33578]: the
      - text: ", it also activates on adjectives like"
      - code [ref=e33579]: special
      - text: and
      - code [ref=e33580]: this
      - text: which are also followed by noun phrases. This dual interpretation of features can be explored by browsing our interface. Several papers have previously explored interpreting neurons as actions (e.g.
      - generic [ref=e33583]: "[51]"
      - text: ), and one-layer models are particularly suited to this, since it's a particularly principled way to understand the last MLP layer, and the only MLP in a one-layer model is the last layer.
    - heading "Feature Splitting" [level=3] [ref=e33584]:
      - link "Feature Splitting" [ref=e33585] [cursor=pointer]:
        - /url: "#phenomenology-feature-splitting"
    - paragraph [ref=e33586]: One striking thing about the features we’ve found is that they appear in clusters. For instance, we observed above multiple base64 features, multiple Arabic script features, and so on. We see more of these features as we increase the total number of learned sparse features, a phenomenon we refer to as feature splitting. As we go from 512 features in A/0 to 4,096 features in A/1 and to 16,384 features in A/2, the number of features specific to base64 contexts goes from 1 to 3 to many more.
    - paragraph [ref=e33587]: To understand how the geometry of the dictionary elements correspond to these qualitative clusters, we do a 2-D UMAP on the combined set of feature directions from A/0, A/1, and A/2.
    - figure [ref=e33589]:
      - img [ref=e33590]
    - paragraph [ref=e33591]: "We see clusters corresponding to the base64 and Arabic script features, together with many other tight clusters from specific contexts and a variety of other interesting geometric structures for other features. This confirms that the qualitative clusters are reflected in the geometry of the dictionary: similar features have small angles between their dictionary vectors."
    - figure [ref=e33592]:
      - img [ref=e33593]
    - paragraph [ref=e33594]: We conjecture that there is some idealized set of features that dictionary learning would return if we provided it with an unlimited dictionary size. Often, these "true features" are clustered into sets of similar features, which the model puts in very tight superposition. Because the number of features is restricted, dictionary learning instead returns features which cover approximately the same territory as the idealized features, at the cost of being somewhat less specific.
    - paragraph [ref=e33595]:
      - text: In this picture, the reason the dictionary vectors of conceptually similar features are similar is that they are likely to produce similar behaviors in the model, and so should be responsible for similar effects in the neuron activations. For instance, it would be natural for a feature that fires on periods to predict tokens with a leading space followed by a capital letter. If there are multiple features that fire on periods, perhaps on periods in somewhat different contexts, these might all predict tokens with a leading space, and those predictions might well involve producing similar neuron activations. The combination of features being highly correlated and having similar "output actions", causes real models to have both denser and more structured superposition than what we observed in our previous toy models work
      - generic [ref=e33598]: "[5]"
      - text: .
      - superscript [ref=e33600]: "31"
    - paragraph [ref=e33601]:
      - text: If this picture is true, it would be important for a number of reasons. It suggests that determining the "correct number of features" for dictionary learning is less important than it might initially seem. It also suggests that dictionary learning with fewer features can provide a "summary" of model features, which might be very important in studying large models. Additionally, it would explain some of the stranger features we observe in the process of dictionary learning, suggesting that these are either "collapsed" features which would make sense if split further (see
      - 'link "\"Bug\" 1: Single Token Features" [ref=e33602] [cursor=pointer]':
        - /url: "#features-seem-like-bugs-1"
      - text: ), or else highly-specific "split" features which do in fact make sense if analyzed closely (see
      - 'link "\"Bug\" 2: Multiple Features for a Single Context" [ref=e33603] [cursor=pointer]':
        - /url: "#features-seem-like-bugs-2"
      - text: ). Finally, it suggests that our basic theory of superposition in toy models is missing an important dimension of the problem by not adequately studying highly correlated and "action sharing" features.
    - 'heading "Example: Mathematics and Physics Features" [level=4] [ref=e33604]'
    - paragraph [ref=e33605]:
      - text: In this example, our coarsest run (with 512 learned sparse features) has three features describing tokens in different technical settings. Using the masked cosine similarity
      - superscript [ref=e33606]: "32"
      - text: between feature activations, we are able to identify how these features refine and split in runs with more learned sparse features.
    - paragraph [ref=e33607]:
      - text: What we see is that the finer runs reveal more fine-grained distinctions between e.g. concepts in technical writing, and distinguish between the articles
      - code [ref=e33608]: the
      - text: and
      - code [ref=e33609]: a
      - text: ", which are followed by slightly different sets of noun phrases. We also see that the structure of this refinement is more complex than a tree: rather, the features we find at one level may both split and merge to form refined features at the next. In general though, we see that runs with more learned sparse features tend to be more specific than those with fewer."
    - figure [ref=e33611]:
      - img [ref=e33612]
    - paragraph [ref=e33613]:
      - text: It's worth noting that these more precise features reflect differences in model predictions as well as activations. The general
      - code [ref=e33614]: the
      - text: in mathematical prose feature (
      - link "A/0/341" [ref=e33615] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-341
      - text: ) has highly generic mathematical tokens for its top positive logits (e.g. supporting
      - code [ref=e33616]: the denominator
      - text: ","
      - code [ref=e33617]: the remainder
      - text: ","
      - code [ref=e33618]: the theorem
      - text: ), whereas the more finely split machine learning version (
      - link "A/2/15021" [ref=e33619] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a2.html#feature-15021
      - text: ) has much more specific topical predictions (e.g.
      - code [ref=e33620]: the dataset
      - text: ","
      - code [ref=e33621]: the classifier
      - text: ). Likewise, our abstract algebra and topology feature (
      - link "A/2/4878" [ref=e33622] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a2.html#feature-4878
      - text: ) supports
      - code [ref=e33623]: the quotient
      - text: and
      - code [ref=e33624]: the subgroup
      - text: ", and the gravitation and field theory feature ("
      - link "A/2/2609" [ref=e33625] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a2.html#feature-2609
      - text: ) supports
      - code [ref=e33626]: the gauge
      - text: ","
      - code [ref=e33627]: the Lagrangian
      - text: ", and"
      - code [ref=e33628]: the spacetime
      - text: .
    - heading "Features which seemed like Bugs" [level=4] [ref=e33629]:
      - link "Features which seemed like Bugs" [ref=e33630] [cursor=pointer]:
        - /url: "#features-seem-like-bugs"
    - 'link "\"Bug\" 1: Single-Token Features" [ref=e33631] [cursor=pointer]':
      - /url: "#features-seem-like-bugs-1"
    - paragraph [ref=e33632]:
      - text: When we limit dictionary learning to use very few learned sparse features, the features that emerge sometimes look quite strange. In particular, there are a large number of high-activation magnitude features which each only fire on a single token, and which seem to fire on every instance of that token. Such features are strange because the model could achieve the same effect entirely by learning different bigram statistics, and so should have no reason to devote MLP capacity to these. Similar features were also recently observed in a report by Smith
      - generic [ref=e33635]: "[15]"
      - text: .
    - paragraph [ref=e33636]:
      - text: "We believe that feature splitting explains this phenomenon: the model hasn’t learned a single feature firing on the letter"
      - code [ref=e33637]: P
      - text: ","
      - superscript [ref=e33639]: "33"
      - text: for instance. Rather, it’s learned many features which fire on
      - code [ref=e33640]: P
      - text: in different contexts
      - superscript [ref=e33642]: "34"
      - text: ", with correspondingly different effects on the neuron activations and output logits (see below). At a sufficiently coarse level dictionary learning cannot tell the difference between these, but when we allow it to use more learned sparse features, the features split and refine into a zoo of different"
      - code [ref=e33643]: P
      - text: features that fire in different contexts.
    - figure [ref=e33645]:
      - img [ref=e33646]
    - 'link "\"Bug\" 2: Multiple Features for a Single Context" [ref=e33647] [cursor=pointer]':
      - /url: "#features-seem-like-bugs-2"
    - paragraph [ref=e33648]:
      - text: We also observed the converse, where multiple features seemed to cover roughly the same concept or context. For example, there were three features in
      - link "A/1" [ref=e33649] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: which fired on (subsets of) base64 strings, and predicted plausible base64 tokens like
      - code [ref=e33650]: zf
      - text: ","
      - code [ref=e33651]: mF
      - text: ", and"
      - code [ref=e33652]: Gp
      - text: . One of these features was discussed in detail
      - link "earlier" [ref=e33653] [cursor=pointer]:
        - /url: "#feature-base64"
      - text: ", where we showed it fired for base64 strings. But we also observed that it didn't fire for all base64 strings – why? And what are the other two features doing? Why are there three?"
    - paragraph [ref=e33654]:
      - text: In
      - link "A/0" [ref=e33655] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html
      - text: (with 512 features), the story is simple. There is only one base64-related feature,
      - link "A/0/45" [ref=e33656] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-45
      - text: ", which seems to activate on all tokens of base64-encoded strings. But in"
      - link "A/1" [ref=e33657] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: ", that feature splits into three different features whose activations seem to jointly cover those of"
      - link "A/0/45" [ref=e33658] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-45
      - text: ":"
    - figure [ref=e33659]:
      - img [ref=e33660]
    - paragraph [ref=e33661]:
      - text: Two of these features seem relatively straightforward.
      - link "A/1/2357" [ref=e33662] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-2357
      - text: seems to fire preferentially on letters in base64, while
      - link "A/1/2364" [ref=e33663] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-2364
      - text: seems to fire preferentially on digits.
    - paragraph [ref=e33664]: "Comparing the logit weights of these features reveals that they predict largely the same sets of tokens, with one significant difference: the feature that firing on digits has much lower logit weights for predicting digits. Put another way, if the present token is made of digits, the model will predict that the next token is a non-digit base64 token."
    - figure [ref=e33665]:
      - img [ref=e33666]
    - paragraph [ref=e33667]:
      - text: We believe this is likely an artifact of tokenization! If a single digit were followed by another digit, they would have been tokenized together as a single token;
      - code [ref=e33668]: "[Bq][8][9][mp]"
      - text: would never occur, as it would be tokenized instead as
      - code [ref=e33669]: "[Bq][89][mp]"
      - text: . Thus even in a random base64 string, the fact that the current token is a single digit gives information about the next token.
    - paragraph [ref=e33670]:
      - text: But what about the third feature,
      - link "A/1/1544" [ref=e33671] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-1544
      - text: "? At first glance, there isn't an obvious rule for when it fires. But if we look more closely, we notice that it seems to respond to base64 strings which encode ASCII text."
      - superscript [ref=e33673]: "35"
      - text: If we look at the top dataset examples for each feature, we find that examples for
      - link "A/1/1544" [ref=e33674] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-1544
      - text: contain substrings which decode as ASCII, while none of the top activating examples for
      - link "A/1/2357" [ref=e33675] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-2357
      - text: or
      - link "A/1/2364" [ref=e33676] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-2364
      - text: "do:"
      - superscript [ref=e33678]: "36"
    - figure [ref=e33679]:
      - img [ref=e33680]
    - paragraph [ref=e33681]: This pattern of investigation, where one looks at coarser sets of features to understand categories of model behavior, and then at more refined sets of features to investigate the subtleties of that behavior, may prove well adapted to larger models where the feature set is expected to be quite large.
    - paragraph [ref=e33682]:
      - text: It's also worth noting how dictionary learning features were able to surprise us here. Many approaches to interpretability are top-down, and look for things we expect. But who would have known that models not only have a base64 feature, but that they distinguish between distinct kinds of base64 strings? This reminds us of cases like high-low frequency detectors
      - generic [ref=e33685]: "[52]"
      - text: or multimodal neurons
      - generic [ref=e33688]: "[48]"
      - text: where surprising and unexpected features were discovered in vision models.
    - heading "Universality" [level=3] [ref=e33689]:
      - link "Universality" [ref=e33690] [cursor=pointer]:
        - /url: "#phenomenology-universality"
    - paragraph [ref=e33691]:
      - text: One of the biggest "meta questions" about features is whether they're
      - link "universal" [ref=e33693] [cursor=pointer]:
        - /url: https://distill.pub/2020/circuits/zoom-in/#claim-3
      - generic [ref=e33696]: "[53, 4]"
      - text: – do the same features form across different models? This question is generally important because it bears on whether the hard-earned lessons from studying one model will generalize to others. But it's especially important in the context of attempting to extract features from superposition because universality could provide significant evidence that the features we're extracting are "real", or at least reproducible.
      - superscript [ref=e33697]: "37"
    - paragraph [ref=e33698]: Earlier, we saw that all the features we performed detailed analyses of (e.g. the Arabic feature, or base64 feature) were universal between two one-layer models. But is this true for typical features in our model? And how broadly is it true – do we only observe the same feature if we train models of the same architectures on the same dataset, or do these features also occur in more divergent models? This section will seek to address these two questions. The first subsection will quantitatively analyze how widespread universality is between the two one-layer models we studied, while the second will compare the features we find to others reported in the literature in search of a stronger form of universality.
    - paragraph [ref=e33699]:
      - text: We observe substantial universality of both types.
      - superscript [ref=e33700]: "38"
      - text: "At a high-level, this makes sense: if a feature is useful to one model in representing the dataset, it's likely useful to others, and if two models represent the same feature then a good dictionary learning algorithm should find it."
    - heading "Comparing features between two one-layer transformers" [level=4] [ref=e33701]
    - paragraph [ref=e33702]: To compare features from different models, we need model-independent ways to represent a feature.
    - paragraph [ref=e33703]:
      - text: One natural approach is to think of a feature as a function assigning values to datapoints; two features would be similar in this sense if they take similar values over a diverse set of data. This general approach has been explored by a number of prior papers (e.g.
      - generic [ref=e33706]: "[54, 53, 55, 56]"
      - text: ). In practice, this can be approximated by representing the feature as a vector, with indices corresponding to a fixed set of data points. We call the correlations between these vectors the activation similarity between features.
    - paragraph [ref=e33707]: A second natural approach is to think of a feature in terms of its downstream effects; two features would be similar in this sense if their activation changes their models' predictions in similar ways. In our one-layer model, a simple approximation to this is the logit weights. This approximation represents each feature as a vector with indices corresponding to vocabulary tokens. We call the correlations between these vectors the logit weight similarity between features.
    - paragraph [ref=e33708]:
      - text: These two notions of similarity correspond to the correlations of the points in the two scatter plots we used when
      - link "analyzing individual features" [ref=e33709] [cursor=pointer]:
        - /url: "#feature-ananlysis"
      - text: "earlier. We've reproduced the plots for the Arabic feature below:"
    - figure [ref=e33710]:
      - img [ref=e33711]
    - paragraph [ref=e33712]:
      - text: For each feature in run
      - link "A/1" [ref=e33713] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: ", we find the closest feature by activation similarity in run"
      - link "B/1" [ref=e33714] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/b1.html
      - text: ", which is a different dictionary learning run trained on different activations from a different transformer with different random seeds but otherwise identical hyperparameters. We find that many features are highly similar between models, with features in"
      - link "A/1" [ref=e33715] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: having a median activation correlation of 0.72 with the most similar feature from
      - link "B/1" [ref=e33716] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/b1.html
      - text: . (We perform the same analysis finding the closest neurons between the transformers, and find significantly less similarity, with median activation correlation 0.46.) The features with low activation correlation between models may represent different "feature splittings" in the dictionaries learned or different "true features" learned by the base models.
    - figure [ref=e33717]:
      - img [ref=e33718]
    - paragraph [ref=e33719]: A natural next question is whether features that fire on the same tokens also have the same logit effects. That is, how well do activation similarity and logit weight similarity agree?
    - paragraph [ref=e33720]: "Some gap between the two is visible for the Arabic feature above: the \"important tokens\" for the features' effects (the ones in Arabic script) are upweighted by features from both models, but there is a large cloud of tokens with smaller effects that appear to almost be isotropic noise, resulting in a logit weight correlation of just 0.23, significantly below the activation correlation of 0.91."
    - paragraph [ref=e33721]: In the scatterplot below, we find that this kind of disagreement is widespread.
    - figure [ref=e33722]:
      - img [ref=e33723]
    - paragraph [ref=e33724]:
      - text: The most dramatic example of this disparity is for the features
      - link "A/1/3949" [ref=e33725] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-3949
      - text: and
      - link "B/1/3321" [ref=e33726] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/b1.html#feature-3321
      - text: ", with an activation correlation of 0.98 but a negative logit weight correlation. These features fire on"
      - code [ref=e33727]: pone
      - text: (and occasionally on
      - code [ref=e33728]: pgen
      - text: and
      - code [ref=e33729]: pcbi
      - text: ) as abbreviations for the journal name PLOSOne in citations, like
      - code [ref=e33730]: "@pone.0082392"
      - text: ", and predict the"
      - code [ref=e33731]: .
      - text: that follows.
      - superscript [ref=e33732]: "39"
    - paragraph [ref=e33733]:
      - text: Zooming in on the logit weight scatterplot (inset in the figure above), we see that only the
      - code [ref=e33734]: .
      - text: token has high logit weight in both models, and that every other token is in the 'interference' portion of the logit weight distribution. Indeed, the model may simply not care about what the feature does to tokens which were already implausible because they are suppressed by the direct path, attention layer, or other features of the MLP.
    - paragraph [ref=e33735]:
      - text: We want to measure something more like "the actual effect a feature has on token probabilities." One way to get at this would be to compute a vector of ablation effects for every feature on every data point; pairs of features whose ablations hurt the model's predictions on the same tokens must have been predicting the same thing. Unfortunately, this would be rather expensive computationally. Instead, we scale the activation vector of a feature by the logit weights of the tokens that empirically come next in the dataset to produce an attribution vector.
      - superscript [ref=e33737]: "40"
      - text: Correlations between those vectors provide an attribution similarity that combines both the activity of the feature with the effect it has on the loss. We find that the attribution similarity correlates quite highly with the activation similarity, meaning that features that were coactive between models were useful at predicting the same tokens.
    - figure [ref=e33738]:
      - img [ref=e33739]
    - paragraph [ref=e33740]: In light of this, we feel that the activation correlation used throughout the paper is in fact a good proxy for both notions of universality in the context of our one-layer models.
    - heading "Comparing features with the literature" [level=4] [ref=e33741]:
      - link "Comparing features with the literature" [ref=e33742] [cursor=pointer]:
        - /url: "#universality-literature"
    - paragraph [ref=e33743]: So far, we've established that many of our features are universal in a limited sense. Features found in one of our transformers can also be found in an alternative version trained with a different random seed. But this second model has an identical architecture and was trained on identical data. This is the most minimal version of universality one could hope for. Despite this, we believe that many of the features we've found are universal in a deeper sense, because very similar features have been reported in the literature before.
    - paragraph [ref=e33744]:
      - text: The first comparison which struck us is that many features seem quite similar to neurons we previously found in one-layer SoLU models, which use an activation function designed to make neurons more monosemantic
      - generic [ref=e33747]: "[38]"
      - text: . In particular, we observed a base64 neuron, hexadecimal neuron, and all caps neuron in our SoLU investigations, and base64 (
      - link "A/0/45" [ref=e33748] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-45
      - text: ), hexademical (
      - link "A/0/119" [ref=e33749] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-119
      - text: ), and all caps (
      - link "A/0/317" [ref=e33750] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-317
      - text: ) features here. Discussion of some of these neurons can be found in
      - link "Section 6.3.1" [ref=e33751] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/solu/index.html#section-6-3-1
      - text: of the SoLU paper.
    - paragraph [ref=e33752]:
      - text: We also find many features similar to Smith
      - generic [ref=e33755]: "[15]"
      - text: ", who applies dictionary learning to the residual stream. In addition to us also observing preponderance of single token features they note (see"
      - link "our interpretation" [ref=e33756] [cursor=pointer]:
        - /url: "#features-seem-like-bugs"
      - text: of this phenomenon), we find a similar German detector (e.g.
      - link "A/0/493" [ref=e33757] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-493
      - text: ) and similar title case detectors (e.g.
      - link "A/0/508" [ref=e33758] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-508
      - text: ). Likewise, we find a number of features similar to Gurnee et al.
      - generic [ref=e33761]: "[49]"
      - text: ", including a \"prime factors\" feature ("
      - link "A/4/22414" [ref=e33762] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a4.html#feature-22414
      - text: ) and a French feature (
      - link "A/0/14" [ref=e33763] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-14
      - text: ).
    - paragraph [ref=e33764]:
      - text: At a more abstract level, many features we find seem similar to features reported in multimodal models by Goh et al.
      - generic [ref=e33767]: "[48]"
      - text: . For example, we find many similar features including an Australia feature (
      - link "A/3/16085" [ref=e33768] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a3.html#feature-16085
      - text: ), Canada feature (
      - link "A/3/13683" [ref=e33769] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a3.html#feature-13683
      - text: ), Africa feature (
      - link "A/3/14490" [ref=e33770] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a3.html#feature-14490
      - text: ), and Israel-Palestine feature (
      - link "A/3/739" [ref=e33771] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a3.html#feature-739
      - text: ) which predict locations in those regions when grammatically appropriate. This vaguely mirrors "region neurons" reported by Goh et al.'s paper. For other families of features, the parallels are less clear. For example, one of the most striking results of Goh et al. was person detector neurons (similar to famous results in neuroscience). We find some features that are person detectors in very narrow contexts, such as responding to a person’s name and predicting appropriate next words, or predicting their name (e.g.
      - link "A/1/3240" [ref=e33772] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-3240
      - text: is somewhat similar to Goh et al.'s Trump neuron), but they seem quite narrow. We also don't find features that seem clearly analogous to Goh et al.'s emotion neurons.
    - heading "\"Finite State Automata\"" [level=3] [ref=e33773]:
      - link "\"Finite State Automata\"" [ref=e33774] [cursor=pointer]:
        - /url: "#phenomenology-fsa"
    - paragraph [ref=e33775]:
      - text: One of the most striking phenomena we've observed in our study of the features in one-layer models is the existence of "finite state automata"-like assemblies of features. These assemblies aren't circuits in the conventional sense – they're formed by one feature increasing the probability of tokens, which in turn cause another feature to fire on the next step, and so on.
      - superscript [ref=e33776]: "41"
    - paragraph [ref=e33777]:
      - text: The simplest example of this is features which excite themselves on the next token, forming a single node loop. For example, a base64 feature increases the probability of tokens like
      - code [ref=e33778]: Qg
      - text: and
      - code [ref=e33779]: zA
      - text: – plausible continuations which would continue to activate it.
    - figure [ref=e33780]:
      - img [ref=e33781]
    - paragraph [ref=e33782]:
      - text: It's worth noting that these examples are from
      - link "A/0" [ref=e33783] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html
      - text: ", a dictionary learning run which is not overcomplete (the dictionary dimensionality is 512, equal to the transformer MLP dimension). As we move to runs with larger numbers of features, the central feature will experience feature splitting, and become a more complex system."
    - paragraph [ref=e33784]:
      - text: Let's now consider a two-node system for producing variables in "all caps snake case" (e.g.
      - code [ref=e33785]: ARRAY_MAX_VALUE
      - text: ). One node (
      - link "A/0/207" [ref=e33786] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-207
      - text: ) activates on the all caps text tokens, the other (
      - link "A/0/358" [ref=e33787] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-358
      - text: ") on underscores:"
    - figure [ref=e33788]:
      - img [ref=e33789]
    - paragraph [ref=e33790]: This type of two-node system is quite common for languages where Unicode characters are sometimes split into two tokens. (Again, with more feature splitting, these would expand into more complex systems.)
    - paragraph [ref=e33791]:
      - text: For example, Tamil Unicode characters (
      - link "block U+0B80–U+0BFF" [ref=e33792] [cursor=pointer]:
        - /url: https://www.compart.com/en/unicode/block/U+0B80
      - text: ) are typically split into two tokens. For example, the character "ண" (
      - link "U+0BA3" [ref=e33793] [cursor=pointer]:
        - /url: https://www.compart.com/en/unicode/U+0BA3
      - text: ) is tokenized as
      - code [ref=e33794]: \xe0\xae
      - text: followed by
      - code [ref=e33795]: \xa3
      - text: . The first part (
      - code [ref=e33796]: \xe0\xae
      - text: or
      - code [ref=e33797]: \xe0\xaf
      - text: ) roughly specifies the Unicode block, while the second component specifies the character within that block. Thus, it's natural for the model to alternate between two features, one for the Unicode prefix token, and one for the suffix token.
    - paragraph [ref=e33798]: "A more complex example is Chinese. While many common Chinese characters get dedicated tokens, many others are split. This is further complicated by Chinese characters being spread over many Unicode blocks, and those blocks being large and cutting across many logical blocks specified in terms of bytes. To understand the state machine the model implements to handle this, the key observation is that complete characters are similar to the \"suffix\" part of a split character: both can be followed by either a new complete character, or a new prefix. Thus, we observe two features, one of which fires on either complete characters or the suffix (predicting either a new complete character, or a prefix), while the other only fires on the prefixes and predicts suffixes."
    - figure [ref=e33799]:
      - img [ref=e33800]
    - paragraph [ref=e33801]: "Let's now consider a very simple four node system which models HTML. The \"main path\" through it is:"
    - list [ref=e33802]:
      - listitem [ref=e33803]:
        - link "A/0/20" [ref=e33804] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-20
        - text: fires on open tags and predicts tag names
      - listitem [ref=e33805]:
        - link "A/0/0" [ref=e33806] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-0
        - text: fires on tag names and predicts tag closes
      - listitem [ref=e33807]:
        - link "A/0/30" [ref=e33808] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-30
        - text: fires on tag closes and predicts whitespace
      - listitem [ref=e33809]:
        - link "A/0/494" [ref=e33810] [cursor=pointer]:
          - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-494
        - text: fires on whitespace and predicts new tag opens.
    - paragraph [ref=e33811]:
      - text: A prototypical sample this might generate is something like
      - code [ref=e33812]: <div>\n\t\t<span>
      - text: .
    - paragraph [ref=e33813]: "The full system can be seen below:"
    - figure [ref=e33814]:
      - img [ref=e33815]
    - paragraph [ref=e33816]:
      - text: Keep in mind that we're focusing on the
      - link "A/0" [ref=e33817] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html
      - text: features where this is very simple – if we looked at
      - link "A/1" [ref=e33818] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html
      - text: ", we'd find something much more complex! One particularly striking shortcoming of the"
      - link "A/0" [ref=e33819] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html
      - text: features is that they don't describe what happens when
      - link "A/0/0" [ref=e33820] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a0.html#feature-0
      - text: emits a token like
      - code [ref=e33821]: href
      - text: ", which leads to a more complex state."
    - paragraph [ref=e33822]: "It's important to note that these features can be quite contextual. There are several features related to IRC transcripts which form a totally different finite state automata like system:"
    - figure [ref=e33823]:
      - img [ref=e33824]
    - paragraph [ref=e33825]:
      - text: A prototypical sample this might generate is something like
      - code [ref=e33826]: <nickonia_> lol ubuntu ;)
      - text: . Presumably the Pile dataset heavily represents IRC transcripts about linux.
    - paragraph [ref=e33827]:
      - text: One particularly interesting behavior is the apparent memorization of specific phrases. This can be observed only in runs with relatively large numbers of features (like
      - link "A/4" [ref=e33828] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a4.html
      - text: ). In the following example, a sequence of features seem to functionally memorize the bolded part of the phrase
      - code [ref=e33829]: MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE
      - text: . This is a relatively standard legal language, and notably occurs in the file headers for popular open source software licenses, meaning the model likely saw it many times during training.
    - figure [ref=e33830]:
      - img [ref=e33831]
    - paragraph [ref=e33832]:
      - text: This seems like an example of the mechanistic theory of memorization we described in Henighan et al.
      - generic [ref=e33835]: "[57]"
      - text: – we observe features which appear to be relatively binary and respond to a very specific situation. This might also be seen as an instance of mechanistic anomaly detection
      - generic [ref=e33838]: "[58]"
      - text: ": the model behaves differently in a specific, narrow case. It's somewhat surprising that something so narrow can be found in a model with only 512 neurons; from this perspective it's an interesting example of superpositions' ability to embed many things in few neurons. On the other hand, because these mechanisms are buried deep in superposition, they are likely very noisy."
    - separator [ref=e33839]
    - heading "Related Work" [level=2] [ref=e33840]:
      - link "Related Work" [ref=e33841] [cursor=pointer]:
        - /url: "#related-work"
    - paragraph [ref=e33842]:
      - text: Superposition and attempts to resolve it have deep connections to many lines of research, including general investigations of interpretable features, linear probing, compressed sensing, dictionary learning and sparse coding, theories of neural coding, distributed representations, mathematical frames, vector symbolic architectures, and much more. Rather than attempt to do justice to all these connections here, we refer readers to the
      - link "related work section" [ref=e33843] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html#related
      - text: of Toy Models of Superposition
      - generic [ref=e33846]: "[5]"
      - text: where we discuss these topics in depth, and also to our essay
      - 'link "Distributed Representations: Composition & Superposition" [ref=e33848] [cursor=pointer]':
        - /url: https://transformer-circuits.pub/2023/superposition-composition/index.html
      - generic [ref=e33851]: "[44]"
      - text: . Instead, we'll focus our discussion on work connected to our attempts to solve superposition, and also more recent advancements in our understanding of superposition.
    - heading "Superposition" [level=4] [ref=e33852]
    - paragraph [ref=e33853]: Since we published Toy Models of Superposition there has been significant further work attempting to better understand superposition. We briefly summarize below.
    - paragraph [ref=e33854]:
      - text: Is superposition real? Gurnee et al.
      - generic [ref=e33857]: "[49]"
      - text: demonstrate some compelling examples of features which may be in superposition, using sparse linear probes. Separately, an exchange between Li et al.
      - generic [ref=e33860]: "[34]"
      - text: and Nanda et al.
      - generic [ref=e33863]: "[31]"
      - text: seems like an update on whether the general picture of features as directions is correct; Li et al. seemed to show that it wasn't, putting the hypothesis in jeopardy, which was then resolved by Nanda et al.
    - paragraph [ref=e33864]:
      - text: When and why does superposition occur? Scherlis et al.
      - generic [ref=e33867]: "[36]"
      - text: provide a mathematical framework for thinking about monosemanticity vs polysemanticity. lsgos
      - generic [ref=e33870]: "[59]"
      - text: explored the effects of dropout on toy models of superposition.
    - paragraph [ref=e33871]:
      - text: Memorization – In Henighan et al.
      - generic [ref=e33874]: "[57]"
      - text: ", we studied the same toy model as in Toy Models of Superposition, but this time trained on many repetitions of finite-sized datasets. We found that small datasets are memorized in superposition, instead of generalizing features in the case of large datasets. Hobbhahn"
      - generic [ref=e33877]: "[60]"
      - text: replicated some of these findings, and further showed extensions to other settings including bottlenecks between layers (analogous to the residual stream between MLP layers). Subsequently, in a monthly update we
      - link "examined" [ref=e33878] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/july-update/index.html#finite-data
      - text: the boundary between the memorization and generalization regimes and found a sharp phase transition, as well as dataset clustering in superposition on the memorization side of the boundary.
    - heading "Disentanglement and Architectural Approaches" [level=4] [ref=e33879]
    - paragraph [ref=e33880]: There is also a rich and related literature on disentanglement, which seeks to find representations of data that separate out (disentangle) conceptually-distinct phenomena influencing the data. In contrast to superposition, this work typically seeks to find a number of factors of variation or features which are equal to the dimensionality of the space being represented, whereas superposition seeks to find more.
    - paragraph [ref=e33881]:
      - text: This is often approached as an architecture/training-time problem. For instance, Kim & Mnih
      - generic [ref=e33884]: "[61]"
      - text: proposed a method that pushes variational autoencoders to disentangle factors by encouraging independence across dimensions. Similarly, Chen et al.
      - generic [ref=e33887]: "[62]"
      - text: developed a Generative Adversarial Network approach that attempts to disentangle factors by maximizing the mutual information between a small subset of factors and the dataset. And Makhzani & Frey
      - generic [ref=e33890]: "[63]"
      - text: use a TopK activation to encourage sparsity and hence disentanglement. See Bengio et al.
      - generic [ref=e33893]: "[64]"
      - text: and Räuker et al.
      - generic [ref=e33896]: "[65]"
      - text: for a discussion of other such approaches.
    - paragraph [ref=e33897]:
      - text: Framed this way, some architectural approaches to superposition may also be understood as attempts at disentanglement. For instance, in Elhage et al.
      - generic [ref=e33900]: "[38]"
      - text: ", we proposed the SoLU activation function, which increases the number of interpretable neurons in transformers by encouraging features to align to the neuron basis. Unfortunately, it appears that training models with the SoLU activation function may make some neurons more interpretable at the cost of making others even less interpretable than before."
    - paragraph [ref=e33901]:
      - text: Similarly, Jermyn et al.
      - generic [ref=e33904]: "[35]"
      - text: studied MLP layers trained on a compressed sensing task and found multiple equal-loss minima, with some strongly polysemantic and others strongly monosemantic. This suggested that training interventions could steer models towards more monosemantic minima, though subsequent investigations on more realistic tasks suggested that the equal-loss property was specific to the chosen task.
    - paragraph [ref=e33905]:
      - text: "These two examples of attempts to tackle superposition through architecture, and the challenges they encountered, highlight a key distinction between the problems of disentanglement and that of superposition: disentanglement fundamentally seeks to ensure that the dimensions in the model’s latent space are disentangled, whereas superposition hypothesizes that this disentanglement typically hurts performance (since success would require throwing away many features), and that models will typically respond to disentangling interventions by making some features more strongly entangled (as was found by both Mahinpei et al."
      - generic [ref=e33908]: "[66]"
      - text: and Elhage et al. 2022
      - generic [ref=e33911]: "[38]"
      - text: in somewhat different contexts).
    - heading "Dictionary Learning and Features" [level=4] [ref=e33912]
    - paragraph [ref=e33913]: Our work builds on a longer tradition of using dictionary learning and sparse autoencoders to decompose neural network activations.
    - paragraph [ref=e33914]:
      - text: Early work in this space focused on word embeddings and other non-transformer neural networks. Faruqui et al.
      - generic [ref=e33917]: "[6]"
      - text: and
      - link "Arora" [ref=e33918] [cursor=pointer]:
        - /url: https://arxiv.org/abs/1601.03764
      - link "et al." [ref=e33920] [cursor=pointer]:
        - /url: https://arxiv.org/abs/1601.03764
      - generic [ref=e33923]: "[2]"
      - text: both found linear structure in word embeddings using sparse coding approaches. Subramanian et al.
      - generic [ref=e33926]: "[7]"
      - text: similarly found linear factors for word embeddings, in this case using a sparse autoencoder. Zhang et al.
      - generic [ref=e33929]: "[8]"
      - text: solved a similar problem using methods from dictionary learning while Panigrahi et al.
      - generic [ref=e33932]: "[9]"
      - text: approached this with Latent Dirichlet Allocation.
    - paragraph [ref=e33933]:
      - text: More recently, a number of works have applied dictionary learning methods to transformer models. Yun et al.
      - generic [ref=e33936]: "[10]"
      - text: applied dictionary learning to the residual stream of a 12-layer transformer to find an undercomplete basis of features.
    - paragraph [ref=e33937]:
      - text: At this point, our work in Toy Models
      - generic [ref=e33940]: "[5]"
      - text: advocated for dictionary learning as a potential approach to superposition. This motivated a parallel investigation by our colleagues Cunningham et al., published as a series of interim reports
      - generic [ref=e33943]: "[11, 12, 13, 14, 15, 16]"
      - text: with very similar themes to this paper, culminating in a manuscript
      - generic [ref=e33946]: "[17]"
      - text: . We've been excited to see so many corroborating findings between our work.
    - paragraph [ref=e33947]:
      - text: In their interim reports, Sharkey et al.
      - generic [ref=e33950]: "[11]"
      - text: used sparse autoencoders to perform dictionary learning on a one-layer transformer, identifying a large (overcomplete) basis of features. (Sharkey et al. deserve credit for focusing on dictionary learning and especially the sparse autoencoder approach, while our investigation was only exploring it as one of several approaches in parallel.) This work was then partially replicated by Cunningham & Smith
      - generic [ref=e33953]: "[12]"
      - text: and Huben
      - generic [ref=e33956]: "[13]"
      - text: . Next, Smith
      - generic [ref=e33959]: "[14]"
      - text: used an autoencoder to find features in one MLP layer of a six-layer model. The resulting features appear interpretable, e.g. detecting ‘$’ in the context of LaTeX equations. In follow up work, Smith then extended this approach to the residual stream of the same model, identifying a number of interesting features (see
      - link "earlier discussion" [ref=e33960] [cursor=pointer]:
        - /url: "#universality-literature"
      - text: ). Building on these results, Cunningham
      - generic [ref=e33963]: "[16]"
      - text: applied autointerpretability techniques from Bills et al.
      - generic [ref=e33966]: "[45]"
      - text: to features in the residual stream and an MLP layer of the same six-layer model, finding that the features discovered by the sparse autoencoder are substantially more interpretable than neurons.
    - separator [ref=e33967]
    - heading "Discussion" [level=2] [ref=e33968]:
      - link "Discussion" [ref=e33969] [cursor=pointer]:
        - /url: "#discussion"
    - heading "Theories of Superposition" [level=3] [ref=e33970]:
      - link "Theories of Superposition" [ref=e33971] [cursor=pointer]:
        - /url: "#discussion-superposition"
    - paragraph [ref=e33972]:
      - text: Coming into this work, our understanding of superposition was mostly informed by Toy Models
      - generic [ref=e33975]: "[5]"
      - text: . This gave us a picture one might call the isotropic superposition model. Features are discrete, one-dimensional objects which repel from each other due to interference, creating a roughly evenly spaced organization of feature directions.
    - paragraph [ref=e33976]: This work has persuaded us that our previous model was missing something crucial. At a minimum, features seem to clump together in higher density groups of related features. One explanation for this (considered briefly by Toy Models) is that the features may have correlated activations – firing together. Another – which we suspect to be more central – is that the features produce similar actions. The feature which fires on single digits in base64 predicts approximately the same set of tokens as the feature firing on other characters in base64, with the exception of other digits; these similar downstream effects manifest as geometrically close feature directions.
    - paragraph [ref=e33977]:
      - text: Moreover, it isn't clear that features need to be one-dimensional objects (encoding only some intensity). In principle, it seems possible to have higher-dimensional "feature manifolds" (see earlier discussion
      - link "here" [ref=e33978] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/may-update/index.html#feature-manifolds
      - text: ).
    - figure [ref=e33979]:
      - img [ref=e33980]
    - paragraph [ref=e33981]:
      - text: These hypotheses are not mutually exclusive. The convex hull of several correlated features might be understood as a feature manifold. On the other hand, some manifolds would not admit a unique description in terms of a finite number of one-dimensional features. (Perhaps this accounts for the continued
      - link "feature splitting" [ref=e33982] [cursor=pointer]:
        - /url: "#phenomenology-feature-splitting"
      - text: observed above.)
    - figure [ref=e33983]:
      - img [ref=e33984]
    - paragraph [ref=e33985]: "Nevertheless, these experiments have left us more confident that some version of the superposition hypothesis (and the linear representation hypothesis) is true. The number of interpretable features found, the way activation level seems to correspond to \"intensity\" or \"confidence,\" the fact that logit weights mostly make sense, and the observation of \"interference weights\": all of these observations are what you would expect from superposition."
    - paragraph [ref=e33986]: Finally, we note that in some of these expanded theories of superposition, finding the "correct number of features" may not be well-posed. In others, there is a true number of features, but getting it exactly right is less essential because we "fail gracefully", observing the "true features" at resolutions of different granularity as we increase the number of learned features in the autoencoder.
    - heading "Are \"Token in Context\" Features Real?" [level=3] [ref=e33987]:
      - link "Are \"Token in Context\" Features Real?" [ref=e33988] [cursor=pointer]:
        - /url: "#discussion-token-in-context"
    - paragraph [ref=e33989]:
      - text: One of the most common motifs we found were "token-in-context" features. They also represent many of the features that emerge via feature splitting with increasing dictionary size. Some of these are intuitive – borrowing an example from
      - generic [ref=e33992]: "[50]"
      - text: ", it makes sense to represent \"die\" in German (where it's the definite article) as distinct from \"die\" in English (where it means \"death\" or \"dice\")."
    - paragraph [ref=e33993]: But why do we see hundreds of different features for "the" (such as "the" in Physics, as distinct from "the" in mathematics)? We also observe this for other common words (e.g. "a", "of"), and for punctuation like periods. These features are not what we expected to find when we set out to investigate one-layer models!
    - paragraph [ref=e33994]:
      - text: To make the question a bit more precise, it is helpful to borrow the language and examples of local vs compositional representations
      - generic [ref=e33997]: "[44, 67]"
      - text: . Individually representing token-context pairs (such as "the" in Physics) is technically a
      - link "\"local code\"" [ref=e33998] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/superposition-composition/index.html#distributed-local
      - text: . The more intuitive way to represent this would instead be a
      - link "\"compositional code\"" [ref=e33999] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/superposition-composition/index.html#distributed-compositional
      - link "– representing" [ref=e34000] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/superposition-composition/index.html#distributed-compositional
      - text: "\"the\" as an independent feature from Physics. So the thing we really want to ask is why we're observing a local code, and whether it's really what's going on. There are two hypotheses:"
    - list [ref=e34001]:
      - listitem [ref=e34002]: The underlying transformer uses a compositional code, and a quirk of our dictionary learning scheme produces features using a local code.
      - listitem [ref=e34003]: The underlying transformer is genuinely using a local code (at least in part), and dictionary learning is correctly representing this.
    - paragraph [ref=e34004]: If the former holds, then better dictionary learning schemes may help uncover a more compositional set of features from the same transformer. Local codes are sparser than compositional codes, and our L1 penalty may be pushing the model too far towards sparsity.
    - paragraph [ref=e34005]: "However, we believe the second hypothesis is likely to hold to some extent. Let's consider the example of \"the\" in Physics again, which predicts noun phrases in Physics: if the model represented \"the\" and Physics context independently, it would be forced to have logits be the sum of \"upweight tokens which come after the\" and \"upweight tokens which occur in Physics\". But the model might wish to have \"sharper\" predictions than this, which is only possible with a local code."
    - heading "Future Work" [level=3] [ref=e34006]:
      - link "Future Work" [ref=e34007] [cursor=pointer]:
        - /url: "#discussion-future-work"
    - paragraph [ref=e34008]:
      - text: Scaling Sparse Autoencoders. Scaling the application of sparse autoencoders to frontier models strikes us as one of the most important questions going forward. We're quite hopeful that these or similar methods will work – Cunningham et al.'s work
      - generic [ref=e34011]: "[17]"
      - text: "seems to suggest this approach can work on somewhat larger models, and we have preliminary results that point in the same direction. However, there are significant computational challenges to be overcome. Consider an autoencoder with a 100× expansion factor applied to the activations of a single MLP layer of width 10,000: it would have ~20 billion parameters. Additionally, many of these features are likely quite rare, potentially requiring the autoencoder to be trained on a substantial fraction of the large model's training corpus. So it seems plausible that training the autoencoder could become very expensive, potentially even more expensive than the original model. We remain optimistic, however, and there is a silver lining – it increasingly seems like a large chunk of the mechanistic interpretability agenda will now turn on succeeding at a difficult engineering and scaling problem, which frontier AI labs have significant expertise in."
    - paragraph [ref=e34012]:
      - text: Scaling Laws for Dictionary Learning. It's worth noting that there's enormous uncertainty about the dynamics of scaling dictionary learning and sparse autoencoders discussed above. As we make the subject model bigger, how does the ideal expansion factor change? (Does it stay constant?) How does the necessary amount of data change? The resolution of these questions will determine whether it's possible for this approach, if executed well, to scale up to frontier models. Ideally, we'd like to have scaling laws
      - generic [ref=e34015]: "[68]"
      - text: which could answer this.
    - paragraph [ref=e34016]:
      - text: How Can We Recognize Good Features? One of the greatest challenges of this work is that we're "wandering in the dark" to some extent. We don't have a great, systematic way to know if we're successfully extracting high quality features. Automated interpretability
      - generic [ref=e34019]: "[45]"
      - text: seems like a strong contender for solving this question. Alternatively, one might hope for some purely abstract definition (e.g. the
      - link "information-based metric" [ref=e34020] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/may-update/index.html#simple-factorization
      - text: proposal), but we have not yet seen compelling signs of life for this on real data. It would also be helpful to have metrics beyond MMCS, activation similarity, and attribution similarity for comparing sets of features for the purposes of assessing consistency and universality.
    - paragraph [ref=e34021]:
      - text: "Scalability of Analysis. Suppose that sparse autoencoders fully solve superposition. Do we have a home run to fully mechanistically understanding models? It seems clear that there would be at least one other fundamental barrier: scaling analysis of models, so that we can turn microscopic insights into a more macroscopic understanding. Again, one approach here could be automated interpretability. But delegating the understanding of AI to AI may not be fully satisfying, for various reasons. It is possible that there may be other paths based on discovering larger scale structure (see discussion"
      - link "here" [ref=e34022] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/interpretability-dreams/index.html#larger-scale
      - text: ).
    - paragraph [ref=e34023]:
      - text: Algorithmic Improvements for Sparse Autoencoders. New algorithms refining the sparse autoencoder approach could be useful. One might explore the use of variational autoencoders (e.g.,
      - generic [ref=e34026]: "[69]"
      - text: ), or sparsity promoting priors regularization techniques beyond a simple L1 penalty on activations (e.g.,
      - generic [ref=e34029]: "[70, 71]"
      - text: ), for example encouraging sparsity in the interactions between learned features in different layers. Earlier research has shown that noise injection can also increase neuron interpretability separately from an L1 penalty
      - generic [ref=e34032]: "[11]"
      - generic [ref=e34035]: "[72]"
      - text: .
    - paragraph [ref=e34036]:
      - text: Attentional Superposition? Many of the motivations for the presence of superposition in MLP layers
      - generic [ref=e34039]: "[5]"
      - text: apply to self-attention layers as well. It seems conceivable that similar methods may extract useful structure from attention layers, although a clear example has not yet been established (e.g., see our
      - link "May" [ref=e34040] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/may-update/index.html#attention-superposition
      - text: and
      - link "July" [ref=e34041] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/july-update/index.html#attn-skip-trigram
      - text: Updates). If this is true, addressing this may become a future bottleneck for the mechanistic interpretability agenda.
    - paragraph [ref=e34042]: Theory of Superposition and Features. Many fundamental questions remain for our understanding of superposition, even if the hypothesis is right in some very broad sense. For example, as discussed above, this work suggests extensions of the superposition hypothesis covering clusters of features with similar effects, or continuous families of features. We believe there is important work to be done in exploring the theory of superposition further, perhaps through the use of toy models.
    - separator [ref=e34043]
    - heading "Comments & Replications" [level=2] [ref=e34044]:
