        - generic [ref=e35127]:
          - math [ref=e35129]:
            - generic [ref=e35133]: f
          - generic [ref=e35136]: f
      - text: are our learned features. As shown, we subtract the decoder bias from the inputs, and call this a pre-encoder bias. Recall that the decoder is also referred to as the “dictionary” while the encoder can be thought of as a linear, amortized approximation to more powerful sparse coding algorithms.
    - paragraph [ref=e35137]: Our modifications to a standard autoencoder are backed by theory and empirical ablations. However, because these modifications appeared at different periods during our research and can interact with each other, we do not provide rigorous ablation experiments and instead provide intuition and anecdotal evidence for why each is justified. There are likely many important modifications that could further improve performance.
    - paragraph [ref=e35138]: Here is a summary of the modifications sorted both between and within sections in rough order of importance
    - list [ref=e35139]:
      - listitem [ref=e35140]: Pre encoder bias – this boosted performance in toy models.
      - listitem [ref=e35141]: Decoder weights not tied – the learned encoder weights are often far from the corresponding decoder weights and this is important for increasing model capacity.
      - listitem [ref=e35142]: Neuron resampling – helps finding more features and achieve a lower total loss.
      - listitem [ref=e35143]: Many training steps – beyond when the training loss looks to have plateaued.
      - listitem [ref=e35144]: Learning rate sweep – lower learning rate results in more real features.
      - listitem [ref=e35145]: Interaction Between Adam and Decoder Normalization – a principled way to account for how the dictionary vector L2 normalization interacts with Adam, resulting in lower total loss.
    - heading "Pre-Encoder Bias" [level=4] [ref=e35146]:
      - link "Pre-Encoder Bias" [ref=e35147] [cursor=pointer]:
        - /url: "#appendix-autoencoder-bias"
    - paragraph [ref=e35148]:
      - text: Testing the autoencoder on toy problems with a bias, we found that it would fail to produce the “bounce plots” we
      - link "described previously" [ref=e35149] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/may-update/index.html#simple-factorization
      - text: unless we added a learned bias term to both the decoder output and the encoder input. We constrain the pre-encoder bias to equal the negative of the post-decoder bias and initialize it to the geometric median of the dataset. These investigations were motivated by the observations by Hobbhahn
      - generic [ref=e35152]: "[60]"
      - text: .
    - heading "Decoder Weights Not Tied" [level=4] [ref=e35153]:
      - link "Decoder Weights Not Tied" [ref=e35154] [cursor=pointer]:
        - /url: "#appendix-autoencoder-untied"
    - paragraph [ref=e35155]:
      - text: It is common to tie the encoder and decoder weights of single hidden layer autoencoders
      - generic [ref=e35158]: "[17, 63]"
      - text: . However, we find that in our trained models the learned encoder weights are not the transpose of the decoder weights and are cleverly offset to increase representational capacity. Specifically, we find that similar features which have closely related dictionary vectors have encoder weights that are offset so that they prevent crosstalk between the noisy feature inputs and confusion between the distinct features.
    - paragraph [ref=e35159]:
      - text: For example, in
      - 'link "\"Bug\" 2: Multiple Features for a Single Context" [ref=e35160] [cursor=pointer]':
        - /url: "#features-seem-like-bugs-2"
      - text: we described 3 features handling different types of base64 strings. These all have similar dictionary vectors, but it turns out that the encoder weight vectors, while still similar, are more tilted away to help distinguish them.
    - paragraph [ref=e35161]: One way of viewing this is that our autoencoder is learning an amortized, linear approximation to a multi-step, non linear sparse coding algorithm. Allowing the weights of the encoder to be independent from the decoder enables more representational capacity as we empirically observe.
    - heading "Neuron Resampling" [level=4] [ref=e35162]:
      - link "Neuron Resampling" [ref=e35163] [cursor=pointer]:
        - /url: "#appendix-autoencoder-resampling"
    - paragraph [ref=e35164]:
      - text: Over the course of training, a subset of autoencoder neurons will have zero activity across a large number of datapoints. We find that “resampling” these dead neurons during training improves the number of likely-interpretable features (i.e., those in the high density cluster, see
      - link "Feature Density Histograms" [ref=e35165] [cursor=pointer]:
        - /url: "#appendix-feature-density"
      - text: ) and reduces total loss. This resampling may be compatible with the Lottery Ticket Hypothesis
      - generic [ref=e35168]: "[75]"
      - text: and increase the number of chances the network has to find promising feature directions.
    - paragraph [ref=e35169]: An interesting nuance around dead neurons involves the ultralow density cluster. We find that if we increase the number of training steps then networks will kill off more of these ultralow density neurons. This reinforces the use of the high density cluster as a useful metric because there can exist neurons that are de facto dead but will not appear to be when looking at the number of dead neurons alone.
    - paragraph [ref=e35170]:
      - text: "The number of dead neurons that appear over training appears to depend upon a number of factors including but not limited to: learning rate (too high); batch size (too low); dataset redundancy (too many tokens per context or repeated epochs over the same dataset); number of training steps (too many); optimizer used. Our results here agree with those of Bricken et al."
      - generic [ref=e35173]: "[72]"
      - text: .
    - paragraph [ref=e35174]: "Better resampling strategies is an active research area of ours. The approach used in this work is as follows:"
    - list [ref=e35175]:
      - listitem [ref=e35176]: At training steps 25,000, 50,000, 75,000 and 100,000, identify which neurons have not fired in any of the previous 12,500 training steps.
      - listitem [ref=e35177]: Compute the loss for the current model on a random subset of 819,200 inputs.
      - listitem [ref=e35178]: Assign each input vector a probability of being picked that is proportional to the square of the autoencoder’s loss on that input.
      - listitem [ref=e35179]: For each dead neuron sample an input according to these probabilities. Renormalize the input vector to have unit L2 norm and set this to be the dictionary vector for the dead autoencoder neuron.
      - listitem [ref=e35180]: For the corresponding encoder vector, renormalize the input vector to equal the average norm of the encoder weights for alive neurons × 0.2. Set the corresponding encoder bias element to zero.
      - listitem [ref=e35181]: Reset the Adam optimizer parameters for every modified weight and bias term.
    - paragraph [ref=e35182]: This resampling procedure is designed to seed new features to fit inputs where the current autoencoder performs worst. Resetting the encoder norm and bias are crucial to ensuring this resampled neuron will only fire weakly for inputs similar to the one used for its reinitialization. We do this to minimize interference with the rest of the network.
    - paragraph [ref=e35183]: This resampling approach outperforms baselines including no resampling and reinitializing the relevant encoder and decoder weights using a default Kaiming Uniform initialization. However, there are likely better resampling methods to be developed – this approach still causes sudden loss spikes, and resampling too frequently causes training to diverge.
    - heading "Learning Rate Sweep" [level=4] [ref=e35184]:
      - link "Learning Rate Sweep" [ref=e35185] [cursor=pointer]:
        - /url: "#appendix-learning-rate-sweep"
    - paragraph [ref=e35186]:
      - text: We performed several training runs using multiple learning rates while also varying the number of training steps and found that lower learning rates, when given sufficient training steps, result in lower total loss and more “real” features discovered (as indicated by the
      - link "Feature Density Histograms" [ref=e35187] [cursor=pointer]:
        - /url: "#appendix-feature-density"
      - text: ). We also tried annealing our learning rate over the course of training but found that this did not further increase performance.
    - heading "Interaction Between Adam and Decoder Normalization" [level=4] [ref=e35188]:
      - link "Interaction Between Adam and Decoder Normalization" [ref=e35189] [cursor=pointer]:
        - /url: "#appendix-autoencoder-optimization"
    - paragraph [ref=e35190]: Recall that we constrain our dictionary vectors to have unit norm. Our first naive implementation simply reset all vectors to unit norm after each gradient step. This means any gradient updates modifying the length of our vector are removed, creating a discrepancy between the gradient used by the Adam optimizer and the true gradient. We find that instead removing any gradient information parallel to our dictionary vectors before applying the gradient step results in a small but real reduction in total loss.
    - 'heading "Advice for Training Sparse Autoencoders: Hyperparameter Selection" [level=3] [ref=e35191]':
      - 'link "Advice for Training Sparse Autoencoders: Hyperparameter Selection" [ref=e35192] [cursor=pointer]':
        - /url: "#appendix-hyperparameters"
    - paragraph [ref=e35193]: The ultimate goal of dictionary learning is to produce features that are interpretable and also accurately represent the underlying model. Quantitatively measuring interpretability is currently difficult and slow, so we frequently look at proxy metrics when testing changes or optimizing hyperparameters. Our methods for optimizing hyperparameters are far from perfect, but we want to share insights that may be useful for other researchers doing similar work.
    - paragraph [ref=e35194]: "We most frequently look at the following proxy metrics:"
    - list [ref=e35195]:
      - listitem [ref=e35196]: "Training loss: This is the simplest metric, and useful for testing changes such as optimizers or learning rates. Unfortunately, it isn’t meaningful to compare training loss across hyperparameters that change the loss function, such as L1 coefficients."
      - listitem [ref=e35197]:
        - link "Feature Density Histograms" [ref=e35199] [cursor=pointer]:
          - /url: "#appendix-feature-density"
        - text: ": Specific metrics from these histograms include:"
    - list [ref=e35200]:
      - listitem [ref=e35201]: The number of alive features outside of the ultralow density cluster
      - listitem [ref=e35202]: The minimum feature density at which we see a significant number of non-ultralow-density-cluster features.
      - listitem [ref=e35203]: The number of features with density above 1%. A significant number of features above this level seems to correspond to an L1 coefficient that is too low.
    - list [ref=e35204]:
      - listitem [ref=e35205]:
