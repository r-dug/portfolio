    - paragraph [ref=e32647]:
      - text: "If such a sparse decomposition exists, it raises an important question: are models in some fundamental sense composed of features or are features just a convenient post-hoc description? In this paper, we take an agnostic position, though our"
      - link "results" [ref=e32648] [cursor=pointer]:
        - /url: "#phenomenology-universality"
      - text: on feature universality suggest that features have some existence beyond individual models.
    - heading "Superposition Hypothesis" [level=4] [ref=e32649]
    - paragraph [ref=e32650]:
      - text: To see how this decomposition relates to superposition, recall that the superposition hypothesis postulates that neural networks “want to represent more features than they have neurons”. We think this happens via a kind of “noisy simulation”, where small neural networks exploit feature sparsity and properties of high-dimensional spaces to approximately simulate much larger much sparser neural networks
      - generic [ref=e32653]: "[5]"
      - text: .
    - figure [ref=e32654]:
      - img [ref=e32655]
    - paragraph [ref=e32656]:
      - text: A consequence of this is that we should expect the feature directions to form an overcomplete basis. That is, our decomposition should have more directions
      - generic [ref=e32657]:
        - text: "\\mathbf{d}_i"
        - generic [ref=e32659]:
          - math [ref=e32661]:
            - generic [ref=e32664]:
              - generic [ref=e32665]: d
              - generic [ref=e32666]: i
          - generic [ref=e32669]:
            - generic [ref=e32670]: d
            - generic [ref=e32675]: i
      - text: than neurons. Moreover, the feature activations should be sparse, because sparsity is what enables this kind of noisy simulation. This is mathematically identical to the classic problem of dictionary learning.
    - heading "What makes a good decomposition?" [level=3] [ref=e32679]:
      - link "What makes a good decomposition?" [ref=e32680] [cursor=pointer]:
        - /url: "#problem-setup-good-decomposition"
    - paragraph [ref=e32681]: "Suppose that a dictionary exists such that the MLP activation of each datapoint is in fact well approximated by a sparse weighted sum of features as in equation 1. That decomposition will be useful for interpreting the neural network if:"
    - list [ref=e32682]:
      - listitem [ref=e32683]:
        - text: We can interpret the conditions under which each feature is active. That is, we have a description of which datapoints
        - generic [ref=e32684]:
          - text: j
          - generic [ref=e32686]:
