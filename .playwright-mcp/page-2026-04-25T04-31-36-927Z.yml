        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a-neurons.html#feature-67
      - text: . DNA contexts form a tiny sliver of that neuron's activating examples. The neuron whose coefficient is the highest in our feature's vector,
      - link "A/neurons/227" [ref=e33337] [cursor=pointer]:
