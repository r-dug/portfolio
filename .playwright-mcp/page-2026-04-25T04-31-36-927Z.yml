          - text: that comes next to get an attribution score of
          - generic [ref=e35698]:
            - text: "f_i(t_j)v_{it_{j+1}}"
            - generic [ref=e35700]:
              - math [ref=e35702]:
                - generic [ref=e35704]:
                  - generic [ref=e35705]:
                    - generic [ref=e35706]: f
                    - generic [ref=e35707]: i
                  - generic [ref=e35708]: (
