    - paragraph [ref=e33350]:
      - text: We now consider a
      - link "base64" [ref=e33351] [cursor=pointer]:
        - /url: https://en.wikipedia.org/wiki/Base64
      - text: feature,
      - link "A/1/2357" [ref=e33352] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-2357
      - text: . We're particularly excited by this feature because we discovered a base64 neuron in our SoLU paper
      - generic [ref=e33355]: "[38]"
      - text: ", suggesting that base64 might be quite universal – even across models trained on somewhat different datasets and with different architectures. We model base64 strings as random sequences of characters from"
      - code [ref=e33356]: "[a-zA-Z0-9+/]"
      - text: . The activation distribution colored by the corresponding computational proxy, together with the random dataset examples from each activation level, shows that this feature is quite specific to base64.
    - figure [ref=e33357]:
      - img [ref=e33358]
    - paragraph [ref=e33359]:
      - text: This is not the only feature active in base64 contexts, and in a section
      - link "below" [ref=e33360] [cursor=pointer]:
        - /url: "#features-seem-like-bugs-2"
      - text: we discuss the two others, one of which fires on single digits in base64 contexts (like the 2, 4, 7, and 9 on which A/1/2357 doesn't activate in the figure above), exploiting a property of the BPE tokenizer to make a better prediction.
    - paragraph [ref=e33361]: Turning to the logit weights, they have a second mode consisting of highly base64-specific tokens. The main mode seems to primarily be interference, but the right side is skewed towards base64-neutral or slightly base64-leaning tokens. (If we look at the conditional below, we see a more continuous transition to base64-specific tokens.)
    - figure [ref=e33362]:
      - img [ref=e33363]
    - paragraph [ref=e33364]:
      - text: There is a more continuous transition between non-base64 and base64 tokens than we saw in the Arabic script example. This difference likely arises because whether a token occurs more in Arabic script than in other text is a relatively binary distinction, whereas whether a token occurs more in base64 or other text varies more continuously. For instance,
      - code [ref=e33365]: fr
      - text: is both a common abbreviation for the French language and also a base64 token, so it makes sense for the model to be cautious in up-weighting
      - code [ref=e33366]: fr
      - text: because it might already have a higher prior due to use in French. Indeed, any token consisting of letters from the English alphabet will have some nontrivial probability of appearing in base64 strings.
    - paragraph [ref=e33367]:
      - text: The Pearson correlation between the computational proxy and the activity of
      - link "A/1/2357" [ref=e33368] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-2357
      - text: is just 0.38. We believe that is mostly because the proxy is too broad. For example hexadecimal strings (those made of
      - code [ref=e33369]: "[0-9A-F]"
      - text: ) activate the proxy, as they are quite different from the overall data distribution, but are actually predicted by a feature of their own,
      - link "A/1/3817" [ref=e33370] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2023/monosemantic-features/vis/a1.html#feature-3817
      - text: .
