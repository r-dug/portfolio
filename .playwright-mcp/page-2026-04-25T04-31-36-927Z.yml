            - text: "v_{it_{j+1}}"
            - generic [ref=e35636]:
              - math [ref=e35638]:
                - generic [ref=e35641]:
                  - generic [ref=e35642]: v
                  - generic [ref=e35643]:
                    - generic [ref=e35644]: i
