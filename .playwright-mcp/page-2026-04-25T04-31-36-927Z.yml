    - paragraph [ref=e32194]: In the following subsections, we will motivate this setup at more length. Additionally, a more detailed discussion of the architectural details and training of these models can be found in the appendix.
    - heading "Features as a Decomposition" [level=3] [ref=e32195]:
      - link "Features as a Decomposition" [ref=e32196] [cursor=pointer]:
        - /url: "#problem-setup-decomposition"
    - paragraph [ref=e32197]:
      - text: There is significant empirical evidence suggesting that neural networks have interpretable linear directions in activation space. This includes classic work by Mikolov et al.
      - generic [ref=e32200]: "[20]"
      - text: investigating "vector arithmetic" in word embeddings (but see
      - generic [ref=e32203]: "[21]"
      - text: ) and similar results in other latent spaces (e.g.
      - generic [ref=e32206]: "[22]"
      - text: ). There is also a large body of work investigating interpretable neurons, which are just basis dimensions (e.g. in RNNs
      - generic [ref=e32209]: "[23, 24]"
      - text: ; in CNNs
      - generic [ref=e32212]: "[25, 26, 27]"
      - text: ; in GANs
      - generic [ref=e32215]: "[28]"
      - text: ; but see
      - generic [ref=e32218]: "[29, 30]"
      - text: ). A longer review and discussion of this work can be found in the
      - link "Motivation section" [ref=e32219] [cursor=pointer]:
        - /url: https://transformer-circuits.pub/2022/toy_model/index.html#motivation
      - text: of Toy Models
      - generic [ref=e32222]: "[5]"
      - text: ", although it doesn't cover more recent work (e.g."
      - generic [ref=e32225]: "[31, 32, 33]"
      - text: ).
      - superscript [ref=e32227]: "2"
    - paragraph [ref=e32228]: If linear directions are interpretable, it's natural to think there's some "basic set" of meaningful directions which more complex directions can be created from. We call these directions features, and they're what we'd like to decompose models into. Sometimes, by happy circumstances, individual neurons appear to be these basic interpretable units (see examples above). But quite often, this isn't the case.
