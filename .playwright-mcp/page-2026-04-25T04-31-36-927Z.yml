          - generic [ref=e35114]: m≥n
      - text: ", and the MSE is a mean over each vector element while the L1 penalty is a sum (with"
      - generic [ref=e35115]:
        - text: \lambda
        - generic [ref=e35117]:
          - math [ref=e35119]:
