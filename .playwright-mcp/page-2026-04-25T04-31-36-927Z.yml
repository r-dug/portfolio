    - heading "Automated Interpretability" [level=3] [ref=e35321]:
      - link "Automated Interpretability" [ref=e35322] [cursor=pointer]:
        - /url: "#appendix-automated"
    - paragraph [ref=e35323]: Here we provide more details on the implementation of our automated interpretability before explaining importance scoring and providing additional results.
    - heading "Experimental Setup" [level=4] [ref=e35324]:
      - link "Experimental Setup" [ref=e35325] [cursor=pointer]:
        - /url: "#appendix-automated-setup"
    - paragraph [ref=e35326]:
      - text: "In order to get feature explanations Claude 2 is provided with a total of 49 examples: ten examples from the top activations interval; two from the other 12 intervals; five completely random examples; and ten examples where the top activating tokens appear in different contexts."
      - superscript [ref=e35327]: "43"
      - text: For example, in the main text we discuss a feature that fires for token "the" in the context of machine learning, the ten examples here would contain the word "the" but across different contexts. We also provide the top and bottom logits and labels for what interval each example came from. In addition, we give eight human demonstrations on held out features that include chain of thought reasoning. Following Bills et al.
      - generic [ref=e35330]: "[45]"
      - text: all of our activations are quantized to be between 0-9 inclusive. Finally, we ask the model to be succinct in its answer and not provide specific examples of tokens it activates for.
    - paragraph [ref=e35331]: "Using the explanation generated, in a new interaction Claude is asked to predict activations for sixty examples: six from the top activations; two from the other 12 intervals; ten completely random; and twenty top activating tokens out of context. The same eight held out demonstration features show how each token should elicit a predicted activation. All of the examples are shuffled, the logits and interval each came from is removed, and blanks are left where the model should fill in its activation predictions. For the sake of computational efficiency, Claude scores all sixty examples in a single shot, repeating each token followed by its predicted activation. In an ideal setting, each example would be given independently as its own prompt."
    - paragraph [ref=e35332]: Note that there are instances where a feature has less than 49 explanation examples and 60 prediction examples because we remove any repeated examples that appear in the feature visualization intervals. However, this occurs for a negligible number of features and we drop any of those with fewer than 20 examples in total.
    - paragraph [ref=e35333]:
      - text: For the sake of comparison to Bills et al.
      - generic [ref=e35336]: "[45]"
      - text: the figure below includes Pearson correlation in addition to Spearman that is otherwise used throughout the text. The distributions and overall conclusions are almost identical to Spearman.
    - figure [ref=e35337]:
      - img [ref=e35338]
    - paragraph [ref=e35339]: We also systematically catalog the feature output weight logits with Claude. We use the same explanation Claude generated to predict activations and provide 100 logits, 50 taken randomly and 50 which are the 10th–60th largest positive logits (the top 10 were used to generate the original explanations and thus held out). Claude was asked to output a binary label for if this logit would plausibly come after the feature fired, given the explanation. Note that the chance performance is 50%. The A/1 features are quite a bit better than the neurons at a median of 0.74 versus 0.53 for the neurons and 0.5 for the randomized transformer.
    - heading "Randomized Transformer" [level=4] [ref=e35340]:
      - link "Randomized Transformer" [ref=e35341] [cursor=pointer]:
        - /url: "#appendix-automated-randomized"
    - paragraph [ref=e35342]: As a further ablation, we compare our human and automated interpretability approaches to the randomized transformer. It is unsurprising that the logit weight predictions are centered around random chance for the randomized transformer by the very nature of its random weights. Manual interpretability also favors the A/1 features. However, for automated interpretability the randomized features have a higher median score.
    - paragraph [ref=e35343]: Iit turns out that the randomized transformer features are distinctly bimodal, consisting of single token and polysemantic clusters which are separated out in the inset at the bottom of the following figure.
    - figure [ref=e35344]:
      - img [ref=e35345]
    - paragraph [ref=e35346]: Features are labeled as being "single token" if for all 20 examples in the top activation interval, the token with the largest activation is the same. The single token features of the randomized transformer are not only more numerous but also more truly single token, for example, firing for the same token even in the weakest activation intervals. This makes them more trivial to score as evidenced by the high scoring yellow peak (bottom row left side of the figure).
    - paragraph [ref=e35347]: Meanwhile, for the not "single token" cluster, the A/1 features score higher while the randomized features in fact have a similar distribution to that of the polysemantic neurons.
    - paragraph [ref=e35348]: Note that this bimodal clustering of the randomized transformer features is also supported by the manual human analysis where there is both a cluster at 0, the same score given to the polysemantic neurons in the main text, and a non zero cluster. The non-zero cluster scores worse than the A/1 Features here (unlike for the automated approach) because part of the rubric accounts for the logit interpretability, which scores zero in the shuffled case.
    - paragraph [ref=e35349]: The fact that the randomized transformer learns more highly single token features fits with the hypothesis that dictionary learning will learn the features of the dataset rather than the representations of the transformer.
    - heading "Importance Scoring" [level=4] [ref=e35350]:
      - link "Importance Scoring" [ref=e35351] [cursor=pointer]:
        - /url: "#appendix-automated-importance-scoring"
    - paragraph [ref=e35352]:
      - text: Importance scoring is the principled way to correct for the fact that we did not randomly sample all of the examples our model is asked to score. Formally, we assign to all tokens from random examples a weight of 1 and examples from each feature interval a weight of
      - code [ref=e35353]: feature_density*interval_probability
      - text: .
      - code [ref=e35354]: feature_density
      - text: is the fraction of times this feature fires over a large portion of the dataset and
      - code [ref=e35355]: interval_probability
      - text: converts the distribution of non-zero activations into a categorical distribution corresponding to each interval and uses the corresponding probability. We then use these weights in our Spearman correlation as before.
      - superscript [ref=e35356]: "44"
    - paragraph [ref=e35357]: The issue with importance scoring is that because our features have densities typically in the range of 1e-3 to 1e-6 (see next Appendix section), almost all of the weight is assigned to the random examples for which features almost never fire. As a result, it is possible for features to score well by almost always predicting zero and in turn favors explanations that are overly restrictive that say what the feature does not fire for, instead of what it does fire for. Conversely, explanations are highly penalized for even a small false positive rate, since the true rate of occurrences is so low.
    - paragraph [ref=e35358]: The figure below shows importance scores for features and neurons. Note that many of the features now have scores very close to zero while the neurons are relatively less affected. We hypothesize this is because the neurons, in being more polysemantic, have more non-zero activations that test their explanations on both things it does and doesn't fire for. Empirically, taking an average over features, 88% of their true activations from the random examples are zero versus 54% for the neurons (the medians are ~91% and 58%, respectively).
    - figure [ref=e35359]:
      - img [ref=e35360]
    - heading "Explanation Lengths Caveat" [level=4] [ref=e35361]:
      - link "Explanation Lengths Caveat" [ref=e35362] [cursor=pointer]:
        - /url: "#appendix-automated-explanation-length"
    - paragraph [ref=e35363]:
      - text: Claude can at times fail to wrap its explanation in the
      - code [ref=e35364]: <answer></answer>
      - text: explanation tags resulting in the full chain of thought being used instead. This can be much longer and leak more specific words that the feature fires for.
    - paragraph [ref=e35365]: Here we plot the number of characters in each explanation where the second mode to the right highlights these instances. However, not only does this happen infrequently, it also occurs across the features, neurons, and randomized transformer results. In fact, it happens the most often for neurons, occurring 19% of the time versus 15% for the randomized transformer and 13% for the features. Most importantly, it does result in significantly different scores when we split out the performance of those with long explanations from short ones.
